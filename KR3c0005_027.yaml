body:
  text: 用人第二十七聞古之善用人者必循天順人而明賞罰循天則用力寡而功立順人則刑罰省而令行明賞罰則伯夷盜跖不亂如此則白黑分矣治國之臣效功於國以履位見能於官以受職盡力於權衡以任事人臣皆宜其能勝其官輕其任而莫懷餘力於心莫負兼官之責於君故內無伏怨之亂外無馬服之患明君使事不相干故莫訟使士不兼官故技長使人不同功故莫爭爭訟止技長立則彊弱不觳力冰炭不合形天下莫得相傷治之至也釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成一輪廢尺寸而差短長王爾不能半中使中主守法術拙匠守規矩尺寸則萬不失矣君人者能去賢巧之所不能守中拙之所萬不失則人力盡而功名立明主立可為之賞設可避之罰故賢者勸賞而不見子胥之禍不肖者少罪而不見傴剖背盲者處平而不遇深谿愚者守靜而不陷險危如此則上下之恩結矣古之人曰其心難知喜怒難中也故以表示目以鼓語耳以法教心君人者釋三易之數而行一難知之心如此則怒積於上而怨積於下以積怒而御積怨則兩危矣明主之表易見故約立其教易知故言用其法易為故令行三者立而上無私心則下得循法而治望表而動隨繩而斲因攢而縫如此則上無私威之毒而下無愚拙之誅故上居明而少怒下盡忠而少罪聞之曰舉事無患者堯不得也而世未嘗無事也君人者不輕爵祿不易富貴不可與救危國故明主厲廉恥招仁義昔者介子推無爵祿而義隨文公不忍口腹而仁割其肌故人主結其德書圖著其名人主樂乎使人以公盡力而苦乎以私奪威人臣安乎以能受職而苦乎以一負二故明主除人臣之所苦而立人主之所樂上下之利莫長於此不察私門之內輕慮重事厚誅薄罪久怨細過長侮偷快數以德追禍是斷手而續以玉也故世有易身之患人主立難為而罪不及則私怨生人臣失所長而奉難給則伏怨結勞苦不撫循憂悲不哀憐喜則譽小人賢不肖俱賞怒則毀君子使伯夷與盜跖俱辱故臣有叛主使燕王內憎其民而外愛魯人則燕不用而魯不附民見憎不能盡力而務功魯見說而不能離死命而親他主如此則人臣為隙穴而人主獨立以隙穴之臣而事獨立之主此之謂危殆釋儀的而妄發雖中小不巧釋法制而妄怒雖殺戮而姦人不恐罪生甲禍歸乙伏怨乃結故至治之國有賞罰而無喜怒故聖人極有刑法而死無螫毒故姦人服發矢中的賞罰當符故堯復生羿復立如此則上無殷夏之患下無比干之禍君高枕而臣樂業道蔽天地德極萬世矣夫人主不塞隙穴而勞力於赭堊暴雨疾風必壞不去眉睫之禍而慕賁育之死不謹蕭牆之患而固金城於遠境不用近賢之謀而外結萬乘之交於千里飄風一旦起則賁育不及救而外交不及至禍莫大於此當今之世為人主忠計者必無使燕王說魯人無使近世慕賢於古無思越人以救中國溺者如此則上下親內功立外名成
