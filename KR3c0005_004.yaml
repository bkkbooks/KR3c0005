body:
  text: 愛臣第四愛臣太親必危其身人臣太貴必易主位主妾無等必危嫡子兄弟不服必危社稷臣聞千乘之君無備必有百乘之臣在其側以徙其民而傾其國萬乘之君無備必有千乘之家在其側以徙其威而傾其國是以姦臣蕃息主道衰亡是故諸侯之博大天子之害也群臣之太富君主之敗也將相之管主而隆家此君人者所外也萬物莫如身之至貴也位之至尊也主威之重主勢之隆也此四美者不求諸外不請於人議之而得之矣故曰人主不能用其富則終於外也此君人者之所識也昔者紂之亡周之卑皆從諸侯之博大也晉之分也齊之奪也皆以群臣之太富也夫燕宋之所以弒其君者皆此類也故上比之殷周中比之燕宋莫不從此術也是故明君之蓄其臣也盡之以法質之以備故不赦死不宥刑赦死宥刑是謂威淫社稷將危國家偏威是故大臣之祿雖大不得藉威城市黨與雖衆不得臣士卒故人臣處國無私朝居軍無私交其府庫不得私貸於家此明君之所以禁其邪是故不得四從不載奇兵非傳非遽載奇兵革罪死不赦此明君之所以備不虞者也
