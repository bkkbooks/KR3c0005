body:
  text: 詭使第四十五聖人之所以為治道者三一曰利二曰威三曰名夫利者所以得民也威者所以行令也名者上下之所同道也非此三者雖有不急矣今利非無有也而民不化上威非不存也而下不聽從官非無法也而治不當名三者非不存也而世一治一亂者何也夫上之所貴與其所以為治相反也夫立名號所以為尊也今有賤名輕實者世謂之高設爵位所以為賤貴基也而簡上不求見者世謂之賢威利所以行令也而無利輕威者世謂之重法令所以為治也而不從法令為私善者世謂之忠官爵所以勸民也而好名義不進仕者世謂之烈士刑罰所以擅威也而輕法不避刑戮死亡之罪者世謂之勇夫民之急名也甚其求利也如此則士之飢餓乏絶者焉得無巖居苦身以爭名於天下哉故世之所以不治者非下之罪上失其道也常貴其所以亂而賤其所以治是故下之所欲常與上之所以為治相詭也今下而聽其上上之所急也而惇愨純信用心怯言則謂之窶守法固聽令審則謂之愚敬上畏罪則謂之怯言時節行中適則謂之不肖無二心私學聽吏從教者則謂之陋難致謂之正難豫謂之廉難禁謂之齊有令不聽從謂之勇無利於上謂之願少欲寬惠行德謂之仁重厚自尊謂之長者私學成群謂之師徒間靜安居謂之有思損仁逐利謂之疾險躁佻反覆謂之智先為人而後自為類名號言泛愛天下謂之聖言大本稱而不可用行而乖於世者謂之大人賤爵祿不撓上者謂之傑下漸行如此入則亂民出則不便也上宜禁其欲滅其迹而不止也又從而尊之是教下亂上以為治也凡上之所以治者刑罰也今有私行義者尊社稷之所以立者安靜也而譟險讒諛者任四封之內所以聽從者信與德也而陂知傾覆者使令之所以行威之所以立者恭儉聽上也而巖居非世者顯倉廩之所以實者耕農之本務也而綦組錦繡刻畫為末作者富名之所以成城池之所以廣者戰士也今死士之孤飢餓乞於道而優笑酒徒之屬乘車衣絲賞祿所以盡民力易下死也今戰勝攻取之士勞而賞不霑而卜筮視手理狐蠱為順辭於前者日賜上握度量所以擅生殺之柄也今守度奉量之士欲以忠嬰上而不得見巧言利辭行姦軌以幸偷世者數御據法直言名刑相當循繩墨誅姦人所以為上治也而愈疏遠諂施順意從欲以危世者近習悉租稅專民力所以備難充倉府也而士卒之逃事伏匿附託有威之門以避徭賦而上不得者萬數夫陳善田利宅所以戰士卒也而斷頭裂腹播骨乎平原野者無宅容身身死田奪而女妹有色大臣左右無功者擇宅而受擇田而食賞利一從上出所以善剬下也而戰介之士不得職而間居之士尊顯上以此為教名安得無卑位安得無危夫卑名危位者必下之不從法令有二心務私學反逆世者也而不禁其行不破其群以散其黨又從而尊之用事者過矣上之所以立廉恥者所以厲下也今士大夫不羞汙泥醜辱而宦女妹私義之門不待次而宦賞賜所以為重也而戰鬭有功之士貧賤而便辟優徒超級名號誠信所以通威也而主掩障近習女謁並行百官主爵遷人用事者過矣大臣官人與下先謀比周雖不法行威利在下則主卑而大臣重矣夫立法令者以廢私也法令行而私道廢矣私者所以亂法也而士有二心私學巖居窞路託伏深慮大者非世細者惑下上不禁又從而尊之以名化之以實是無功而顯無勞而富也如此則士之有二心私學者焉得無深慮勉知詐與誹謗法令以求索與世相反者也凡亂上反世者常士有二心私學者也故本言曰所以治者法也所以亂者私也法立則莫得為私矣故曰道私者亂道法者治上無其道則智者有私詞賢者有私意上有私惠下有私欲聖智成群造言作辭以非法措於上上不禁塞又從而尊之是教下不聽上不從法也是以賢者顯明而居姦人賴賞而富賢者顯名而居姦人賴賞而富是以上不勝下也
