body:
  text: 難言第三臣非非難言也所以難言者言順比滑澤洋洋纚纚然則見以為華而不實敦厚恭祗鯁固慎完則見以為拙而不倫多言繁稱連類比物則見以為虛而無用總微説約徑省而不飾則見以為劌而不辨激急親近探知人情則見以為譖而不讓閎大廣博妙遠不測則見以為夸而無用家計小談以具數言則見以為陋言而近世辭不悖逆則見以為貪生而諛上言而遠俗詭躁人間則見以為誕捷敏辨給繁於文采則見以為史殊釋文學以質性言則見以為鄙時稱詩書道法往古則見以為誦此臣非之所以難言而重患也故度量雖正未必聽也義理雖全未必用也大王若以此不信則小者以為毀訾誹謗大者患禍災害死亡及其身故子胥善謀而吳戮之仲尼善説而匡圍之管夷吾實賢而魯囚之故此三大夫豈不賢哉而三君不明也上古有湯至聖也伊尹至智也夫至智説至聖然且七十説而不受身執鼎俎為庖宰昵近習親而湯乃僅知其賢而用之故曰以至智説至聖未必至而見受伊尹説湯是也以智説愚必不聽文王説紂是也故文王説紂而紂囚之翼侯炙鬼侯臘比干剖心梅伯醢夷吾束縛而曹羈奔陳伯里子道乞傅説轉鬻孫子臏腳於魏吳起抆泣於岸門痛西河之為秦卒枝解於楚公叔痤言國器反為悖公孫鞅奔秦關龍逄斬萇弘分胣尹子穽於棘司馬子期死而浮於江田明辜射宓子賤西門豹不鬭而死人手董安于死而陳於市宰豫不免於田常范雎折脅於魏此十數人者皆世之仁賢忠良有道術之士也不幸而遇悖亂暗惑之主而死然則雖賢聖不能逃死亡避戮辱者何也則愚者難説也故君子難言也且至言忤於耳而倒於心非賢聖莫能聽願大王熟察之也
