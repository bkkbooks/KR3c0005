body:
  text: 揚權第八天有大命人有大命夫香美脆味厚酒肥肉甘口而疾形曼理皓齒說情而捐精故去甚去泰身乃無害權不欲見素無為也事在四方要在中央聖人執要四方來效虛而待之彼自以之四海既藏道陰見陽左右既立開門而當勿變勿易與二俱行行之不已是謂履理也夫物者有所宜材者有所施各處其宜故上無為使雞司夜令狸執鼠皆用其能上乃無事上有所長事乃不方矜而好能下之所欺辨惠好生下因其材上下易用國故不治用一之道以名為首名正物定名倚物徙故聖人執一以靜使名自命令事自定不見其采下故素正因而任之使自事之因而豫之彼將自舉之正與處之使皆自定之上以名舉之不知其名復修其形形名參同用其所生二者誠信下乃貢情謹修所事待命於天毋失其要乃為聖人聖人之道去智與巧智巧不去難以為常民人用之其身多殃主上用之其國危亡因天之道反形之理督參鞠之終則有始虛以靜後未嘗用己凡上之患必同其端信而勿同萬民一從夫道者弘大而無形德者核理而普至至於群生斟酌用之萬物皆盛而不與其寧道者下周於事因稽而命與時生死參名異事通一同情故曰道不同於萬物德不同於陰陽衡不同於輕重繩不同於出入和不同於燥濕君不同於群臣凡此六者道之出也道無雙故曰一是故明君貴獨道之容君臣不同道下以名禱君操其名臣效其形形名參同上下和調也凡聽之道以其所出反以為之入故審名以定位明分以辨類聽言之道溶若甚醉脣乎齒乎吾不為始乎齒乎脣乎愈惛惛乎彼自離之吾因以知之是非輻湊上不與構虛靜無為道之情也參伍比物事之形也參之以比物伍之以合虛根幹不革則動泄不失矣動之溶之無為而攻之喜之則多事惡之則生怨故去喜去惡虛心以為道舍上不與共之民乃寵之上不與義之使獨為之上固閉內扃從室視庭咫尺已具皆之其處以賞者賞以刑者刑因其所為各以自成善惡必及孰敢不信規矩既設三隅乃列主上不神下將有因其事不當下考其常若天若地是謂纍解若地若天孰踈孰親能象天地是謂聖人欲治其內置而勿親欲治其外官置一人不使自恣安得移并大臣之門唯恐多人凡治之極下不能得周合刑名民乃守職去此更求是謂大惑猾民愈衆姦邪滿側故曰毋富人而貸焉毋貴人而逼焉毋專信一人而失其都國焉腓大於股難以趣走主失其神虎隨其後主上不知虎將為狗主不蚤止狗益無已虎成其群以弒其母為主而無臣奚國之有主施其法大虎將怯主施其刑大虎自寧法刑苟信虎化為人復反其真欲為其國必伐其聚不伐其聚彼將聚衆欲為其地必適其賜不適其賜亂人求益彼求我豫假仇人斧假之不可彼將用之以伐我黃帝有言曰上下一日百戰下匿其私用試其上上操度量以割其下故度量之立主之寶也黨與之具臣之寶也臣之所不弒其君者黨與不具也故上失扶寸下得尋常有國之君不大其都有道之臣不貴其家有道之君不貴其臣貴之富之彼將代之備危恐殆急置太子禍乃無從起內索出圉必身自執其度量厚者虧之薄者靡之虧靡有量毋使民比周同欺其上虧之若月靡之若熱簡令謹誅必盡其罰毋弛而弓一棲兩雄一棲兩雄其鬭㘖㘖豺狼在牢其羊不繁一家二貴事乃無功夫妻持政子無適從為人君者數披其木毋使木枝扶踈木枝扶踈將塞公閭私門將實公庭將虛主將壅圍數披其木無使木枝外拒木枝外拒將逼主處數披其木毋使枝大本小枝大本小將不勝春風不勝春風枝將害心公子既衆宗室憂吟止之之道數披其木毋使枝茂木數披黨與乃離掘其根本木乃不神填其洶淵毋使水清探其懷奪之威主上用之若電若雷
