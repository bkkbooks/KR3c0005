body:
  text: 喻老第二十一天下有道無急患則曰靜遽傳不用故曰卻走馬以糞天下無道攻擊不休相守數年不已甲冑生蟣虱鷰雀處帷幄而兵不歸故曰戎馬生於郊翟人有獻豐狐玄豹之皮於晉文公文公受客皮而歎曰此以皮之美自為罪夫治國者以名號為罪徐偃王是也以城與地為罪虞虢是也故曰罪莫大於可欲智伯兼范中行而攻趙不已韓魏反之軍敗晉陽身死高梁之東遂卒被分漆其首以為溲器故曰禍莫大於不知足虞君欲屈產之乘與垂棘之璧不聽宮之奇故邦亡身死故曰咎莫憯於欲得邦以存為常霸王其可也身以生為常富貴其可也不以欲自害則邦不亡身不死故曰知足之為足矣楚莊王既勝狩于河雍歸而賞孫叔敖孫叔敖請漢間之地沙石之處楚邦之法祿臣再世而收地唯孫叔敖獨在此不以其邦為收者瘠也故九世而祀不絕故曰善建不拔善抱不脫子孫以其祭祀世世不輟孫叔敖之謂也制在己曰重不離位曰靜重則能使輕靜則能使躁故曰重為輕根靜為躁君故曰君子終日行不離輜重也邦者人君之輜重也主父生傳其邦此離其輜重者也故雖有代雲中之樂超然已無趙矣主父萬乘之主而以身輕於天下無勢之謂輕離位之謂躁是以生幽而死故曰輕則失臣躁則失君主父之謂也勢重者人君之淵也君人者勢重於人臣之間失則不可復得也簡公失之於田成晉公失之於六卿而邦亡身死故曰魚不可脫於深淵賞罰者邦之利器也在君則制臣在臣則勝君君見賞臣則損之以為德君見罰臣則益之以為威人君見賞而人臣用其勢人君見罰人臣乘其威故曰邦之利器不可以示人越王入宦於吳而觀之伐齊以弊吳吳兵既勝齊人於艾陵張之於江濟強之於黃池故可制於五湖故曰將欲翕之必固張之將欲弱之必固強之晉獻公將欲襲虞遺之以璧馬知伯將襲仇由遺之以廣車故曰將欲取之必固與之起事於無形而要大功於天下是謂微明處小弱而重自卑損謂弱勝強也有形之類大必起於小行久之物族必起於少故曰天下之難事必作於易天下之大事必作於細是以欲制物者於其細也故曰圖難於其易也為大於其細也千丈之堤以螻蟻之穴潰百尺之室以突隙之熛焚故曰白圭之行堤也塞其穴丈人之慎火也塗其隙是以白圭無水難丈人無火患此皆慎易以避難敬細以遠大者也扁鵲見蔡桓公立有間扁鵲曰君有疾在腠理不治將恐深桓侯曰寡人無扁鵲出桓侯曰醫之好治不病以為功居十日扁鵲復見曰君之病在肌膚不治將益深桓侯不應扁鵲出桓侯又不悅居十日扁鵲復見曰君之病在腸胃不治將益深桓侯又不應扁鵲出桓侯又不悅居十日扁鵲望桓侯而還走桓侯故使人問之扁鵲曰疾在腠理湯熨之所及也在肌膚鍼石之所及也在腸胃火齊之所及也在骨髓司命之所屬無柰何也今在骨髓臣是以無請也居五日桓侯體痛使人索扁鵲已逃秦矣桓侯遂死故良醫之治病也攻之於腠理此皆爭之於小者也夫事之禍福亦有腠理之地故聖人蚤從事焉昔晉公子重耳出亡過鄭鄭君不禮叔瞻諫曰此賢公子也君厚待之可以積德鄭君不聽叔瞻又諫曰不厚待之不若殺之無令有後患鄭君又不聽及公子返晉邦舉兵伐鄭大破之取八城焉晉獻公以垂棘之璧假道於虞而伐虢大夫宮之奇諫曰不可脣亡而齒寒虞虢相救非相德也今日晉滅虢明日虞必隨之亡虞君不聽受其璧而假之道晉已取虢還反滅虞此二臣者皆爭於腠理者也而二君不用也然則叔瞻宮之奇亦虞鄭之扁鵲也而二君不聽故鄭以破虞以亡故曰其安易持也其未兆易謀也昔者紂為象箸而箕子唏以為象箸必不加於土鉶必將犀玉之柸象箸玉柸必不羹菽藿必旄象豹胎旄象豹胎必不衣短褐而食於茅屋之下則錦衣九重廣室高臺吾畏其卒故唏其始居五年紂為肉圃設炮烙登糟丘臨酒池紂遂以亡故箕子見象箸以知天下之禍故曰見小曰明勾踐入宦於吳身執干戈為吳王洗馬故能殺夫差於姑蘇文王見詈於王門顏色不變而武王擒紂於牧野故曰守柔曰強越王之霸也不病宦武王之王也不病詈故曰聖人之不病也以其不病是以無病也宋之鄙人得璞玉而獻之子罕子罕不受鄙人曰此寶也宜為君子器不宜為細人用子罕曰爾以玉為寶我以不受子玉為寶是鄙人欲玉而子罕不欲玉故曰欲不欲而不貴難得之貨王壽負書而行見徐馮於周塗馮曰事者為也為生於時知者無常事書者言也言生於知知者不藏書今子何獨負之而行於是王壽因焚其書而儛之故知者不以言談教而慧者不以藏書篋此世之所過也而王壽復之是學不學也故曰學不學復歸眾人之所過也夫物有常容因乘以導之因隨物之容故靜則建乎德動則順乎道宋人有為其君以象為楮葉者三年而成豐殺莖柯毫芒繁澤亂之楮葉之中而不可別也此人遂以功食祿於宋邦列子聞之曰使天地三年而成一葉則物之有葉者寡矣故不乘天地之資而載一人之身不隨道理之數而學一人之智此皆一葉之行也故冬耕之稼后稷不能羨也豐年大禾藏獲不能惡也以一人力則后稷不足隨自然則臧獲有餘故曰恃萬物之自然而不敢為也空竅者神明之戶牖也耳目竭於聲色精神竭于外貌故中無主中無主則禍福雖如丘山無從識之故曰不出於戶可以知天下不闚於牖可以知天道此言神明之不離其實也趙襄主學御於王子於期俄而與於期逐三易馬而三後襄主曰子之教我御術未盡也對曰術已盡用之則過也凡御之所貴馬體安于車人心調于馬而後可以進速致遠今君後則欲逮臣先則恐逮于臣夫誘道爭遠非先則後也而先後心皆在于臣上何以調於馬此君之所以後也白公勝慮亂罷朝倒杖而策銳貫顊血流至于地而不知鄭人聞之曰顊之忘將何不忘哉故曰其出彌遠者其智彌少此言智周乎遠則所遺在近也是以聖人無常行也能並智故曰不行而知能並視故曰不見而明隨時以舉事因資而立功用萬物之能而獲利其上故曰不為而成楚莊王莅政三年無令發無政為也右司馬御座而與王隱曰有鳥止南方之阜三年不翅不飛不鳴嘿然無聲此為何名王曰三年不翅將以長羽翼不飛不鳴將以觀民則雖無飛飛必沖天雖無鳴鳴必驚人子釋之不穀知之矣處半年乃自聽政所廢者十所起者九誅大臣五舉處士六而邦大治舉兵誅齊敗之徐州勝晉於河雍合諸侯於宋遂霸天下莊王不為小害善故有大名不蚤見示故有大功故曰大器晚成大音希聲楚莊王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣愚患之智如目也能見百步之外而不能自見其睫王之兵自敗於秦晉喪地數百里此兵之弱也莊蹊蹻為盜於境內而吏不能禁此政之亂也王之弱亂非越之下也而欲伐越此智之如目也王乃止故知之難不在見人在自見故曰自見之謂明子夏見曾子曾子曰何肥也對曰戰勝故肥也曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰於胸中未知勝負故臞今先王之義勝故肥是以志之難也不在勝人在自勝也故曰自勝之謂強周有玉版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故予費仲文王舉太公於渭濱者貴之也而資費仲玉版者是愛之也故曰不貴其師不愛其資雖知大迷是謂要妙
