body:
  text: 備內第十七人主之患在於信人信人則制於人人臣之於其君非有骨肉之親也縛於勢而不得不事也故為人臣者窺覘其君心也無須臾之休而人主怠慠處其上此世所以有劫君弒主也為人主而大信其子則姦臣得乘於子以成其私故李兌傅趙王而餓主父為人主而大信其妻則姦臣得乘於妻以成其私故優施傅麗姬殺申生而立奚齊夫以妻之近與子之親而猶不可信則其餘無可信者矣且萬乘之主千乘之君后妃夫人適子為太子者或有欲其君之蚤死者何以知其然夫妻者非有骨肉之恩也愛則親不愛則疏語曰其母好者其子抱然則其為之反也其母惡者其子釋丈夫年五十而好色未解也婦人年三十而美色衰矣以衰美之婦人事好色之丈夫則身見疏賤而子疑不為後此后妃夫人之所以冀其君之死者也唯母為后而子為主則令無不行禁無不止男女之樂不減於先君而擅萬乘不疑此鴆毒扼昧之所以用也故桃左春秋曰人主之疾死者不能處半人主弗知則亂多資故曰利君死者衆則人主危故王良愛馬越王勾踐愛人為戰與馳醫善吮人之傷含人之血非骨肉之親也利所加也故輿人成輿則欲人之富貴匠人成棺則欲人之夭死也非輿人仁而匠人賊也人不貴則輿不售人不死則棺不買情非憎人也利在人之死也故后妃夫人太子之黨成而欲君之死也君不死則勢不重情非憎君也利在君之死也故人主不可以不加心於利己死者故日月暈圍於外其賊在內備其所憎禍在所愛是故明王不舉不參之事不食非常之食遠聽而近視以審內外之失省同異之言以知朋黨之分偶參伍之驗以責陳言之實執後以應前按法以治衆衆端以參觀士無幸賞無踰行殺必當罪不赦則姦邪無所容其私徭役多則民苦民苦則權勢起權勢起則復除重復除重則貴人富苦民以富貴人起勢以藉人臣非天下長利也故曰徭役少則民安民安則下無重權下無重權則權勢滅權勢滅則德在上矣今夫水之勝火亦明矣然而釜鬵間之水煎沸竭盡其上而火得熾盛焚其下水失其所以勝者矣今夫治之禁姦又明於此然守法之臣為釜鬵之行則法獨明於胸中而已失其所以禁姦者矣上古之傳言春秋所記犯法為逆以成大姦者未嘗不從尊貴之臣也然而法令之所以備刑罰之所以誅常於卑賤是以其民絶望無所告訴大臣比周蔽上為一陰相善而陽相惡以示無私相為耳目以候主隙人主掩蔽無道得聞有主名而無實臣專法而行之周天子是也偏借其權勢則上下易位矣此言人臣之不可借權勢也
