body:
  text: 八經第四十八因情凡治天下必因人情人情者有好惡故賞罰可用賞罰可用則禁令可立而治道具矣君執柄以處勢故令行禁止柄者殺生之制也勢者勝眾之資也廢置無度則權瀆賞罰下共則威分是以明主不懷愛而聽不留說而計故聽言不參則權分乎姦智力不用則君窮乎臣故明主之行制也天其用人也鬼天則不非鬼則不困勢行教嚴逆而不違毀譽一行而不議故賞賢罰暴舉善之至者也賞暴罰賢舉惡之至者也是謂賞同罰異賞莫如厚使民利之譽莫如美使民榮之誅莫如重使民畏之毀莫如惡使民恥之然後一行其法禁誅於私家不害功罪賞罰必知之知之道盡矣主道力不敵眾智不盡物與其用一人不如用一國故智力敵而群物勝揣中則私勞不中則任過下君盡己之能中君盡人之力上君盡人之智是以事至而結智一聽而公會聽不一則後悖於前後悖於前則愚智不分不公會則猶豫而不斷不斷則事留自取一則毋墮壑之累故使之諷諷定而怒是以言陳之日必有筴籍結智者事發而驗結能者功見而謀成敗成敗有徵賞罰隨之事成則君收其功規敗則臣任其罪君人者合符猶不親而況於力乎事智猶不親而況於懸乎故其用人也不取同同則君怒使人相用則君神君神則下盡下盡則臣上不因君而主道畢矣起亂知臣主之異利者王以為同者劫與共事者殺故明主審公私之分審利害之地姦乃無所乘亂之所生六也主母后姬子姓弟兄大臣顯賢任吏責臣主母不放禮施異等后姬不疑分勢不貳庶適不爭權籍不失兄弟不侵下不一門大臣不擁禁賞必行顯賢不亂臣有二因謂外內也外曰畏內曰愛所畏之求得所愛之言聽此亂臣之所因也外國之置諸吏者結誅親暱重帑則外不籍矣爵祿循功請者俱罪則內不因矣外不籍內不因則姦宄塞矣官襲節而進以至大任智也其位至而任大者以三節持之曰質曰鎮曰固親戚妻子質也爵祿厚而必鎮也參伍責怒固也賢者止於質貪饕化於鎮姦邪窮於固忍不制則下上小不除則大誅而名實當則徑之生害事死傷名則行飲食不然而與其讎此謂除陰姦也翳曰詭詭曰易見功而賞見罪而罰而詭乃止是非不泄說諫不通而易乃不用父兄賢良播出曰遊禍其患鄰敵多資僇辱之人近習曰狎賊其患發忿疑辱之心生藏怒持罪而不發曰增亂其患徼幸妄舉之人起大臣兩重提衡而不踦曰卷禍其患家隆劫殺之難作脫易不自神曰彈威其患賊夫酖毒之亂起此五患者人主之不知則有劫殺之事廢置之事生於內則治生於外則亂是以明主以功論之內而以利資之外故其國治而敵亂即亂之道臣憎則起外若眩臣愛則起內若藥立道參伍之道行參以謀多揆伍以責失行參必拆揆伍必怒不拆則瀆上不怒則相和拆之徵足以知多寡怒之前不及其眾觀聽之勢其徵在比周而賞異也誅毋謁而罪同言會眾端必揆之以地謀之以天驗之以物參之以人四徵者符乃可以觀矣參言以知其誠易視以改其澤執見以得非常一用以務近習重言以懼遠使舉往以悉其前即邇以知其內䟽置以知其外握明以問所闇詭使以絕黷泄倒言以嘗所疑論反以得陰姦設諫以綱獨為舉錯以觀姦動明說以誘避過卑適以觀直諂宣聞以通未見作鬭以散朋黨深一以警眾心泄異以易其慮似類則合其參陳過則明其固知罪辟罪以止威陰使時循以省衷漸更以離通比下約以侵其上相室約其廷臣廷臣約其官屬軍吏約其兵士遣使約其行介縣令約其辟吏郎中約其左右后姬約其宮媛此之謂條達之道言通事泄則術不行參言明主其務在周密是以喜見則德償怒見則威分故明主之言隔塞而不通周密而不見故以一得十者下道也以十得一者上道也明主兼行上下故姦無所失伍閭連縣而鄰謁過賞失過誅上之於下下之於上亦然是故上下貴賤相畏以法相誨以利民之性有生之實有生之名為君者有賢知之名有賞罰之實名實俱至故福善必聞矣聽法聽不參則無以責下言不督乎用則邪說當上言之為物也以多信不然之物十人云疑百人然乎千人不可解也吶者言之疑辯者言之信姦之食上也取資乎眾籍信乎辯而以類飾其私人主不饜忿而待合參其勢資下也有道之主聽言督其用課其功功課而賞罰生焉故無用之辯不留朝任事者知不足以治職則官收說大而誇則窮端故姦得而怒無故而不當為誣誣而罪臣言必有報說必責用也故朋黨之言不上聞凡聽之道人臣忠論以聞姦博論以內一人主不智則姦得資明主之道己喜則求其所納己怒則察其所搆論於已變之後以得毀譽公私之徵眾諫以效智故使君自取一以避罪故眾之諫也敗君之取也無副言於上以設將然令符言於後以知謾誠語明主之道臣不得兩諫必任其一語不得擅行必合其參故姦無道進矣類柄官之重也毋法也法之息也上闇也上闇無度則官擅為官擅為故奉重無前奉重無前則徵多徵多故富官之富重也亂功之所生也明主之道取於任賢於官賞於功言程主喜俱必利不當主怒俱必害則人不私父兄而進其仇讎勢足以行法奉足以給事而私無所生故民勞苦而輕官任事也毋重使其寵必在爵處官者毋私使其利必在祿故民尊爵而重祿爵祿所以賞也民重所以賞也則國治刑之煩也名之繆也賞譽不當則民疑民之重名與其重賞也均賞者有誹焉不足以勸罰者有譽焉不足以禁明主之道賞必出乎公利名必在乎為上賞譽同軌非誅俱行然則民無榮於賞之內有重罰者必有惡名故民畏罰所以禁也民畏所以禁則國治矣主威行義示則主威分慈仁聽則法制毀民以制畏上而上以勢卑下故下肆很觸而榮於輕君之俗則主威分民以法難犯上而上以法撓慈仁故下明愛施而務賕納之政是以法令隳尊私行以貳主威行賕納以疑法聽之則亂治不聽則謗主故君輕乎位而法亂乎官此之謂無常之國明主之道臣不得以行義成榮不得以家利為功功名所生必出於官法法之所外雖有難行不以顯焉故民無以私名設法度以齊民信賞罰以盡民能明誹譽以勸沮名號賞罰法令三隅故大臣有行則尊君百姓有功則利上此之謂有道之國也
