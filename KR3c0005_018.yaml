body:
  text: 南面第十八人主之過在已任臣矣又必反與其所不任者備之此其説必與其所任者為讎而主反制於其所不任者今所與備人者且曩之所備也人主不能明法而以制大臣之威無道得小人之信矣人主釋法而以臣備臣則相愛者比周而相譽相憎者朋黨而相非非譽交爭則主惑亂矣人臣者非名譽請謁無以進取非背法專制無以為威非假於忠信無以不禁三者惛主壞法之資也人主使人臣雖有智能不得背法而專制雖有賢行不得踰功而先勞雖有忠信不得釋法而不禁此之謂明法人主有誘於事者有壅於言者二者不可不察也人臣易言事者少索資以事誣主主誘而不察因而多之則是臣反以事制主也如是者謂之誘誘於事者困於患其進言少其退費多雖有功其進言不信不信者有罪事有功者不賞則群臣莫敢飾言以惛主主道者使人臣前言不復於後後言不復於前事雖有功必伏其罪謂之任下人臣為主設事而恐其非也則先出説設言曰議是事者妬事者也人主藏是言不更聽群臣群臣畏是言不敢議事二勢者用則忠臣不聽而譽臣獨任如是者謂之壅於言壅於言者制於臣矣主道者使人臣必有言之責又有不言之責言無端末辨無所驗者此言之責也以不言避責持重位者此不言之責也人主使人臣言者必知其端以責其實不言者必問其取舍以為之責則人臣莫敢妄言矣又不敢默然矣言默則皆有責也人主欲為事不通其端末而以明其欲有為之者其為不得利必以害反知此者任理去欲舉事有道計其入多其出少者可為也惑主不然計其入不計其出出雖倍其入不知其害則是名得而實亡如是者功小而害大矣凡功者其入多其出少乃可謂功今大費無罪而少得為功則人臣出大費而成小功小功成而主亦有害不知治者必曰無變古毋易常變與不變聖人不聽正治而已然則古之無變常之毋易在常古之可與不可伊尹毋變殷太公毋變周則湯武不王矣管仲毋易齊郭偃毋更晉則桓文不霸矣凡人難變古者憚易民之安也夫不變古者襲亂之迹適民心者恣姦之行也民愚而不知亂上懦而不能更是治之失也人主者明能知治嚴必行之故雖拂於民必立其治説在商君之內外而鐵殳重盾而豫戒也故郭偃之始治也文公有官卒管仲始治也桓公有武車戒民之備也是以愚戇窳墯之民苦小費而忘大利也故夤虎受阿謗而𨌑小變而失長便故鄒賈非載旅狎習於亂而容於治故鄭人不能歸
