body:
  text: 外儲説右上第三十四君所以治臣者有三經一勢不足以化則除之師曠之對晏子之説皆舍勢之易也而道行之難是與獸逐走也未知除患患之可除在子夏之説春秋也善持勢者蚤絶其姦萌故季孫讓仲尼以遇勢而況錯之於君乎是以太公望殺狂矞而臧獲不乘驥嗣公知之故不駕鹿薛公知之故與二欒博此皆知同異之反也故明主之牧臣也説在畜烏經二人主者利害之軺轂也射者衆故人主共矣是以好惡見則下有因而人主惑矣辭言通則臣難言而主不神矣説在申子之言六慎與唐易之言弋也患在國羊之請變與宣王之太息也明之以靖郭氏之獻十珥也與犀首甘茂之道穴聞也堂溪公知術故問玉卮昭侯能術故以聽獨寢明主之道在申子之勸獨斷也經三術之不行有故不殺其狗則酒酸夫國亦有狗且左右皆社鼠也人主無堯之再誅與莊王之應太子而皆有薄媼之決蔡嫗也知貴不能以教歌之法先揆之吳起之出愛妻文公之斬顛頡皆違其情者也故能使人彈疽者必其忍痛者也説一賞之譽之不勸罰之毀之不畏四者加焉不變則其除之齊景公之晉從平公飲師曠侍坐景公問政於師曠曰太師將奚以教寡人師曠曰君必惠民而已中坐酒酣將出又復問政於師曠曰太師奚以教寡人曰君必惠民而已矣景公出之舍師曠送之又問政於師曠師曠曰君必惠民而已矣景公歸思未醒而得師曠之所謂公子尾公子夏者景公之二弟也甚得齊民家富貴而民説之擬於公室此危吾位者也今謂我惠民者使我與二弟爭民耶於是反國發廩粟以賦衆貧散府餘財以賜孤寡倉無陳粟府無餘財宮婦不御者出嫁之七十受祿米鬻德惠施於民也已與二弟爭居二年二弟出走公子夏逃楚公子尾走晉景公與晏子遊於少海登柏寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎景公曰寡人有此國也而曰田成氏有之何也晏子對曰夫田成氏甚得齊民其於民也上之請爵祿行諸大臣下之私大斗斛區釜以出貸小斗斛區釜以收之殺一牛取一豆肉餘以食士終歲布帛取二制焉餘以衣士故市木之價不加貴於山澤之魚鹽龜鱉螺蚌不貴於海君重斂而田成氏厚施齊嘗大飢道旁餓死者不可勝數也父子相牽而趨田成氏者不聞不生故秦周之民相與歌之曰謳乎其已乎苞乎其往歸田成子乎詩曰雖無德與女式歌且舞今田成氏之德而民之歌舞民德歸之矣故曰其田成氏乎公泫然出涕曰不亦悲乎寡人有國而田成氏有之今為之奈何晏子對曰君何患焉若君欲奪之則近賢而遠不肖治其煩亂緩其刑罰振貧窮而恤孤寡行恩惠而給不足民將歸君則雖有十田成氏其如君何或曰景公不知用勢而師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良佐轡則身不勞而易及輕獸矣今釋車輿之利捐六馬之足與王良之御而下走逐獸則雖樓季之足無時及獸矣託良馬固車則臧獲有餘國者君之車也勢者君之馬也夫不處勢以禁誅擅愛之臣而必德厚以與天下齊行以爭民是皆不乘君之車不因馬之利舍車而下走者也故曰景公不知用勢之主也而師曠晏子不知除患之臣也子夏曰春秋之記臣殺君子殺父者以十數矣皆非一日之積也有漸而以至矣凡姦者行久而成積積成而力多力多而能殺故明主蚤絶之今田常之為亂有漸見矣而君不誅晏子不使其君禁侵陵之臣而使其主行惠故簡公受其禍故子夏曰善持勢者蚤絶姦之萌季孫相魯子路為郈令魯以五月起衆為長溝當此之為子路以其私秩粟為漿飯要作溝者於五父之衢而餐之孔子聞之使子貢往覆其飯擊毀其器曰魯君有民子奚為乃餐之子路怫然怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共其所有而同其利者也今以由之秩粟而餐民不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之餐之為愛之也夫禮天子愛天下諸侯愛境內大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子令徒役而餐之將奪肥之民耶孔子駕而去魯以孔子之賢而季孫非魯君也以人臣之資假人主之術蚤禁於未形而子路不得行其私惠而害不得生況人主乎以景公之勢而禁田常之侵也則必無劫弒之患矣太公望東封於齊齊東海上有居士曰狂矞華士昆弟二人者立議曰吾不臣天子不友諸侯耕作而食之掘井而飲之吾無求於人也無上之名無君之祿不事仕而事力太公望至於營丘使吏執殺之以為首誅周公旦從魯聞之發急傳而問之曰夫二子賢者也今日饗國而殺賢者何也太公望曰是昆弟二人立議曰吾不臣天子不友諸侯耕作而食之掘井而飲之吾無求於人也無上之名無君之祿不事仕而事力彼不臣天子者是望不得而臣也不友諸侯者是望不得而使也耕作而食之掘井而飲之無求於人者是望不得以賞罰勸禁也且無上名雖知不為望用不仰君祿雖賢不為望功不仕則不治不任則不忠且先王之所以使其臣民者非爵祿則刑罰也今四者不足以使之則望當誰為君乎不服兵革而顯不親耕耨而名又非所以教於國也今有馬於此如驥之狀者天下之至良也然而驅之不前卻之不止左之不左右之不右則臧獲雖賤不託其足臧獲之所願託其足於驥者以驥之可以追利辟害也今不為人用臧獲雖賤不託其足焉已自謂以為世之賢士而不為主用行極賢而不用於君此非明主之所臣也亦驥之不可左右矣是以誅之一曰太公望東封於齊海上有賢者狂矞太公望聞之往請焉三卻馬於門而狂矞不報見也太公望誅之當是時也周公旦在魯馳往止之比至已誅之矣周公旦曰狂矞天下賢者也夫子何為誅之太公望曰狂矞也議不臣天子不友諸侯吾恐其亂法易教也故以為首誅今有馬於此形容似驥也然驅之不往引之不前雖臧獲不託足於其軫也如耳説衛嗣公衛嗣公説而太息左右曰公何為不相也公曰夫馬似鹿者而題之千金然而有千金之馬而無千金之鹿者馬為人用而鹿不為人用也今如耳萬乘之相也外有大國之意其心不在衛雖辨智亦不為寡人用吾是以不相也薛公之相魏昭侯也左右有欒子者曰陽胡潘其於王甚重而不為薛公薛公患之於是乃召與之博豫之人百金令之昆弟博俄又益之人二百金方博有間謁者言客張季之子在門公怫然怒撫兵而授謁者曰殺之吾聞季之不為文也立有間時季羽在側曰不然竊聞季為公甚顧其人陰未聞耳乃輟不殺客大禮之曰曩者聞季之不為文也故欲殺之今誠為文也豈忘季哉告廩獻千石之粟告府獻五百金告騶私廄獻良馬固車二乘因令奄將宮人之美妾二十人并遺季也欒子因相謂曰為公者必利不為公者必害吾曹何愛不為公因私競勸而遂為之薛公以人臣之勢假人主之術也而害不得生況錯之人主乎夫馴烏者斷其下翎焉斷其下翎則必恃人而食焉得不馴乎夫明主畜臣亦然令臣不得不利君之祿不得無服上之名夫利君之祿服上之名焉得不服説二申子曰上明見人備之其不明見人惑之其知見人飾之不知見人匿之其無欲見人司之其有欲見人餌之故曰吾無從知之惟無為可以規之一曰申子曰慎而言也人且知女慎而行也人且隨女而有知見也人且匿女而無知見也人且意女女有知也人且臧女女無知也人且行女故曰惟無為可以規之田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廩田子方曰善子加之弋我加之國鄭長者聞之曰田子方知欲為廩而未得所以為廩夫虛無無見者廩也一曰齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廩王曰何謂謹廩對曰鳥以數十目視人人以二目視鳥奈何不謹廩也故曰在於謹廩也王曰然則為天下何以為此廩今人主以二目視一國一國以萬目視人主將何以自為廩乎對曰鄭長者有言曰夫虛靜無為而無見也其可以為此廩乎國羊重於鄭君聞君之惡己也侍飲因先謂君曰臣適不幸而有過願君幸而告之臣請變更則臣免死罪矣客有説韓宣王宣王説而太息左右引王之説之以先告客以為德靖郭君之相齊也王后死未知所置乃獻玉珥以知之一曰薛公相齊齊威王夫人死中有十孺子皆貴於王薛公欲知王所欲立而請置一人以為夫人王聽之則是説行於王而重於置夫人也王不聽是説不行而輕於置夫人也欲先知王之所欲置以勸王置之於是為十玉珥而美其一而獻之王以賦十孺子明日坐視美珥之所在而勸王以為夫人甘茂相秦惠王惠王愛公孫衍與之間有所言曰寡人將相子甘茂之吏道穴聞之以告甘茂甘茂入見王曰王得賢相臣敢再拜賀王曰寡人託國於子安更得賢相對曰將相犀首王曰子安聞之對曰犀首告臣王怒犀首之泄乃逐之一曰犀首天下之善將也梁王之臣也秦王欲得之與治天下犀首曰衍其人臣者也不敢離主之國居期年犀首抵罪於梁王逃而入秦秦王甚善之樗里疾秦之將也恐犀首之代之將也鑿穴於王之所常隱語者俄而王果與犀首計曰吾欲攻韓奚如犀首曰秋可矣王曰吾欲以國纍子子必勿泄也犀首反走再拜曰受命於是樗里疾也道穴聽之矣郎中皆曰兵秋起攻韓犀首為將於是日也郎中盡知之於是月也境內盡知之王召樗里疾曰是何胸胸也何道出樗里疾曰似犀首也王曰吾無與犀首言也其犀首何哉樗里疾曰犀首也羈旅新抵罪其心孤是言自嫁於衆王曰然使人召犀首已逃諸侯矣堂溪公謂昭侯曰今有千金之玉卮通而無當可以盛水乎昭侯曰不可有瓦器而不漏可以盛酒乎昭侯曰可對曰夫瓦器至賤也不漏可以盛酒雖有乎千金之玉卮至貴而無當漏不可盛水則人孰注漿哉今為人之主而漏其群臣之語是猶無當之玉卮也雖有聖智莫盡其術為其漏也昭侯曰然昭侯聞堂溪公之言自此之後欲發天下之大事未嘗不獨寢恐夢言而使人知其謀也一曰堂溪公見昭侯曰今有白玉之卮而無當有瓦卮而有當君渴將何以飲君曰以瓦卮堂溪公曰白玉之卮美而君不以飲者以其無當耶君曰然堂溪公曰為人主而漏泄其群臣之語譬猶玉卮之無當堂溪公每見而出昭侯必獨臥惟恐夢言泄於妻妾申子曰獨視者謂明獨聽者謂聰能獨斷者故可以為天下主説三宋人有酤酒者升概甚平遇客甚謹為酒甚美縣幟甚高著然不售酒酸怪其故問其所知問長者楊倩倩曰汝狗猛耶曰狗猛則酒何故而不售曰人畏焉或令孺子懷錢挈壺甕而往酤而狗迓而齕之此酒所以酸而不售也夫國亦有狗有道之士懷其術而欲以明萬乘之主大臣為猛狗迎而齕之此人主之所以蔽脅而有道之士所以不用也故桓公問管仲治國最奚患對曰最患社鼠矣公曰何患社鼠哉對曰君亦見夫為社者乎樹木而塗之鼠穿其間掘穴託其中燻之則恐焚木灌之則恐塗阤此社鼠之所以不得也今人君之左右出則為勢重而收利於民入則比周而蔽惡於君內間主之情以告外外內為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社鼠也故人臣執柄而擅禁明為己者必利而不為己者必害此亦猛狗也夫大臣為猛狗而齕有道之士矣左右又為社鼠而間主之情人主不覺如此主焉得無壅國焉得無亡乎一曰宋之酤酒者有莊氏者其酒常美或使僕往酤莊氏之酒其狗齕人使者不敢往乃酤他家之酒問曰何為不酤莊氏之酒對曰今日莊氏之酒酸故曰不殺其狗則酒酸桓公問管仲曰治國何患對曰最苦社鼠夫社木而塗之鼠因自託也燻之則木焚灌之則塗陀此所以苦於社鼠也今人君左右出則為勢重以收利於民入則比周謾侮蔽惡以欺於君不誅則亂法誅之則人主危據而有之此亦社鼠也故人臣執柄擅禁明為己者必利不為己者必害亦猛狗也故左右為社鼠用事者為猛狗則術不行矣堯欲傳天下於舜鯀諫曰不祥哉孰以天下而傳之於匹夫乎堯不聽舉兵而誅殺鯀於羽山之郊共工又諫曰孰以天下而傳之於匹夫乎堯不聽又舉兵而誅共工於幽州之都於是天下莫敢言無傳天下於舜仲尼聞之曰堯之知舜之賢非其難者也夫至乎誅諫者必傳之舜乃其難也一曰不以其所疑敗其所察則難也荊莊王有茅門之法曰群臣大夫諸公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理斬其輈戮其御太子怒入為王泣曰為我誅戮廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也焉可誅也夫犯法廢令不尊敬社稷者是臣乘君而下尚校也臣乘君則主失威下尚校則上位危威失位危社稷不守吾將何以遺子孫於是太子乃還走避舍露宿三日北面再拜請死罪一曰楚王急召太子楚國之法車不得至於茆門天雨廷中有潦太子遂驅車至於茆門廷理曰車不得至茆門至茆門非法也太子曰王召急不得須無潦遂驅之廷理舉殳而擊其馬敗其駕太子入為王泣曰廷中多潦驅車至茆門廷理曰非法也舉殳擊臣馬敗臣駕王必誅之王曰前有老主而不踰後有儲主而不屬矜矣是真吾守法之臣也乃益爵二級而開後門出太子勿復過衛嗣君謂薄疑曰子小寡人之國以為不足仕則寡人力能仕子請進爵以子為上卿乃進田萬頃薄子曰疑之母親疑以疑為能相萬乘所不窕也然疑家巫有蔡嫗者疑母甚愛信之屬之家事焉疑智足以信言家事疑母盡以聽疑也然已與疑言者亦必復決之於蔡嫗也故論疑之智能以疑為能相萬乘而不窕也論其親則子母之間也然猶不免議之於蔡嫗也今疑之於人主也非子母之親也而人主皆有蔡嫗人主之蔡嫗必其重人也重人者能行私者也夫行私者繩之外也而疑之所言法之內也繩之外與法之內讎也不相受也一曰衛君之晉謂薄疑曰吾欲與子皆行薄疑曰媼也在中請歸與媼計之衛君自請薄媼薄媼曰疑君之臣也君有意從之甚善衛君曰吾以請之媼媼許我矣薄疑歸言之媼也曰衛君之愛疑奚與媼媼曰不如吾愛子也衛君之賢疑奚與媼也曰不如吾賢子也媼與疑計家事已決矣乃請決之於卜者蔡嫗今衛君從疑而行雖與疑決計必與他蔡嫗敗之如是則疑不得長為臣矣夫教歌者使先呼而詘之其聲反清徵者乃教之一曰教歌者先揆以法疾呼中宮徐呼中徵疾不中宮徐不中徵不可謂教吳起衛左氏中人也使其妻織組而幅狹於度吳子使更之其妻曰諾及成復度之果不中度吳子大怒其妻對曰吾始經之而不可更也吳子出之其妻請其兄而索入其兄曰吳子為法者也其為法也且欲以與萬乘致功必先踐之妻妾然後行之子毋幾索入矣其妻之弟又重於衛君乃因以衛君之重請吳子吳子不聽遂去衛而入荊也一曰吳起示其妻以組曰子為我織組令之如是組已就而效之其組異善起曰使子為組令之如是而今也異善何也其妻曰用財若一也加務善之吳起曰非語也使之衣歸其父往請之吳起曰起家無虛言晉文公問於狐偃曰寡人甘肥周於堂卮酒豆肉集於宮壺酒不清生肉不布殺一牛遍於國中一歲之功盡以衣士卒其足以戰民乎狐子曰不足文公曰吾弛關市之征而緩刑罰其足以戰民乎狐子曰不足文公曰吾民之有喪資者寡人親使郎中視事有罪者赦之貧窮不足者與之其足以戰民乎狐子對曰不足此皆所以慎産也而戰之者殺之也民之從公也為慎産也公因而迎殺之失所以為從公矣曰然則何如足以戰民乎狐子對曰令無得不戰公曰無得不戰奈何狐子對曰信賞必罰其足以戰公曰刑罰之極安至對曰不辟親貴法行所愛文公曰善明日令田於圃陸期以日中為期後期者行軍法焉於是公有所愛者曰顛頡後期吏請其罪文公隕涕而憂吏曰請用事焉遂斬顛頡之脊以徇百姓以明法之信也而後百姓皆懼曰君於顛頡之貴重如彼甚也而君猶行法焉況於我則何有矣文公見民之可戰也於是遂興兵伐原克之伐衛東其畝取五鹿攻陽勝虢伐曹南圍鄭反之陴罷宋圍還與荊人戰城濮大敗荊人返為踐土之盟遂成衡雍之義一舉而八有功所以然者無他故異物從狐偃之謀假顛頡之脊也夫痤疽之痛也非刺骨髓則煩心不可支也非如是不能使人以半寸砥石彈之今人主之於治亦然非不知有苦則安欲治其國非如是不能聽聖知而誅亂臣亂臣者必重人重人者必人主所甚親愛也人主所甚親愛也者是同堅白也夫以布衣之資欲以離人主之堅白所愛是以解左髀説右髀者是身必死而説不行者也
