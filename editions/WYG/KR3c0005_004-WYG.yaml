body:
  text: 韓非子卷四元何犿註孤憤第十一說難第十二和氏第十三姦劫弑臣第十四孤憤第十一言法術之士既無黨與孤獨而已故其材用終不見明卞生既以抱玉而長號韓公由之寢謀而内憤智術之士必逺見而明察不明察不能燭私能法之士必强毅而勁直不勁直不能矯姦人臣循令而從事案法而治官非謂重人也重人也者無令而擅為虧法以利私耗國以便家力能得其君此所為重人也擅為虧法逆理而動其力尚能得君從已况其餘乎此謂重人也言其貴賤國人所共重之也智術之士明察聼用且燭重人之隂情智術之士既明且察今見聼用能燭見重人之隂情能法之士勁直聼用且矯重人之姦行故智術能法之士用則貴重之臣必在繩之外矣言必見削除也是智法之士與當塗之人不可兩存之仇也既不可兩存所存以相仇也當塗之人擅事要則外内為之用矣外謂百官也内謂君之左右也皆與當塗之人為用也是以諸侯不因則事不應故敵國為之訟鄰國諸侯或來求事不因當塗者其求必不見應故重人有事敵國為之訟寃百官不因則業不進故羣臣為之用郎中不因則不得近主故左右為之匿郎中為郎居中則君之左右之人也既因重人而得近主故為之匿非也學士不因則飬禄薄禮卑故學士為之談也談者謂為重人延譽此四助者邪臣之所以自飾也重人不能忠主而進其仇重人所仇者法術之士也人主不能越四助而燭察其臣臣亦謂法術之臣也故人主愈蔽而大臣愈重凢當塗者之於人主也希不信愛也又且習故重人得主信愛者多又用事既乆乃慣習故舊也若夫即主心同好惡固其所自進也官爵貴重朋黨又衆而一國為之訟訟即說也重人舉措常就主心而同其好惡已自進舉之人官爵重之朋黨衆及其有事一國為之訟寃則君無得而誅之則法術之士欲干上者非有所信愛之親習故之澤也又将以法術之言矯人主阿辟之心是與人主相反也處勢卑賤無黨孤特夫以疏逺與近愛信争近愛信謂重人是也其數不勝也數理也以新旅與習故争其數不勝也以反主意與同好争重人與君同好其數不勝也以輕賤與貴重争其數不勝也以一口與一國争重人與一國為朋黨其數不勝也法術之士操五不勝之勢以嵗數而又不得見所經時嵗已至於數猶不得見君當塗之人乘五勝之資而旦暮獨說於前法術之士既不得見故當塗之人獨訟而稱寃故法術之士奚道得進而人主奚時得悟乎法術之士既不得進則人主何從而悟乎故資必不勝而勢不兩存法術之士焉得不危法術之士既資必不可勝之數而又與重人勢不兩存則法術之士必危而見陷其可以罪過誣者公法而誅之法術之士有過失可誣㒺者重人則舉以為罪而誅之其不可被以罪過者以私劒而窮之若無過失可誣者則使俠客以劒刺之以窮其命也是明法術而逆主上者不僇於吏誅必死於私劒矣朋黨比周以蔽主言曲以便私者必信於重人矣故其可以功伐借者以官爵貴之彼有功伐重人借為己用者則官爵貴其人也其可借以美名者以外權重之彼雖無功伐可使近權令者威重之是以蔽主上而趨於私門者不顯於官爵必重於外權矣趨向也今人主不合參驗而行誅謂於法術之士不參驗以知其真偽即行誅罰不待見功而爵禄重人所進雖未見功先與之爵禄也故法術之士安能䝉死亡而進其說姦邪之臣安肯乘利而退其身故主上愈卑私門益尊夫越雖國富兵彊中國之主皆知無益於己也曰非吾所得制也越國為異國即敏國也今有國者雖地廣人衆然而人主壅蔽大臣專權是國為越也大臣專國常有謀君之心即已國還為越國故曰是國為越也智不類越而不知不類其國不察其類者也縱臣專權國變成越是不自知己國即與越國不異所以然者良以不察知己國類於越國故也人主所以謂齊亡者非地與城亡也吕氏弗制而田氏用之所以謂晉亡者亦非地與城亡也姬氏不制而六卿專之也今大臣執柄獨斷而上弗知收是人主不明也不知收取其柄而自執之令臣於上獨斷此主之不明也今謂秦也與死人同病者不可生也與亡國同事者不可存也今襲跡於齊晉欲國安存不可得也襲重也凢法術之難行也不獨萬乘干乘亦然人主之左右不必智也人主於人有所智而聼之因與左右論其言是與愚人論智也人主之左右不必賢也人主於人有所賢而禮之因與左右論其行是與不肖論賢也智者決䇿於愚人賢士程行於不肖則賢智之士羞而人主之論悖矣人臣之欲得官者其修士且以精潔固身修士謂修身之士但精潔自固其身其智士且以治辯進業智者謂智謀之士也其修士不能以貨賂事人既修身故不以貨事人也恃其精潔而更不能以枉法為治既精潔故不能枉法為治智士不重說似闕文也則修智之士不事左右不聼請謁矣左右謂財貨修智之士不肯聼從也人主之左右行非伯夷也求索不得貨賂不至則精辯之功息而毁誣之言起矣精謂修士精潔也辯謂智士辭辯也治亂之功制於近習治亂謂智士材辯能治於亂也精潔之行决於毁譽則修治之吏廢而人主之明塞矣修智之士能發人主之聰明今既廢而不用則主明自塞矣不以功伐决智行决智行當以功伐積功曰伐也不以參伍審罪過審罪過當參伍之參比驗也伍偶會也而聼左右近習之言則無能之士在廷而愚汚之吏處官矣近習之人既皆小人同氣相求同聲相應故所親者無能之人所愛者愚汚之人亦既親愛必用之在廷舉之處官矣萬乗之患大臣太重千乗之患左右太信此人主之所公患也公正也正當以此為患也且人臣有大罪人主有大失臣主之利與相異者也何以明之哉曰主利在有能而任官臣利在無能而得事主利在有勞而爵禄臣利在無功而富貴主利在豪傑使能豪傑之人有材能然後使之矣臣利在朋黨用私是以國地削而私家富主上卑而大臣重故主失勢而臣得國主更稱蕃臣君臣易位故主稱蕃臣於其臣而相室剖符相室家臣也剖符言得專投人官與之剖符也此人臣之所以譎主便私也譎誑也設詐謀以誑誤於主也故當世之重臣主變勢而得固寵者十無二三變謂行譎誑以移主意十中但有二三故曰十無二三也是其故何也人臣之罪大也臣有大罪者其行欺主也其罪當死亡也智士者逺見而畏於死亡必不從重人矣賢士者修亷而羞與姦臣欺其主必不從重臣矣是當塗者之徒屬非愚而不知患者必汚而不避姦者也重人所為必不軌故知士恐與同之亷士羞與之欺主莫有從之逰者同惡相濟故與之為徒屬者必汚愚之人也大臣挾愚汚之人上與之欺主下與之收利侵漁朋黨言侵奪百姓若漁者之取魚也比周相與阿黨為比忠信為周也比周者言以阿黨之人為忠信與親也一口惑主敗法以亂士民雷同是非故曰一口使國家危削主上勞辱此大罪也臣有大罪而主弗禁此大失也使其主有大失於上臣有大罪於下索國之不亡者不可得也說難第十二夫說者有順逆之機順以招福逆而致禍失之毫釐差之千里以此說之所以難也凢說之難非吾知之有以說之之難也不知而說雖忠見疑故曰非吾知之說之難也又非吾辯之能明吾意之難也吾雖不自辯數則能明吾所說之意如此者萬不一有所以則為難也又非吾敢横失而能盡之難也吾之所說其不可循理非敢横失能盡此意亦復難有凢說之難在知所說之心可以吾說當之既知所說之心則能隨心而發唱故所說能當所說出於為名髙者也而說之以厚利則見下節而遇卑賤必弃逺矣所說之人意在名髙今以厚利說之彼則為己志節凢下而以卑賤相遇亦既賤之必弃遺而疎逺矣所說出於厚利者也而說之以名髙則見無心而逺事情必不收矣所說之人意在厚利今以名髙說之此則為已無相時之心而闊逺事情矣如此則必見弃而不收矣所說隂為厚利而顯為名髙者也而說之以名髙則陽收其身而實疏之說之以厚利則隂用其言顯弃其身矣所說之人内隂為厚利外陽為名髙今見其外說以名髙彼雖陽收其身内實疏逺若察知其内說以厚利私用其言外明弃其身以飾其名髙也此不可不察也夫事以宻成語以泄敗未必其身泄之也而語及所匿之事如此者身危所說之人其所謀事身雖不泄謀說者泛語言及所匿似若說者先知其事今以發動之既懐此疑其身必危矣彼顯有所出事而乃以成他故說者不徒知所出而已矣又知其所以為如此者身危所說之人顯出其事有所避諱乃託以他故而說者深知其事既所出入知所為所說既知情露必有危己之心規異事而當知者揣之外而得之事泄於外必以為已也如此者身危說者為君規謀異事而智謀之士當知此者自外揣之遂得其謀因泄於外君則疑已漏之便以為不宻而加誅也周澤未渥也而語極知說行而有功則徳忘說不行而有敗則見疑如此者身危君之於已周給之澤未有渥厚遂以知之極妙而以語之行說有功猶忘其徳若不行有敗則羞始生焉此正危身之道也貴人有過端而說者明言禮義以挑其惡如此身危挑謂發揚也貴人或得計而欲自以為功說者與知焉如此者身危彊以其所不能為止以其所不能已如此者身危不能而强不已而止必以不討而興怒故危也故與之論大人則以為間已矣間代也論大人必談以道徳𢎞曠彼則以為薦大人以代之也與之論細人則以為賣重論細人必談以器斗筲彼則以為短人而賣重也論其所愛則以為藉資謂為藉君之所愛以為已資論其所憎則以為嘗已也甞試也論君所憎則謂為試己也含怒之深淺徑省其說則以為不智而拙之徑直米鹽博辯則以為多而交之米鹽之為物積羣萃以成㪷斛謂博明細雜之物則謂已多合而猥交之也畧事陳意則曰怯懦而不盡略言其事粗陳其意則謂已怯懦而有畏懼不敢具言慮事廣肆則曰草野而倨侮肆陳也所說之事廣有陳說不為忌諱則謂草野凢鄙俗直而侮慢也此說之難不可不知也凢說之務在知飾所說之所矜而滅其所耻凢欲說彼要在知其所矜則隨而光飾之知其所耻則隨而掩滅之如此則順㫖而不忤彼有私急也必以公義示而强之其意有下也然而不能已說者因為之飾其羙而少其不為也所說而成者或有私事将欲急為則示以公義而勉强之彼雖下意從已而不能止其私此則為之飾其背私之意而以不能順公為少有以激彼存公也其心有髙也而實不能及說者為之舉其過而見其惡而多其不行也若所說心以公義髙而其材實不能及如此者則舉簡私之過見背公之惡以不行私急為多所以成其髙有所矜以智能則為之舉異事之同類者多為之地使之資說於我而佯不知也以資其智所說或矜以廣智則多與舉彼同類之異事以寛所取之地令其取說於我而我佯若不知如此者所以助其智也欲内相存之言則必以羙名明之而㣲見其合於私利也欲彼内有存恤之言則為陳顯義之名明其人能為此又㣲言成此美名於私有則利其人必得而相存者也欲陳危害之事則顯其毁誹而㣲見其合於私患也欲為陳危之事其有毁誹之者則為之顯言又㣲毁誹當為私患其人必以誠而可試之譽異人與同行者規異事與同計者有與同汚者則必以大飾其無傷也有與同敗者則必以明飾其無失也說者或延譽異人與彼同行或規謀異事與彼同計其異人之行若與彼同汚則大文飾之言此汚何所傷其異事之計若與彼同敗者則明為文飾言此敗何所失如此必以已為善補過而崇重之也彼自多其力則毋以其難概之也彼或自多矜其力當就譽之無得以其所難滯礙之概礙也自勇之斷則無以其謫怒之彼或自以斷為勇則無得以其先所罪謫而動怒之也自智其計則毋以其敗窮之彼或自以計謀為智則無得以其先所困敗而窮屈之凢此皆所以䕶其短而飬其銳其說可以無傷也大意無所拂忤辭言無所繫縻然後極騁智辯焉意無拂忤辭無繫縻其智辯得以極騁此道所得親近不疑而得盡辭也說者因道此術則得親近於君終不見疑其辭又得自盡也伊尹為宰百里奚為虜皆所以干其上也二人自託於宰虜者所以干其上也此二人者皆聖人也然猶不能無役身以進加如此其汚也今以吾言為宰虜而可以聼用而振世此非能仕之所耻也夫曠日離久而周澤未渥離猶經也謂所經久逺也深計而不疑引争而不罪則明割利害以致其功斷割直指是非以飾其身直指言無所廻避也飾身謂以寵榮光飾相持其身也以此相持此說之成也君則以不疑不罪以固臣臣則以致功飾身以輸忠故曰相持如此者說之成也昔者鄭武公欲伐胡故先以其女妻胡君以娱其意因問於羣臣吾欲用兵誰可伐者大夫闗其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已遂不備鄭鄭人襲胡取之宋有富人天雨墻壊其子曰不築必将有盗其鄰人之父亦云暮而果大亡其財此夕盗至故大亡也其家甚智其子而疑鄰人之父此二人說者皆當矣厚者為戮薄者見疑二人謂闗其思鄰人之父鄭武公所以戮其所厚欲令胡不疑也富人所以疑其薄者不當為已同憂也則非知之難也處知則難也其思鄰父非不知也但處用其知不得其宜故或見疑或見戮故曰處之難也故繞朝之言當矣其為聖人於晉而為戮於秦也此不可不察晉人譎取士㑹於秦繞朝贈之以䇿曰吾謀適不用其言非不當也晉人雖以為聖後秦竟以言戮之是亦處知失宜也昔者彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子瑕母病人間往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君遊於果園食桃而甘不盡以其半啗君君曰愛我哉忘其口味以啗寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗啗我以餘桃故彌子之行未變於初也而以前之所以見賢而後獲罪者愛憎之變也故有愛於主則智當而加親有憎於主則智不當見罪而加疏故諫說談論之士不可不察愛憎之主而後說焉夫龍之為虫也柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人嬰觸人主亦有逆鱗說者能無嬰人主之逆鱗則幾矣和氏第十三楚人和氏得玉璞楚山中奉而獻之厲王厲王使玉人相之玉人曰石也王以和為誑而刖其左足及厲王薨武王即位和又奉其璞而獻之武王武王使玉人相之又曰石也王又以和為誑而刖其右足武王薨文王即位和乃抱其璞而哭於楚山之下三日三夜淚盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲也和曰吾非悲刖也悲夫寳玉而題之以石貞士而名之以誑此吾所以悲也王乃使玉人理其璞而得寳焉遂命曰和氏之璧夫珠玉人主之所急也和雖獻璞而未羙未為主之害也所獻之寳設令未美亦無害於玉也然猶兩足斬而寳乃論論寳若此其難也今人主之於法術也未必和璧之急也而禁羣臣士民之私邪人主之於法術未必如和璧之急乃更禁其臣人為卞和之忠茍無卞和之忠誰肯犯禁而論其法術亂也然則有道者之不僇也特帝王之璞未獻耳帝王之璞即法術也有道之士所以不見僇者明以未獻法術也主用術則大臣不得擅斷近習不敢賣重官行法則浮萌趨於耕農而游士危於戰陳則法術者乃羣臣士民之所禍也人主非能倍大臣之議越民萌之誹獨周乎道言也則法術之士雖至死亡道必不論矣昔者吴起教楚悼王以楚國之俗曰大臣太重封君太衆若此則上偪主而下虐民此貪國弱兵之道也不如使封君之子孫三世而收爵祿絶滅百吏之祿秩損不急之枝官枝官謂非要急者若樹之枝也然飬樹者必披落其枝為政者亦損其閒冗以奉選練之士悼王行之期年而薨矣吴起枝解於楚商君教秦孝公以連什伍設告坐之過使什家伍家相拘連中有犯罪或有告者則并坐其什伍故曰告坐燔詩書而明法令塞私門之請而遂公家之勞於公有勞者不滯其功賞禁游宦之民不守本業游散求官者設法以禁之也而顯耕戰之士孝公行之主以尊安國以富强八年而薨商君車裂於秦楚不用吴起而削亂秦行商君法而富强二子之言也已當矣然而枝解吳起而車裂商君者何也大臣苦法而細民惡治也當今之世大臣貪重大臣虧公法而行私惠所以成其重也細民安亂甚於秦楚之俗此篇非未入秦時為韓著之故得引秦以為喻而人主無悼王孝公之聼則法術之士安能䝉二子之危也而明己之法術哉此世所以亂無霸王也姦劫弑臣第十四凢姦臣皆欲順人主之心以取親幸之勢者也是以主有所善臣從而譽之主有所憎臣因而毁之凢人之大體取舍同者則相是也取舍異者則相非也今人臣之所譽者人主之所是也此之謂同取人臣之所毁者人主之所非也此之謂同舍夫取舍合而相與逆者未嘗聞也此人臣之所以信幸之道也夫姦臣得乗信幸之勢以毁譽進退羣臣者人主所有術數以御之也非叅驗以審之也必将以曩之合已信今之言此幸臣之所以得欺主成私者也故主必欺於上而臣必重於下矣此之謂擅主之臣國有擅主之臣則羣下不得盡其智力以陳其忠百官之吏不得奉法以致其功矣何以明之夫安利者就之危害者去之此人之情也今為臣盡力以致功竭智以陳忠者其身困而家貧父子罹其害為姦利以蔽人主行財貨以事貴重之臣者身尊家富父子被其澤人焉能去安利之道而就危害之處哉治國若此其過也而上欲下之無姦吏之奉法其不可得亦明矣故左右知貞信之不可以得安利也必曰我以忠信事上積功勞而求安是猶盲而欲知黒白之情必不幾矣若以道化行正理不趨富貴事上而求安是猶聾而欲審清濁之聲也愈不幾矣二者不可以得安我安能無相比周蔽主上為姦私以適重人哉此必不顧人主之義矣其百官之吏亦知方正之不可以得安也必曰我以清亷事上而求安若無規矩而欲為方圓也必不幾矣若以守法不朋黨治官而求安是猶以足搔頂也愈不幾也二者不可以得安能無廢法行私以適重人哉此必不顧君上之法矣故以私為重人者衆而以法事君者少矣是以主孤於上而臣成黨於下此田成之所以弑簡公者也夫有術者之為人臣也得效度數之言上明主法下困姦臣以尊主安國者也是以度數之言得效于前則賞罰必用于後矣人主誠明於聖人之術而不茍於世俗之言循名實而定是非因㕘驗而審言辭是以左右近習之臣知偽詐之不可以得安也必曰我不去姦私之行盡力竭智以事主而乃以相與比周妄毁譽以求安是猶負千鈞之重䧟於不測之淵而求生也必不幾矣百官之吏亦知為姦利之不可以得安也必曰我不以清亷方正奉法乃以貪汚之心枉法以取私利是猶上髙陵之顛墮峻谿之下而求生必不幾矣安危之道若此其明也左右安能以虚言惑主而百官安敢以貪漁下是以臣得陳其忠而不蔽下得守其職而不怨此管仲之所以治齊而商君之所以强秦也從是觀之則聖人之治國也固有使人不得不愛我之道而不恃人之以愛為我也恃人之以愛我者危矣恃吾不可不為者安矣夫君臣非有骨肉之親正直之道可以得利則臣盡力以事主正直之道不可以得安則臣行私以干上明主知之故設利害之道以示天下而已矣夫是以人主雖不口教百官不目索姦袤而國已治矣人主者非目若離婁乃為明也非耳若師曠乃為聦也目必不任其數而待目以為明所見者少矣非不蔽之術也耳必不因其勢而待耳以為聦所聞者寡矣非不欺之道也明主者使天下不得不為已視天下不得不為已聼故身在深宫之中而明照四海之内而天下弗能蔽弗能欺者何也闇亂之道廢而聰明之勢興也故善任勢者國安不知因其勢者國危古秦之俗君臣廢法而服私是以國亂兵弱而主卑商君說秦孝公以變法易俗而明公道賞告姦困末作而利本事當此之時秦民習故俗之有罪可以得免無功可以得尊顯也故輕犯新法於是犯之者其誅重而必告之者其賞厚而信故姦莫不得而被刑者衆民疾怨而衆過日聞孝公不聼遂行商君之法民後知有罪之必誅而私姦者衆也故民莫犯其刑無所加是以國治而兵强地廣而主尊此其所以然者匿罪之罰重而告姦之賞厚也此亦使天下必為已視聽之道也至治之法術已明矣而世學者弗知也且夫世之愚學皆不知治亂之情讘䛟多誦先古之書以亂當世之治智慮不足以避穽井之陷又妄非有術之士聽其言者危用其計者亂此亦愚之至大而患之至甚者也俱與有術之士有談說之名而實相去千萬也此夫名同而實有異者也夫世愚學之人比有術之士也猶螘垤之比大陵也其相去逺矣而聖人者審於是非之實察於治亂之情也故其治國也正明法陳嚴刑將以救羣生之亂去天下之禍使强不凌弱衆不暴寡耆老得遂㓜孤得長邊境不侵君臣相親父子相保而無死亡繫虜之患此亦功之至厚者也愚人不知顧以為暴愚者固欲治而惡其所以治皆惡危而喜其所以危者何以知之夫嚴刑重罰者民之所惡也而國之所以治也哀憐百姓輕刑罰者民之所喜而國之所以危也聖人為法國者必逆於世而順於道徳知之者同於義而異於俗弗知之者異於義而同於俗天下知之者少則義非矣處非道之位被衆口之譖溺於當世之言而欲當嚴天子而求安幾不亦難哉此夫智士所以至死而不顯於世者也楚莊王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之弃其妻也因自傷其身以視君而泣曰得為君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾余之詐為弃正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲强戲余余與争之至裂余之衣而此子之不孝莫大於此矣君怒而殺甲也故妻以妾余之詐弃而子以之死從是觀之父之愛子也猶可以而害也君臣之相與也非有父子之親也而羣臣之毁言非特一妾之口也何怪夫賢聖之戮死哉此商君之所以車裂於秦而吴起之所以枝解於楚者也凢人臣者有罪固不欲誅無功者皆欲尊顯而聖人之治國也賞不加於無功而誅必行於有罪者也然則有術數者之為人臣也固左右姦臣之所害非明主弗能聼也世之學術者說人主不曰乗威嚴之勢以困姦衺之臣而皆曰仁義惠愛而已矣世主羙仁義之名而不察其實是以大者國亡身死小者地削主卑何以明之夫施貧困者此世之所謂仁義哀憐百姓不忍誅罰者此世之所謂惠愛也夫有施與貧困則無功者得賞不忍誅罰則暴亂者不止國有無功得賞者則民不外務當敵斬首内不急力田疾作皆欲行貨財事富貴為私善立名譽以取尊官厚俸故姦私之臣愈衆而暴亂之徒愈勝不亡何待夫嚴刑者民之所畏也重罰者民之所惡也故聖人陳其所畏以禁其衺設其所惡以防其姦是以國安而暴亂不起吾以是明仁義愛惠之不足用而嚴刑重罰之可以治國也無捶䇿之威銜橛之備雖造父不能以服馬無䂓矩之法䋲墨之端雖王爾不能以成方圓無威嚴之勢賞罰之法雖堯舜不能以為治今世主皆輕釋重罰嚴誅行愛惠而欲覇王之功亦不可幾也故善為主者明賞設利以勸之使民以功賞而不以仁義賜嚴刑重罰以禁之使民以罪誅而不以愛惠免是以無功者不望而有罪者不幸矣託於犀車良馬之上則可以陸犯阪阻之患乘舟之安持檝之利則可以永絶江河之難操法術之數行重罰嚴誅則可以致霸王之功治國之有法術賞罰猶若陸行之有犀車良馬也水行之有輕舟便檝也乗之者遂得其成伊尹得之湯以王管仲得之齊以霸商君得之秦以彊此三人者皆明於霸王之術察於治彊之數而不以牽於世俗之言適當世明主之意則有直任布衣之士立為卿相之處處位治國則有尊主廣地之實此之謂足貴之臣湯得伊尹以百里之地立為天子桓公得管仲立為五霸主九合諸侯一匡天下孝公得商君地以廣兵以彊故有忠者外無敵國之患内無亂臣之憂長安於天下而名垂後世所謂忠臣也若夫豫讓為智伯臣也上不能說人主使之明法術度數之理以避禍難之患下不能領御其衆以安其國及襄子之殺智伯也豫讓乃自黔劓敗其形容以為智伯報襄子之仇是雖有殘形殺身以為人主之名而實無益於智伯若秋毫之末此吾之所下也而世主以為忠而髙之古有伯夷叔齊者武王讓以天下而弗受二人餓死首陽之陵若此臣不畏重誅不利重賞不可以罰禁也不可以賞使也此之謂無益之臣也吾所少而去也而世主之所多而求也諺曰厲憐王此不恭之言也雖然古無虚諺不可不察也此謂刼殺死亡之主言也人無法術以御其臣雖長年而美材大臣猶将得勢擅事主斷而各為其私急而恐父兄豪傑之士借人主之力以禁誅於已也故弑賢長而立㓜弱廢正嫡而立不義故春秋記之曰楚王子圍将聘於鄭未出境聞王病而反因入問病以其冠纓絞王而殺之遂自立也齊崔杼其妻美而莊王通之數如崔氏之室及公往崔子之徒賈舉率崔子之徒而攻公公入室請與之分國崔子不許公請自刄於廟崔子又不聼公乃走踰於北墻賈舉射公中其股公墜崔子之徒以戈斫公而死之而立其弟景公近之所見李兊之用趙也餓主父百日而死淖齒之用齊也擢湣王之筋懸之廟梁宿昔而死故厲雖癰腫疕􅅑上比於春秋未至於絞頸射股也下比於勢臣未至於餓死擢筋也故刼殺死亡之君此其心之憂懼形之苦痛也必甚厲矣由此觀之雖厲憐王可也韓非子巻四
