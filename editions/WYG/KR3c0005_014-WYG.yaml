body:
  text: 韓非子卷十四元何犿註外儲説右下第三十五一賞罰共則禁令不行令臣操之故曰共也何以明之以造父於期既善馭馬又能忍得及至彘趨飲遂不能制子罕為出彘罕行罰一國畏之因簒君亦威分出彘之類也田恒為圃池擅行賞人歸之因弑簡公亦分圃池之比也故宋君簡公弑患在王良造父之共車田連成竅之共琴也王造誠能御車使共操轡則不進田成信善琴令共操彈則曲不成君臣共賞亦由是也二治强生於法弱亂生於阿法曲則亂君明於此則正賞罰而非不仁也爵禄生於功功立則爵生誅罰生於罪罪著則罰生臣明於此則盡死力而非忠君也君通於不仁臣通於不忠則可以王矣昭襄知主情但當自求理以訾責也百姓但當仰君亦不湏曲為愛故君疾而禱者責之以二甲而不發五苑應侯欲發蔬果以救饑人昭王以為無功受賞因止之也田鮪知臣情但當立功盖因不湏私忠於上也故教田章鮪教子章曰富國家自富利君身自利也而公儀辭魚以為遼法受魚則失魚不受三明主者鑒於外也而外事不得不成故蘓代非齊王以令燕王專任子之故不專任終不成霸人主鑒於上也而居者不適不顯故潘壽言禹情欲媚子之故謂燕王言禹傳位於益終令啟取之王遂崇子之人主無所覺悟方吾知之故恐同衣於族而况借於權乎方吾知人皆知己不與同服者共車同族者共家恐其因同而擅已况君權可借臣乎吳章知之故説以佯而况借於誠乎趙王惡虎目而壅明主之道王圃中虎目而惡之左右或言平陽君之目甚於虎目遂殺言者如周行人之却衛侯也衛君名辟疆行人以辟疆天子同號故不令朝改名然後納之四人主者守法責成以立功者也聞有吏雖亂而有獨善之民吏雖亂賢人不改操殷之三仁夏之龍逢是也不聞有亂民而有獨治之吏子率以正孰敢不正故明主治吏不治民吏治則民治矣說在揺木之本與引網之綱揺木本則萬木動引網綱則萬目張吏正則國治也故失火之嗇夫不可不論也救火者吏操壺走火則一人之用也操鞭使人則役萬夫明主執契亦然故所遇術者如造父之遇駕馬牽馬推車則不能進代御執轡持筴則馬咸騖矣是以説在椎鍜平夷㮄檠矯直不然敗在淖齒用齊戮閔王李兊用趙餓主父也五因事之理則不勞而成故茲鄭之踞轅而歌以上髙梁也其患在趙簡主税吏請輕重主欲税吏問輕重主不自定其輕重之節日勿輕重而已吏因擅意因以富薄疑之言國中飽簡主喜而府庫虛百姓餓而姦吏富也故桓公廵民而管仲省腐財怨女公廵人見有饑人及老而無妻者以告仲曰國有腐財則人饑宫有怨女則人老而無妻也不然則在延陵乘馬不得進造父過之而為之泣也前礙飾後礙錯旣不得前却遂旁而佚造父見之泣猶賞罰失必致敗也右經一造父御四馬馳驟周旋而恣欲於馬意所欲馬必随之也恣欲於馬者擅轡筴之制也以轡筴專制之故馬不違也然馬驚於出彘而造父不能禁制者非轡筴之嚴不足也威分於出彘也彘亦令馬可畏故曰威分王子於期為駙駕轡筴不用而擇欲於馬擅芻水之利也然馬過於圃池而駙馬敗者非芻水之利不足也徳分於圃池也故王良造父天下之善御者也然而使王良操左革而叱咤之使造父操右革而鞭笞之馬不能行十里共故也田連成竅天下善鼔琴者也然而田連鼔上成竅檝下而不能成曲亦共故也夫以王良造父之巧共轡而御不能使馬人主安能與其臣共權以為治以田連成竅之巧共琴而不能成曲人主又安能與臣共勢以成功乎一曰造父為齊王駙駕渴馬服成令馬忍渴百日服習之故成也效駕圃中渴馬見圃池去車走池駕敗王子於期為趙簡主取道争千里之表其始發也彘伏溝中王子於期齊轡筴而進之彘突出於溝中馬驚駕敗司城子罕謂宋君曰慶賞賜與民之所喜也君自行之殺戮誅罰民之所惡也臣請當之宋君曰諾於是出威令誅大臣君曰問子罕也於是大臣畏之細民歸之處期年子罕殺宋君而奪政故子罕為出彘以奪其君國罕用刑服國是由出彘用威懼焉簡公在上位罰重而誅嚴厚賦歛而殺戮民田成恒設慈愛明寛厚簡公以齊民為渴馬不以恩加民而田成恒以仁厚為圃池也以仁濟物猶圃池也一曰造父為齊王駙駕以渴服馬百日而服成服成請效駕齊王王曰效駕於圃中造父驅車入圃馬見圃池而走造父不能禁造父以渴服馬乆矣今馬見池駻而走雖造父不能治今簡公之法禁其衆乆矣而田成恒利之是田成恒傾圃池而示渴民也一曰王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪中繩引而却之馬掩迹拊而發之彘逸出於竇中馬退而却筴不能進前也馬駻而走轡不能正也一曰司城子罕謂宋君曰慶賞賜予者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅大臣君曰與子罕議之居期年民知殺生之命制於子罕也故一國歸焉故子罕劫宋君而奪其政法不能禁也故曰子罕為出彘而田成恒為圃池也今令王良造父共車人操一邊轡而入門閭駕必敗而道不至也令田連成竅共琴人撫一絃而揮則音必敗曲不遂矣二秦昭王有病百姓里買牛而家為王禱公孫述出見之入賀王曰百姓乃皆里買牛為王禱王使人問之果有之王曰訾之人二甲訾毁也罰之也夫非令而擅禱是愛寡人也夫愛寡人寡人亦且改法而心與之相循者是法不立法不立亂亡之道也不如人罰二甲而復與為治一曰秦襄王病百姓為之禱病愈殺牛塞禱郎中閻遏公孫衍出見之曰非社臘之時也奚自殺牛而祠社怪而問之百姓曰人主病為之禱今病愈殺牛塞禱閻遏公孫衍説見王拜賀曰過堯舜矣王驚曰何謂也對曰堯舜其民未至為之禱也今王病而民以牛禱病愈殺牛塞禱故臣竊以王為過堯舜也王因使人問之何里為之訾其里正與伍老屯二甲屯亦罰也閻遏公孫衍媿不敢言居數月王飲酒酣樂閻遏公孫衍謂王曰前時臣竊以王為過堯舜非直敢䛕也堯舜病且其民未至為之禱也今王病而民以牛禱病愈殺牛塞禱今乃訾其里正與伍老屯二甲臣竊怪之王曰子何故不知於此彼民之所以為我用者非以吾愛之為我用者也以吾勢之為我用者也吾釋勢與民相收若是吾適不愛而民因不為我用也故遂絶愛道也秦大饑應侯請曰五苑之草著謂草木著地而生也蔬菜橡果棗栗足以活民請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬果者使民有功與無功俱賞也夫使民有功與無功俱賞者此亂之道也夫發五苑而亂不如棄棗􅂼而治一曰令發五苑之蓏􅂼棗栗足以活民是用民有功與無功争取也夫生而亂不如死而治大夫其釋之田鮪教其子田章曰欲利而身先利而君欲富而家先富而國一曰田鮪教其子田章曰主賣官爵臣賣智力故自恃無恃人公孫儀相魯而嗜魚一國盡爭買魚而獻之公儀子不受其弟諌曰夫子嗜魚而不受者何也對曰夫唯嗜魚故不受也夫即受魚必有下人之色有下人之色將枉於法枉於法則免於相雖嗜魚此不必能自給致我魚我又不能自給魚即無受魚而不免於相雖嗜魚我能長自給魚此明夫恃人不如自恃也明於人之為己者不如己之自為也三子之相燕貴而主斷蘇代為齊使燕王問之曰齊王亦何如主也對曰必不霸矣燕王曰何也對曰昔桓公之霸也内事屬鮑叔外事屬管仲桓公被髪而御婦人日遊於市今齊王不信其大臣於是燕王因益大信子之子之聞之使人遺蘇代金百鎰而聴其所使之一曰蘇代為秦使燕見無益子之則必不得事而還貢賜又不出於是見燕王乃譽齊王燕王曰齊王何若是之賢也則將必王乎蘇代曰救亡不暇安得王哉燕王曰何也曰其任所愛不均燕王曰其任何也曰昔者齊桓公愛管仲置以為仲父内事理焉外事斷焉舉國而歸之故一匡天下九合諸侯今齊任所愛不均是以知其亡也燕王曰今吾任子之天下未之聞也於是明日張朝而聴子之潘壽謂燕王曰王不如以國讓子之人所以謂堯賢者以其讓天下於許由許由必不受也則是堯有讓許由之名而實不失天下也今王以國讓子之子之必不受也則是王有讓子之之名而與堯同行也於是燕王因舉國而屬之子之大重一曰潘夀隠者燕使人聘之潘夀見燕王曰臣恐子之之如益也王曰何益哉對曰古者禹死將𫝊天下於益啟之人因相與攻益而立啟今王信愛子之將𫝊國子之太子之人盡懐印璽子之之人無一人在朝廷者王不幸棄羣臣則子之亦益也王因收吏璽自三百石以上皆效之子之子之大重夫人主之所以鏡照者諸侯之士徒也今諸侯之士徒皆私門之黨也人主之所以自羽翼者巖穴之士徒也今巖穴之士徒皆私門之舍人也是何也奪褫之資在子之也故吳章曰人主不佯憎愛人佯愛人不得復憎也佯憎人不得復愛也一曰燕王欲傳國於子之也問之潘夀對曰禹愛益而任天下於益已而以啟人為吏及老而以啟為不足任天下故傳天下於益而勢重盡在啟也已而啟與友黨攻益而奪之天下是禹名傳天下於益而實令啟自取之也此禹之不及堯舜明矣今王欲傳之子之而吏無非太子之人者也是名傳之而實令太子自取之也燕王乃收璽自三百石以上皆效之子之遂重方吾子曰吾聞之古禮行不與同服者同車不與同族者共家而况君人者乃借其權而外其勢乎吳章謂韓宣王曰人主不可佯愛人一日不可復憎不可以佯憎人一日不可復愛也故佯憎佯愛之徴見則䛕者因資而毁譽之雖有明主不能復收而况於以誠借人也趙王遊於圃中左右以莵與虎而輟觀之盼然環其眼環轉其眼以作怒也王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目如此者則必死矣其明日平陽君聞之使人殺言者而王不誅也衛君入朝於周周行人問其號對曰諸侯辟疆周行人却之曰諸侯不得與天子同號開辟疆土者天子之號衛君乃自更曰諸侯燬而後内之仲尼聞之曰逺哉禁偪虛名不以借人况實事乎名辟疆未必能辟疆故曰虛也四揺木者一一攝其葉則勞而不徧左右拊其本而葉徧揺矣拊擊動也臨淵而揺木鳥驚而髙魚恐而下善張網者引其綱若一一攝萬目而後得則是勞而難引其綱而魚已囊矣故吏者民之本綱者也故聖人治吏不治民治吏猶引綱理人猶張目救火者令吏挈壺甕而走火則一人之用也操鞭箠指麾而趣使人則制萬夫是以聖人不親細民明主不躬小事造父方耨時有父子乘車過者馬驚而不行其子下車牽馬父子推車請造父助我推車造父因收噐輟而寄載之援其子之乘乃始檢轡持筴未之用也而馬轡騖矣使造父而不能御雖盡力勞身助之推車馬猶不肯行也今使身佚且寄載有徳於人者有術而御之也故國者君之車也勢者君之馬也無術以御之身雖勞猶不免亂術則國之轡䇿也有術以御之身處佚樂之地又致帝王之功也椎鍜者所以平不夷也榜檠者所以矯不直也聖人之為法也所以平不夷矯不直也淖齒之用齊也擢閔王之筋李兊之用趙也餓殺主父此二君者皆不能用其椎鍜榜檠故身死為戮而為天下笑一曰入齊則獨聞淖齒而不聞齊王入趙則獨聞李兊而不聞趙王故曰人主者不操術則威勢輕而臣擅名一曰田嬰相齊人有説王者曰終嵗之計王不一以數日之間自聴之則無以知吏之姦邪得失也王曰善田嬰聞之即遽請於王而聴其計王將聴之矣田嬰令官具押劵斗石叅升之計王自聴計計不勝聴罷食後復坐不復暮食矣田嬰復謂曰羣臣所終嵗日夜不敢偷怠之事也王以一夕聴之則羣臣有為勸勉矣王曰諾俄而王已睡矣吏盡揄刀削其押劵升石之計王自聴之亂乃始生一曰武靈王使惠文王莅政李兊為相武靈王不以身躬親殺生之柄故劫於李兊五茲鄭子引輦上髙梁而不能支茲鄭踞轅而歌前者止後者趨輦乃上使茲鄭無術以致人則身雖絶力致死輦猶不上也今身不至勞苦而輦以上者有術以致人之故也趙簡主出税者吏請輕重簡主曰勿輕勿重重則利入於上若輕則利歸於民吏無私利而正矣薄疑謂趙簡主曰君之國中飽簡主欣然而喜曰何如焉對曰府庫空虛於上百姓貧餓於下然而姦吏富矣齊桓公㣲服以廵民家人有年老而自飬者桓公問其故對曰臣有子三人家貧無以妻之傭未及反桓公歸以告管仲管仲曰畜積有腐棄之財則人饑餓宫中有怨女則民無妻桓公曰善乃論宫中有婦人而嫁之下令於民也丈夫二十而室婦人十五而嫁一曰桓公㣲服而行於民間有鹿門稷者行年七十而無妻桓公問管仲曰有民老而無妻者乎管仲曰有鹿門稷者行年七十矣而無妻桓公曰何以令之有妻管仲曰臣聞之上有積財則民臣必匱乏於下宫中有怨女則有老而無妻者桓公曰善令於宫中女子未嘗御出嫁之乃令男子年二十而室女年十五而嫁則内無怨女外無曠夫延陵卓子乘蒼龍挑文之乘言雕飾之鉤飾在前約鉤使奮也錯錣在後錣鍬也以金飾之馬欲進則鉤飾禁之欲退則鍇錣貫之馬因旁出造父過而為之泣涕曰古之治人亦然矣夫賞所以勸之而毁存焉罰所以禁之而譽加焉民中立而不知所由言賞則有毁罰則有譽故不知其所由此亦聖人之所為泣也一曰延陵卓子乘蒼龍與翟文之乘馬有翟之文前則有錯飾後則有利錣筴則引之退則筴之馬前不得進後不得退遂避而逸因下抽刀而刎其脚造父見之泣終日不食因仰天而歎曰筴所以進之也錯飾在前引所以退之也利錣在後今人主以其清潔也進之以其不適左右也退之以其公正也譽之以其不聴從也廢之民懼中立而不知所由此聖人之所為泣也右傳韓非子卷十四
