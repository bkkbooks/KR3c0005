body:
  text: 心度第五十四聖人之治民度於本不從其欲期於利民而已故其與之刑非所以惡民愛之本也刑勝而民靜賞繁而姦生故治民者刑勝治之首也賞繁亂之本也夫民之性喜其亂而不親其法故明主之治國也明賞則民勸功嚴刑則民親法勸功則公事不犯親法則姦無所萌故治民者禁姦於未萌而用兵者服戰於民心禁先其本者治兵戰其心者勝聖人之治民也先治者強先戰者勝夫國事務先而一民心專舉公而私不從賞告而姦不生明法而治不煩能用四者強不能用四者弱夫國之所以強者政也主之所以尊者權也故明君有權有政亂君亦有權有政積而不同其所以立異也故明君操權而上重一政而國治故法者王之本也刑者愛之自也夫民之性惡勞而樂佚佚則荒荒則不治不治則亂而賞刑不行於天下者必塞故欲舉大功而難致其力者大功不可幾而舉也欲治其法而難變其故者民亂不可幾而治也故治民無常唯法為治法與時轉則治治與世宜則有功故民樸而禁之以名則治世知維之以刑則從時移而治不易者亂能眾而禁不變者削故聖人之治民也法與時移而禁與能變能越力於地者富能起力於敵者強強不塞者王故王道在所開在所塞塞其姦者必王故王術不恃外之不亂也恃其不可亂也恃外不亂而治立者削恃其不可亂而行法者興故賢君之治國也適於不亂之術貴爵則上重故賞功爵任而邪無所關好力者其爵貴爵貴則上尊上尊則必王國不事力而恃私學者其爵賤爵賤則上卑上卑者必削故立國用民之道也能閉外塞私而上自恃者王可致也
