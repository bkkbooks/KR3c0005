body:
  text: 觀行第二十四古之人目短於自見故以鏡觀面智短於自知故以道正己故鏡無見疵之罪道無明過之怨目失鏡則無以正鬚眉身失道則無以知迷惑西門豹之性急故佩韋以緩己董安于之心緩故佩弦以自急故以有餘補不足以長續短之謂明主天下有信數三一曰智有所不能立二曰力有所不能舉三曰彊有所不能勝故雖有堯之智而無眾人之助大功不立有烏獲之勁而不得人助不能自舉有賁育之彊而無法術不得長勝故勢有不可得事有不可成故烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離朱易百步而難眉睫非百步近而眉睫遠也道不可也故明主不窮烏獲以其不能自舉不困離朱以其不能自見因可勢求易道故用力寡而功名立時有滿虛事有利害物有生死人主為三者發喜怒之色則金石之士離心焉聖賢之樸深矣故明主觀人不使人觀己明於堯不能獨成烏獲不能自舉賁育之不能自勝以法術則觀行之道畢矣
