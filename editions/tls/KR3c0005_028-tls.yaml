body:
  text: 功名第二十八明君之所以立功成名者四一曰天時二曰人心三曰技能四曰勢位非天時雖十堯不能冬生一穗逆人心雖賁育不能盡人力故得天時則不務而自生得人心則不趣而自勸因技能則不急而自疾得勢位則不推進而名成若水之流若船之浮守自然之道行毋窮之令故曰明主夫有材而無勢雖賢不能制不肖故立尺材於高山之上則臨千仞之谿材非長也位高也桀為天子能制天下非賢也勢重也堯為匹夫不能正三家非不肖也位卑也千鈞得船則浮錙銖失船則沉非千鈞輕錙銖重也有勢之與無勢也故短之臨高也以位不肖之制賢也以勢人主者天下一力以共載之故安眾同心以共立之故尊人臣守所長盡所能故忠以尊主御忠臣則長樂生而功名成名實相持而成形影相應而立故臣主同欲而異使人主之患在莫之應故曰一手獨拍雖疾無聲人臣之憂在不得一故曰右手畫圓左手畫方不能兩成故曰至治之國君若桴臣若鼓技若車事若馬故人有餘力易於應而技有餘巧便於事立功者不足於力親近者不足於信成名者不足於勢近者不親而遠者不結則名不稱實者也聖人德若堯舜行若伯夷而位不載於世則功不立名不遂故古之能致功名者眾人助之以力近者結之以成遠者譽之以名尊者載之以勢如此故太山之功長立於國家而日月之名久著於天地此堯之所以南面而守名舜之所以北面而效功也
