body:
  text: 制分第五十五夫凡國博君尊者未嘗非法重而可以至乎令行禁止於天下者也是以君人者分爵制祿則法必嚴以重之夫國治則民安事亂則邦危法重者得人情禁輕者失事實且夫死力者民之所有者也情莫不出其死力以致其所欲而好惡者上之所制也民者好利祿而惡刑罰上掌好惡以御民力事實不宜失矣然而禁輕事失者刑賞失也其治民不秉法為善也如是則是無法也故治亂之理宜務分刑賞為急治國者莫不有法然而有存有亡亡者其制刑賞不分也治國者其刑賞莫不有分有持異以為分不可謂分至於察君之分獨分也是以其民重法而畏禁願毋抵罪而不敢胥賞故曰不待刑賞而民從事矣是故夫至治之國善以止姦為務是何也其法通乎人情關乎治理也然則去微姦之道柰何其務令之相規其情者也則使相闚柰何曰蓋理相坐而已禁尚有連於己者理不得不相闚惟恐不得免有姦心者不令得忘闚者多也如此則慎己而闚彼發姦之密告過者免罪受賞失姦者必誅連刑如此則姦類發矣姦不容細私告任坐使然也夫治法之至明者任數不任人是以有術之國不用譽則毋適境內必治任數也亡國使兵公行乎其地而弗能圉禁者任人而無數也自攻者人也攻人者數也故有術之國去言而任法凡畸功之循約者難知過刑之於言者難見也是以刑賞惑乎貳所謂循約難知者姦功也臣過之難見者失根也循理不見虛功度情詭乎姦根則二者安得無兩失也是以虛士立名於內而談者為略於外故愚怯勇慧相連而以虛道屬俗而容乎世故其法不用而刑罰不加乎僇人如此則刑賞安得不容其二實故有所至而理失其量量之失非法使然也法定而任慧也釋法而任慧者則受事者安得其務務不與事相得則法安得無失而刑安得無煩是以賞罰擾亂邦道差誤刑賞之不分白也
