body:
  text: 守道第二十六聖王之立法也其賞足以勸善其威足以勝暴其備足以必完法治世之臣功多者位尊力極者賞厚情盡者名立善之生如春惡之死如秋故民勸極力而樂盡情此之謂上下相得上下相得故能使用力者自極於權衡而務至於任鄙戰士出死而願為賁育守道者皆懷金石之心以死子胥之節用力者為任鄙戰如賁育中為金石則君人者高枕而守已完矣古之善守者以其所重禁其所輕以其所難止其所易故君子與小人俱正盜跖與曾史俱廉何以知之夫貪盜不赴谿而掇金赴溪而掇金則身不全賁育不量敵則無勇名盜跖不計可則利不成明主之守禁也賁育見侵於其所不能勝盜跖見害於其所不能取故能禁賁育之所不能犯守盜跖之所不能取則暴者守愿邪者反正大勇愿巨盜貞則天下公平而齊民之情正矣人主離法失人則危於伯夷不妄取而不免於田成盜跖之禍何也今天下無一伯夷而姦人不絕世故立法度量度量信則伯夷不失是而盜跖不得非法分明則賢不得奪不肖強不得侵弱眾不得暴寡託天下於堯之法則貞士不失分姦人不徼幸寄千金於羿之矢則伯夷不得亡而盜跖不敢取堯明於不失姦故天下無邪羿巧於不失發故千金不亡邪人不壽而盜跖止如此故圖不載宰予不舉六卿書不著子胥不明夫差孫吳之略廢盜跖之心伏人主甘服於玉堂之中而無瞋目切齒傾取之患人臣垂拱於金城之內而無扼捥聚脣嗟唶之禍服虎而不以柙禁姦而不以法塞偽而不以符此賁育之所患堯舜之所難也故設柙非所以備鼠也所以使怯弱能服虎也立法非所以備曾史也所以使庸主能止盜跖也為符非所以豫尾生也所以使眾人不相謾也不獨恃比干之死節不幸亂臣之無詐也恃怯之所能服握庸主之所易守當今之世為人主忠計為天下結德者利莫長於此故君人者無亡國之圖而忠臣無失身之畫明於尊位必賞故能使人盡力於權衡死節於官職通賁育之情不以死易生惑於盜跖之貪不以財易身則守國之道畢備矣
