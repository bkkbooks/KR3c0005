body:
  text: 內儲說下六微第三十一六微一曰權借在下二曰利異外借三曰託於似類四曰利害有反五曰參疑內爭六曰敵國廢置此六者主之所察也經一權借權勢不可以借人上失其一臣以為百故臣得借則力多力多則內外為用內外為用則人主壅其說在老聃之言失魚也是以人主久語而左右鬻懷刷其患在胥僮之諫厲公與州侯之一言而燕人浴矢也經二利異君臣之利異故人臣莫忠故臣利立而主利滅是以姦臣者召敵兵以內除舉外事以眩主苟成其私利不顧國患其說在衛人之妻夫禱祝也故戴歇議子弟而三桓攻昭公公叔內齊軍而翟黃召韓兵太宰嚭說大夫種大成牛教申不害司馬喜告趙王呂倉規秦楚宋石遺衛君書白圭教暴譴經三似類似類之事人主之所以失誅而大臣之所以成私也是以門人捐水而夷射誅濟陽自矯而二人罪司馬喜殺爰騫而季辛誅鄭袖言惡臭而新人劓費無忌教郄宛而令尹誅陳需殺張壽而犀首走故燒芻廥而中山罪殺老儒而濟陽賞也經四有反事起而有所利其尸主之有所害必反察之是以明主之論也國害則省其利者臣害則察其反者其說在楚兵至而陳需相黍種貴而廩吏覆是以昭奚恤執販茅而僖侯譙其次文公髮繞炙而穰侯請立帝經五參疑參疑之勢亂之所由生也故明主慎之是以晉驪姬殺太子申生而鄭夫人用毒藥衛州吁殺其君完公子根取東周王子職甚有寵而商臣果作亂嚴遂韓廆爭而哀侯果遇賊田常闞止戴驩皇喜敵而宋君簡公殺其說在狐突之稱二好與鄭昭之對未生也經六廢置敵之所務在淫察而就靡人主不察則敵廢置矣故文王資費仲而秦王患楚使黎且去仲尼而干象沮甘茂是以子胥宣言而子常用內美人而虞虢亡佯遺書而萇弘死用雞猳而鄶桀盡廟攻參疑廢置之事明主絕之於內而施之於外資其輕者輔其弱者此謂廟攻參伍既用於內觀聽又行於外則敵偽得其說在秦侏儒之告惠文君也故襄疵言襲鄴而嗣公賜令蓆說一勢重者人主之淵也臣者勢重之魚也魚失於淵而不可復得也人主失其勢重於臣而不可復收也古之人難正言故託之於魚賞罰者利器也君操之以制臣臣得之以擁主故君先見所賞則臣鬻之以為德君先見所罰則臣鬻之以為威故曰國之利器不可以示人靖郭君相齊與故人久語則故人富懷左右刷則左右重久語懷刷小資也猶以成富況於吏勢乎晉厲公之時六卿貴胥僮長魚矯諫曰大臣貴重敵主爭事外市樹黨下亂國法上以劫主而國不危者未嘗有也公曰善乃誅三卿胥僮長魚矯又諫曰夫同罪之人偏誅而不盡是懷怨而借之間也公曰吾一朝而夷三卿予不忍盡也長魚矯對曰公不忍之彼將忍公公不聽居三月諸卿作難遂殺厲公而分其地州侯相荊貴而主斷荊王疑之因問左右左右對曰無有如出一口也燕人無惑故浴狗矢燕人其妻有私通於士其夫早自外而來士適出夫曰何客也其妻曰無客問左右左右言無有如出一口其妻曰公惑易也因浴之以狗矢一曰燕人李季好遠出其妻私有通於士季突至士在內中妻患之其室婦曰令公子裸而解髮直出門吾屬佯不見也於是公子從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼乎婦人曰然為之柰何曰取五牲之矢浴之季曰諾乃浴以矢一曰浴以蘭湯說二衛人有夫妻禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾荊王欲宦諸公子於四鄰戴歇曰不可宦公子於四鄰四鄰必重之曰子出者重重則必為所重之國黨則是教子於外市也不便魯孟孫叔孫季孫相戮力劫昭公遂奪其國而擅其制魯三桓偪公昭公攻季孫氏而孟孫氏叔孫氏相與謀曰救之乎叔孫氏之御者曰我家臣也安知公家凡有季孫與無季孫於我孰利皆曰無季孫必無叔孫然則救之於是撞西北隅而入孟孫見叔孫之旗入亦救之三桓為一昭公不勝逐之死於乾侯公叔相韓而有攻齊公仲甚重於王公叔恐王之相公仲也使齊韓約而攻魏公叔因內齊軍於鄭以劫其君以固其位而信兩國之約翟璜魏王之臣也而善於韓乃召韓兵令之攻魏因請為魏王搆之以自重也越王攻吳王吳王謝而告服越王欲許之范蠡大夫種曰不可昔天以越與吳吳不受今天反夫差亦天禍也以吳予越再拜受之不可許也太宰嚭遺大夫種書曰狡兔盡則良犬烹敵國滅則謀臣亡大夫何不釋吳而患越乎大夫種受書讀之太息而歎曰殺之越與吳同命大成牛從趙謂申不害於韓曰以韓重我於趙請以趙重子於韓是子有兩韓我有兩趙司馬喜中山君之臣也而善於趙嘗以中山之謀微告趙王呂倉魏王之臣也而善於秦荊微諷秦荊令而攻魏因請行和以自重也宋石魏將也衛君荊將也兩國搆難二子皆將宋石遺衛君書曰二軍相當兩旗相望唯毋一戰戰必不兩存此乃兩主之事也與子無有私怨善者相避也白圭相魏暴譴相韓白圭謂暴譴曰子以韓輔我於魏我以魏待子於韓臣長用魏子長用韓說三齊中大夫有夷射者御飲於王醉甚而出倚於郎門門者刖跪請曰足下無意賜之餘瀝乎夷射叱曰去刑餘之人何事乃敢乞飲長者刖跪走退及夷射去刖跪因捐水郎門霤下類溺者之狀明日王出而訶之曰誰溺於是刖跪對曰臣不見也雖然昨日中大夫夷射立於此王因誅夷射而殺之魏王臣二人不善濟陽君濟陽君因偽令人矯王命而謀攻己王使人問濟陽君曰誰與恨對曰無敢與恨雖然嘗與二人不善不足以至於此王問左右左右曰固然王因誅二人者季辛與爰騫相怨司馬喜新與季辛惡因微令人殺爰騫中山之君以為季辛也因誅之荊王所愛妾有鄭袖者荊王新得美女鄭袖因教之曰王甚喜人之掩口也為近王必掩口美女入見近王因掩口王問其故鄭袖曰此固言惡王之臭及王與鄭袖美女三人坐袖因先誡御者曰王適有言必亟聽從王言美女前近王甚數掩口王悖然怒曰劓之御因揄刀而劓美人一曰魏王遺荊王美人荊王甚悅之夫人鄭袖知王悅愛之也亦悅愛之甚於王衣服玩好擇其所欲為之王曰夫人知我愛新人也其悅愛之甚於寡人此孝子所以養親忠臣之所以事君也夫人知王之不以己為妬也因為新人曰王甚悅愛子然惡子之鼻子見王常掩鼻則王長幸子矣於是新人從之每見王常掩鼻王謂夫人曰新人見寡人常掩鼻何也對曰不知也王強問之對曰頃嘗言惡聞王臭王怒曰劓之夫人先誡御者曰王適有言必可從命御者因揄刀而劓美人費無極荊令尹之近者也郄宛新事令尹令尹甚愛之無極因謂令尹曰君愛宛甚何不一為酒其家令尹曰善因令之為具於郄宛之家無極教宛曰令尹甚傲而好兵子必謹敬先亟陳兵堂下及門庭宛因為之令尹往而大驚曰此何也無極曰君殆去之事未可知也令尹大怒舉兵而誅郄宛遂殺之犀首與張壽為怨陳需新入不善犀首因使人微殺張壽魏王以為犀首也乃誅之中山有賤公子馬甚瘦車甚弊左右有私不善者乃為之請王曰公子甚貧馬甚瘦王何不益之馬食王不許左右因微令夜燒芻廄王以為賤公子也乃誅之魏有老儒而不善濟陽君客有與老儒私怨者因攻老儒殺之以德於濟陽君曰臣為其不善君也故為君殺之濟陽君因不察而賞之一曰濟陽君有少庶子有不見知欲入愛於君者齊使老儒掘藥於馬梨之山濟陽少庶子欲以為功入見於君曰齊使老儒掘藥於馬梨之山名掘藥也實間君之國君不殺之是將以濟陽君抵罪於齊矣臣請刺之君曰可於是明日得之城陰而刺之濟陽君還益親之說四陳需魏王之臣也善於荊王而令荊攻魏荊攻魏陳需因請為魏王行解之因以荊勢相魏韓昭侯之時黍種嘗貴甚昭侯令人覆廩吏果竊黍種而糶之甚多昭奚恤之用荊也有燒倉廥窌者而不知其人昭奚恤令吏執販茅者而問之果燒也昭僖侯之時宰人上食而羹中有生肝焉昭侯召宰人之次而誚之曰若何為置生肝寡人羹中宰人頓首服死罪曰竊欲去尚宰人也一曰僖侯浴湯中有礫僖侯曰尚浴免則有當代者乎左右對曰有僖侯曰召而來譙之曰何為置礫湯中對曰尚浴免則臣得代之是以置礫湯中文公之時宰臣上炙而髮繞之文公召宰人而譙之曰女欲寡人之哽耶奚為以髮繞炙宰人頓首再拜請曰臣有死罪三援礪砥刀利猶干將也切肉肉斷而髮不斷臣之罪一也援木而貫臠而不見髮臣之罪二也奉熾爐炭火盡赤紅而炙熟而髮不燒臣之罪三也堂下得微有疾臣者乎公曰善乃召其堂下而譙之果然乃誅之一曰晉平公觴客少庶子進炙而髮繞之平公趣殺炮人毋有反令炮人呼天曰嗟乎臣有三罪死而不自知乎平公曰何謂也對曰臣刀之利風靡骨斷而髮不斷是臣之一死也桑炭炙之肉紅白而髮不焦是臣之二死也炙熟又重睫而視之髮繞炙而目不見是臣之三死也意者堂下其有翳憎臣者乎殺臣不亦蚤乎穰侯相秦而齊強穰侯欲立秦為帝而齊不聽因請立齊為東帝而不能成也說五晉獻公之時驪姬貴擬於后妻而欲以其子奚齊代太子申生因患申生於君而殺之遂立奚齊為太子鄭君已立太子矣而有所愛美女欲以其子為後夫人恐因用毒藥賊君殺之衛州吁重於衛擬於君群臣百姓盡畏其勢重州吁果殺其君而奪之政公子朝周太子也弟公子根甚有寵於君君死遂以東周叛分為兩國楚成王以商臣為太子既而又欲置公子職商臣作亂遂攻殺成王一曰楚成王以商臣為太子既欲置公子職商臣聞之未察也乃為其傅潘崇曰柰何察之也潘崇曰饗江羋而勿敬也太子聽之江羋曰呼役夫宜君王之欲廢女而立職也商臣曰信矣潘崇曰能事之乎曰不能能為之諸侯乎曰不能能舉大事乎曰能於是乃起宿營之甲而攻成王成王請食熊膰而死不許遂自殺韓廆相韓哀侯嚴遂重於君二人甚相害也嚴遂乃令人刺韓廆於朝韓廆走君而抱之遂刺韓廆而兼哀侯田恆相齊闞止重於簡公二人相憎而欲相賊也田恆因行私惠以取其國遂殺簡公而奪之政戴驩為宋太宰皇喜重於君二人爭事而相害也皇喜遂殺宋君而奪其政狐突曰國君好內則太子危好外則相室危鄭君問鄭昭曰太子亦何如對曰太子未生也君曰太子已置而曰未生何也對曰太子雖置然而君之好色不已所愛有子君必愛之愛之則必欲以為後臣故曰太子未生也說六文王資費仲而遊於紂之旁令之諫紂而亂其心荊王使人之秦秦王甚禮之王曰敵國有賢者國之憂也今荊王之使者甚賢寡人患之群臣諫曰以王之賢聖與國之資厚願荊王之賢人王何不深知之而陰有之荊以為外用也則必誅之仲尼為政於魯道不拾遺齊景公患之黎且謂景公曰去仲尼猶吹毛耳君何不迎之以重祿高位遺哀公女樂以驕榮其意哀公新樂之必怠於政仲尼必諫諫必輕絕於魯景公曰善乃令黎且以女樂六遺哀公哀公樂之果怠於政仲尼諫不聽去而之楚楚王謂干象曰吾欲以楚扶甘茂而相之秦可乎干象對曰不可也王曰何也曰甘茂少而事史舉先生史舉上蔡之監門也大不事君小不事家以苛刻聞天下茂事之順焉惠王之明張儀之辨也茂事之取十官而免於罪是茂賢也王曰相人敵國而相賢其不可何也干象曰前時王使邵滑之越五年而能亡越所以然者越亂而楚治也日者知用之越今亡之秦不亦太亟亡乎王曰然則為之柰何干象對曰不如相共立王曰共立可相何也對曰共立少見愛幸長為貴卿被王衣含杜若握玉環以聽於朝且利以亂秦矣吳政荊子胥使人宣言於荊曰子期用將擊之子常用將去之荊人聞之因用子常而退子期也吳人擊之遂勝之晉獻公伐虞虢乃遺之屈產之乘垂棘之璧女樂六以榮其意而亂其政叔向之讒萇弘也為書曰萇弘謂叔向曰子為我謂晉君所與君期者時可矣何不亟以兵來因佯遺其書周君之庭而急去行周以萇弘為賣周也乃誅萇弘而殺之鄭桓公將欲襲鄶先問鄶之豪傑良臣辯智果敢之士盡與姓名擇鄶之良田賂之為官爵之名而書之因為設壇場郭門之外而埋之釁之以雞豭若盟狀鄶君以為內難也而盡殺其良臣桓公襲鄶遂取之鄴令襄疵陰善趙王左右趙王謀襲鄴襄疵常輒聞而先言之魏王魏王備之趙乃輟行說七秦侏儒善於荊王而陰有善荊王左右而內重於惠文君荊適有謀侏儒常先聞之以告惠文君衛嗣君之時有人於令之左右縣令發蓐而席弊甚嗣公還令人遺之席曰吾聞汝今者發蓐而席弊甚賜汝席縣令大驚以君為神也
