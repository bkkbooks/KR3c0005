body:
  text: 說林第二十二湯以伐桀而恐天下言己為貪也因乃讓天下於務光而恐務光之受之也乃使人說務光曰湯殺君而欲傳惡聲于子故讓天下於子務光因自投於河秦武王令甘茂擇所欲為於僕與行事孟卯曰公不如為僕公所長者使也公雖為僕王猶使之於公也公佩僕璽而為行事是兼官也子圉見孔子於商太宰孔子出子圉入請問客太宰曰吾已見孔子則視子猶蚤虱之細者也吾今見之於君子圉恐孔子貴於君也因謂太宰曰君已見孔子亦將視子猶蚤虱也太宰因弗復見也魏惠王為臼里之盟將復立於天子彭喜謂鄭君曰君勿聽大國惡有天子小國利之若君與大不聽魏焉能與小立之晉人伐邢齊桓公將救之鮑叔曰太蚤邢不亡晉不敝晉不敝齊不重且夫持危之功不如存亡之德大君不如晚救之以敝晉齊實利待邢亡而復存之其名實美桓公乃弗救子胥出走邊候得之子胥曰上索我者以我有美珠也今我已亡之矣我且曰子取吞之候因釋之慶封為亂於齊而欲走越其族人曰晉近奚不之晉慶封曰越遠利以避難族人曰變是心也居晉而可不變是心也雖遠越其可以安乎智伯索地於魏宣子魏宣子弗予任章曰何故不予宣子曰無故請地故弗予任章曰無故索地鄰國必恐彼重欲無厭天下必懼君予之地智伯必驕而輕敵鄰邦必懼而相親以相親之兵待輕敵之國則智伯之命不長矣周書曰將欲敗之必姑輔之將欲取之必姑予之君不如與之以驕智伯且君何釋以天下圖智氏而獨以吾國為智氏質乎君曰善乃與之萬戶之邑智伯大悅因索地於趙弗與因圍晉陽韓魏反之外趙氏應之內智氏以亡秦康公築臺三年荊人起兵將欲以兵攻齊任妄曰饑召兵疾召兵勞召兵亂召兵君築臺三年今荊人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊荊人輟行齊攻宋宋使臧孫子南求救於荊荊大說許救之甚勸臧孫子憂而反其御曰索救而得今子有憂色何也臧孫子曰宋小而齊大夫救小宋而惡於大齊此人之所以憂也而荊王說必以堅我也我堅而齊敝荊之所利也臧孫子乃歸齊人拔五城於宋而荊救不至魏文侯借道於趙而攻中山趙肅侯將不許趙刻曰君過矣魏攻中山而弗能取則魏必罷罷則魏輕魏輕則趙重魏拔中山必不能越趙而有中山也是用兵者魏也而得地者趙也君必許之許之而大歡彼將知君利之也必將輟行君不如借之道示以不得已也鴟夷子皮事田成子田成子去齊走而之燕鴟夷子皮負傳而從至望邑子皮曰子獨不聞涸澤之蛇乎澤涸蛇將徙有小蛇謂大蛇曰子行而我隨之人以為蛇之行者耳必有殺子不如相銜負我以行人以我為神君也乃相銜負以越公道人皆避之曰神君也今子美而我惡以子為我上客千乘之君也以子為我使者萬乘之卿也子不如為我舍人田成子因負傳而隨之至逆旅逆旅之君待之甚敬因獻酒肉溫人之周周不納客問之曰客耶對曰主人問其巷人而不知也吏因囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩曰普天之下莫非王土率土之濱莫非王臣今君天子則我天子之臣也豈有為人之臣而又為之客哉故曰主人也君使出之韓宣王謂樛留曰吾欲兩用公仲公叔其可乎對曰不可晉用六卿而國分簡公兩用田成闞止而簡公殺魏兩用犀首張儀而西河之外亡今王兩用之其多力者樹其黨寡力者借外權群臣有內樹黨以驕主有外為交以列地則王之國危矣紹績昧醉寐而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下而康誥曰毋彝酒者彝酒常酒也常酒者天子失天下匹夫失其身管仲隰朋從於桓公而伐孤竹春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水以管仲之聖而隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎有獻不死之藥於荊王者謁者操之以入中射之士問曰可食乎曰可因奪而食之王大怒使人殺中射之士中射之士使人說王曰臣問謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也是客欺王也夫殺無罪之臣而明人之欺王也不如釋臣王乃不殺田駟欺鄒君鄒君將使人殺之田駟恐告惠子惠子見鄒君曰今有人見君則䀹其一目奚如君曰我必殺之惠子曰瞽兩目䀹君奚為不殺君曰不能勿䀹惠子曰田駟東慢齊侯南欺荊王駟之於欺人瞽也君奚怨焉鄒君乃不殺魯穆公使眾公子或宦於晉或宦於荊犂鉏曰假人於越而救溺子越人雖善遊子必不生矣失火而取水於海海水雖多火必不滅矣遠水不救近火也今晉與荊雖強而齊近魯患其不救乎嚴遂不善周君患之馮沮曰嚴遂相而韓傀貴於君不如行賊於韓傀則君必以為嚴氏也張譴相韓病將死公乘無正懷三十金而問其疾居一日君問張譴曰若子死將誰使代子荅曰無正重法而畏上雖然不如公子食我之得民也張譴死因相公乘無正樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羹樂羊坐於幕下而啜之盡一杯文侯謂堵師贊曰樂羊以我故而食其子之肉荅曰其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心孟孫獵得麑使秦西巴持之歸其母隨之而啼秦西巴弗忍而與之孟孫歸至而求麑荅曰余弗忍而與其母孟孫大怒逐之居三月復召以為其子傅其御曰曩將罪之今召以為子傅何也孟孫曰夫不忍麑又且忍吾子乎故曰巧詐不如拙誠樂羊以有功見疑秦西巴以有罪益信曾從子善相劍者也衛君怨吳王曾從子曰吳王好劍臣相劍者也臣請為吳王相劍拔而示之因為君刺之衛君曰子之為是也非緣義也為利也吳強而富衛弱而貧子必往吾恐子為吳王用之於我也乃逐之紂為象箸而箕子唏以為象箸必不盛羹於土鉶則必犀玉之杯玉柸象箸必不盛菽藿則必旄象豹胎旄象豹胎必不衣短褐而舍茅茨之下則必錦衣九重高臺廣室也稱此以求則天下不足矣聖人見微以知萌見端以知末故見象箸而唏知天下不足也周公旦已勝殷將攻商蓋辛公甲曰大難攻小易服不如服眾小以劫大乃攻九夷而商蓋服矣紂為長夜之飲懽以失日問其左右盡不知也乃使人問箕子箕子謂其徒曰為天下主而一國皆失日天下其危矣一國皆不知而我獨知之吾其危矣辭以醉而不知魯人身善織屨妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰屨為履之也而越人跣行縞為冠之也而越人被髮以子之所長游於不用之國欲使無窮其可得乎陳軫貴於魏王惠子曰必善事左右夫楊橫樹之即生倒樹之即生折而樹之又生然使十人樹之而一人拔之則毋生楊至以十人之眾樹易生之物而不勝一人者何也樹之難而去之易也子雖工自樹於王而欲去子者眾子必危矣魯季孫新弒其君吳起仕焉或謂起曰夫死者始死而血已血而衂已衂而灰已灰而土及其土也無可為者矣今季孫乃始血其毋乃未可知也吳起因去之晉隰斯彌見田成子田成子與登臺四望三面皆暢南望隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫田子將有大事而我示之知微我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也楊子過於宋東之逆旅有妾二人其惡者貴美者賤楊子問其故逆旅之父荅曰美者自美吾不知其美也惡者自惡吾不知其惡也楊子謂弟子曰行賢而去自賢之心焉往而不美衛人嫁其子而教之曰必私積聚為人婦而出常也其成居幸也其子因私積聚其姑以為多私而出之其子所以反者倍其所以嫁其父不自罪於教子非也而自知其益富今人臣之處官者皆是類也魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出而不反舍遂去中山其御曰反見乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來間中山君因索而罪之田伯鼎好士而存其君白公好士而亂荊其好士則同其所以為則異公孫友自刖而尊百里豎刁自宮而諂桓公其自刑則同其所以自刑之為則異慧子曰狂者東走逐者亦東走其東走則同其所以東走之為則異故曰同事之人不可不審察也
