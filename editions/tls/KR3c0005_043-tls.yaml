body:
  text: 定法第四十三問者曰申不害公孫鞅此二家之言孰急於國應之曰是不可程也人不食十日則死大寒之隆不衣亦死謂之衣食孰急於人則是不可一無也皆養生之具也今申不害言術而公孫鞅為法術者因任而授官循名而責實操殺生之柄課群臣之能者也此人主之所執也法者憲令著於官府刑罰必於民心賞存乎慎法而罰加乎姦令者也此臣之所師也君無術則弊於上臣無法則亂於下此不可一無皆帝王之具也問者曰徒術而無法徒法而無術其不可何哉對曰申不害韓昭侯之佐也韓者晉之別國也晉之故法未息而韓之新法又生先君之令未收而後君之令又下申不害不擅其法不一其憲令則姦多故利在故法前令則道之利在新法後令則道之利在故新相反前後相勃則申不害雖十使昭侯用術而姦臣猶有所譎其辭矣故託萬乘之勁韓十七年而不至於霸王者雖用術於上法不勤飾於官之患也公孫鞅之治秦也設告相坐而責其實連什伍而同其罪賞厚而信刑重而必是以其民用力勞而不休逐敵危而不卻故其國富而兵強然而無術以知姦則以其富強也資人臣而已矣及孝公商君死惠王即位秦法未敗也而張儀以秦殉韓魏惠王死武王即位甘茂以秦殉周武王死昭襄王即位穰侯越韓魏而東攻齊五年而秦不益尺土之地乃城其陶邑之封應侯攻韓八年成其汝南之封自是以來諸用秦者皆應穰之類也故戰勝則大臣尊益地則私封立主無術以知姦也商君雖十飾其法人臣反用其資故乘強秦之資數十年而不至於帝王者法雖勤飾於官主無術於上之患也問者曰主用申子之術而官行商君之法可乎對曰申子未盡於術商君未盡於法也申子言治不踰官雖知弗言治不踰官謂之守職也可知而弗言是不謂過也人主以一國目視故視莫明焉以一國耳聽故聽莫聰焉今知而弗言則人主尚安假借矣商君之法曰斬一首者爵一級欲為官者為五十石之官斬二首者爵二級欲為官者為百石之官官爵之遷與斬首之功相稱也今有法曰斬首者令為醫匠則屋不成而病不已夫匠者手巧也而醫者齊藥也而以斬首之功為之則不當其能今治官者智能也今斬首者勇力之所加也以勇力之所加而治智能之官是以斬首之功為醫匠也故曰二子之於法術皆未盡善也
