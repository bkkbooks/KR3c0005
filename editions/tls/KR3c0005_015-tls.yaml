body:
  text: 亡徵第十五凡人主之國小而家大權輕而臣重者可亡也簡法禁而務謀慮荒封內而恃交援者可亡也群臣為學門子好辯商賈外積小民右仗者可亡也好宮室臺榭陂池事車服器玩好罷露百姓煎靡貨財者可亡也用時曰事鬼神信卜筮而好祭祀者可亡也聽以爵不待參驗用一人為門戶者可亡也官職可以重求爵祿可以貨得者可亡也緩心而無成柔茹而寡斷好惡無決而無所定立者可亡也饕貪而無饜近利而好得者可亡也喜淫辭而不周於法好辯說而不求其用濫於文麗而不顧其功者可亡也淺薄而易見漏泄而無藏不能周密而通群臣之語者可亡也很剛而不和愎諫而好勝不顧社稷而輕為自信者可亡也恃交援而簡近鄰怙強大之救而侮所迫之國者可亡也羈旅僑士重帑在外上閒謀計下與民事者可亡也民信其相下不能其上主愛信之而弗能廢者可亡也境內之傑不事而求封外之士不以功伐課試而好以名問舉錯羈旅起貴以陵故常者可亡也輕其適正庶子稱衡太子未定而主即世者可亡也大心而無悔國亂而自多不料境內之資而易其鄰敵者可亡也國小而不處卑力少而不畏強無禮而侮大鄰貪愎而拙交者可亡也太子已置而娶於強敵以為后妻則太子危如是則群臣易慮群臣易慮者可亡也怯懾而弱守蚤見而心柔懦知有謂可斷而弗敢行者可亡也出君在外而國更置質太子未反而君易子如是則國攜國攜者可亡也挫辱大臣而狎其身刑戮小民而逆其使懷怒思恥而專習則賊生賊生者可亡也大臣兩重父兄眾強內黨外援以爭事勢者可亡也婢妾之言聽愛玩之智用外內悲惋而數行不法者可亡也簡侮大臣無禮父兄勞苦百姓殺戮不辜者可亡也好以智矯法時以行雜公法禁變易號令數下者可亡也無地固城郭惡無畜積財物寡無守戰之備而輕攻伐者可亡也種類不壽主數即世嬰兒為君大臣專制樹羈旅以為黨數割地以待交者可亡也太子尊顯徒屬眾強多大國之交而威勢蚤具者可亡也變褊而心急輕疾而易動發心悁忿而不訾前後者可亡也主多怒而好用兵簡本教而輕戰攻者可亡也貴臣相妬大臣隆盛外藉敵國內困百姓以攻怨讎而人主弗誅者可亡也君不肖而側室賢太子輕而庶子伉官吏弱而人民桀如此則國躁國躁者可亡也藏怨而弗發懸罪而弗誅使群臣陰憎而愈憂懼而久未可知者可亡也出軍命將太重邊地任守太尊專制擅命徑為而無所請者可亡也后妻淫亂主母畜穢外內混通男女無別是謂兩主兩主者可亡也后妻賤而婢妾貴太子卑而庶子尊相室輕而典謁重如此則內外乖內外乖者可亡也大臣甚貴偏黨眾強壅塞主斷而重擅國者可亡也私門之官用馬府之世絀鄉曲之善舉官職之勞廢貴私行而賤公功者可亡也公家虛而大臣實正戶貧而寄寓富耕戰之士困末作之民利者可亡也見大利而不趨聞禍端而不備淺薄於爭守之事而務以仁義自飾者可亡也不為人主之孝而慕匹夫之孝不顧社稷之利而聽主母之令女子用國刑餘用事者可亡也辭辯而不法心智而無術主多能而不以法度從事者可亡也親臣進而故人退不肖用事而賢良伏無功貴而勞苦賤如是則下怨下怨者可亡也父兄大臣祿秩過功章服侵等宮室供養大侈而人主弗禁則臣心無窮臣心無窮者可亡也公壻公孫與民同門暴慠其鄰者可亡也亡徵者非曰必亡言其可亡也夫兩堯不能相王兩桀不能相亡亡王之機必其治亂其強弱相踦者也木之折也必通蠹墻之壞也必通隙然木雖蠹無疾風不折墻雖隙無大雨不壞萬乘之主有能服術行法以為亡徵之君風雨者其兼天下不難矣
