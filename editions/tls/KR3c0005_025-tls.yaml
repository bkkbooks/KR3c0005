body:
  text: 安危第二十五安術有七危道有六安術一曰賞罰隨是非二曰禍福隨善惡三曰死生隨法度四曰有賢不肖而無愛惡五曰有愚智而無非譽六曰有尺寸而無意度七曰有信而無詐危道一曰斲削於繩之內二曰斷割於法之外三曰利人之所害四曰樂人之所禍五曰危人於所安六曰所愛不親所惡不䟽如此則人失其所以樂生而忘其所以重死人不樂生則人主不尊不重死則令不行也使天下皆極智能於儀表盡力於權衡以動則勝以靜則安治世使人樂生於為是愛身於為非小人少而君子多故社稷長立國家久安奔車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智廉生危則爭鄙起故安國之法若饑而食寒而衣不令而自然也先王寄理於竹帛其道順故後世服今使人去饑寒雖賁育不能行廢自然雖順道而不立強勇之所不能行則上不能安上以無厭責已盡則下對無有無有則輕法法所以為國也而輕之則功不立名不成聞古扁鵲之治其病也以刀刺骨聖人之救危國也以忠拂耳刺骨故小痛在體而長利在身拂耳故小逆在心而久福在國故甚病之人利在忍痛猛毅之君以福拂耳忍痛故扁鵲盡巧拂耳則子胥不失壽安之術也病而不忍痛則失扁鵲之巧危而不拂耳則失聖人之意如此長利不遠垂功名不久立人主不自刻以堯而責人臣以子胥是幸殷人之盡如比干盡如比干則上不失下不亡不權其力而有田成而幸其身盡如比干故國不得一安廢堯舜而立桀紂則人不得樂所長而憂所短失所長則國家無功守所短則民不樂生以無功御不樂生不可行於齊民如此則上無以使下下無以事上安危在是非不在於強弱存亡在虛實不在於眾寡故齊萬乘也而名實不稱上空虛於國內不充滿於名實故臣得奪主桀天子也而無是非賞於無功使讒諛以詐偽為貴誅於無罪使傴以天性剖背以詐偽為是天性為非小得勝大明主堅內故不外失失之近而不亡於遠者無有故周之奪殷也拾遺於庭使殷不遺於朝則周不敢望秋毫於境而況敢易位乎明主之道忠法其法忠心故臨之而治去之而思堯無膠漆之約於當世而道行舜無置錐之地於後世而德結能立道於往古而垂德於萬世者之謂明主
