body:
  text: 難二第三十七景公過晏子曰子宮小近市請徙子家豫章之圃晏子再拜而辭曰且嬰家貧待市食而朝暮趨之不可以遠景公笑曰子家習市識貴賤乎是時景公繁於刑晏子對曰踴貴而屨賤景公曰何故對曰刑多也景公造然變色曰寡人其暴乎於是損刑五或曰晏子之貴踴非其誠也欲便辭以止多刑也此不察治之患也夫刑當無多不當無少無以不當聞而以太多說無術之患也敗軍之誅以千百數猶北不止即治亂之刑如恐不勝而姦尚不盡今晏子不察其當否而以太多為說不亦妄乎夫惜草茅者耗禾穗惠盜賊者傷良民今緩刑罰行寬惠是利姦邪而害善人也此非所以為治也齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此有國之恥也公胡其不雪之以政公曰故其善因發倉囷賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎或曰管仲雪桓公之恥於小人而生桓公之恥於君子矣使桓公發倉囷而賜貧窮論囹圄而出薄罪非義也不可以雪恥使之而義也桓公宿義須遺冠而後行之則是桓公行義非為遺冠也是雖雪遺冠之恥於小人而亦生遺義之恥於君子矣且夫發囷倉而賜貧窮者是賞無功也論囹圄而出薄罪者是不誅過也夫賞無功則民偷幸而望於上不誅過則民不懲而易為非此亂之本也安可以雪恥哉昔者文王侵盂克莒舉酆三舉事而紂惡之文王乃懼請入洛西之地赤壤之國方千里以請解炮烙之刑天下皆說仲尼聞之曰仁哉文王輕千里之國而請解炮烙之刑智哉文王出千里之地而得天下之心或曰仲尼以文王為智也不亦過乎夫智者知禍難之地而辟之者也是以身不及於患也使文王所以見惡於紂者以其不得人心耶則雖索人心以解惡可也紂以其大得人心而惡之已又輕地以收人心是重見疑也固其所以桎梏囚於羑里也鄭長者有言體道無為無見也此最宜於文王矣不使人疑之也仲尼以文王為智未及此論也晉平公問叔向曰昔者齊桓公九合諸侯一匡天下不識臣之力也君之力也叔向對曰管仲善制割賓胥無善削縫隰朋善純緣衣成君舉而服之亦臣之力也君何力之有師曠伏琴而笑之公曰太師奚笑也師曠對曰臣笑叔向之對君也凡為人臣者猶炮宰和五味而進之君君弗食孰敢強之也臣請譬之君者壤地也臣者草木也必壤地美然後草木碩大亦君之力也臣何力之有或曰叔向師曠之對皆偏辭也夫一匡天下九合諸侯美之大者也非專君之力也又非專臣之力也昔者宮之奇在虞僖負羈在曹二臣之智言中事發中功虞曹俱亡者何也此有其臣而無其君者也且蹇叔處干而干亡處秦而秦霸非蹇叔愚於干而智於秦也此有君與無君也向曰臣之力也不然矣昔者桓公宮中二市婦閭二百披髮而御婦人得管仲為五伯長失管仲得豎刁而身死蟲流出戶不葬以為非臣之力也且不以管仲為霸以為君之力也且不以豎刁為亂昔者晉文公慕於齊女而亡歸咎犯極諫故使反晉國故桓公以管仲合文公以舅犯霸而師曠曰君之力也又不然矣凡五霸所以能成功名於天下者必君臣俱有力焉故曰叔向師曠之對皆偏辭也齊桓公之時晉客至有司請禮桓公曰告仲父者三而優笑曰易哉為君一曰仲父二曰仲父桓公曰吾聞君人者勞於索人佚於使人吾得仲父已難矣得仲父之後何為不易乎哉或曰桓公之所應優非君人者之言也桓公以君人為勞於索人何索人為勞哉伊尹自以為宰干湯百里奚自以為虜干穆公虜所辱也宰所羞也蒙羞辱而接君上賢者之憂世急也然則君人者無逆賢而已矣索賢不為人主難且官職所以任賢也爵祿所以賞功也設官職陳爵祿而士自至君人者奚其勞哉使人又非所佚也人主雖使人必以度量準之以刑名參之以事遇於法則行不遇於法則止功當其言則賞不當則誅以刑名收臣以度量準下此不可釋也君人者焉佚哉索人不勞使人不佚而桓公曰勞於索人佚於使人者不然且桓公得管仲又不難管仲不死其君而歸桓公鮑叔輕官讓能而任之桓公得管仲又不難明矣已得管仲之後奚遽易哉管仲非周公旦周公旦假為天子七年成王壯授之以政非為天下計也為其職也夫不奪子而行天下者必不背死君而事其讎背死君而事其讎者必不難奪子而行天下不難奪子而行天下者必不難奪其君國矣管仲公子糾之臣也謀殺桓公而不能其君死而臣桓公管仲之取舍非周公旦可知也若使管仲大賢也且為湯武湯武桀紂之臣也桀紂作亂湯武奪之今桓公以易居其上是以桀紂之行居湯武之上桓公危矣若使管仲不肖人也且為田常田常簡公之臣也而弒其君今桓公以易居其上是以簡公之易居田常之上也桓公又危矣管仲非周公旦以明矣然為湯武與田常未可知也為湯武有桀紂之危為田常有簡公之亂也已得仲父之後桓公奚遽易哉若使桓公之任管仲必知不欺己也是知不欺主之臣也然雖知不欺主之臣今桓公以任管仲之專借豎刁易牙蟲流出戶而不葬桓公不知臣欺主與不欺主已明矣而任臣如彼其專也故曰桓公闇主李克治中山苦陘令上計而入多李克曰語言辨聽之說不度於義謂之窕言無山林澤谷之利而入多者謂之窕貨君子不聽窕言不受窕貨子姑免矣或曰李子設辭曰夫言語辨聽之說不度於義者謂之窕言辯在言者說在聽者言非聽者也所謂不度於義非謂聽者必謂所聽也聽者非小人則君子也小人無義必不能度之義也君子度之義必不肯說也夫曰言語辯聽之說不度於義者必不誠之言也入多之為窕貨也未可遠行也李子之姦弗蚤禁使至於計是遂過也無術以知而入多入多者穰也雖倍入將柰何舉事慎陰陽之和種樹節四時之適無早晚之失寒溫之災則入多不以小功妨大務不以私欲害人事丈夫盡於耕農婦人力於織紝則入多務於畜養之理察於土地之宜六畜遂五穀殖則入多明於權計審於地形舟車機械之利用力少致功大則入多利商市關梁之行能以所有致所無客商歸之外貨留之儉於財用節於衣食宮室器械周於資用不事玩好則入多入多皆人為也若天事風雨時寒溫適土地不加大而有豐年之功則入多人事天功二物者皆入多非山林澤谷之利也夫無山林澤谷之利入多因謂之窕貨者無術之言也趙簡子圍衛之郛郭犀楯犀櫓立於矢石之所不及鼓之而士不起簡子投枹曰烏乎吾之士數弊也行人燭過免冑而對曰臣聞之亦有君之不能耳士無弊者昔者吾先君獻公并國十七服國三十八戰十有二勝是民之用也獻公沒惠公即位淫衍暴亂身好玉女秦人恣侵去絳十七里亦是人之用也惠公沒文公授之圍衛取鄴城濮之戰五敗荊人取尊名於天下亦此人之用也亦有君不能耳士無弊也簡子乃去楯櫓立矢石之所及鼓之而士乘之戰大勝簡子曰與吾得革車千乘不如聞行人燭過之一言也或曰行人未有以說也乃道惠公以此人是敗文公以此人是霸未見所以用人也簡子未可以速去楯櫓也嚴親在圍輕犯矢石孝子之所以愛親也孝子愛親百數之一也今以為身處危而人尚可戰是以百族之子於上皆若孝子之愛親也是行人之誣也好利惡害夫人之所有也賞厚而信人輕敵矣刑重而必夫人不北矣長行徇上數百不一人喜利畏罪人莫不然將眾者不出乎莫不然之數而道乎百無一人之行行人未知用眾之道也
