body:
  text: 御製讀韓非子楚莊莅三年無令無政為司馬隠進諌王亦隠答辭飛有沖天日鳴有驚人時廢十起者九誅舉邦大治叶是盖效殷宗夢築吾固疑向評通鑑輯覽以殷髙宗圗像傅巖事致疑傷誕或居民間時物色已久特託之神道設教而已一之已為甚其可再乎斯臯陶亦有言一二日萬㡬三年㒺禀令叢脞萬事堕逮其起捄正害久民受之非非達政者泥古兼好竒御製讀韓非子昔韓非述管仲之對桓公曰知臣莫如君知子莫如父斯言也予以為非是夫自古及今多有以此言為然者而余以為非是者何盖其君若父果賢耶自能知之而亦無待其臣子及他人之頌使其不賢不能知在他人則是不闗己之謬賛以害人家國設為臣子者亦如是言則是内懐怨懟而仍陷其君若父於不知也即亦桓公屢舉鮑叔牙數人而管仲皆以為不可是果知臣乎桀之於闗龍逢紂之於王子比干亦猶是也瞽䏂之於舜獻公之於申生是果知之乎其類此者不可屈指數余故以為非是盖不近情之論聼之似是而折衷於理其剌謬不通若是者亦多矣且君子立言将以為萬世法程而不可逞一己之私智以欺世盗名也言治之書莫如典謨一則曰在知人再則曰惟帝其難之使世之為君為父者皆曰我已知臣我已知子誤知子者其害猶不過一家誤知臣者其害将及國與天下是誰作之俑㢤夫自以為不知者或可勉以至有知之日而自以為己知者吾知其為終于不知而已矣御製讀韓非説難韓非曽著説難辭世態揣摩竟莫遺寄語聴人之説者破其術祇在無私御製讀説難率詠説難說盡説人情姚賈猶然數語傾不及周昌心口一機權百出究何成御製讀韓子韓非著説難其於人情世態亦既知之悉而言之詳矣而其所稱周文王晉文公之結韈結履何其謬之甚㢤韈履之有帶古制姑弗論而文王文公之事如出一轍一之為甚再何堪焉夫伐與戰嚴装時也臨陣而帶繫觧已屬烏有之事而二君者方且周旋道古以為無可使結帯之人則一國之臣孰非先君之臣乎上者中者固不必其下者亦不敢使則二君之於其國竟無一人可使執賤役者将厠牏浣滌亦皆自親之乎夫重士理也重士而失之諂文公之譎或偶為之孰謂文王之聖而為是乎予故斥其謬之甚而明示重士之有常經也欽定四庫全書子部三韓子法家類提要臣等謹案韓子二十卷周韓非撰漢書藝文志載韓子五十五篇張守節史記正義引阮孝緒七録載韓子二十卷篇數卷數皆與今本相符惟王應麟漢藝文志考作五十六篇殆𫝊寫字誤也其註不知何人作考元至元三年何犿本稱舊有李瓉註鄙陋無取盡為削去云云則註者當為李瓚然瓉為何代人犿未之言玉應麟玉海已稱韓子註不知誰作諸書亦别無李瓉註韓子之文不知犿何所據也犿本僅五十三篇其序稱内佚姦劫一篇説林下一篇及内儲説下六㣲内似煩以下數章明萬厯十年趙用賢購得宋槧與犿本相校始知舊本六㣲篇之末尚有二十八條不止犿所云數章説林下篇之首尚有伯樂教二人相踶馬等十六章諸本佚脱其文以説林上篇田伯鼎好士章逕接此篇蟲有蚘章和氏篇之末自和雖獻璞而未美未為王之害也以下脱三百九十六字姦劫篇之首自我以清亷事上以上脱四百六十字其脱葉適在兩篇之間故其次篇標題與文俱佚𫝊寫者各誤以下篇之半連于上篇遂求其下篇而不得其實未嘗全佚也今世所𫝊又有明周孔教所刋大字本極為清楷其序不著年月未知在用賢本前後考孔教舉進士在用賢後十年疑所見亦宋槧本故其文均與用賢本同無所疑闕今即據以繕録而校以用賢之本考史記非本𫝊稱非見韓削弱數以書諌韓王韓王不能用悲亷直不容于邪枉之臣觀往者得失之變故作孤憤五蠧内外儲説林説難十餘萬言又云人或𫝊其書至秦秦王見其孤憤五蠧之書則非之著書當在未入秦前史記自叙所謂韓非囚秦説難孤憤者乃史家駁文不足為據今書冠以初見秦次以存韓皆入秦後事雖似與史記自叙相符然傳稱韓王遣非使秦秦王悦之未信用李斯姚賈害之下吏治非李斯使人遺之藥使自殺計其間未必有暇著書且存韓一篇終以李斯駁非之議及斯上韓王書其事與文皆為未畢疑非所著書本各自為篇非沒之後其徒收拾編次以成一帙故在韓在秦之作均為收録併其私記未完之藁亦收入書中名為非撰實非非所手定也以其本出于非故仍題非名以著于録焉乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
