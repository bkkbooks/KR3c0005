body:
  text: 和氏第十三楚人和氏得玉璞楚山中奉而獻之厲王厲王使玉人相之玉人曰石也王以和為誑而刖其左足及厲王薨武王即位和又奉其璞而獻之武王武王使玉人相之又曰石也王又以和為誑而刖其右足武王薨文王即位和乃抱其璞而哭於楚山之下三日三夜淚盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲也和曰吾非悲刖也悲夫寶玉而題之以石貞士而名之以誑此吾所以悲也王乃使玉人理其璞而得寶焉遂命曰和氏之璧夫珠玉人主之所急也和雖獻璞而未美未為主之害也然猶兩足斬而寶乃論論寶若此其難也今人主之於法術也未必和璧之急也而禁群臣士民之私邪然則有道者之不僇也特帝王之璞未獻耳主用術則大臣不得擅斷近習不敢賣重官行法則浮萌趍於耕農而遊士危於戰陳則法術者乃群臣士民之所禍也人主非能倍大臣之議越民萌之誹獨周乎道言也則法術之士雖至死亡道必不論矣昔者吳起教楚悼王以楚國之俗曰大臣太重封君太衆若此則上逼主而下虐民此貧國弱兵之道也不如使封君之子孫三世而收爵祿絶減百吏之祿秩損不急之枝官以奉選練之士悼王行之期年而薨矣吳起枝解於楚商君教秦孝公以連什伍設告坐之過燔詩書而明法令塞私門之請而遂公家之勞禁遊宦之民而顯耕戰之士孝公行之主以尊安國以富強八年而薨商君車裂於秦楚不用吳起而削亂秦行商君法而富強二子之言也已當矣然而枝解吳起而車裂商君者何也大臣若法而細民惡治也當今之世大臣貪重細民安亂甚於秦楚之俗而人主無悼王孝公之聽則法術之士安能蒙二子之危也而明己之法術哉此世所以亂無霸王也
