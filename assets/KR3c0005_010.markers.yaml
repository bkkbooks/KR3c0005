  - {type: variant, offset: 331, length: 0, content: '', WYG: 劓羙人費無極荆令尹之近者也郄宛新事令尹令尹甚愛之無極因謂令尹曰君愛宛甚何不一為酒其家令尹曰善因令之為具於郄宛之家無極教宛曰令尹甚傲而好兵子必謹敬先亟陳兵堂下及門庭宛因為之令尹徃而大驚曰此何也無極曰君殆}
