  - {type: variant, offset: 683, length: 273, content: 楚靈王為申之會宋太子後至執而囚之狎徐君拘齊慶封中射士諫曰合諸侯不可無禮此存亡之機也昔者桀為有戎之會而有緡叛之紂為黎丘之蒐而戎狄叛之由無禮也君其圖之君不聽遂行其意居未期年靈王南遊群臣從而劫之靈王餓而死乾溪之上故曰行僻自用無禮諸侯則亡身之至也奚謂好音昔者衛靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼓新聲者而說之使人問左右盡報弗聞乃召師涓而告之曰有鼓新聲者使人問左右盡報弗聞其狀似鬼神子為我聽而寫之師涓曰諾因靜坐撫琴而寫之師涓明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日已習之遂去之晉晉平公觴之於施夷之臺酒酣靈公起公曰有新聲願請以示平, WYG: 乎}
