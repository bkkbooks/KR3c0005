  - {type: variant, offset: 47, length: 0, content: '', krp: 可以借人上失其一臣以為百故臣得借則力多力多則内外為用内外為用則人主壅其說在老聃之言失魚也是以人主久語而左右鬻懐尉其患在胥僮之諫厲公與州侯之一言而燕人浴矢也權借一君臣之利異故人臣莫忠故臣利立而主利滅是以姦臣者召敵兵以内除舉外事以眩主茍成其私利不顧國患其說在衛人之妻夫禱祝也故戴歇議子弟而三桓攻昭公公叔内齊軍而翟璜召韓兵大宰嚭說大夫種大成牛教申不害司馬喜告趙王吕倉規秦楚宋石遺衛君書白圭教暴譴利異二似類之事人主之所以失誅而大臣之所以成私也是以門人捐水而夷射誅濟陽自矯而二人罪司馬喜殺爰騫而季辛誅鄭袖言惡臭而新人劓費無忌教郄宛而令尹誅陳需殺張夀而犀首走故燒芻廥而中山罪殺老儒而濟陽賞也事類三事起而有所利其尸主之有所害必反察之是以明主之論也國害則省其利者臣害則察其反者其說在楚兵至而陳需相黍種貴而廩吏覆是以昭奚恤執販茅而僖侯譙其次文公髪繞炙而穰侯請立帝有反四叅疑之勢亂之所由生也故明主愼之是以晉驪姬殺太子申生而鄭夫人用毒藥衛州吁殺其君完公子根取東周王子職甚有寵而商臣果作亂嚴遂韓廆争而哀侯果遇賊田常闞止戴驩皇喜敵而宋君簡公殺其說在狐突之稱二好與鄭昭之對未生也參疑五敵之所}
  - {type: variant, offset: 48, length: 0, content: '', WYG: 在淫察而就靡人主不察則敵廢置矣故文王資費仲而秦王患楚使黎且去仲尼而干象沮甘茂是以子胥宣言而子常用内羙人而虞虢亡佯遺書而萇死用雞猳而鄶傑盡廢置六叅疑廢置之事明主絶之於内而施之於外資其輕者輔其弱者此謂廟攻參伍既用於内觀}
  - {type: page-break, offset: 48, content: '', id: KR3c0005_WYG_010-3b, image: WYG0729/WYG0729-0694b.png}
  - {type: variant, offset: 48, length: 0, content: '', krp: 在淫察而就靡人主不察則敵廢置矣故文王資費仲而秦王患楚使黎且去仲尼而干象沮甘茂是以子胥宣言而子常用内羙人而虞虢亡佯遺書而萇死用雞猳而鄶傑盡廢置六叅疑廢置之事明主絶之於内而施之於外資其輕者輔其弱者此謂廟攻參伍既用於内觀}
  - {type: variant, offset: 49, length: 1, content: 治, WYG: 又行於外則敵偽得其說在秦侏儒之告惠文君也故襄疵言襲鄴}
  - {type: variant, offset: 49, length: 1, content: 治, krp: 又行於外則敵偽得其說在秦侏儒之告惠文君也故襄疵言襲鄴}
  - {type: 'tls:seg', offset: 50, content: '', id: KR3c0005_tls_010-2a.3}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 嗣公賜令蓆廟攻七右經一勢重者人主之淵也臣者勢重之魚也魚失於淵而不可復得也人主失其勢重於臣而不可復收也古之人難正言故託之於魚賞罰者利器也君操之以制臣臣得之以壅主故君先見所賞則臣鬻之以為徳君先見所罰則臣鬻之以為威故曰國之利器不可以示人靖郭君相齊與故人久語則故人富懐左右尉則左右重久語懐尉小資也猶以成富況於吏勢乎晉厲公之時六卿貴胥僮長魚矯諫曰大臣貴重敵主争事外市樹黨下亂國法上以刧主而國不危者未嘗有也公曰善乃誅三卿胥僮長魚矯又諫曰夫同罪之人偏誅而不盡是懐怨而借之間也公曰吾一朝而夷三卿予不忍盡也長魚矯對曰公不忍之彼將忍公公不聽居三月諸卿作難遂殺厲公而分其地州侯相荆貴而主斷荆王疑之因問左右左右對曰無有如出一口也燕人無惑故浴狗矢燕人其妻有私通於士其夫早自外而來士適出夫曰何客也其妻曰無客問左右左右言無有如出一口其妻曰公惑易也因浴之以狗矢一曰燕人李季}
  - {type: page-break, offset: 51, content: '', id: KR3c0005_WYG_010-4a, image: WYG0729/WYG0729-0694c.png}
  - {type: page-break, offset: 51, content: '', id: KR3c0005_WYG_010-4b, image: WYG0729/WYG0729-0694d.png}
