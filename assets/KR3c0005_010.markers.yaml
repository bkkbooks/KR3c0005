  - {type: variant, offset: 1088, length: 387, content: 此所謂清商也公曰清商固最悲乎師曠曰不如清徵公曰清徵可得而聞乎師曠曰不可古之聽清徵者皆有德義之君也今吾君德薄不足以聽平公曰寡人之所好者音也願試聽之師曠不得已援琴而鼓一奏之有玄鶴二八道南方來集於郎門之垝再奏之而列三奏之延頸而鳴舒翼而舞音中宮商之聲聲聞于天平公大說坐者皆喜平公提觴而起為師曠壽反坐而問曰音莫悲於清徵乎師曠曰不如清角平公曰清角可得而聞乎師曠曰不可昔者黃帝合鬼神於泰山之上駕象車而六蛟龍畢方並鎋蚩尤居前風伯進掃雨師洒道虎狼在前鬼神在後騰蛇伏地鳳皇覆上大合鬼神作為清角今吾君德薄不足聽之聽之將恐有敗平公曰寡人老矣所好者音也願遂聽之師曠不得已而鼓之一奏之有玄雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆隳廊瓦坐者散走平公恐懼伏于廊室之間晉國大旱赤地三年平公之身遂癃病故曰不務聽治而好五音不已則窮身之事也奚謂貪愎昔者智伯瑤率趙韓魏而伐范中行滅之反歸休兵數年因令人請地於韓韓康, WYG: 太}
