  - {type: variant, offset: 995, length: 4, content: 道出師曠, WYG: 齊代太子申生因患申生於君而殺之遂立奚齊為太子鄭君已立太子矣而有所愛羙女欲以其子為後夫人恐因用毒藥賊君殺之衛州吁重於衛擬於君羣臣百姓盡畏其勢重州吁果殺其君而奪之政公子朝周太子也弟公子根甚有寵於君君死遂以東周叛分為兩國楚成王以商臣為太子既而又欲置公子職商臣作亂遂攻殺成王一}
