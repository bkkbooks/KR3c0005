  - {type: variant, offset: 472, length: 189, content: 假我道則是寶猶取之內府而藏之外府也馬猶取之內廄而著之外廄也君勿憂君曰諾乃使荀息以垂棘之璧與屈產之乘賂虞公而求假道焉虞公貪利其璧與馬而欲許之宮之奇諫曰不可許夫虞之有虢也如車之有輔輔依車車亦依輔虞虢之勢正是也若假之道則虢朝亡而虞夕從之矣不可願勿許虞公弗聽遂假之道荀息伐虢剋之還反處三年興兵伐虞又剋之荀息牽馬操璧而報獻公獻公說曰璧則猶是也雖然馬齒亦益長矣故虞公之兵殆而地削者何也愛小利, WYG: 貫臠}
