  - {type: variant, offset: 993, length: 1, content: 此, WYG: 何謂也對曰臣刀之利風靡骨斷而髪不斷是臣之一死也桑炭炙之肉紅白而髪不焦是臣之二死也炙熟又重睫而視之髪繞炙而目不見是臣之三死也意者堂下其有翳憎臣者乎殺臣不亦蚤乎穰侯相秦而齊强穰侯欲立秦為帝而齊不聽因請立齊為東帝而不能成也五晉獻公之時驪姬貴擬於后妻而欲以其子}
