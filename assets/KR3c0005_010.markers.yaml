  - {type: variant, offset: 2197, length: 841, content: 貴智矣君釋此計者臣請試潛行而出見韓魏之君張孟談見韓魏之君曰臣聞脣亡齒寒今知伯率二君而伐趙趙將亡矣趙亡則二君為之次二君曰我知其然也雖然知伯之為人也麤中而少親我謀而覺則其禍必至矣為之柰何張孟談曰謀出二君之口而入臣之耳人莫之知也二君因與張孟談約三軍之反與之期日夜遣孟談入晉陽以報二君之反襄子迎孟談而再拜之且恐且喜二君以約遣張孟談因朝知伯而出遇智過於轅門之外智過怪其色因入見知伯曰二君貌將有變君曰何如曰其行矜而意高非他時之節也君不如先之君曰吾與二主約謹矣破趙而三分其地寡人所以親之必不侵欺兵之著於晉陽三年今旦暮將拔之而嚮其利何乃將有他心必不然子釋勿憂勿出於口明旦二主又朝而出復見智過於轅門智過入見曰君以臣之言告二主乎君曰何以知之曰今日二主朝而出見臣而其色動而視屬臣此必有變君不如殺之君曰子置勿復言智過曰不可必殺之若不能殺遂親之君曰親之柰何智過曰魏宣子之謀臣曰趙葭韓康子之謀臣曰段規此皆能移其君之計君其與二君約破趙國因封二子者各萬家之縣一如是則二主之心可以無變矣知伯曰破趙而三分其地又封二子者各萬家之縣一則吾所得者少不可智過見其言之不聽也出因更其族為輔氏至於期日之夜趙氏殺其守堤之吏而決其水灌知伯軍知伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗知伯之軍而擒知伯知伯身死軍破國分為三為天下笑故曰貪愎好利則滅國殺身之本也奚謂耽於女樂昔者戎王使由余聘於秦穆公問之曰寡人嘗聞道而未得目見之也願聞古之明主得國失國常何以由余對曰臣嘗得聞之矣常以儉得之以奢失之穆公曰寡人不辱而問道於子子以儉對寡人何也由余對曰臣聞昔者堯有天下飯於土簋飲於土鉶其地南至交趾北至幽都東西至日月之所出入者莫不賓服堯禪天下虞舜受之作為食器斬山木而財之削鋸脩其迹流漆墨其上輸之於宮以為食器諸侯以為益侈國之不服者十三舜禪天下而傳之於禹禹作為祭器墨漆其外而朱畫其內縵帛為茵蔣席頗緣觴酌有采而樽俎有飾此彌侈矣而國之不服者三十三夏后氏沒殷人受之作為大路而建九旒食器雕琢觴酌刻鏤白壁堊墀茵席雕文此彌侈矣而國之不服者五十三君子皆知文章矣而欲服者彌少, WYG: 後}
