  - {type: variant, offset: 52, length: 0, content: '', WYG: 逺出其妻私有通於士季突至士在内中妻患之其室婦曰令公子裸而解髪直出門吾屬佯不見也於是公子從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼乎婦人曰然為之奈何曰取}
  - {type: page-break, offset: 52, content: '', id: KR3c0005_WYG_010-5a, image: WYG0729/WYG0729-0695a.png}
  - {type: variant, offset: 52, length: 0, content: '', krp: 逺出其妻私有通於士季突至士在内中妻患之其室婦曰令公子裸而解髪直出門吾屬佯不見也於是公子從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼乎婦人曰然為之奈何曰取}
  - {type: variant, offset: 53, length: 1, content: 音, WYG: 姓之矢一云尿浴之季曰諾乃浴以矢一曰浴以蘭湯二衛人有夫妻禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾荆王欲宦諸公子於四隣戴歇曰不可宦公子於四隣四隣必重之曰子出者重重}
  - {type: page-break, offset: 53, content: '', id: KR3c0005_WYG_010-5b, image: WYG0729/WYG0729-0695b.png}
  - {type: variant, offset: 53, length: 1, content: 音, krp: 姓之矢一云尿浴之季曰諾乃浴以矢一曰浴以蘭湯二衛人有夫妻禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾荆王欲宦諸公子於四隣戴歇曰不可宦公子於四隣四隣必重之曰子出者重重}
  - {type: punctuation, offset: 54, content: ，, id: KR3c0005_tls_010-bkkpn9}
  - {type: 'tls:seg', offset: 54, content: '', id: KR3c0005_tls_010-2a.4}
  - {type: variant, offset: 55, length: 2, content: 窮身, WYG: 必為所重之國黨則是教子於外市也不便魯孟孫叔孫季孫相戮力刧昭公遂奪其國而擅其制魯三桓逼昭公攻季孫氏而孟孫氏叔孫氏相與謀曰救之乎叔孫氏之御者曰我家臣也安知公家凡有季孫與無季孫於我孰利皆曰無季孫必無叔孫然則救之於是撞西北隅而入孟孫見叔孫之旗入亦救之三桓為一昭公不勝逐之死於乾侯公叔相韓而有功齊公仲甚重於王公叔恐王之相公仲也使齊韓約而攻衛公叔因内齊軍於鄭以劫其君以固其位而信兩國之約翟璜魏王之臣也而善於韓乃召韓兵令之攻魏因請為魏王搆之以自重也越王攻吳王吳王謝而告服越王欲許之范蠡大夫種曰不可昔天以越與吳吳不受今天反夫差亦天禍也以吳予越再拜受之不可許也大宰嚭遺大夫種書曰狡兎盡則良犬烹敵國滅則謀臣亡大夫何不釋吳而患越乎大夫種受書讀之太息而歎曰殺之越與吳同命大成牛從趙謂申不害於韓曰以韓重我於趙請以趙重子於韓是子有兩韓我有兩趙司馬喜中山君之臣也而善於趙嘗以中山之謀㣲告趙王吕倉魏王之臣也而善於秦荆㣲諷秦荆令之攻魏因請行和以自重也宋石衛將也衛君荆將也兩國搆難二子皆將宋石遺衛君書曰二軍相當兩旗相望唯毋一戰戰必不兩存此乃兩主}
