  - {type: variant, offset: 46, length: 0, content: '', krp: 利害有反五曰叅疑内争六曰敵國廢置此六者主之所察也權勢}
  - {type: variant, offset: 47, length: 0, content: '', WYG: 可以借人上失其一臣以為百故臣得借則力多力多則内外為用内外為用則人主壅其說在老聃之言失魚也是以人主久語而左右鬻懐尉其患在胥僮之諫厲公與州侯之一言而燕人浴矢也權借一君臣之利異故人臣莫忠故臣利立而主利滅是以姦臣者召敵兵以内除舉外事以眩主茍成其私利不顧國患其說在衛人之妻夫禱祝也故戴歇議子弟而三桓攻昭公公叔内齊軍而翟璜召韓兵大宰嚭說大夫種大成牛教申不害司馬喜告趙王吕倉規秦楚宋石遺衛君書白圭教暴譴利異二似類之事人主之所以失誅而大臣之所以成私也是以門人捐水而夷射誅濟陽自矯而二人罪司馬喜殺爰騫而季辛誅鄭袖言惡臭而新人劓費無忌教郄宛而令尹誅陳需殺張夀而犀首走故燒芻廥而中山罪殺老儒而濟陽賞也事類三事起而有所利其尸主之有所害必反察之是以明主之論也國害則省其利者臣害則察其反者其說在楚兵至而陳需相黍種貴而廩吏覆是以昭奚恤執販茅而僖侯譙其次文公髪繞炙而穰侯請立帝有反四叅疑之勢亂之所由生也故明主愼之是以晉驪姬殺太子申生而鄭夫人用毒藥衛州吁殺其君完公子根取東周王子職甚有寵而商臣果作亂嚴遂韓廆争而哀侯果遇賊田常闞止戴驩皇喜敵而宋君簡公殺其說在狐突之稱二好與鄭昭之對未生也參疑五敵之所}
