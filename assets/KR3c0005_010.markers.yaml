  - {type: variant, offset: 1771, length: 256, content: 令將車騎先至晉陽君因從之君至而行其城郭及五官之藏城郭不治倉無積粟府無儲錢庫無甲兵邑無守具襄子懼乃召張孟談曰寡人行城郭及五官之藏皆不備具吾將何以應敵張孟談曰臣聞聖人之治藏於民不藏於府庫務脩其教不治城郭君其出令令民自遺三年之食有餘粟者入之倉遺三年之用有餘錢者入之府遺有奇人者使治城郭之繕君夕出令明日倉不容粟府無積錢庫不受甲兵居五日而城郭已治守備已具君召張孟談而問之曰吾城郭已治守備已具錢粟已足甲兵有餘吾柰無箭何張孟談曰臣聞董子之治晉陽也公宮之垣皆以荻蒿楛楚墻之有楛高至于丈君發而用之於是發而試之其堅則雖菌簵之勁弗能過, WYG: ''}
