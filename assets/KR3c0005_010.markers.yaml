  - {type: variant, offset: 4551, length: 220, content: 年矣嗣子不善吾恐此將令其宗廟不祓除而社稷不血食也如是弗定則非與人交之道吾欲輔重耳而入之晉何如群臣皆曰善公因起卒革車五百乘疇騎二千步卒五萬輔重耳入之于晉立為晉君重耳即位三年舉兵而伐曹矣因令人告曹君曰懸叔瞻而出之我且殺而以為大戮又令人告釐負羈曰軍旅薄城吾知子不違也其表子之閭寡人將以為令令軍勿敢犯曹人聞之率其親戚而保釐負羈之閭者七百餘家此禮之所用也故曹小國也而迫於晉楚之間其君之危猶累卵也而以無禮蒞之此所以絕世也故曰國小無禮不用諫臣則絕世之勢也, WYG: ''}
