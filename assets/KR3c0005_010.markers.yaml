  - {type: variant, offset: 435, length: 1, content: 乘, WYG: 因以荆勢相魏韓昭侯之時黍種常貴甚昭侯令人覆廪吏果竊黍種而糶之甚多昭奚恤之用荆也有燒倉廥􅀢者而不知其人昭奚恤令吏執販茅者而問之果燒也昭奚侯之時宰人上食而羮中有生肝焉昭侯召宰人之次而誚之曰若何為置生肝寡人羮中宰人頓首服死罪曰竊欲去尚宰人也一曰僖侯浴湯中有礫僖侯曰尚浴免則有當代者乎左右對曰有僖侯曰召而來譙之曰何為置礫湯中對曰尚浴免則臣得代之是以置礫湯中文公之時宰臣上炙而髮繞之文公召宰人而譙之曰女欲}
