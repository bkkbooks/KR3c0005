  - {type: variant, offset: 3306, length: 701, content: 公曰寡人布令曰言歸者死今子犯寡人之令援戈將擊之顏涿聚曰昔桀殺關龍逢而紂殺王子比干今君雖殺臣之身以三之可也臣言為國非為身也延頸而前曰君擊之矣君乃釋戈趣駕而歸至三日而聞國人有謀不內齊景公者矣齊景公所以遂有齊國者顏涿聚之力也故曰離內遠遊則危身之道也奚謂過而不聽於忠臣昔者齊桓公九合諸侯一匡天下為五伯長管仲佐之管仲老不能用事休居於家桓公從而問之曰仲父家居有病即不幸而不起此病政安遷之管仲曰臣老矣不可問也雖然臣聞之知臣莫若君知子莫若父君其試以心決之君曰鮑叔牙何如管仲曰不可鮑叔牙為人剛愎而上悍剛則犯民以暴愎則不得民心悍則下不為用其心不懼非霸者之佐也公曰然則豎刁何如管仲曰不可夫人之情莫不愛其身公妬而好內豎刁自獖以為治內其身不愛又安能愛君公曰然則衛公子開方何如管仲曰不可齊衛之間不過十日之行開方為事君欲適君之故十五年不歸見其父母此非人情也其父母之不親也又能親君乎公曰然則易牙何如管仲曰不可夫易牙為君主味君之所未嘗食唯人肉耳易牙蒸其子首而進之君所知也人之情莫不愛其子今蒸其子以為膳於君其子弗愛又安能愛君乎公曰然則孰可管仲曰隰朋可其為人也堅中而廉外少欲而多信夫堅中則足以為表廉外則可以大任少欲則能臨其眾多信則能親鄰國此霸者之佐也君其用之君曰諾居一年餘管仲死君遂不用隰朋而與豎刁刁蒞事三年桓公南遊堂阜豎刁率易牙衛公子開方及大臣為亂桓公渴餒而死南門之寢公守之室身死三月不收蟲出于戶故桓公之兵橫行天下為五伯長卒見弒於其臣而滅高名為天下笑者何也不用管仲之過也故曰過而不聽於忠臣獨行其意則滅其高名為人笑之始也奚謂內不量力昔者秦之攻宜陽韓氏急公仲朋謂韓君曰與國不可恃也豈如因張儀為和於秦哉因賂以名都而南與伐楚是患解於秦而害交於楚也, WYG: ''}
