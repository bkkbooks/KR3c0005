  - {type: variant, offset: 4, length: 0, content: '', WYG: 大體第二十九説林下第二十三伯樂教二人相踶馬相與之簡子廐觀馬一人舉踶馬其一人從後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而腫膝夫踶馬也者舉後而任前腫膝不可任也故後不舉子巧於相踶馬而拙於任腫膝夫事有所必歸而以有所腫膝而不任智者之所獨知也恵子曰置猿於柙中則與豚同故勢不便非所以逞能也衛將軍文子見曽子曽子不起而延於坐席正身於奥文子謂其御曰曾子愚人也哉以我為君子也君子安可毋敬也以我為暴人也暴人安可侮也曽子不僇命也鳥有翢翢者重首而屈尾將欲飲於河則必顛乃銜其羽而飲之人之所有飲不足者不可不索其羽也鱣似蛇蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱣婦人拾蠶利之所在皆為賁諸伯樂教其所憎者相千里之馬教其所愛者相駑馬千里之馬時一其利緩駑馬日售其利急此周書所謂下言而上用者惑也桓赫曰刻削之道鼻莫如大目莫如小鼻大可小小不可大也目小可大大不可小也舉事亦然為其不可復者也則事寡敗矣崇侯惡來知不適紂之誅也而不見武王之滅之也比干子胥知其君之必亡也而不知身之死也故曰崇侯惡來知心而不知事比干子胥知事而不知心聖人其備矣宋太宰貴而主㫁季于將見宋君梁子聞之曰語必可與太宰三坐乎不然將不免季子因説以貴主而輕國楊朱之弟楊布衣素衣而出}
