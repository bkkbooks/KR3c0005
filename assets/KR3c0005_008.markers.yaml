  - {type: variant, offset: 7, length: 1, content: 命, krp: 敬重公則公常用宋矣管仲鮑叔相謂曰君亂甚矣必失國齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先達者相収管仲乃從公子糾鮑叔從小白國人果弑君小白先入為君魯人拘管仲而效之鮑叔言而相之故諺曰巫咸雖善祝不能自祓也秦醫雖善除不能自彈也以管仲之聖而待鮑叔之助此鄙諺所謂虜自賣裘而不售士自譽辯而不信者也荆王伐呉呉使沮衛蹷融犒於荆師荆將軍曰縛之殺以釁鼔問之曰汝來卜乎答曰卜卜吉乎曰吉荆人曰今荆將欲女釁鼓其何也答曰是故其所以吉也呉使人來也固視將軍怒將軍怒將深溝髙壘將軍不怒將懈怠今也將軍殺臣則呉必警守矣且國之卜非為一臣卜夫殺一臣而存一國其不言吉何也且死者無知則以臣釁鼓無益也死者有知也臣將當戰之時臣使鼓不鳴荆人因不殺也知伯將伐仇由而道難不通乃鑄大鐘遺仇由之君仇由之君大說除道將内之赤章曼支曰不可此小之所以事大也而今也大以來卒必隨之不可内也仇由之君不聴遂内之赤章曼枝因斷轂而驅至於齊七月而仇由亡矣越已勝呉又索卒於荆而攻晉左史倚相謂荆王曰夫越破呉豪士死銳卒盡大甲傷今又索卒以攻晉示我不病也不如起師以分呉荆王曰善因起師而從越越王怒將擊之大夫種曰不可吾豪士盡大甲傷我與戰必不尅不如賂之乃割露山之隂五百里以賂之荆伐陳呉救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚呉人必至不如僃之乃為陳陳未成也而呉人至見荆陳而反左史曰呉反覆六十里其君子必休小人必食我行三十里擊之必可敗也乃從之遂破呉軍韓趙相與為難韓子索兵於魏曰願借師以伐趙魏文侯曰寡人與趙兄弟不可以從趙又索兵攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反已乃知文侯以構於己乃皆朝魏齊伐魯索讒鼎魯以其贗往齊人曰贗也魯人曰眞也齊曰使樂正子春來吾將聴子魯君請樂正子春樂正子春曰胡不以其眞往也君曰我愛之答曰臣亦愛臣之信韓咎立為君未定也弟在周周欲重之而恐韓咎不立也綦母恢曰不若以車百乘送之得立因曰為戒不立則曰來效賊也靖郭君將城薛客多以諫者靖郭君謂謁者曰毋為客通齊}
