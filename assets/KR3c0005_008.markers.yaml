  - {type: variant, offset: 24, length: 3, content: 疾形曼, WYG: 以見之晉平公曰可以城壺丘矣平公曰何也對曰荆王弟在秦秦不出也是秦惡荆也必不敢禁我城壺丘若禁之我曰為我出荆王之弟吾不城也彼如出之可以徳荆彼不出是卒惡也必不敢禁我城壺丘矣公曰善乃城壺丘謂秦公曰為我出荆王之弟吾不城也秦因出之荆王大說以鍊金百鎰遺晉闔廬攻郢戰三勝問子胥曰可以退乎子胥對曰溺人者一飲而止則無溺者以其不休也不如乘之以沈之鄭人有一子將宦謂其家曰必築壞墻是不善人將竊其巷人亦云不時築而人果竊之以其子為智以巷人告者為盜觀行第二十四古之人目短於自見故以鏡觀面智短於自知故以道正己故鏡無見疵之罪道無明過之怨目失鏡則無以正鬚眉身失道則無以知迷惑西門豹之性急故佩韋以緩己董安于之心緩故佩弦以自急故以餘補不足以長續短之謂明主天下有信數三一曰智有所不能立二曰力有所不能舉三曰彊有所不能勝故雖有堯之智而無衆人之助大功不立有烏獲之勁而不得人助不能自舉有賁育之彊而無法術不得長生故世有不可得事有不可成故烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離朱易百歩而難眉睫非百歩近而眉睫逺也道不可也故明主不窮烏獲以其不能自舉不困離朱以其不能自見因可勢求易道故用力寡而功名立時有滿虛事有利害物有生死人主為三者發喜怒之色則金石之士離心焉聖賢之撲淺深矣故明主觀人不使人觀己明於堯不能獨成烏獲不能自舉賁育之不能自勝以法術則觀行之道畢矣安危第二十五安術有七危道有六安術一曰賞罰隨是非二曰禍福隨善惡三曰死生隨法度四曰有賢不肖而無愛惡五曰有愚智而無非譽六曰有尺寸而無意度七曰有信而無詐危道一曰斵削於繩之内二曰斷割於法之外三曰利人之所害四曰樂人之所禍五曰危人之所安六曰所愛不親所惡不䟽如此則人失其所以樂生而忘其所以重死人不樂生則人主不尊不重死則令不行也使天下皆極智能於儀表盡力於權衡以動則勝以靜則安治世使人樂生於為是愛身於為非小人少而君子多故社稷常立國家久安奔車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智㢘生危則爭鄙起故安國之法若饑而食寒而衣不令而自然也先王寄}
