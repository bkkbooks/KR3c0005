  - {type: variant, offset: 481, length: 1, content: 禱, WYG: 尊者載之以勢如此故太山之功長立於國家而日月之明久著於天地此堯之所以南面而守功舜之所以北面而效功也大體第二十九古之全大體者望天地觀江海因山谷日月所照四時所行雲布風動不以智累心不以私累己寄治亂於法術託是非於賞罰屬輕重於權衡不逆天理不傷情性不吹毛而求小疵不洗垢而察難知不引繩之外不推繩之内不急法之外不緩法之内守成理因自然禍福生乎道法而不出乎愛惡榮辱之責在乎己而不在乎人故至安之世法如朝露純樸不散心無結怨口無煩言故車馬不疲敝於逺路旌旗不亂於大澤萬民不失命於冦戎雄駿不創夀於旗幢豪傑不著名於圖書不録功於盤盂記年之牒空虛故曰利莫長於簡福莫久於安使匠石以千嵗之夀操鈞視規矩舉繩墨而正太山使賁育帶干將而齊萬民雖盡力於巧極盛於夀太山不正民不能齊故曰古之牧天下者不使匠石極巧以敗太山之體不使賁育盡威以傷萬民之性因道全法}
