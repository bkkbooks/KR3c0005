  - {type: variant, offset: 5, length: 0, content: '', krp: 雨解素衣衣緇衣而反其狗不知而吠之楊布怒將擊之楊朱曰子毋擊也子亦猶是曩者使女狗白而往黒而來子豈能毋怪哉恵子曰羿執鞅持扞操弓闗機越人爭為持的弱子扞弓慈母入室閉户故曰可必則越人不疑羿不可必則慈母逃弱子桓公問管仲富}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 涯乎答曰水之以涯其無水者也富之以涯其富已足者也人不能自止於足而亡其富之涯乎宋之富賈有監止子者與人爭買百金之璞玉因佯失而毁之負其百金而理其毁瑕得千鎰焉事有舉之而有敗而賢其毋舉之者負之時也有欲以御見荆王者衆騶妬之因曰臣能撽鹿見王王為御不及鹿自御及之王善其御也乃言衆騶妬之荆令公子將伐陳丈人送之曰晉彊不可不慎也公子曰丈人奚憂吾為丈人破晉丈人曰可吾方廬陳南門之外公子曰是何也曰我笑勾踐也為人之如是其易也己獨何為宻宻十年難乎堯以天下讓許由許由逃之舎於家人家人藏其皮冠夫棄天下而家人藏其皮冠是不知許由者也三虱相與訟一虱過之曰訟者奚說三虱曰爭肥饒之地一虱曰若亦不患臘之至而茅之燥耳若又奚患於是乃相與聚嘬其母而食之彘臞人乃弗殺蟲有蚘者或作􅚣一身兩口爭相齕也遂相食因自殺人臣之爭事而亡其國者皆蚘類也宫有堊器有滌則潔矣行身亦然無滌堊之地則寡非矣公子糾將為亂桓公使使者視之使者報曰笑不樂視不見必為亂乃使魯人殺之公孫宏斷髪而為越王騎公孫喜使人絶之曰吾不與子為昆弟矣公孫宏曰我斷髪子斷頸而為人用兵我將謂子何周南之戰公孫喜死焉有與悍者鄰欲賣宅而避之人曰是其貫將滿也遂去之或曰勿之矣子姑待之答曰吾恐其以我滿貫也遂去故曰物之㡬者非所靡也孔子謂弟子曰孰能導子西之釣名也子貢曰賜也能乃導之不復疑也孔子曰寛哉不被於利絜哉民性有恒曲為曲直為直孔子曰子西不免白公之難子西死焉故曰直於行者曲於欲晉中行文子出亡過於縣邑從者曰此嗇夫公之故人公奚不休舍且待後車文子曰吾嘗好音此人遺我鳴琴吾好珮此人遺我玊環是振我過者也以求容於我者吾恐其以我求容於人也乃去之果收文子後車二乘而獻之其君矣周趮謂宫他曰為我謂齊王曰以齊資我於魏請以魏事王宫他曰不可是示之無魏也齊王必不資於無魏者而以怨有魏者公不如曰以王之所欲臣請以魏聽王齊王必以公為有魏也必因公是公有齊也因以有齊魏矣白圭謂宋令尹曰君長自知政公無事矣今君少主也而務名不如令荆賀君之孝也則君不奪公位而}
