  - {type: variant, offset: 62, length: 5, content: 執要四方來, WYG: 之救危國也以忠拂耳刺骨故小痛在體而長利在身拂耳故小逆在心而久福在國故甚病之人利在忍痛猛毅之君以福拂耳忍痛故扁鵲盡巧拂耳則子胥不失夀安之術也病而不忍痛則失扁鵲之巧危而不拂耳則失聖人之意如此長利不逺垂功名不久立人主不自刻以堯而責人臣以子胥是幸殷人之盡如比干盡如比干則上不失下不亡不權其力而有田成而幸其身盡如比干故國不得一安廢堯舜而立桀紂則人不得樂所長而憂所短失所長則國家無功守所短則民不樂生以無功御不樂生不可行於齊民如此則上無以使下下無以事上安危在是非不在於強弱存亡在虚實不在於衆寡故齊萬乘也而名實不稱上空虚於國内不充滿於名實故臣得奪主殺天子也而無是非賞於無功使讒諛以詐偽為貴誅於無罪使傴以天性剖背以詐偽為是天性為非小得勝大矣明主堅内故不外失失之近正不亡於逺者無有故周之奪殷也拾遺於庭使殷不遺於朝則周不敢望秋毫於境而况敢易位乎明主之道忠法其法忠心故臨之而法去之而思堯無膠漆之約於當世而道行舜無置錐之地於後世而徳結能立道於往古而垂徳於萬世者之謂明主守道第二十六聖王之立法也其賞足以勸善其威足以勝暴其僃足以必完法治世之臣功多者位尊力極者賞厚情盡者名立善之生如春惡之死如秋故民勸極力而樂盡情此之謂上下相得上下相得故能使用力者自極於權衡而務至於任鄙戰士出死而願為賁育守道者出懐金石之心以死子胥之節用力者為任鄙戰如賁育守為金石則君人者髙枕而守己完矣古之善守者以其所重禁其所輕以其所難止其所易故君子與小人俱正盜跖與曾史俱㢘何以知之夫貪盜不赴谿而掇金赴谿而掇金則身不全賁育不量敵則無勇名盜跖不計可則利不成明主之守禁也賁育見侵於其所不能勝盜跖見害於其所不能取故能禁賁育之所不能犯守盜跖之所不能取則暴者守愿邪者反正大勇愿巨盜貞則天下公平而齊民之情正矣人主離法失人則危於伯夷不妄取而不免於田成盜跖之禍何也今天下無一伯夷而姦人不絶世故立法度量度量信則伯夷不失是而盜跖不得非法分明則賢不得奪不肖強不得侵弱衆不得暴寡託天下於堯之法則貞士不失分姦人不徼幸寄千金於羿之矢則伯夷不得亡而盜跖不敢取堯明於不失姦故天下無邪羿巧於不失發故千金不亡邪人不售而盜跖止如此故圗不載宰予不舉六卿書不著子胥不明夫差孫呉之略廢盜跖之心伏人主卄服於玊堂之中而無瞑目切齒傾取之患人臣垂拱於金城之内而無扼腕聚脣嗟唶之禍服虎而不以柙禁姦而不以法塞偽而不以符此賁育之所患堯舜之所難也故設柙非所以僃䑕也所以使怯弱能服虎也立法非所以僃曽史也所以使庸主能止盜跖也為符非所以豫尾生也所以使衆人不相謾也不獨恃比干之死節不幸亂臣之無詐也恃怯士之所能服握庸主之所易守當今之世為人主忠計為天下結徳者利莫長於如此故君人者無亡國之圗而忠臣無失身之畫明於尊位必賞故能使人盡力於權衡死節於官職通於賁育之情不以死易生惑於盜跖之貪不以財易身則守國之道畢僃矣用人第二十七聞古之善用人者必循天順人而明賞罰循天則用力寡而功立順人則刑罰省而令行明賞罰則伯夷盗跖不亂如此則白黒分矣治國之臣}
