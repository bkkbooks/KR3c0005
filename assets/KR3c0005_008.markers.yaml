  - {type: variant, offset: 72, length: 2, content: 彼自, WYG: 責於君故内無伏怨之亂外無馬服之患明君使事不相干故莫訟使士不兼官故技長使人不同功故莫爭訟爭訟止技長立則彊弱不觳力冰炭不合形天下莫得相傷治之至也釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成一輪廢尺寸而差短長王爾不能半中使中主守法術拙匠守規矩尺寸則萬不失矣君人者能去賢巧之所不能守中拙之所萬不失則人力盡而功名立明主立可為之賞設可避之罰故賢者勸賞而不見子胥之禍不肖者少罪而不見傴剖背盲者處平而不遇深谿愚者守靜而不陷險危如此則上下之恩結矣古之人曰其心難知喜怒難中也故}
