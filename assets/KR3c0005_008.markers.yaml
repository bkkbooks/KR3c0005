  - {type: variant, offset: 13, length: 10, content: 香美脆味厚酒肥肉甘口, WYG: 齊亦君之海也君長有齊奚以薛為君失齊雖隆薛城至於天猶無益也靖郭君曰善乃輟不城薛荆王弟在秦秦不出也中射之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟在秦秦不出也請以百金委叔向叔向受金}
