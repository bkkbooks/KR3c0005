  - {type: variant, offset: 163, length: 0, content: '', WYG: 瑟以小絃為大聲以大絃為小聲是大小易序貴賤易位儒者以為害義故不鼔也宣王曰善仲尼曰與其使民諂下也寧使民諂上諂下則朋黨諂上則尊敬四詎者齊之居士孱者魏之居士齊魏之君不明不能親照境内而聽左右之言故二子費金璧而求入仕也西門豹為鄴令清尅潔慤秋毫之端無私利也而甚簡左右不}
  - {type: page-break, offset: 163, content: '', id: KR3c0005_WYG_012-10a, image: WYG0729/WYG0729-0716a.png}
  - {type: variant, offset: 163, length: 0, content: '', krp: 瑟以小絃為大聲以大絃為小聲是大小易序貴賤易位儒者以為害義故不鼔也宣王曰善仲尼曰與其使民諂下也寧使民諂上諂下則朋黨諂上則尊敬四詎者齊之居士孱者魏之居士齊魏之君不明不能親照境内而聽左右之言故二子費金璧而求入仕也西門豹為鄴令清尅潔慤秋毫之端無私利也而甚簡左右不}
  - {type: variant, offset: 164, length: 0, content: '', WYG: 君左右也左右因相與比周而惡之居期年上計君收其璽豹自請曰臣昔者不知所}
  - {type: variant, offset: 164, length: 0, content: '', krp: 君左右也左右因相與比周而惡之居期年上計君收其璽豹自請曰臣昔者不知所}
  - {type: variant, offset: 165, length: 1, content: 密, WYG: 治鄴今臣得矣願請璽復以治鄴不當請伏斧鑕之罪文侯不忍而復與之豹因重歛百姓急事左右期年上計文侯迎而拜之豹對曰徃年臣為君治鄴而君奪臣璽今臣為左右治鄴而君拜臣臣不能治矣遂納璽而去文侯不受曰寡人曩不知子今知矣願子勉為寡人治之遂不受不受豹所納之璽也齊有狗盜之子與刖危子戱而相誇盜子曰吾父之裘獨有尾言裘尚有所盜之狗尾危子曰吾父獨冬不失袴刖足者不衣袴雖終其冬夏無所損失也子綽曰人莫能左畫方而右畫圓也以肉去蟻蟻愈多以魚去蠅蠅愈至桓公謂管仲曰官少而索者衆寡人憂之管仲曰君無聽左右之請因能而受祿錄功而與官則莫敢索官君何患焉韓宣子曰吾馬菽粟多矣甚臞何也寡人患之周市對曰使騶盡粟以食雖無肥不可得也名與多與之其實少雖無臞亦不可得也主不審其情實坐而患之馬猶不肥也桓公問置吏於管仲曰辯察於辭清潔於貨習人情夷吾不如絃商請立以為大理登降肅讓以明禮待賓臣不如隰朋請立以為大行墾草仞邑仞入也所食之邑能入其租稅也辟地生粟臣不如甯武請以為大田三軍既}
