  - {type: variant, offset: 559, length: 471, content: 則必以美名明之而微見其合於私利也欲陳危害之事則顯其毀誹而微見其合於私患也譽異人與同行者規異事與同計者有與同汙者則必以大飾其無傷也有與同敗者則必以明飾其無失也彼自多其力則毋以其難概之也自勇其斷則無以其謫怒之自智其計則毋以其敗窮之大意無所拂悟辭言無所繫縻然後極騁智辯焉此道所得親近不疑而得盡辭也伊尹為宰百里奚為虜皆所以干其上也此二人者皆聖人也然猶不能無役身以進如此其汙也今以吾言為宰虜而可以聽用而振世此非能仕之所恥也夫曠日離久而周澤既渥深計而不疑引爭而不罪則明割利害以致其功直指是非以飾其身以此相持此說之成也昔者鄭武公欲伐胡故先以其女妻胡君以娛其意因問於群臣吾欲用兵誰可伐者大夫關其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親己遂不備鄭鄭人襲胡取之宋有富人天雨墻壞其子曰不築必將有盜其鄰人之父亦云暮而果大亡其財其家甚智其子而疑鄰人之父此二人說者皆當矣厚者為戮薄者見疑則非知之難也處知則難也故繞朝之言當矣其為聖人於晉而為戮於秦也此不可不察昔者彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子瑕母病人間往夜告彌子彌子矯駕君車以出君聞而, WYG: 我且}
