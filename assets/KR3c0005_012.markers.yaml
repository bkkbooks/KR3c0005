  - {type: variant, offset: 1078, length: 145, content: 色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗啗我以餘桃故彌子之行未變於初也而以前之所以見賢而後獲罪者愛憎之變也故有愛於主則智當而加親有憎於主則智不當見罪而加䟽故諫說談論之士不可不察愛憎之主而後說焉夫龍之為虫也柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人人主亦有逆鱗說者能無嬰人主之逆鱗則幾矣, WYG: 卷十二}
