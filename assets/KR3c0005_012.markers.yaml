  - {type: variant, offset: 10, length: 1, content: 吾, WYG: 文公晉文公以箕鄭信誠以為原令曰必不叛我軒曰人主不以術御臣而恃其不叛其若之何也故有術之主信賞以盡能必罰以禁邪雖有駮行必得所利駮行不貞白而駮雜者簡主之相陽虎虎逐魯疑齊是行駮也趙主以術御之盡其用而趙㡬霸哀公問一足問孔子曰􅇪一足若何曰􅇪反戾惡心然所以免禍者也公曰其信一足故曰一足三失臣主之理則文王自履而矜君雖有師臣當亦謹小臣當即充指顧之役文王理解左右無可使者是亦失士也託言君所與者皆其師是矜過而飾非也不易朝燕之處則季孫莊而遇賊朝堂當莊燕季孫一之故終身莊而遇害也四利所禁禁所利雖神不行當禁而利當利而禁如此雖神不行況不神乎譽所罪毁所賞雖堯不治當罪而譽當賞而毁如此雖堯不治況非堯乎夫為門而不使入門不入不如無門也委利而不使進與利不進不如止也亂之所以産也門不使入利不使進亂所由生也齊侯不聽左右魏主不聽譽者而明察照羣臣則鉅不費金錢鉅費金以齊王用左右故也孱不用玉璧孱用玉以魏主用毁故西門豹請復治鄴足以}
