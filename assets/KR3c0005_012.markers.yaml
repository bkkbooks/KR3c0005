  - {type: variant, offset: 173, length: 0, content: '', krp: 有軍事是故循車馬比卒乘以備戎事有難則以備不虞平夷則以終朝事今亂晉國之政乏不虞之備以成節儉以潔私名獻伯之儉也可與言辭制當誅之故可與也又何賀管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立於高國之上曰臣尊矣然而臣踈乃立為仲父孔子聞而非之曰泰侈偪上一曰管仲父岀朱盖青衣置鼔而歸自朝歸設鼔吹之樂庭有陳鼎家有三歸孔子曰良大夫也}
  - {type: variant, offset: 174, length: 2, content: 身泄, WYG: 侈偪上孫叔敖相楚棧車柴車也牝馬糲餅菜羮枯魚之膳冬羔裘夏葛衣面有饑色則良大夫也其儉偪下陽虎去齊走趙簡主問曰吾聞子善樹人虎曰臣居魯樹三人皆為令尹及虎扺罪於魯皆搜索於虎也臣居齊薦三人一人得近王一人為縣令一人為候吏及臣得罪近王者不見臣縣令者迎臣執縛候吏者追臣至境上不及而止虎不善樹人主俛而笑曰夫樹橘柚者食之則甘嗅之則香樹枳棘者成而刺人故君子慎所樹中牟無令晉平公問趙武曰中牟三國之股肱趙齊燕也邯鄲之肩髀寡人欲得其良令也誰使而可武曰刑伯子可公曰非子之讎也曰私讎不入公門公又問曰中府之令誰使而可曰臣子可故曰外舉不避讎内舉不避子趙武所薦四十六人及武死各就賔位其無私徳若此也平公問叔向曰羣臣孰賢曰趙武子曰子黨於師人向武之屬大夫武立如不勝衣言如不出口然所舉士也數十人皆得其意稱叔向故得意而公家甚頼之及武子之生也不利於家死不託於孤臣敢以為賢也解狐薦其讎於簡主以為相其讎以為且幸釋己也乃因徃拜謝狐乃引弓送而射之曰夫薦汝公也以汝能當}
