  - {type: 'tls:seg', offset: 171, content: '', id: KR3c0005_tls_012-6a.4}
  - {type: variant, offset: 173, length: 0, content: '', WYG: 有軍事是故循車馬比卒乘以備戎事有難則以備不虞平夷則以終朝事今亂晉國之政乏不虞之備以成節儉以潔私名獻伯之儉也可與言辭制當誅之故可與也又何賀管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立於高國之上曰臣尊矣然而臣踈乃立為仲父孔子聞而非之曰泰侈偪上一曰管仲父岀朱盖青衣置鼔而歸自朝歸設鼔吹之樂庭有陳鼎家有三歸孔子曰良大夫也}
