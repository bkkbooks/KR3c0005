  - {type: variant, offset: 28, length: 1, content: 意, WYG: 聞古者有䕫一足其果信有一足乎孔子對曰不也䕫非一足也䕫者忿戾惡心人多不說喜也雖然其所以得免於人害者以其信也人皆曰獨此一足矣䕫非一足也一而足也哀公曰審而是固足矣一曰哀公問於孔子曰吾聞䕫一足信乎曰䕫人也何故一足彼其無他異而獨通於聲堯曰䕫一而足矣使為樂正故君子曰䕫有一足非一足也三文王伐崇至鳯黄虚韈繋解因自結太公望曰何為也王曰君與處皆其師中皆其友下盡其使也今皆先君}
