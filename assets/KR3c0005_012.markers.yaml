  - {type: variant, offset: 20, length: 0, content: '', WYG: 梁車用法而成侯收璽車為鄴令其妺犯法跀之趙侯以為不慈免其官也管仲以公而國人謗怨仲不報封人之恩唯賢是用人怨謗也右經一孔子相衛弟子子臯為獄吏刖人足所跀者守門人有惡孔子於衛君者曰尼欲作亂衛君欲執孔子孔子走弟子皆逃子臯從出門跀危引之而逃之門下室中吏追不得夜半子臯問跀危曰吾不能虧主之法令而親跀子之足是子報仇之時也而子何故乃肯逃我我何以得此於子跀危曰吾斷足也固吾罪當之不可奈何然方公之欲治臣也公傾側法令先後臣以言欲臣之免也甚而臣知之及獄決罪定公憱然不恱形於顔色臣見}
  - {type: page-break, offset: 20, content: '', id: KR3c0005_WYG_012-4a, image: WYG0729/WYG0729-0713a.png}
