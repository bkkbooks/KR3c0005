  - {type: 'tls:seg', offset: 167, content: '', id: KR3c0005_tls_012-6a.3}
  - {type: variant, offset: 167, length: 0, content: '', WYG: 陣使士視死如歸臣不如公子成父請以為大司馬犯顔極諫臣不如東郭牙請立以為諫臣治齊此五子足矣將欲霸王夷吾在此五孟獻伯相魯堂下生藿藜門外長荆棘食不二味坐不重席晉無衣帛之妾居不粟馬出不從車叔向聞之以告苖賁皇賁皇非之曰是出主之爵禄以附下也一曰孟獻伯拜上卿叔向徃賀門有御馬不食禾向曰子無二馬二輿何也獻伯曰吾觀國人尚有饑色是以不秣馬班白者多徒行故不二輿向曰吾始賀子之拜卿今賀子之儉也向出}
  - {type: page-break, offset: 167, content: '', id: KR3c0005_WYG_012-12a, image: WYG0729/WYG0729-0717a.png}
  - {type: variant, offset: 167, length: 0, content: '', krp: 陣使士視死如歸臣不如公子成父請以為大司馬犯顔極諫臣不如東郭牙請立以為諫臣治齊此五子足矣將欲霸王夷吾在此五孟獻伯相魯堂下生藿藜門外長荆棘食不二味坐不重席晉無衣帛之妾居不粟馬出不從車叔向聞之以告苖賁皇賁皇非之曰是出主之爵禄以附下也一曰孟獻伯拜上卿叔向徃賀門有御馬不食禾向曰子無二馬二輿何也獻伯曰吾觀國人尚有饑色是以不秣馬班白者多徒行故不二輿向曰吾始賀子之拜卿今賀子之儉也向出}
