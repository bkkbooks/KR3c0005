  - {type: variant, offset: 22, length: 0, content: '', WYG: 私臣而然也夫天性仁心固然也此臣之所以恱而徳公也跀者行歩危故曰跀危也田子方從齊之魏望翟璜乘軒騎駕出既乘軒車又有輕騎方以為文侯也移車異路而避之則徒翟璜也徒獨方問曰子奚乘是車也曰君謀欲伐中山臣薦翟角而謀得果伐之臣薦樂羊而中山拔得中山憂欲治之臣薦李克而中山治是以君賜此車方曰寵之稱功尚薄秦韓攻魏昭夘西說而秦韓罷齊荆攻魏夘東說而齊荆罷魏襄王養之以五乘將軍養之以五乘使為將軍也夘曰伯夷以將軍葬於首陽山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手足不掩也今臣罷四國之兵而王乃與臣五乘此其稱功猶贏勝而履蹻贏利也謂賈者贏利倍勝今以薄賞報大功猶贏勝之人履草屩也孔子曰善為吏者樹徳不能為吏者樹怨槩者平量者也吏者平法者也治國者不可失平也少室周者古之貞廉潔慤者也為趙襄主力士與中牟徐子角力不若也入言之襄主以自代也襄主曰子之處人之所欲也何為言徐子以自代曰臣以力事君者也今徐子力多臣臣不以自代恐他人言之而為罪也有蔽賢之罪也一曰少室周為襄主驂乘至晉陽有力士牛子耕與角力而不勝周言於主曰主之所以使臣騎乘者以臣多力也今有多力於臣者願進之二齊桓公將立管仲令羣臣曰寡人將立管仲為仲父善者入門而左不善者入門而右東郭牙中門而立公曰寡人立管仲為仲父令曰善者左不善者右今子何為中門而立牙曰以管仲之智為能謀天下乎公曰能以斷為敢行大事乎公曰敢牙曰君知能謀天下斷敢行大事君因專屬之國柄焉以管仲能乘公之勢以治齊國得無危乎公曰善乃令隰朋治内管仲治外以相㕘晉文公岀亡箕鄭挈壺餐而從迷而失道與公相失饑而道泣寢餓而不敢食及文公反國舉兵攻原而拔之文公曰夫輕忍饑餒之患而必全壺餐是將不以原叛乃舉以為原令大夫渾軒聞而非之曰以不動壺餐之故怙其不以原叛也不亦無術乎故明主者不恃其不我叛也恃}
