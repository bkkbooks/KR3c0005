  - {type: variant, offset: 13, length: 0, content: '', WYG: 初治鄴不事左右故君奪之後治事之君乃迎而拜據此是知左右能為國之害猶盜嬰兒之矜裘與跀危子榮衣盜者子不恥其父盜以父所盜衣矜人跀者兒不恥其父跀以跀所著衣榮人人所謟媚為非猶是子綽左右畫左畫圜右畫方必不得俱成喻用左右言亦不能得賢也去蟻驅蠅以骨去蟻以魚去蠅則蠅蟻愈至喻温言訓左右愈謟安得無桓公之憂索官公聽左右索官無以與之故憂也與宣王之患臞馬也王不察掌馬者竊芻豆但患馬臞也五臣以卑儉為行則爵不足以觀賞寵光無節則臣下侵偪說在苗賁皇非獻伯孔子議晏嬰獻伯為相妻不衣帛晏嬰亦然故非其太偪下故仲尼論管仲與孫叔敖仲}
