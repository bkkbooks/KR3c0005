  - {type: variant, offset: 14, length: 0, content: '', WYG: 三歸}
  - {type: variant, offset: 14, length: 0, content: '', krp: 三歸}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 其太奢敖有糲餅以其太儉而出入之容變陽虎之言見其臣也而簡主之應人臣也失主術虎言居齊已有三人及其得罪而三人為君執逐虎言明已無私簡主應以私臣之事言其舉非之譬樹枳棘者反得其刺也朋黨相和臣下得欲則人主孤羣臣公舉下不相和則人主明陽貨將為趙武之賢解狐之公此三人皆以公舉人内不避親外不避讎虎言已舉亦同之也而簡主以為枳棘非所以教國也主云所舉害己與枳棘者同此反教人為私也六公室卑則忌直言私行勝則少公功}
