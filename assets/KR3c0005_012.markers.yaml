  - {type: variant, offset: 81, length: 1, content: 卑, WYG: 賊何也曰昔周成王近優侏儒以逞其意而與君子斷事是能成其欲於天下今季孫養孔子之徒所朝服而與坐者以十數而與優侏儒斷事是以遇賊故曰不在所與居在所與謀也孔子御坐於魯哀公哀公賜之桃與黍哀公請用仲尼先飯黍而後㗖桃左右皆掩口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五榖之長也祭先王為上盛果蓏有六而桃為下祭先王不得入廟丘之聞也君子以}
