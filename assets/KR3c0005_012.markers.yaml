  - {type: variant, offset: 8, length: 1, content: 難, WYG: 有不忍之心跀者懐恩報徳以功受賞臣不徳君功當故不以為徳翟璜操右契而乘軒功當受寵故乘軒而無慙襄王不知不知功當厚賞也故昭夘五乘而履屩夘西却秦東止齊大矣而王唯養之五乘功大賞薄猶富人而履屩也上不過任臣不誣能即臣將為失少室周周以勇力事襄王貞信不誣人有勇力多己者即進之以自代二恃勢而不恃信恃勢則信者不生心恃信則有時不信故東郭牙議管仲公欲專仲國柄牙以仲雖忠矣儻不忠必危矣公因命仲理外隰朋治内也恃術而不恃信故渾軒}
