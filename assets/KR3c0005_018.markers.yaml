  - {type: variant, offset: 83, length: 0, content: '', WYG: 禁誅於私家不害公罪賞罰必知之知之道盡矣因情一曰収智二力不敵衆智不盡物與其用一人不如用一國用君之一人之智力不如任衆而用國也故智力敵而羣物勝揣中則私勞不中則有過下君盡已之能中君盡人之力上君盡人之智是以事至而結智一聼而公㑹聼不一則後悖於前後悖於前則愚智不分不公㑹則猶豫而不斷不斷則事留自取一聼則毋墮壑之累故使之諷諷定而不怒是以言陳之由必有筴籍結智者事發而驗結能者功見而謀成敗有徴賞罰随之事成則君收其功規敗則臣任其罪君人者合符猶不親而况於力乎事智猶不親而况於懸乎故非用人也不取同同則君怒使人相用則君神君神則下盡下盡則臣上不因君而主道畢矣主道一曰結智三知臣主之異利者王以異為同者劫與共事者殺故明主審公私之分審利害之地姦乃無所乘亂之所生六也主母后姬子姓弟兄大臣顯賢主母君㓜稱制后姬子姓則强庶逼兄弟則公子擅國大臣代主執物者顯賢則虛名掩君任吏責臣主母不放廢亂輙責於臣禮施異等后姬不疑分勢不貳庶適不爭不令庶子貳嫡也權籍不失兄弟不侵權柄國籍不失於下也下不一門大臣不擁不令一門專制則不得權禁賞必行顯賢不亂臣有二因謂外内也外曰畏外臣行威物皆畏内曰愛所畏之求得所愛之言聼此亂臣之所因也外國之置諸吏者誅其親暱重帑則外不籍矣爵禄循功請者俱罪則内不因矣外不籍内不因則姦宄塞矣官襲節而進以至大任智也其位至而任大者以三節持之曰質曰鎮曰固親戚妻子質也爵禄厚而必鎮也叅伍貴帑固也賢者止於質貪饕化於鎮姦邪窮於固忍不制則下失小不除則大誅名實當則徑之生害事死傷名則行飲食不然而與其讎此謂除隂姦也繄曰詭詭曰易易均而賞見罪而罰而詭乃止是非不泄説諌不通而易乃不用父兄賢良播出曰遊禍其患鄰敵多資僇辱之人近習曰狎賊其患發忿疑辱之心生藏怒持罪而不發曰増亂其患徼幸妄舉之人起大臣兩重提衡而不踦曰卷禍其患家隆劫殺之難作脱易不自神曰彈威其患賊夫酖毒之亂起此五患者人主之不知則有劫殺之事廢置之事生於内則治生於外則亂是以明主以功論之内}
