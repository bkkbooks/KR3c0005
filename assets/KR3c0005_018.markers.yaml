  - {type: variant, offset: 65, length: 0, content: '', WYG: 一功勞此公利也錯法以道民也而又貴文學則民之所師法也疑賞功以勸民也而又尊行修則民之産利也惰夫貴文學以疑法尊行修以貳功索國之富強不可得也搢笏干戚不適有方鐡銛言國軍異噐方楯也言搢笏之議干戚之舞與夫方楯鐡銛不相稱適也登降周旋不逮日中奏百貍首射矦不當強弩趨發干城距衝不若堙穴伏櫜古人亟於德中世逐於智當今争於力古者寡事而僃簡樸陋而不盡故有珧銚而推車者珧音堯􅀢屬銚音挑銚耨剗削之噐也以􅀢為銚即推輪也上古摩􅀢而耨也古者人寡而相親物多而輕利易譲故有揖譲而傳天下者然則行揖譲髙慈惠而道仁厚皆推政也處多事之時用寡事之噐非智者之備也當大爭之世而循揖譲之軌非聖人之治也故智者不乘推車聖人不行推政難法所}
  - {type: page-break, offset: 65, content: '', id: KR3c0005_WYG_018-10b, image: WYG0729/WYG0729-0772b.png}
  - {type: variant, offset: 65, length: 0, content: '', krp: 一功勞此公利也錯法以道民也而又貴文學則民之所師法也疑賞功以勸民也而又尊行修則民之産利也惰夫貴文學以疑法尊行修以貳功索國之富強不可得也搢笏干戚不適有方鐡銛言國軍異噐方楯也言搢笏之議干戚之舞與夫方楯鐡銛不相稱適也登降周旋不逮日中奏百貍首射矦不當強弩趨發干城距衝不若堙穴伏櫜古人亟於德中世逐於智當今争於力古者寡事而僃簡樸陋而不盡故有珧銚而推車者珧音堯􅀢屬銚音挑銚耨剗削之噐也以􅀢為銚即推輪也上古摩􅀢而耨也古者人寡而相親物多而輕利易譲故有揖譲而傳天下者然則行揖譲髙慈惠而道仁厚皆推政也處多事之時用寡事之噐非智者之備也當大爭之世而循揖譲之軌非聖人之治也故智者不乘推車聖人不行推政難法所}
  - {type: variant, offset: 67, length: 0, content: '', WYG: 事事所以名功也法立而有難權其難而事成則立之事成而有害權其害而功多則為之無難之法無害之功天下無有也是以拔千丈之都敗十萬之衆死傷者軍之乘乘謂其半也甲兵折挫士卒死傷而賀戰勝得地者岀其小害計其}
  - {type: page-break, offset: 67, content: '', id: KR3c0005_WYG_018-11a, image: WYG0729/WYG0729-0772c.png}
  - {type: variant, offset: 67, length: 0, content: '', krp: 事事所以名功也法立而有難權其難而事成則立之事成而有害權其害而功多則為之無難之法無害之功天下無有也是以拔千丈之都敗十萬之衆死傷者軍之乘乘謂其半也甲兵折挫士卒死傷而賀戰勝得地者岀其小害計其}
  - {type: variant, offset: 68, length: 1, content: 臣, WYG: 利也夫沐者有弃髪除者傷血肉為人見其難因釋其業是無術}
  - {type: variant, offset: 68, length: 1, content: 臣, krp: 利也夫沐者有弃髪除者傷血肉為人見其難因釋其業是無術}
