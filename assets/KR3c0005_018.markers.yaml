  - {type: variant, offset: 219, length: 0, content: '', WYG: 於上以設将然今符言於後以知謾誠明主之道臣不得兩諌必任其一語不得擅行必合其叅故姦無道進矣聽法七官之重也毋法也法之息也上闇也上闇無度則官擅為官擅為故奉重無前奉重無前則徴多徴多故富官之富重也亂功之所生也明主之道取於任能任事則取之賢於官能守官則賛揚之賞於功言程主喜俱必利不當主怒俱必害則人不私父兄而進其仇讎勢足以行法奉足以給事而私無所生故民勞苦而輕官任}
