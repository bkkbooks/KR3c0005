  - {type: variant, offset: 545, length: 294, content: 惑主不然計其入不計其出出雖倍其入不知其害則是名得而實亡如是者功小而害大矣凡功者其入多其出少乃可謂功今大費無罪而少得為功則人臣出大費而成小功小功成而主亦有害不知治者必曰無變古毋易常變與不變聖人不聽正治而已然則古之無變常之毋易在常古之可與不可伊尹毋變殷太公毋變周則湯武不王矣管仲毋易齊郭偃毋更晉則桓文不霸矣凡人難變古者憚易民之安也夫不變古者襲亂之迹適民心者恣姦之行也民愚而不知亂上懦而不能更是治之失也人主者明能知治嚴必行之故雖拂於民必立其治說在商君之內外而鐵殳重盾而豫戒也故郭偃之始治也文公有官卒管仲始治也桓公有武車戒民之備也是以愚戇窳墯之民苦小費而忘大利也故夤虎受阿謗而𨌑小變而失長便故鄒賈, WYG: 韓}
