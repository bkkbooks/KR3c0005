  - {type: variant, offset: 10, length: 0, content: '', WYG: 賞罰之輕重且夫重刑者非為罪人也明主之法揆也治賊非治所揆也治所揆也者是治死人也刑盗非治所刑也治所刑也者是治胥靡也故曰重一姦之罪而止境内之邪此所以為治也重罰者盗賊也而悼懼者良民也欲治者奚疑於重刑若夫厚賞者非獨賞功也又勸一國受賞者甘利未賞者慕業是報一人之功而勸境内之衆也欲治者何疑於厚賞今不知治者皆曰重刑傷民輕刑可以止姦何必於重哉此不察於治者也夫以重止者未必以輕止也以輕止者必以重止矣是以上設重刑者而姦盡止姦盡止則此奚傷於民也所謂重刑者姦之所利者細而上之所加焉者大也民不以小利加大罪故姦必止者也所謂輕刑者姦之所利者大上之所加焉者小也民慕其利而傲其罪故姦不止也故先聖有諺曰不躓於山而躓於垤山者大故人順之垤㣲小故人易之也今輕刑罰民必易之犯而不誅是驅國而弃之也犯而誅之是為民設陷也是故輕罪者民之垤也是以輕罪之為民道也非亂國也則設民陷也此則可謂傷民矣今學者皆道書筴之頌語不察當世之實事曰上不愛民賦歛常重則用不足而下恐上故天下大亂此以為足其財用以加愛焉雖輕刑罰可以治也此言不然矣凢人之取重賞罰固}
