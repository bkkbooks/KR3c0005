  - {type: variant, offset: 5, length: 0, content: '', WYG: 元何犿註六反第四十六八説第四十七八經第四十八六反第四十六畏死逺難降北之民也而士尊之曰貴生之士學道立方離法之民也而世尊之曰文學之士遊居厚飬牟食之民也而世尊之曰有能之士語曲牟知偽詐之民也而世尊之曰辯智之士行劒攻殺暴憿之民也而世尊之曰磏勇之士活賊匿姦當死之民也而世尊之曰任譽之士此六民者世之所譽也赴險殉誠死節之民而世少之曰失計之民也寡聞從令全法之民也而世少之曰樸陋之民也力作而食生利之民也而世少之曰寡能之民也嘉厚純粹整糓之民也而世少之曰愚戇之民也重命畏事尊上之民也而世少之曰怯懾之民也挫賊遏姦明上之民也而世少之曰讇讒之民也此六民者世之所毁也姦偽無益之民六而世譽之如彼耕戰有益之民六而世毁之如此此之謂六反布衣循私利而譽之世主聴虗聲而禮之禮之所在利必加焉百姓循私害而訾之世主壅於俗而賤之賤之所在害必加焉故名賞在乎私惡當罪之民而毁害在乎公善宜賞之士索國之富強不可得也古者有諺曰為政猶沐也雖有弃髮必為之愛愛弃髮之費而忘長髮之利不知權者也夫彈痤者痛飲藥者苦為苦憊之故不彈痤飲藥則身不活病不已矣今上下之接無父子之澤而欲以行義禁下則交必有郄矣且父母之於子也産男則相賀産女則殺之此俱出父母之懐袵然男子受賀女子殺之者慮其後便計之長利也故父母之於子也猶用計算之心以相待也而况無父子之澤乎今學者之説人主也皆去求利之心出相愛之道是求}
