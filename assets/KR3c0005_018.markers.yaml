  - {type: variant, offset: 14, length: 1, content: 又, WYG: 老聃有言曰知足不辱知止不殆夫以殆辱之故而不求於足之外者老聃也今以為足民而可以治是以民為皆如老聃也故桀貴在天子而不足於尊富有四海之内而不足於寳君人者雖足民不能足使為天子而桀未}
