  - {type: variant, offset: 9, length: 0, content: '', WYG: 父母之親也此不熟於論思詐而誣也故明主不受也聖人之治也審於法禁法禁明著則官法必於賞罰賞罰不阿則民用官官治則國富國富則兵强而覇王之業成矣覇王者人主之大利也人主挾大利以聼治故其任官者當能其賞罰無私使士民明焉盡力致死則功伐可立而爵禄可致爵禄致而富貴之業成矣富貴者人臣之大利也人臣挾大利以從事故其行危至死其力盡而不望此謂君不仁臣不忠則不可以覇王矣夫姦必知則備必誅則止不知則肆不誅則行夫陳輕貨於幽隱雖曽史可疑也懸百金於市雖大盗不取也不知則曽史可疑於幽隱必知則大盗不取懸金於市故明主之治國也衆其守而重其罪使民以法禁而不以㢘止母之愛子也倍父父令之行於子者十母吏之於民無愛令之行於民也萬父母父母積愛而令窮吏威嚴而民聼從嚴愛之筴亦可决矣且父母之所以求於子也動作則欲其安利也行身則欲其逺罪也君上之於民也有難則用其死安平則盡其力親以厚愛闗子於安利而不聼君以無愛利求民之死力而令行明主知之故不飬恩愛之心而增威嚴之勢故母厚愛處子多敗推愛也推行也父薄愛教笞子多善用嚴也令家人之治産也相忍以饑寒相強以勞苦雖犯軍旅之難饑饉之患温衣美食者必是家也相憐以衣食相惠以佚樂天饑歲荒嫁妻賣子者必是家也故法之為道前苦而長利仁之為道偷樂而後窮聖人權其輕重出其大利故用法之相忍而弃仁人之相憐也學者之言皆曰輕刑此亂亡之術也凢賞罰之必者勸禁也賞厚則所欲之得也疾罰重則所惠之禁也急夫欲利者必惡害害者利之反也反於所欲焉得無惡欲治者必惡亂亂者治之反也是故欲治甚者其賞必厚矣其惡亂甚者其罰必重矣今取於輕刑者其惡亂不甚也其欲治又不甚也其欲治又不甚也者此非特無術也又乃無行是故决賢不肖愚智之分}
