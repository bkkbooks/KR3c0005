  - {type: variant, offset: 11, length: 2, content: 任臣, WYG: 足之之後也雖財用足而厚愛之然而輕刑猶之亂也夫當家之愛子財貨足用財貨足用則輕用輕用則侈泰親愛之則不忍不忍則驕恣侈泰則家貧驕恣則行暴此則財用足而愛厚輕利之患也凡人之生也財用足則隳於用力上懦治則肆於為非財用足而力作者神農也上治懦而行修者曽史也夫民之不及神農曽史亦明}
