  - {type: variant, offset: 72, length: 3, content: 道得小, WYG: 奈之何此通權之言也是以説有必立而曠於實者言有辭拙而急於用者故聖人不求無害之言而務無益之事}
  - {type: variant, offset: 72, length: 3, content: 道得小, krp: 奈之何此通權之言也是以説有必立而曠於實者言有辭拙而急於用者故聖人不求無害之言而務無益之事}
  - {type: variant, offset: 77, length: 1, content: 信, WYG: 不事衡石者非貞廉而逺利也石不能為人多少衡不能為人輕重求索不䏻得故人不事也明主之國官不敢枉法吏不敢為私利貨賂不行者是境内之事盡如衡石也此其臣有姦者必知知者必誅是以有道之主不求清潔之吏而務必知之術也慈母之於弱子也愛不可為前不可先以愛飬之也然而弱子有僻行使之随師有惡病使之事醫不随師則陷於刑不事醫則疑於死慈母雖愛無益於振刑救死則存子者非愛也子母之性愛也臣主之權筴也母不能以愛存家君安能以愛持國明主者通於富强則可以得欲矣故謹於聴治富强之法也明其法禁察其謀計法明則内無變化之患計得則外無死虜之禍故存國者非仁義也仁者慈惠而輕財者也暴者心毅而易誅者也慈惠則不忍輕財則好與心毅則憎心見於下易誅則妄殺加於人不忍則罰多宥赦好與則賞多無功憎心見則下怨其上妄誅則民將背叛故仁人在位下肆而輕犯禁法偷幸而望於上暴人在位則法令妄而臣主乖民怨而亂心生故曰仁暴者皆亡國者也不能具美食而勸餓人飯不能為活餓者也不能辟草生粟而勸貸施賞賜不能為富民者也今學者之言也不務本作而好末事道虛惠以説民此勸飯之説勸飯之説明主不受也書約而弟子辯法省而民訟簡是以聖人之書必著論明主之法必詳事盡思慮揣得失智者之所難也無思無慮挈前言而責後功愚者之所易也明主操愚者之所易以責智者之所難故智慮力勞不用而國治也酸甘鹹淡不以口斷而决於宰尹則厨人輕君而重於宰尹矣上下清濁不以耳斷而决於樂正則瞽工輕君而重於樂正矣治國是非不以術斷而决於寵人則臣下輕君而重於寵人}
