  - {type: variant, offset: 81, length: 1, content: 釋, WYG: 不親觀聴而制斷在下託食於國者也使人不衣不食而不饑不寒又不惡死則無事上之意意欲不宰於君則不可使也今生殺之柄在大臣而主令得行者未嘗有也虎豹必不用其爪牙而與鼷䑕同威萬金之家必不用其富厚而與監門同資有上之君説人不能利惡人不能害索人欲畏重己不可得也人臣肆意陳欲曰俠人主肆意陳欲曰亂人臣輕上曰驕人主輕下曰暴行理同實下以受譽上以得非人臣大得人主大亡明主之國有貴臣無重臣貴臣者爵尊而官大也重臣者言聴而力多者也明主之國遷官襲級官爵受功故有貴臣言不度行而有偽必誅故無重臣也八經第四十八一凡治天下必因人情人情者有好惡故賞罰可用賞罰可用則禁令可立禁令可立而治道具矣君執柄以處勢故令行禁止柄者殺生之制也勢者勝衆之資也廢置無度則權瀆賞罰下共則威分是以明主不懐愛而聴不留説而計故聴言不參則權分乎姦智術不用則君窮乎臣故明主之行制也天不可測也其用人也鬼如鬼之陰密天則不非既高不測誰能非之鬼則不困既陰密誰能困之勢行敎嚴逆而不違雖逆天下不敢違此勢之用也毁譽一行而不議毁譽一行而天下不敢議故賞賢罰暴舉善之至者也賞暴罰賢舉惡之至者也是謂賞同罰異賞莫如厚使民利之譽莫如美使民榮之誅莫如重使民畏之毁莫如惡使民恥之然後一行其}
