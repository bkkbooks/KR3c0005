  - {type: variant, offset: 61, length: 0, content: '', WYG: 察社稷之利害而用匹夫之私譽索國之無危亂不可得矣任人以事存亡治亂之機也無術以任人無所任而不敗人君之所任非辯智則修潔也任人者使有勢也智士者未必信也為多其智因惑其信也以智士之計處乘勢之資而為其私急則君必欺焉為智者之不可信也故任修士者使斷事也修士者未必智為潔其身因惑其智以愚人之所惽處治事之官而為其所然則事必亂矣故無術以用人任智則君欺任修則君事亂此無術之患也明君之道賤德義貴法術倒言而詭使參聼無門户人莫}
  - {type: page-break, offset: 61, content: '', id: KR3c0005_WYG_018-9a, image: WYG0729/WYG0729-0771c.png}
  - {type: variant, offset: 61, length: 0, content: '', krp: 察社稷之利害而用匹夫之私譽索國之無危亂不可得矣任人以事存亡治亂之機也無術以任人無所任而不敗人君之所任非辯智則修潔也任人者使有勢也智士者未必信也為多其智因惑其信也以智士之計處乘勢之資而為其私急則君必欺焉為智者之不可信也故任修士者使斷事也修士者未必智為潔其身因惑其智以愚人之所惽處治事之官而為其所然則事必亂矣故無術以用人任智則君欺任修則君事亂此無術之患也明君之道賤德義貴法術倒言而詭使參聼無門户人莫}
  - {type: variant, offset: 62, length: 0, content: '', WYG: 測也故智者不得詐欺計功而行賞程能而授事察端而觀失有過者罪有能者得故愚者不任事智者不敢欺愚者不得斷則事無失矣察士然後能知之不可以為令夫民不盡察賢者然後能行之不可以為法夫民不盡賢楊朱墨翟天下之所察也千世亂而卒不决雖察而不可以為官職之令鮑焦華角天下之所賢也鮑焦木枯立死若木之枯也華角赴河雖賢不可以為耕戰之士故人主之察智士能盡其辯焉人主之所尊能士盡其行焉今世主察無用之辯尊逺功之行索國之富強不可得也博習辯智如孔墨孔墨不耕耨則國何得焉修孝寡欲如曽史曽史不戰攻則國何利焉匹夫有私便人主有公利不作而飬足不仕而名顯此私便也息文學而}
  - {type: page-break, offset: 62, content: '', id: KR3c0005_WYG_018-9b, image: WYG0729/WYG0729-0771d.png}
