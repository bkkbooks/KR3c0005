  - {type: variant, offset: 859, length: 0, content: '', WYG: 說也皆如燕王學道也而長說者皆如鄭人争年也是以言有纎察㣲難而非務也故李惠宋墨皆畫䇿也論有迂深閎大非用也故畏震瞻車狀皆鬼魅也言而拂難堅确非功也故務卞鮑介墨翟皆堅瓠也且虞慶詘匠也而屋壊范且窮工而弓折是故求其誠者非歸餉也不可三夫挾相為則責望自為則事行故父子或怨譟取庸作者進羙羮說在文公之先宣言與句踐之稱如皇也故桓公藏蔡怒而攻楚吳起懐瘳實而吮傷且先王之賦頌鍾鼎之銘皆潘吾之跡華山之博也然先王所期者利也所用者力也築杜之諺目辭說也請許學者而行宛曼於先王或者不宜今乎如是不能更也鄭縣人得車軛也衛人佐弋也卜子妻為弊袴也而其少者也先王之言有其所為小而世意之大者有其所為大而世意之小者未可必知也說在宋人之解書與梁人之讀記也故先王有郢書而後世多燕說夫不適國事而謀先王皆歸取度者也四利之所在民歸之名之所彰士死之是以功外於法而賞加焉則上不能得所利於下名外於法而譽加焉則士勸名而不畜之於君故中章胥己仕而中牟之民棄田圃而隨文學者邑之半平公腓痛足痺而不敢壊坐晉國之辭仕托慕者國之錘此三士者言襲法則官府之籍也行中事則如令之民也二君之禮太甚若言離法而行逺功則繩外民也二君又何禮之禮之當亡且居學之士國無事不用力有難不披甲禮之則惰修耕戰之功不禮則周主上之法國安則尊顯危則為屈公之威人主奚得於居學之士哉故明王論李疵視中山也五詩曰不躬不親庶民不信傅說之以無衣紫子産之以鄭簡宋襄責之以尊厚耕戰夫不明分不責誠而以躬親蒞下且為下走睡卧與夫揜弊㣲服孔丘不知故稱猶盂鄒君不知故先自僇明主之道如叔向賦獵與昭侯之奚聽也六小信成則大信立故明主積於信賞罰不信則禁令不行說在文公之攻原與箕鄭救餓也是以吳起須故人而食文侯㑹虞人而獵故明主表信如曽子殺彘也患在尊厲王撃驚鼔與李悝謾兩和也右經一宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼔五絃歌南風之詩而天下治今以單父之細也治之而憂治天下將奈何乎故有術而御之身坐於廟堂之上有處女子之色無害於治無術而御之身雖瘁臞猶未有益楚王謂田鳩曰墨子者顯學也其身體則可其言多而不辯何也曰昔秦伯嫁其女於晉公子令晉為之飾裝從衣文之媵七十人至晉晉人愛其妾而賤公女此可謂善嫁妾而未可謂善嫁女也楚}
