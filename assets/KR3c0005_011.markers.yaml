  - {type: variant, offset: 56, length: 589, content: 重人也者無令而擅為虧法以利私耗國以便家力能得其君此所為重人也智術之士明察聽用且燭重人之陰情能法之士勁直聽用且矯重人之姦行故智術能法之士用則貴重之臣必在繩之外矣是智法之士與當塗之人不可兩存之仇也當塗之人擅事要則外內為之用矣是以諸侯不因則事不應故敵國為之訟百官不因則業不進故群臣為之用郎中不因則不得近主故左右為之匿學士不因則養祿薄禮卑故學士為之談也此四助者邪臣之所以自飾也重人不能忠主而進其仇人主不能越四助而燭察其臣故人主愈弊而大臣愈重凡當塗者之於人主也希不信愛也又且習故若夫即主心同乎好惡固其所自進也官爵貴重朋黨又眾而一國為之訟則法術之士欲干上者非有所信愛之親習故之澤也又將以法術之言矯人主阿辟之心是與人主相反也處勢卑賤無黨孤特夫以䟽遠與近愛信爭其數不勝也以新旅與習故爭其數不勝也以反主意與同好惡爭其數不勝也以輕賤與貴重爭其數不勝也以一口與一國爭其數不勝也法術之士操五不勝之勢以歲數而又不得見當塗之人乘五勝之資而旦暮獨說於前故法術之士奚道得進而人主奚時得悟乎故資必不勝而勢不兩存法術之士焉得不危其可以罪過誣者以公法而誅之其不可被以罪過者以私劍而窮之是明法術而逆主上者不僇於吏誅必死於私劍矣朋黨比周以弊主言曲以便私者必信於重人矣故其可以功伐借者以官爵貴之其不可借以美名者以外權重之是以弊主上而趨於私門者不顯於官爵必重於外權矣今人主不合參驗而行誅不待見功而爵祿故法術之士安能蒙死亡而進, WYG: 離世}
