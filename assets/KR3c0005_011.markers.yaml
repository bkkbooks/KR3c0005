  - {type: 'tls:seg', offset: 873, content: '', id: KR3c0005_tls_011-28a.5}
  - {type: variant, offset: 873, length: 0, content: '', WYG: 今人主聽說不應之以度而說其辯不度之以功而譽其行此人主所以長欺而說者所以長養也客有教燕王為不死之道者王使人學之所使學者未及學而客死王大怒誅之王不知客之欺己而誅學者之晩也夫信不然之物而誅無罪之臣不察之患也且人所急無如其身不能自使其無死安能使王長生哉鄭人有相與争年者其一人曰我與黄帝之兄同年訟此而不訣以後息者為勝耳客有為周君畫莢者三年而成君觀之與髹莢者同狀周君大怒畫莢者曰築十版之墻鑿八尺之牖而以日始出時加之其上而觀周君為之望見其狀盡成龍蛇禽獸車馬萬物之狀備具周君大恱畫莢之功非不㣲難也然其用與素髹莢同客有為齊王畫者齊王問曰畫孰最難者曰犬馬難孰易者曰鬼魅最易夫犬馬人所知也旦暮罄於前不可類之故難鬼神無形者不罄於前故易之也齊有居士田仲者宋人屈榖見之曰榖聞先生之義不恃仰人而食今榖有樹瓠之道堅如石厚而無竅獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然榖將以欲弃之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也虞慶為屋謂匠人曰屋太尊匠人對曰此新屋也塗濡而椽生虞慶曰不然夫塗濡重而生椽撓以撓椽任重塗此宜卑虞慶曰不然更日久則塗乾而椽燥塗乾則輕椽燥則直直椽任輕塗此益尊匠人詘為之而屋壊一曰虞慶將為屋匠人曰材生而塗濡夫材生則撓塗濡則重以撓任重今雖成久必壊虞慶曰材乾則直塗乾則輕今誠得乾日以輕直雖久必不壊匠人詘作之成有間屋果壊范且曰弓之折必於其盡也不於其始也夫工人張弓也伏檠三旬而蹈弦一日犯機}
