  - {type: variant, offset: 861, length: 1, content: 所, WYG: 賣其珠於鄭者為木蘭之櫃薰桂椒之櫝綴以珠玉飾以玫瑰輯以羽翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也今世之談也皆道辯說文辭之言人主覽其文而忘有用墨子之說傳先王之道論聖人之言以宣告人若辯其辭則恐人懐其文忘其直以文害用也此與楚人鬻珠秦伯嫁女同類故其言多不辯墨子為木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰不如為車輗者巧也用咫尺之木不費一朝之事而引三十石之任致逺力多久於嵗數今我為鳶三年成蜚一日而敗惠子聞之曰墨子大巧巧為輗拙為鳶宋王與齊仇也築武宫謳癸倡行者止觀築者不倦王聞召而賜之對曰臣師射稽之謳又賢於癸王召射稽使之謳行者不止築者知倦王曰行者不止築者知倦其謳不勝如癸羙何也對曰王試度其功癸四板射稽八板擿其堅癸五寸射稽二寸夫良藥苦於口而}
