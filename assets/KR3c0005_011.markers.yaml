  - {type: variant, offset: 947, length: 0, content: '', WYG: 邑之半叔向御坐平公請事公腓痛足痺轉筋而不敢壊坐晉國聞之皆曰叔向賢者平公禮之轉筋而不敢壊坐晉國之辭仕託慕叔向者國之錘矣鄭縣人有屈公者聞敵恐因死恐已因生趙主父使李疵視中山可攻不也還報曰中山可伐也君不亟伐將後齊燕主父曰何故可攻李疵對曰}
