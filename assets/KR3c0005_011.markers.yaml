  - {type: variant, offset: 1063, length: 0, content: '', WYG: 能讀此法夫不躬親其勢柄而欲為人臣所宜為者也睡不亦宜乎孔子曰為人君者猶盂也民猶水也盂方水方盂圜水圜鄒君好服長纓左右皆服長纓甚貴鄒君患之問左右左右曰君好服百姓亦多服是}
