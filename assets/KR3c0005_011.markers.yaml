  - {type: variant, offset: 997, length: 0, content: '', WYG: 曰吾甚惡紫之臭於是左右適有衣紫而進者公必曰少却吾惡紫臭公曰諾於是日郎中莫衣紫其明日國中莫衣紫三日境内莫衣紫也一曰齊王好衣紫齊人皆好也齊國五素}
