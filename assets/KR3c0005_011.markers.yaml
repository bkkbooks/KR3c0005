  - {type: variant, offset: 868, length: 3, content: 左右論, WYG: 不能可知也王曰善謂衛人曰客為棘削之曰以削吾欲觀見之客曰臣請之舍取之因逃兒說宋人善辯者也持白馬非馬也服齊稷下之辯者乘白馬而過關則顧白馬之賦故籍之虚辭則能勝一國考實按形不能謾於一人夫新砥礪殺矢彀弩而射雖㝠而妄發}
