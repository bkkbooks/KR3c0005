  - {type: variant, offset: 866, length: 0, content: '', krp: 知其可以致功也二宋人有請為燕王以棘刺之端為母猴者必三月齋然後能觀之燕王}
  - {type: variant, offset: 867, length: 0, content: '', WYG: 以三乘養之右御冶工言王曰臣聞人主無十日不燕之齋今知王不能久齋以觀無用之器也故以三月為期凡刻削者以其所以削必小今臣冶人也無以為之削此不然物也王必察之王因囚而問之果妄乃殺之冶人謂王曰計無度量言談之士多棘刺之說也一曰好㣲巧衛人曰能以棘刺之端為母猴燕王說之養之以五乘之奉王曰吾試觀客為棘刺之母猴客曰人主欲觀之必半嵗不入宫不飲酒食肉雨霽日出視之晏陰之間而棘刺之母猴乃可見也燕王因養衛人不能觀其母猴鄭有臺下之冶者謂燕王曰臣削者也諸㣲物必以削削之而所削必大於削今棘刺之端不容削鋒難以治棘刺之端王試觀客之削能}
  - {type: page-break, offset: 867, content: '', id: KR3c0005_WYG_011-6a, image: WYG0729/WYG0729-0704a.png}
