  - {type: variant, offset: 993, length: 0, content: '', WYG: 所傾盖與車以見窮閭隘巷之士以十數伉禮下布衣之士以百數矣君曰以子言論是賢君也安可攻疵曰}
  - {type: variant, offset: 993, length: 0, content: '', krp: 所傾盖與車以見窮閭隘巷之士以十數伉禮下布衣之士以百數矣君曰以子言論是賢君也安可攻疵曰}
  - {type: variant, offset: 994, length: 1, content: 事, WYG: 然夫好顯巖穴之士而朝之則戰士怠於行陣上尊學者下士居朝則農夫惰於田戰士怠於行陣者則兵弱也農夫惰於田者則國貧也兵弱於敵國貧於内而不亡者未之有也伐之不亦可乎主父曰善舉兵而伐中山遂滅也五齊桓公好服紫一國盡服紫當是時也五素不得一紫桓公患之謂管仲曰寡人好服紫紫貴甚一國百姓好服紫不已寡人奈何管仲曰君何不試勿衣紫也謂}
