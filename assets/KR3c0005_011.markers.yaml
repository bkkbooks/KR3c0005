  - {type: variant, offset: 872, length: 0, content: '', WYG: 端未嘗不中秋毫也然而莫能復其處不可謂善射無常儀的也設五寸之的引十歩之逺非羿逄䝉不能必全者有常儀的也有度難而無度易也有常儀的則羿逄䝉以五寸為巧無常儀的則以妄發而中秋毫為拙故無度而應之則辯士繁說設度而持之雖知者猶畏失也不敢妄}
