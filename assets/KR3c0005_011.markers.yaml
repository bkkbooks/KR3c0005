  - {type: variant, offset: 1000, length: 1, content: 謁, WYG: 自解紫衣而朝羣臣有紫衣進者曰益逺寡人惡臭是日也郎中莫衣紫是月也國中莫衣紫是嵗也境内莫衣紫鄭簡公謂子産曰國小廹於荆晉之間今城郭不完兵甲不備不可以待不虞子産曰臣閉其外也已逺}
