  - {type: variant, offset: 1002, length: 0, content: '', WYG: 而守其内也已固矣雖小國猶不危之也君其勿憂是以沒簡公身無患子産相鄭簡公謂子産曰飲酒不樂也俎豆不大鐘鼔竽瑟不鳴寡人之事不一國家不定百姓不治耕戰不輯睦亦子之罪子有職寡人亦有職各守其職子産退而為政五年國無盜賊道不拾遺桃棗蔭於街者莫有援也錐刀遺道三日可反三年不變民無饑也宋襄公與楚人戰於涿谷上宋人既成列矣楚人未及濟右司馬購强趨而諫曰楚人衆而宋人寡請使楚人半渉未成列而撃之必敗襄公曰寡人聞君子曰不重傷不擒二毛不推人於險不廹人於阨不鼔不成列今楚未濟而撃之害義請使楚人畢渉成陣而後鼔士進之右司馬曰君不愛宋民腹心不完特為義耳公曰不反列且行法右司馬反列楚人已成列撰陣矣公乃鼔之宋人大敗公傷股三日而死此乃慕自親仁義之禍夫必恃}
