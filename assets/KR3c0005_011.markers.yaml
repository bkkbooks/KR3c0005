  - {type: 'tls:seg', offset: 940, content: '', id: KR3c0005_tls_011-31a.2}
  - {type: variant, offset: 940, length: 0, content: '', WYG: 而心調於用者皆挾自為心也故}
  - {type: variant, offset: 940, length: 0, content: '', krp: 而心調於用者皆挾自為心也故}
  - {type: variant, offset: 941, length: 0, content: '', WYG: 行事施予以利之為心則越人易和以害之為心則父子離且怨文公伐宋乃先宣言曰吾聞宋君無道蔑侮長老分財不中教令不信余來為民誅之越伐吳乃先宣言曰我聞吳王築如皇之臺握深池罷苦百姓煎靡財貨以盡民力余為民誅之蔡女為桓公妻桓公與之乘舟夫人蕩舟桓公大懼禁之不止怒而出之乃且復召之因復更嫁之桓公大怒將伐蔡仲父諫曰夫以寢席之戯不足以伐人之國功業不可冀也請無以此為規也桓公不聽仲父曰必不得已楚之菁茅不貢於天子三年矣君不如舉兵為天子伐楚楚服因還襲蔡曰余為天子伐楚而蔡不以兵聽從遂滅之此義於名而利於實故必有天子誅之名而有報讎之實吳起為魏將而攻中山軍人有病疽者吳起跪而自吮其膿傷者之母立泣人問曰將軍於若子如是尚何為而泣對曰吳起吮其父之創而父死今是子又將死也今吾是以泣趙主父令工施鉤梯而緣潘吾刻踈人迹其上廣三尺長五尺而勒之曰主父常遊於此秦昭王令工施鉤梯而上華山以松栢之心為博箭長八尺棊長八寸而勒之曰昭王嘗與天神愽於此矣文公反國至河令籩豆捐之席蓐捐之手足胼胝面目黧黑者後之咎犯聞之而夜哭公曰寡人出亡二十年乃今得反國咎犯聞之不喜而哭意不欲寡人反國耶犯對曰籩豆所以食也席蓐所以卧也而君捐之手足胼胝面目黧黑勞有功者也而君後之今臣有與在後中不勝其哀故哭且臣為君行詐偽以反國者衆矣臣尚自惡也而况於君再拜而辭文公止之曰諺曰築社者攓撅而置之端冕而祀之今子與我取之而不與我治之與我置之而不與我祀之焉可解左驂而盟於河鄭縣人卜子使其妻為袴其妻問曰今袴何如夫曰象吾故袴妻子因毁新令如故袴鄭縣人有得車軛者而不知其名問人曰此何種也對曰此車軛也俄又復得一問人曰此是何種也對曰此車軛也問者大怒曰曩者曰車軛今又曰車軛是何衆也此女欺我也遂與之鬭衛人有佐弋者鳥至因先以其裷麾之鳥驚而不射也鄭縣人乙子妻之市買鼈以歸過潁水以為渇也因縱而飲之遂亡其鼈夫少者侍長者飲長者飲亦自飲也一曰魯人有自喜者見長年飲酒不能釂則唾之亦效唾之一曰宋人有少者亦欲效善見長者飲無餘非斟酒飲也而欲盡之書曰紳之束之宋人有治者因重帯自紳束也人曰是何也對曰書言之固然書曰既雕既琢還歸其樸梁人有治者動作言學舉事於文曰難之固失其實人曰是何也對曰書言之固然郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭云而過書舉燭舉燭非書意也燕相受書而說之曰舉燭者尚明也尚明也者舉賢而任之燕相白王大說國以治治則治矣非書意也今世學者多似此類鄭人有且置履者先自度其足而置之其坐至之市而忘操之已得履乃曰吾忘持度反歸取之及反市罷遂不得履人曰何不試之以足曰寧信度無自信也四王登為中牟令上言於襄主曰中牟有士曰中章胥己者其身甚修其學甚博君何不舉之王曰子見之我將為中大夫相室諫曰中大夫晉重列也今無功而受非晉}
