  - {type: variant, offset: 874, length: 2, content: 與愚, WYG: 節之其始而暴之其盡也焉得無折范且曰不然伏檠一日而蹈弦三旬而犯機是暴之其始而節之其盡也工}
  - {type: variant, offset: 874, length: 2, content: 與愚, krp: 節之其始而暴之其盡也焉得無折范且曰不然伏檠一日而蹈弦三旬而犯機是暴之其始而節之其盡也工}
  - {type: variant, offset: 877, length: 2, content: 論智, WYG: 窮也為之弓折范且虞慶之言皆文辯辭勝而反事之情人主說而不禁此所以敗也夫不謀治强之功而艷乎辯說文麗之聲是却有術之士而任壊屋折弓也故人主之於國事也皆不逹乎工匠之搆屋張弓也然而士窮乎范且虞慶者為虚辭其無用而勝實事其無易而窮}
