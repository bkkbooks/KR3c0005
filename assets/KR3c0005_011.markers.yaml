  - {type: variant, offset: 1080, length: 0, content: '', WYG: 之請此所以難行也昭侯曰吾自今以來知行法矣寡人奚聽矣一曰申子請仕其從兄官昭侯曰非所學於子也聽子之謁敗子之道乎亡其用子之謁申子辟舍請罪六晉文公攻原裹十日糧遂與大夫期十日至原十日而原不下撃金而退罷兵而去士有從原中出者曰原三日即下矣羣臣左右諫曰夫原之食竭力盡矣君姑待之公曰吾與士期十日不去是亡吾信也得原失信吾不為也遂罷兵而去原人聞曰有君如彼其信也可無歸乎乃降公衛人聞曰有君如彼其信也可無從乎乃降公孔子聞而記之曰攻原得衛者信也文公問箕鄭曰救餓奈何對曰信公曰安信曰信名信名則羣臣守職善惡不踰百事不怠信事則不失天時百姓不踰信義則}
