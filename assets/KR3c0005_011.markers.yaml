  - {type: variant, offset: 1095, length: 3, content: 吏處官, WYG: 明日蚤令人求故人故人來方與之食魏文侯與虞人期獵明日㑹天疾風左右止文侯不聽曰不可以風疾之故而失信吾不為也遂自驅車徃犯風而罷虞人曽子之妻之市其子隨之而泣其母曰女還顧反為女殺彘適市來曽子欲捕彘殺之妻止之曰特與嬰兒戯耳曽子曰嬰兒非與戯也嬰兒非有知也待父母而學者也聽父母之教今子欺之是教子欺也父欺子而不信其母非以成教也遂烹彘也楚厲王有警為鼔以與百姓為戍飲酒醉過而撃之也民大驚使人止曰吾醉而與左右戱過撃之也民皆罷居數月有警撃鼔而民不赴乃更令明號而民信之李悝警其兩和曰謹警敵人旦暮且至撃汝如是者再三而敵不至兩和懈怠不信李悝居數月秦人來襲之至㡬奪其軍此不信患也一曰李悝與秦人戰謂左和曰速上右和已上}
