  - {type: variant, offset: 937, length: 2, content: 論悖, WYG: 不止是貴敗折之類而以知術之人為工匠也不得施其技巧故屋壊弓折知治之人不得行其方術故國亂而主危夫嬰兒相與戯也以塵為飯以塗為羮以木為胾然至日晩必歸饟者塵飯塗羮可以戱而不可食也夫稱上古之𫝊頌辯而不慤道先王仁義而不能正國者此亦可以戱而不可以為治也夫慕仁義而弱亂者三晉也不慕而治强者秦也然而秦强而未帝者治未畢也三人為嬰兒也父母養之簡子長而怨子盛壯成人其供養薄父母怒而誚之子父至親也而或譙或怨者皆挾相為而不周於為己也夫賣庸而播耕者主人費家而羙食調布而求易錢者非愛庸客也曰如是耕者且深耨者熟耘也庸客致力而疾耕耘者盡巧而正畦陌疇畤者非愛主人也曰如是羮且羙錢布且易云也此其養功力有父子之澤}
