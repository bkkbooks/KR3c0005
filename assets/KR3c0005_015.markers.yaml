  - {type: variant, offset: 377, length: 2, content: 自多, WYG: 服之亦臣之力也君何力之有師曠伏琴而笑之公曰太師奚笑也師曠對曰臣笑叔向之對君也凢為人臣者猶炮宰和五味而進之君君弗食孰敢强之也臣請譬之君者壤地也臣者草木也必壤地美然後草木碩大亦君之力臣何力之有或曰叔向師曠之對皆偏辭也夫一匡天下九合諸侯美之大者也非專君之力也又非專臣之力也昔者宫之奇在虞僖負羈在曹二臣之智言中事發中功虞曹俱亡者何也此有其臣而無其君者也且蹇叔處虞而虞亡處秦而秦霸非蹇叔愚於虞而智於秦也此有君與無臣也向曰臣之力也}
