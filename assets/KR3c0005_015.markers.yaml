  - {type: variant, offset: 326, length: 0, content: '', WYG: 易萬乘之主萬乘之主不好仁義亦無以下布衣之士於是五往乃得見之或曰桓公不知仁義夫仁義者憂天下之害趨一國之患不避卑辱謂之仁義故伊尹以中國為亂道為宰于湯百里奚以秦為亂道為虜于穆公皆憂天下之害趨一國之患不辭卑辱故謂之仁義今桓公以萬乘之勢下匹夫之士將與欲憂齊國而小臣不行見小臣之忘民也忘民不可謂仁義仁義者不失人臣之禮不敗君臣之位者也是故四封之内執㑹而朝名曰臣臣吏分職受事名曰萌今小臣在民萌之衆而逆君上之欲故不可謂仁義仁義不在焉桓公又從而禮之使小臣有智能而遁桓公是隠也宜刑徳修而隠不為臣用故宜刑也若無智能而虛驕矜桓公是誣也宜戮小臣之行非刑則戮桓公不能領臣主之理而禮刑戮之人是桓公以輕上侮君之俗教於齊國也非所以為治也故曰桓公不知仁義靡笄之役晉伐齊也靡笄山名韓獻子將斬人郄獻子聞之駕往救之比至則已斬之矣郄子因曰胡不以徇其僕曰曩不将救之乎郄子曰吾敢不分􅉪乎或曰郄子言不可不察也非分􅉪也韓子之所斬也若罪人則不可救救罪人法之所以敗也法敗則國亂若非罪人而勸之以殉勸之以殉是重不辜也斬既不辜殉又不辜是重不辜也重不辜民所以起怨者也民怨則國危郄子之言非危則亂不可不察也且韓子之所斬若罪人郄子奚分焉斬若非罪人則已斬之矣而郄子乃至是韓子之􅉪已成而郄且後至也夫郄子曰以殉不足以分斬人之􅉪而又生殉之􅉪殉既不辜益得一􅉪是何言分􅉪也昔者紂為炮烙崇矦惡來又曰斬渉者之脛也奚分於紂之謗此助為虐更益謗也且民之望於上也甚矣韓子弗得不得斬謂不辜也且望郄子之得之也望郄子正韓子之過今郄子俱弗得則民絶望於上矣故曰郄子之言非分謗也益謗也且郄子之往救罪也以韓子為非也不道其所以為非而勸之以殉是使韓子不知其過也夫下使民望絶於上又使韓子不知其失吾未得郄子之所以分謗者也桓公觧管仲之束縳而相之管仲曰臣有寵矣然而臣卑公曰使子立髙國之上管仲曰臣貴矣然而臣貧公曰使子有三歸之家管仲曰臣富矣然而臣䟽於是立以為仲父霄略曰管仲以賤為不可以治國故請髙國之上以貧為不可以治富故請三歸以䟽為不可以治親故處仲父管仲非貪以便治也或曰今使臧獲奉君令詔卿相莫敢不聴非卿相卑而臧獲尊也主令所加莫敢不從也今使管仲之治不縁桓公是無君也謂擅出其令故曰不縁也國無君不可以為治若負桓公之威下桓公之令是臧獲之所以信也奚待髙國仲父之尊而後行哉當世之行事都丞都丞官之卑者也之下徴令者不辟尊貴不就卑賤二官雖卑奉命徴令亦不以尊即避卑即就也故行之而法者雖巷伯信乎卿相行之而非法者雖大吏詘乎民萌今管仲不務尊主明法而事増寵益爵是非管仲貪欲富貴必闇而不知術也故曰管仲有失行霄略有過譽韓宣王問於樛留吾欲兩用公仲公叔其可乎樛留對曰昔魏兩用樓翟而亡西河樓緩翟璜也楚兩用昭景而亡鄢郢昭景楚之二姓今君兩用公仲公叔此必將争事而外市與鄰國交私以示己利故曰外市也則國必憂矣或曰昔者齊桓公兩用管仲鮑叔成湯兩用伊尹仲虺夫兩用臣者國之憂則是桓公不霸成湯不王也湣王一用淖齒而手死乎東廟主父一用李兊減食而死主誠有術兩用不為患無術兩用則争争事而外市一則專制而劫弑今留無術以規上使其主去兩用一是不有西河鄢郢之憂則必有身死减食之患是樛留未有善以知言也難二第三十七景公過晏子曰子宫小近市請徙子家豫章之圃晏子再拜而辭曰且嬰家貧待市食而朝暮趨之不可以逺景公笑曰子家習市識貴賤乎是時景公繁於刑晏子對曰踴貴而屨賤景公曰何故對曰刑多也景公造亡老反然變色曰寡人其暴乎於是損刑五或曰晏子之貴踴非其誠也欲便辭以止多刑也卒問而應非深思也亂國重典豈惡刑多在當與不當耳不在多少此不察治之患也夫刑當無多不當無少苟不當雖少猶以為多也無以不當聞而以太多說無術之患也敗軍之誅以千百數猶北且不止即治亂之刑如恐不勝而姦尚不盡今晏子不察其當否而以太多為說不亦妄乎夫惜草茅者耗禾穗惠盗賊者傷良民今緩刑罰行寛惠是利姦邪而害善人也此非所以為治也齊桓公飲酒醉遺其冠耻之三日不朝管仲曰此非有國之耻也公胡其不雪之以政公曰善因發倉囷賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎或曰管仲雪桓公之耻於小人而生桓公之耻於君子矣使桓公發倉囷而賜貧窮論囹圄而出薄罪非義也不可以雪耻使之而義也桓公宿義須遺冠而後行之則是桓公行義非為遺冠也是雖雪遺冠之耻於小人而亦遺宿義之耻於君子矣且夫發囷倉而賜貧窮者是賞無}
