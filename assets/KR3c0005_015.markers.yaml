  - {type: variant, offset: 5, length: 1, content: 凡, WYG: 元何犿註難一第三十六難二第三十七難一第三十六古人行事或有不合理韓子立義以難之晉文公將與楚人戰召舅犯問之曰吾將與楚人戰彼衆我寡為之奈何舅犯曰臣聞之繁禮君子不厭忠信禮繁縟故曰繁禮唯忠信可以學禮故曰不厭忠信戰陣之間不厭詐偽非譎詐不能制勝故曰不厭詐偽也君其詐之而已矣文公辭舅犯因召雍季而問之曰我將與楚人戰彼衆我寡為之奈何雍季對曰焚林而田偷苟且也多取獸後必無獸以詐遇民偷取一時後必無復因詐得利必以詐為俗故無復有忠信文公曰善辭雍季以舅犯之謀與楚人戰以敗之歸而行爵先雍季而後舅犯羣臣曰城濮之事舅犯謀也夫用其言而後其身可乎文公曰此非君所知也夫舅犯言一時之權也雍季言萬世之利也仲尼聞之曰文公之覇也宜哉既知一時之權又知萬世之利或曰雍季之對不當文公之問凢對問者有因因小大緩急而對也所問髙大而對以卑狹則明主弗受也今文公問以少遇衆而對曰後必無復此非所以應也且文公不知一時之權又不知萬世之利戰而勝則國安而身定兵強而威立雖有後復莫大於此萬世之利奚患不至戰而不勝則國亡兵弱身死名息拔拂今日之死不及安暇待萬世之利待萬世之利在今日之勝今日之勝在詐於敵詐敵萬世之利而已故曰雍季之對不當文公之問且文公又不知舅犯之言舅犯所謂不厭詐偽者不謂詐其民謂詐其敵也敵者所伐之國也後雖無復何傷哉文公之所以先雍季者以其功耶則所以勝楚破軍者舅犯之謀也以其善言耶則雍季乃道其後之無復也此未有善言也舅犯則以兼之矣舅犯曰繁禮君子不厭忠信者忠所以愛其下也信所以不欺其民也夫既以愛而不欺矣言孰善於此然必曰出於詐偽者軍旅之計也舅犯前有善言後有戰勝故舅犯有二功而後論雍季無一焉而先賞文公之霸不亦宜乎仲尼不知善賞也仲尼不知善賞妄歎宜哉乎厯山之農者侵畔舜往耕焉朞年甽畒正相謙故正也河濵之漁者爭坻坻水中髙地釣者依之舜往漁焉朞年而讓長東夷之陶者噐苦窳苦窳惡也舜往陶焉朞年而噐牢仲尼歎曰耕漁與陶非舜官也而舜往為之者所以救敗也舜其信仁乎乃躬耕處苦而民從之故曰聖人之徳化乎或問儒者曰方此時也堯安在其人曰堯為天子然則仲尼之聖堯奈何堯在上容人為惡仲尼謂堯為聖者奈何聖人明察在上位將使天下無姦也今耕漁不争陶噐不窳舜又何徳而化若堯以聖在上則自有禮讓何湏舜以化之舜之救敗也則是堯有失也賢舜則去堯之明察聖堯則去舜之徳化不可兩得也楚人有鬻楯與矛者譽之曰吾楯之堅莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以子之矛陷子之楯何如其人弗能應也夫不可陷之楯與無不陷之矛不可同世而立今堯舜之不可兩譽矛楯之説也且舜救敗朞年已一過三年已三過舜有盡夀有盡天下過無己者以有盡逐無己所止者寡矣賞罰使天下必行之令曰中程者賞弗中程者誅令朝至暮變暮至朝變十日而海内畢矣奚待朞年舜猶不以此説堯令從己乃躬親不亦無術乎且夫以身為苦而後化民者堯舜之所難也處勢而令下者庸主之所易也將治天下釋庸主之所易道堯舜之所難未可與為政也管仲有病桓公往問之曰仲父病不幸卒於大命將奚以告寡人管仲曰㣲君言臣故將謁之願君去竪刁除易牙逺衛公子開方易牙為君主味君惟人肉未嘗易牙烝其首子而進之夫人情莫不愛其子今弗愛其子安能愛君君妬而好内竪刁自宫以治内人情莫不愛其身身且不愛安能愛君開方事君十五年齊衛之間不容數日行弃其母乆官不歸其母不愛安能愛君臣聞之矜偽不長蓋虚不乆言蓋藏詐事不可久也願君去此三子者也管仲卒死桓公弗行及桓公死蟲出尸不葬或曰管仲所以見告桓公者非有度者之言也所以去竪刁易牙者以不愛其身適君之欲也曰不愛其身安能愛君然則臣有盡死力以為其主者盡死力亦不愛身也管仲將弗用也曰不愛其死力安能愛君是君去忠臣也且以不愛其身度其不愛其君是將以管仲之不能死公子糾度其不死桓公也是管仲亦在所去之域矣明主之道不然設民所欲以求其功故為爵禄以勸之設民所惡以禁其姦故為刑罰以威之慶賞信而刑罰必故君舉功於臣而姦不用於上臣有功者舉用之自然姦不見用也雖有竪刁其奈君何且臣盡死力以與君市君垂爵禄以與臣市君臣之際非父子之親也計數之所出也君計臣力臣計君禄君有道則臣盡力而姦不生無道則臣上塞主明而下成私管仲非明此度數於桓公也使去竪刁一竪刁又至非絶姦之道也且桓公所以身死蟲流出尸不葬者是臣重也臣重之實擅主也有擅主之臣則君令不下究臣情不上通一人之力能隔君臣之間使善敗不聞禍福不通故有不𦵏之患也明主之道一人不兼官一官不兼事卑賤不待尊貴而進大臣不因左右而見百官修通羣臣輻湊有賞者君見其功有罰者君知其罪見知不悖於前賞罰不蔽於後可賞賞可罰罰無所蔽塞也安有不𦵏之患管仲非明此言於桓公也使去三子故曰管仲無度矣襄子圍於晉陽中出圍賞有功者五人髙赫為賞首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事寡人國危社稷殆矣吾羣臣無有不驕侮之意者惟赫子不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫敢失禮矣或曰仲尼不知善賞矣夫善賞罰者百官不敢侵職羣臣不敢失禮上設其法而下無姦詐之心如此則可謂善賞罰矣使襄子於晉陽也令不行禁不止是襄子無國晉陽無君也尚誰與守哉今襄子於晉陽也知氏灌之穴竈生鼃而民無反心是君臣親也襄子有君臣親之澤操令行禁止之法而猶有驕侮之臣是襄子失罰也為人臣者乘事而有功則賞今赫僅不驕侮而襄子賞之是失賞也臣有不驕僅合臣禮非有善可賞也明主賞不加於無功罰不加於無罪今襄子不誅驕侮之臣而賞無功之赫安在襄子之善賞也故曰仲尼不知善賞晉平公與羣臣飲飲酣乃喟然歎曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披祍而避琴壊於壁公曰太師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰啞歎息之聲是非君人者之言也左右請除之公曰釋之以為寡人戒或曰平公失君道師曠失臣禮夫非其行而誅其身君之於臣也非其行則陳其言善諫不聼則逺其身者臣之於君也今師曠非平公之行不陳人臣之諌而行}
