  - {type: variant, offset: 1268, length: 0, content: '', WYG: 管仲公子糾之臣也謀殺桓公而不能其君死而臣桓公管仲之取舍非周公旦未可知也若使管仲大賢也且為湯武湯武桀紂之臣也桀紂作亂湯武奪之今桓公以易居其上是以桀紂之行居湯武之上桓公危矣若使管仲不肖人也且為田常田常簡公之臣也而弑其君今桓公以易居其上是以簡公之易居田常之上也桓公又危矣管仲非周公且亦已明矣然為湯武與田常未可知也為湯武有桀紂之危為田常有簡公之亂也已得仲父之後桓公奚處易哉若使桓公之任管仲必知不欺己也是知不欺主之臣也然雖知不欺主之臣今桓公以任管仲之專借竪刁易牙蟲流出尸而不𦵏桓公不知臣欺主與不欺主已明矣而任臣如彼其專也故曰桓公闇主李兊治中山苦陘令上計而入多李兊曰語言辨聴之説不度於義謂之窕言苟且也無山林澤谷之利而入多者謂之窕貨君子不聴窕言不受窕貨子姑免矣或曰李子設辭曰夫言語辯聴之説不度於義者謂之窕言辯在言者説在聴者言非聼者也則辯非說者也所謂不度於義非為聴者必謂所聴也聴者非小人則君子也小人無義必不能度之義也君子度之義必不肯説也夫曰言語辯聼之説不度於義者必不誠之言也入多之為窕貨也未可逺行也李子之姦弗蚤禁使至於計是遂過也無術以知而入多入多者穰也穰豐多也雖倍入將奈何舉事愼隂陽之和種樹節四時之適無早晚之失寒温之災則入多不以小功妨大務不以私欲害人事丈夫盡於耕農婦人力於織紝則入多務於畜飬之理察於土地之冝六畜遂五榖殖則入多明於權計審於地形舟車機械之利用力少致功大則入多利商市闗梁之行能以所有致所無客商歸之外貨留之儉於財用節於衣食宫室噐械周於資用不事玩好則入多入多皆人為也若天事風雨時寒温適土地不加大而有豐年之功則入多人事天功二物者皆入多非山林澤谷之利也夫無山林澤谷之利入多因謂之窕貨者無術之言也趙簡子圍衛之郛郭犀楯犀櫓立於矢石之所及簡子以犀為脅櫓而自卧之櫓楯類也鼔之而士不起簡子投枹曰烏乎吾之士數弊也行人燭過免胄而對曰臣聞之亦有君之不能耳士無弊者但君不能用之耳昔者吾先君獻公并國十七服國三十八戰十有二勝是民之用也獻公沒惠公即位淫衍暴亂身好玉女秦人恣侵去綘十七里亦是人之用也惠公沒文公授之圍衛取鄴城濮之戰五敗荆人取尊名於天下亦此人之用也亦有君不能耳士無弊也簡子乃去楯櫓立矢石之所及鼓之而士乘之戰大勝簡子曰與吾得革車千乘不如聞行人燭過之一言也或曰行人未有以説也乃道惠公以此人是敗文公以此人是霸未見所以用人也文能以賞信必罰未必去櫓親立於矢石間簡子未可以速去楯櫓也嚴親在圍輕犯矢石孝子之所愛親也孝子所以輕犯矢石而救者謂親愛孝子愛親百數之一也犯難救親百人無一人言孝稀也今以為身處危而人尚可戰是以百族之子愛於上皆若孝子之愛親也是行人之誣也能孝於親者尚百無一况於君百族而行孝哉是誣也好利惡害夫人之所有也賞厚而信人輕敵矣刑重而必人不北矣長行徇上數百不一人喜利畏罪人莫不然將衆者不出乎莫不然之數而道乎百無失人之行行人未知用衆之道也韓非子卷十五}
