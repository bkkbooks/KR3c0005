  - {type: variant, offset: 41, length: 0, content: '', WYG: 行之時有功者必賞有罪者必誅强匡天下威行四鄰及法慢妄予而國日削矣當趙之方明國律從大軍之時人衆兵强辟地齊燕及國律慢用者弱而國日削矣當燕之方明奉法審官斷之時東縣齊國南盡中山之地及奉法已亡官斷不用左右交争論從其下則兵弱而地削國制於鄰敵矣故曰明法者强慢法者弱强弱如是其明矣而世主弗為國亡宜矣語曰家有常業雖飢不餓國有常法雖危不亡夫舍常法而從私意則臣飾於智能臣下飾於智能則法禁不立矣是妄意之道行治國之道廢也治國之道去害法者則不惑於智能不矯於名譽矣昔者舜使吏决鴻水先}
