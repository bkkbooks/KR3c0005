  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書韓非子卷五元何犿註亡徵第十五三守第十六備内第十七南面第十八飾邪第十九亡徵第十五凢人主之國小而家大權輕而臣重者可亡也簡法禁而務謀慮荒封内而恃交援者可亡也羣臣為學門子好辯商賈外積小民右仗者可亡也好宫室臺榭陂池事車服器玩好罷露百姓煎靡貨財者可亡也用時日事鬼神信卜筮而好祭祀者可亡也聼以爵不待叅驗用一人為門户者可亡也官職可以重求爵祿可以貨得者可亡也緩心而無成柔茹而寡斷好惡無决而無所定立者可亡也饕貪而無饜近利而好得者可亡也喜淫而不周於法好辯說而不求其用濫於文麗而不顧其功者可亡也淺薄而易見漏泄而無藏不能周宻而通羣臣之語者可亡也狠剛而不和愎諫而好勝不顧社稷而輕為自信者可亡也恃交援而簡近隣怙强大之救而侮所迫之國者可亡也羈旅僑士重帑在外上間謀計下與民事者可亡也民信其相下不能其上主愛信之而弗能廢者可亡也境内之傑不事而求封外之士不以功伐課試而好以名問舉錯羈旅起貴以陵故常者可亡也輕其適正庶子稱衡太子未定而主即世者可亡也大心而無悔國亂而自多不料境内之資而易其鄰敵者可亡也國小而不處卑力少而不畏强無禮而侮大鄰貪愎而拙交者可亡也太子已置而娶於强敵以為后妻則太子危如是則羣臣易慮羣臣易慮者可亡也怯懾而弱守蚤見而心柔懦知有謂可斷而弗敢行者可亡也出君在外而國更置質太子未反而君易子如是則國攜國攜者可亡也挫辱大臣而狎其身刑戮小民而逆其使懐怒思恥而專習則賊生賊生者可亡也大臣兩重父兄衆强内黨外援以争事勢者可亡也婢妾之言聼愛玩之智用外内悲惋而數行不法者可亡也簡侮大臣無禮父兄勞苦百姓殺戮不辜者可亡也好以智矯法時以私雜公法禁變易號令數下者可亡也無地固城郭惡無畜積財物寡無守戰之備而輕攻伐者可亡也種類不壽主數即世嬰兒為君大臣專制樹羈旅以為黨數割地以待交者可亡也太子尊顯徒屬衆强多大國之交而威勢蚤具者可亡也偏褊而心急輕疾而易動發心悁忿而不訾前後者可亡也主多怒而好用兵簡本教而輕戰攻者可亡也貴臣相妬大臣隆盛外藉敵國内困百姓以攻怨讎而人主弗誅者可亡也君不肖而側室賢太子輕而庶子伉官吏弱而人民桀如此則國躁國躁者可亡也藏怒而弗發懸􅓧而弗誅使羣臣隂憎而愈憂懼而久未可知者可亡也出軍命将太重邊地任守太尊專制擅命徑為而無所請者可亡也后妻淫亂主母畜穢外内混通男女無别是謂兩主兩主者可亡也后妻賤而婢妾貴太子卑而庶子尊相室輕而典謁重如此則内外乖内外乖者可亡也大臣甚貴偏黨衆强壅塞主斷而重擅國者可亡也私門之官用馬府之世絀軍馬之府立功者也鄉曲之善舉官職之勞廢貴私行而賤公功者可亡也公家虚而大臣實正户貧而寄寓富耕戰之士困末作之民利者可亡也見大利而不趨聞禍端而不備淺薄於争守之事而務以仁義自飾者可亡也不為人主之孝而慕匹夫之孝不顧社稷之利而聼主母之令女子用國刑餘用事者可亡也辭辯而不法心智而無術主多能而不以法度從事者可亡也親臣進而故人退不肖用事而賢良伏無功貴而勞苦賤如是則下怨下怨者可亡也父兄大臣祿秩過功章服侵等宫室供飬大侈而人主弗禁則臣心無窮臣心無窮者可亡也公壻公孫與民同門暴傲其鄰者可亡也亡徵者非曰必亡言其可亡也夫兩堯不能相王兩桀不能相亡亡王之機必其治亂其强弱相踦者也木之折也必通蠧牆之壞也必通隙然木雖蠧無疾風不折牆雖隙無大雨不壞萬乘之主有能服術行法以為亡徵之君風雨者其兼天下不難矣三守第十六人主有三守三守完則國安身榮三守不完則國危身殆何謂三守人臣有議當途之失用事之過舉臣之情人主不心藏而漏之近習能人使人臣之欲有言者不敢不下適近習能人之心而乃上以聞人主然則端言直道之人不得見而忠直日疏愛人不獨利也待譽而後利之憎人不獨害也待非而後害之然則人主無威而重在左右矣惡自治之勞憚使羣臣輻湊用事因傳柄移藉使殺生之幾奪予之要在大臣如是者侵此謂三守不完三守不完則刼殺之徵也凢刼有三有明刼有事刼有刑刼人臣有大臣之尊外操國要以資羣臣使外内之事非已不得行雖有賢良逆者必有禍而順者必有福然則羣臣莫敢忠主憂國以争社稷之利害人主雖賢不能獨計而人臣有不敢忠主則國為亡國矣此謂國無臣國無臣者豈郎中虚而朝臣少哉羣臣持祿飬交行私道而不效公忠此謂明劫鬻寵擅權矯外以勝内險言禍福得失之形以阿主之好惡人主聼之卑身輕國以資之事敗與主分其禍而功成則臣獨專之諸用事之人一心同辭以語其羙則主言惡者必不信矣此謂事劫至於守司囹圄禁制刑罰人臣擅之此謂刑劫三守不完則三劫者起三守完則三刧者止三劫者止則王矣備内第十七人主之患在於信人信人則制於人人臣之於其君非有骨肉之親也縳於勢而不得不事也故為人臣者窺覘其君心也無須㬰之休而人主怠傲處其上此世所以有刼君弑主也為人主而大信其子則姦臣得乗於子以成其私故李兊傅趙王而餓主父為人主而大信其妻則姦臣得乗於妻以成其私故優施傅麗姬殺申生而立奚齊夫以妻之近與子之親而猶不可信則其餘無可信者矣且萬乗之主千乗之君后妃夫人適子為太子者或有欲其君之蚤死者何以知其然夫妻者非有骨肉之恩也愛則親不愛則疏語曰其母好者其子抱然則其為之反也其母惡者其子釋丈夫年五十而好色未解也婦人年三十而羙色衰矣以衰美之婦人事好色之丈夫則身見疏賤而子疑不為後此后妃夫人之所以冀其君之死者也唯母為后而子為主則令無不行禁無不止男女之樂不減於先君而擅萬乗不疑此鴆毒扼昧扼昧謂暗中絞縊也之所以用也故桃左春秋曰人主之疾死者不能處半人主弗知則亂多資故曰利君死者衆則人主危故王良愛馬越王勾踐愛人為戰與馳醫善吮人之傷含人之血非骨肉之親也利所加也故輿人成輿則欲人之富貴匠人成棺則欲人之夭死也非輿人仁而匠人賊也人不貴則輿不售人不死則棺不買情非憎人也利在人之死也故后妃夫人太子之黨成而欲君之死也君不死則勢不重情非憎君也利在君之死也故人主不可以不加心於利已死者故日月暈圍於外其賊在内備其所憎禍在所愛是故明王不舉不㕘之事不食非常之食逺聼而近視以審内外之失省同異之言以知朋黨之分偶三五之驗以責陳言之實執後以應前按法以治衆衆端以叅觀衆事之端相叅而觀士無幸賞賞無踰行殺必當罪不赦則姦邪無所容其私矣徭役多則民苦民苦則權勢起權勢起則復除重復除重則貴人富苦民以富貴人起勢以藉藉假借也人臣非天下長利也故曰徭役少則民安民安則下無重權下無重權則權勢滅權勢滅則徳在上矣今夫水之勝火亦明矣然而釡鬵間之水煎沸竭盡其上而火得熾盛焚其下水失其所以勝者矣今夫治之禁姦又明於此然守法之臣為釡鬵之行則法獨明於胷中而已失其所以禁姦者矣上古之傳言春秋所記犯法為逆以成大姦者未嘗不從尊貴之臣也然而法令之所以備刑罰之所以誅常於卑賤是以其民絶望無所告愬大臣比周蔽上為一隂相善而陽相惡以示無私相為耳目以候主隙人主掩蔽無道得聞有主名而無實臣專法而行之周天子是也偏借其權勢則上下易位矣此言人臣之不可借權勢也南面第十八人主之過在己任在臣矣又必反與其所不任者備之此其說必與其所任者為讎而主反制於其所不任者今所與備人者且曩之所備也人主不能明法而以制大臣之威無道得小臣之信矣人主釋法而以臣備臣則相愛者比周而相譽相憎者朋黨而相非非譽交争則主惑亂矣人臣者非名譽請謁無以進取非背法專制無以為威非假於忠信無以不禁偽為忠信然後不禁三者惽主壞法之資也人主使人臣雖有智能不得背法而專制雖有賢行不得踰功而先勞雖有忠信不得釋法而不禁此之謂明法人主有誘於事者有壅於言者二者不可不察也人臣易言事者必索資以事誣主主誘而不察因而多之則是臣反以事制主也如是者謂之誘誘於事者困於患其進言少其退費多雖有功其進言不信不信者有罪事有功者必賞則羣臣莫敢飾言以惽主}
