  - {type: variant, offset: 226, length: 381, content: 無為於上群臣竦懼乎下明君之道使智者盡其慮而君因以斷事故君不窮於智賢者勑其材君因而任之故君不窮於能有功則君有其賢有過則臣任其罪故君不窮於名是故不賢而為賢者師不智而為智者正臣有其勞君有其成功此之謂賢主之經也道在不可見用在不可知虛靜無事以闇見疵見而不見聞而不聞知而不知知其言以往勿變勿更以參合閱焉官有一人勿令通言則萬物皆盡函掩其跡匿其端下不能原去其智絕其能下不能意保吾所以往而稽同之謹執其柄而固握之絕其望破其意毋使人欲之不謹其閉不固其門虎乃將存不慎其事不掩其情賊乃將生弒其主代其所人莫不與故謂之虎處其主之側為姦匿聞其主之忒故謂之賊散其黨收其餘閉其門奪其輔國乃無虎大不可量深不可測同合刑名審驗法式擅為者誅國乃無賊是故人主有五壅臣閉其主曰壅臣制財利曰壅臣擅行令曰壅臣得行義曰壅臣得樹人曰壅臣閉其主則主失位臣制財利則主失德臣擅行令則主失制臣得行義則主失明臣得樹人則主失黨此人, WYG: 亂}
