  - {type: variant, offset: 2, length: 2, content: 第五, krp: 者使人臣前言不復於後後言不復於前事雖有功必伏其罪謂之任下人臣為主設事而恐其非也則先出說設言曰議是事者妬事者也人主藏是言不更聼羣臣羣臣畏是言不敢議事二勢者用則忠臣不聼而譽臣獨任如是者謂之壅於言壅於言者制於臣矣主}
