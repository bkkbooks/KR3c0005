  - {type: 'tls:seg', offset: 15, content: '', id: KR3c0005_tls_005-1a.6}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 愚戇窳惰之民苦小費而亡大利也故夤虎受阿謗而􅀈小變而失長便故鄒賈非載旅狎習於亂而容於治故鄭人不能歸飾邪第十九鑿龜數筴兆曰大吉而以攻燕者趙也鑿龜數筴兆曰大吉而以攻趙者燕也劇辛之事燕無功而社稷危鄒衍之事燕無功而國道絶趙代先得意於燕後得意於齊國亂飾髙自以為與秦提衡非趙龜神而燕龜欺也趙又嘗鑿龜數筴而北伐燕将劫燕以逆秦兆曰大吉始攻大梁而秦出上黨矣兵至釐而六城㧞矣至陽城秦㧞鄴矣龐援揄兵而南則鄣盡矣臣故曰趙龜雖無逺見於燕且宜近見於秦秦以其大吉辟地有實救燕有名趙以其大吉利削兵辱主不得意而死又非秦龜神而趙龜欺也初時者魏數年東鄉攻盡陶衛數年西鄉以失其國此非豐隆五行太乙王相攝提六神五括天河殷搶嵗星非數年在西也又非天缺弧逆刑星熒惑奎台非數年在東也故曰龜筴鬼神不足舉勝左右背鄉不足以專戰然而恃之愚莫大焉古者先王盡力於親民加事於明法彼法明則忠臣勸罰必則邪臣止忠勸邪止而地廣主尊者秦是也羣臣朋黨比周以隠正道行私曲而地削主卑者山東是也亂弱者亡人之性也治强者王古之道也越王勾踐恃大朋之龜與吴戰而不勝身臣入官于吴反國弃龜明法親民以報吴則夫差為擒故恃鬼神者慢於法恃諸侯者危其國曹恃齊而不聼宋齊攻荆而宋滅曹荆恃吴而不聼齊越伐吴而齊滅荆許恃荆而不聼魏荆攻宋而魏滅許鄭恃魏而不聼韓魏攻荆而韓滅鄭今者韓國小而恃大國主慢而聼秦魏恃齊荆為用而小國愈亡故恃人不足以廣壤而韓不見也荆為攻魏而加兵許鄢齊攻任扈而削魏不足以存鄭而韓弗知也此皆不明其法禁以治其國恃外以滅其社稷者也臣故曰明於治之數則國雖小富賞罰敬信民雖寡强賞罰無度國雖大兵弱者地非其地民非其民也無地無民堯舜不能以王三代不能以强人主又以過予人臣又以徒取舍法律而言先王}
