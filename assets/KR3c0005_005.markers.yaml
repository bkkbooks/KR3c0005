  - {type: page-break, offset: 6, content: '', id: KR3c0005_WYG_005-11b, image: WYG0729/WYG0729-0647d.png}
  - {type: variant, offset: 6, length: 2, content: 萬物, krp: 使人臣必有言之責又有不言之責言無端末辯無所驗者此言之責也以不言避責持重位者此不言之責也人主使人臣言者必知其端以責其實不言者必問其取舍以為之資則人臣莫敢妄言矣又不敢黙然矣言黙則皆有責也人主欲為事不通其端末而以明其欲有為之意者其為不得利必以害反知此者任理去欲舉事有道計其入多其出少者可為也惑主不然計其入不計其出出雖倍其入不知其害則是名得而實亡如是者功小而害大矣凢功者其入多其出少乃可謂功今大費無罪而少得為功則人臣出大費而成小功小功成而主亦有害不知治者必曰無變古毋易常變與不變聖人不聼正治而已然則古之無變常之毋易在常古之可與不可伊尹毋變殷太公毋變周則湯武不王矣管仲毋易齊郭偃毋更晉則桓文不霸矣凢人難變古者憚易民之安也夫不變古者襲亂之迹適民心者恣姦之行也民愚而不知亂上懦而不能更是治之失也人主者明能知治嚴必行之故雖拂於民必立其治說在商君之内外而鐵殳重盾而豫戒也故郭偃}
