  - {type: variant, offset: 1621, length: 0, content: '', krp: 夫進而擊趙不能取退而攻韓弗能㧞則陷銳之卒憅於野戰負任之旅罷於内攻勞餉者則合羣苦弱以敵而共二萬乘非所以亡趙之心也均如貴人之計均同也謂同其計而用之則秦必為天下兵質矣既進退不能則同於為質者陛下雖以金石相弊弊盡也盡以召士則兼天下之日未也今賤臣之進愚計使人使荆重幣用事之臣明趙之所以欺秦者與魏質以安其心從韓而伐趙趙雖與齊為一不足患也二國事畢齊趙則韓可以移書定也是我一舉二國有亡形則荆魏又必自服矣故曰兵者凶器也不可不審用也以秦與趙敵衡加以齊今又背韓而未有以堅荆魏之心夫一戰而不勝則禍搆矣計者所以定事也不可不察也韓秦强弱在今年耳且趙與諸侯隂謀久矣夫一動而弱於諸侯危事也為計而使諸侯有意伐之心至殆也見二踈非所以强於諸侯也臣竊願陛下之幸熟圗之攻伐而使從者聞焉不可悔也詔以韓客之所上書書言韓之未可舉下臣斯甚以為不然秦之有韓若人之有心腹之病也虚處則㤥然㤥妨也心腹虚也而病為妨喻秦虚心待韓韓終為妨㤥音艾若居濕地著而不去以極走則發矣謂疾得冷卒然而走必發矣喻秦雖加㤙於韓有急韓之不臣之心必見矣夫韓雖臣於秦未嘗不為秦病今若有卒報之事韓不可信也秦與趙為難荆蘇使齊未知何如以臣觀之則齊趙之交未必以荆蘇絶也若不絶是悉趙而應二萬乗也夫韓不服秦之義而服於强也今專於齊趙則韓必為腹心之病而發矣韓與荆有謀諸侯應之則秦必復見崤塞之患非之來也未必不以其能存韓也為重於韓也辯說屬辭飾非詐謀以釣利於秦而以韓利闚陛下闚陛下之意因隙而入說以求韓利夫秦韓之交親則非重矣見重於二國此自便之計也臣視非之言文其淫說靡辯才甚臣恐陛下淫非之辯而聴其盗心因不詳察事情今以臣愚議秦發兵而未名所伐則韓之用事者以事秦為計矣疑伐已也臣斯請往見韓王使來入見大王見因内其身而勿遣稍召其社稷之臣以與韓人為市則韓可深割也因令象武發東郡之卒闚兵於境上而未名所之則齊人懼而從蘇之計是我兵未出而勁韓以威擒强齊以義從矣聞於諸侯也趙氏破膽荆人狐疑必有忠計荆人不動魏不足患也則諸侯可蠶食而盡趙氏可得與敵矣願陛下幸察愚臣之計無忽秦遂遣斯使韓也李斯往詔韓王未得見因上書曰昔秦韓戮力一意以不相侵天下莫敢犯如此者數世矣前時五諸侯嘗相與共伐韓秦發兵以救之韓居中國地不能滿千里而所以得與諸侯班位於天下君臣相保者以世世相教事秦之力也先時五諸侯共伐秦韓反與諸侯先為鴈行以嚮秦軍於闕下矣諸侯兵困力極無奈何諸侯兵罷杜倉相秦起兵發將以報天下之怨而先攻荆荆令尹患之曰夫韓以秦為不義而與秦兄弟共苦天下已又背秦先為鴈行以攻闗韓則居中國展轉不可知天下共割韓上地十城以謝秦解其兵夫韓嘗一背秦而國廹地侵兵弱至今所以然者聽姦人之浮說不權事實故雖殺戮姦臣不能使韓復强今趙欲聚兵士卒以秦為事使人來借道言欲伐秦其勢必先韓而後秦且臣聞之脣亡則齒寒夫秦韓不得無同憂其形可見魏欲發兵以攻韓秦使人將使者於韓今秦王使臣斯來而不得見恐左右襲曩姦臣之計使韓復有亡地之患臣斯不得見請歸報秦韓之交必絶矣斯之來使以奉秦王之歡心願效便計豈陛下所以逆賤臣者耶臣斯願得一見前進道愚計退就葅戮願陛下有意焉今殺臣於韓則大王不足以强若不聽臣之計則禍必搆矣秦發兵不留行而韓之社稷憂矣臣斯暴身於韓之市則雖欲察賤臣愚忠之計不可得已邊鄙殘國固守鼓鐸之聲於耳而乃用臣斯之計晩矣且夫韓之兵於天下可知也今乂背强秦夫弃城而敗軍則反掖之㓂反掖者謂麾下反以禽君掖也必襲城矣城盡則聚散聚散則無軍矣使城固守則秦必興兵而圍王一都道不通則難必謀其勢不救左右計之者不用願陛下熟圗之若臣斯之所言有不應事實者願大王幸使得畢辭於前乃就吏誅不晩也秦王飲食不甘遊觀不樂意專在圗趙使臣斯來言願得身見因急與陛下有計也今使臣不通則韓之信未可知也夫秦必釋趙之患而移兵於韓願陛下幸復察圗之而賜臣報決難言第三臣非非難言也所以難言者言順比滑澤洋洋纚纚然則見以為華而不實言順於慎比於班洋洋羙纚纚有編次也敦祗恭厚鯁固慎完則見以為拙而不倫多言繁稱連類比物則見以為虛而無用總微說約徑省而不飾則見以為劌而不辯激意親近探知人情則見以為譖而不讓閎大廣博妙逺不測則見以為夸而無用纎計小談以具數言則見以為陋言而近世辭不悖逆則見以為貪生而䛕上言而逺俗詭躁人間則見以為誕㨗敏辯給繁於文采則見以為史殊釋文學以質信言則見以為鄙時稱詩書道法往古則見以為誦誦說舊事此臣非之所以難言而重患也故度量雖正未必聽也義理雖全未必用也大王若以此不信則小者以為毁訾誹謗大者患禍災害死亡及其身故子胥善謀而吳戮之仲尼善說而匡圍之管夷吾實賢而魯囚之故此三大夫豈不賢哉而三君不明也上古有湯至聖也伊尹至智也夫至智說至聖然且七十說而不受身執鼎俎為庖宰眤近習親而湯乃僅知其賢而用之故曰以至智說至聖未必至而見受伊尹說湯是也以智說愚必不聽文王說紂是也故文王說紂而紂囚之翼侯炙鬼侯腊比干剖心梅伯醢夷吾束縛而曹羈奔陳伯里子道乞傅說轉鬻轉次而傭故曰鬻孫子臏脚於魏吳起收泣於岸門痛西河之為秦卒枝解於楚公叔座言國器反為悖公孫鞅奔秦關龍逄斬萇𢎞分胣碟裂也尹子穽於棘司馬子期死而浮於江田明辜射非罪為辜射而殺之宓子賤西門豹不鬬而死人手董安于死而陳於市宰予不免於田常范睢折脅於魏齊此十數人者皆世之仁賢忠良有道術之士也不幸而遇悖亂闇惑之主而死然則雖賢聖不能逃死亡避戮辱者何也則愚者難說也故君子難言也且至言忤於耳而倒於心非賢聖莫能聽願大王熟察之也愛臣第四愛臣太親必危其身威權上逼故危其身人臣太貴必易主位主妾無等必危嫡子主謂室主兄弟不服必危社稷君之兄弟不相從服臣聞千乘之君無備必有百乘之臣在其側以徙其民而傾其國萬乘之君無備必有千乘之家在其側以徙其威而傾其國是以姦臣蕃息主道衰亡是故諸侯之博大天子之害也羣臣之太富君主之敗也將相之管主而隆國家此君人者所外也君當疎外斥逺之萬物莫如身之至貴也位之至尊也主威之重主勢之隆也此四羙者不求諸外不請於人議之而得之矣故曰人主不能用其富則終於外也既不能用富臣則竊之此君人者之所識也昔者紂之亡周之卑皆從諸侯之博大也殷諸侯文王周諸侯秦襄王晉之分也趙魏韓也齊之奪也陳恒弑簡公也皆以羣臣之太富也夫燕宋之所以弑其君者皆以類也故上比之殷周中比之燕宋莫不從此術也是故明君之蓄其臣也盡之以法臣雖有貴賤同以法也質之以備謂薄其賞賜也臣貧則易制故不赦死不宥刑赦死宥刑是謂威淫淫散也社稷将危國家偏威君威散臣威成故曰偏威是故大臣之禄雖大不得藉威城市市衆所聚恐其乘衆而生心也黨與雖衆不得臣士卒故人臣處國無私朝謂臣自私朝居軍無私交其府庫不得私貸於家不欲令其樹福也此明君之所以禁其邪是故不得四從四鄰之國為私交不載竒兵非傳非遽載竒兵革罪死不赦此明君之所以備不虞者也主道第五道者萬物之始物從道生故曰始是非之紀也是非因道彰故曰紀是以明君守始以知萬物之源得其始其源可知也治紀以知善敗之端得其紀其端可知也故虚静以待令令名自命也令事自定也虚則知實之情靜則知動者正有言者自為名有事者自為形形名叅同君乃無事焉歸之其情故曰君無見其所欲君見其所欲臣自将雕琢臣因欲雕琢以稱之君無見其意君見其意臣将自表異君見其意臣因其意以稱之故曰去好去惡臣乃見素去舊去智臣乃自僃好惡不形臣無所效則戒而自僃故有智而不以慮使萬物知其處有行而不以賢觀臣下之所因有勇而不以怒使羣臣盡其武是故去智而有明去君智則臣智自明也去賢而有功去君賢則臣事有功去勇而有强去君勇則臣武自强羣臣守職百官有常因能而使之是謂習常故曰寂乎其無位而處漻乎莫得其所明君無為於上羣臣竦懼乎下明君之道使智者盡其慮而君因以斷事故君不窮於智用臣智故智不窮賢者敕其材君因而任之故君不窮於能有功則君有其賢有過則臣任其罪故君子不窮於名是故不賢而為賢者師君雖不賢為賢臣之師不智而為上智者正為臣之正臣有其勞君有其成功君取成勞以為已功此之謂賢主之經也經常法也道在不可見君道必使臣不可見也用在不可知虚静無事以闇見疵見而不見聞而不聞知而不知知其言以往勿變勿更以參合閱焉官有一人勿令通言則萬物皆盡各令守職勿使相通情既相猜則自盡矣函掩其跡匿其端下不能原去其智絶其能下不能意保吾所以往而稽同之謹執其柄而固握之絶其能破其意毋使人欲之執柄固則人意望絶也不謹其閉不固其門虎乃将存權柄不固則簒國之虎因而存矣不慎其事不掩其情賊乃将生弑其主代其所人莫不與故謂之虎處其主之側為姦臣聞其主之忒故謂之賊散其黨收其餘閉其門奪其輔國乃無虎大不可量深不可測同合刑名審驗法式擅為者誅國乃無賊是故人主有五壅臣閉其主曰壅臣制財利曰壅臣擅行令曰壅臣得行義曰壅臣得樹人曰壅臣閉其主則主失位臣制財利則主失徳臣擅行令則主失制臣得行義則主失名臣得樹人則主失黨此人主之所以獨擅也非人臣之所以得操也人主之道静退以為寳不自操事而知拙與巧不自計慮而知福與咎是以不言而善應不約而善増言已應則執其契事已増則操其符符契之所合賞罰之所生也故羣臣陳其言君以其言授其事以事責其功功當其事事當其言則賞功不當其事事不當其言則誅明君之道臣不陳言而不當是故明君之行賞也曖乎如時雨百姓利其澤其行罰也畏乎如雷霆神聖不能解也故明君無偷賞無赦罰賞偷則功臣墯其業赦罰則姦臣易為非是故誠有功則雖䟽賤必賞誠有過則雖近愛必誅近愛必誅則踈賤者不怠而近愛者不驕也韓非子卷一}
