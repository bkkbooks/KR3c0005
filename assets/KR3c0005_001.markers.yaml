  - {type: variant, offset: 1619, length: 0, content: '', WYG: 也存韓第二韓事秦三十餘年出則為扞蔽入則為蓆薦出貢以供若蓆薦居人下秦特出銳師取韓地而隨之怨懸於天下功歸於强秦且夫韓入貢職與郡縣無異也今日臣竊聞貴臣之計舉兵將伐韓夫趙氏聚士卒養從徒欲贅天下之兵贅綴連也明秦不弱則諸侯必滅宗廟欲西面行其意非一日之計也今釋趙之患而攘内臣之韓則天下明趙氏之計矣韓為内臣秦猶滅之則天下從趙攻秦計為得矣夫韓小國也而以應天下四擊主辱臣苦上下相與同憂久矣修守備}
  - {type: page-break, offset: 1619, content: '', id: KR3c0005_WYG_001-6b, image: WYG0729/WYG0729-0605b.png}
  - {type: variant, offset: 1619, length: 0, content: '', krp: 也存韓第二韓事秦三十餘年出則為扞蔽入則為蓆薦出貢以供若蓆薦居人下秦特出銳師取韓地而隨之怨懸於天下功歸於强秦且夫韓入貢職與郡縣無異也今日臣竊聞貴臣之計舉兵將伐韓夫趙氏聚士卒養從徒欲贅天下之兵贅綴連也明秦不弱則諸侯必滅宗廟欲西面行其意非一日之計也今釋趙之患而攘内臣之韓則天下明趙氏之計矣韓為内臣秦猶滅之則天下從趙攻秦計為得矣夫韓小國也而以應天下四擊主辱臣苦上下相與同憂久矣修守備}
  - {type: variant, offset: 1620, length: 0, content: '', WYG: 强敵有蓄積築城池以守固今伐韓未可一年而滅㧞一城而退則權輕於天下天下摧我兵矣韓叛則魏應之趙據齊以為原若山原然如此則以韓魏資趙假齊以固其從而以與爭强趙之福而秦之禍}
  - {type: page-break, offset: 1620, content: '', id: KR3c0005_WYG_001-7a, image: WYG0729/WYG0729-0605c.png}
  - {type: variant, offset: 1620, length: 0, content: '', krp: 强敵有蓄積築城池以守固今伐韓未可一年而滅㧞一城而退則權輕於天下天下摧我兵矣韓叛則魏應之趙據齊以為原若山原然如此則以韓魏資趙假齊以固其從而以與爭强趙之福而秦之禍}
  - {type: punctuation, offset: 1621, content: 。, id: KR3c0005_tls_001-bkkpn325}
  - {type: xml-element, offset: 1621, content: '', id: KR3c0005_tls_001-bkkxmlele82}
