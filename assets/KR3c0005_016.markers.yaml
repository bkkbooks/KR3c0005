  - {type: variant, offset: 11, length: 2, content: 守完, WYG: 公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰恱近而来逺魯哀公有大臣三人外障距諸侯四隣之士内比周而以愚於君使宗廟不掃除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乘之家賜者三謂以大夫之業也賜與為寢也故曰政在節財或曰仲尼之對亡國之言也恐民有倍心而説之恱近而来逺則是教民懷恵恵之為政無功者受賞而有罪者免此法之所以敗也法敗而政亂以亂政治敗民未見其可也且民有倍心者君上之明有所不及也不紹葉公之明而使之恱近而来逺是舎吾勢之所能禁而使與天下行惠以争民非能恃勢者也夫堯之賢六王之冠也舜一從而咸包而堯無天下矣有人無術以禁下恃為舜而不失其民不亦無術乎明君見小姦於㣲故民無大謀行小誅於細故民無大亂此謂圖難者於其所易也為大者於其所細也今有功者必賞賞者不德君力之所致也有罪者必誅誅者不怨上罪之所生也民知誅罰之皆起於身也故習功力於業而不受賜於君太上下智有之此言太上之下民無說也安取懷惠之民上君之民無利害說以恱近來逺亦可舎己哀公有臣外障距内比周以愚其君而說之以選賢此非功伐之論也選其心之所為賢者也使哀公知三子外障距内比周也則三子不一日立矣哀公不知選賢選其心之所謂賢故三子得任事燕王噲賢子之而非孫卿故身死為僇夫差智太宰嚭而愚子胥故滅於越魯君不知賢而説以選賢是使哀公有夫差燕噲之患也明君不自舉臣臣相進也不自賢功功相徇也論之於任試之於事課之於功故羣臣公正而無私不隠賢不進不肖然則人主奚勞於選賢景公以百乘之家賜而說以節財是使景公無術以享厚樂而獨儉於上未免於貧也有君以千里飬其口腹則雖桀紂不侈焉齊國方三千里而桓公以其半自飬是侈於桀紂也然而能為五霸冠者知侈儉之地也為君不能禁下而自禁者謂之劫不能飾下而自飾者謂之亂不節下而自節者謂之貧明君使人無私以詐而食者禁力盡於事歸利於上者必聞聞者必賞汚穢為私者必知知者必誅然故忠臣盡忠於公民士竭力於家百官精尅於上精亷尅已侈倍景公非國之患也但如上雖侈非國之患也然則說之以節財非其急者也夫對三公一言而三公可以無患知下之謂也知下明則禁於㣲禁於㣲則姦無積姦無積則無比周無比周則公私分公私分則朋黨散朋黨散則無外障距内比周之患知下明則見精沐見精沐則誅賞明誅賞明}
