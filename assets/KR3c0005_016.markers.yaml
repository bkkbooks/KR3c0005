  - {type: variant, offset: 113, length: 1, content: 憎, WYG: 則鄭國之得姦者寡矣不任典成之吏典主也謂因事而責成之不察參伍之政不眀度量恃盡聰明勞智慮而以知姦不亦無術乎且夫物衆而智寡寡不勝衆智不足以徧知物故因物以治物謂若因龍以治鱗蟲因鳯以治羽鳥也下衆而上寡寡不勝衆者言君不足以徧知臣也故因}
