  - {type: variant, offset: 129, length: 0, content: '', WYG: 之大物非法則術也法者編著之圖籍設之於官府而布之於天下者也術者藏之於胸中以偶衆端而潜御羣臣者也故法莫如顯而術不欲見是以明主言法則境内卑賤莫不聞知也不獨滿於堂用術則親愛近習莫之得聞也不得滿室而管子猶曰言於室滿室言於堂滿堂非法術之言也難四第三十九衛孫文子聘於魯公登亦登叔孫穆子趨進曰諸侯之㑹寡君未嘗後衛君也今子不後寡君一等寡君未知所過也子其少安孫子}
