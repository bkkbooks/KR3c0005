  - {type: variant, offset: 127, length: 0, content: '', WYG: 害與不侵在自恃而已矣奚問乎曰恃其不可侵則強與弱奚其擇焉夫不能自恃而問其奈何也其不侵也幸矣申子曰失之數而求之信則疑矣其昭王之謂也知伯無度從韓康魏宣而圖以水灌滅其國此知伯之所以國亡而身死頭為飲柸之故也今昭王乃問孰與始強其畏有水人之患乎雖有左右非韓魏之二子也安有肘足之事而中期曰勿易此虛言也且中期之所官琴瑟也絃不調㺯不明中期之任也此中期所以事昭王者也中期善承其任未慊昭王也而為所不知豈不妄哉左右對之曰弱於始與不及則可矣其曰甚然則䛕也申子曰治不踰官雖知不言今中期不知而尚言之故曰昭王之問有失左右中期之對皆有過也管子曰見其可說之有證見其不可惡之有形賞罰信於所見雖所不見其敢為之乎見其可說之無證見其不可惡之無形賞罰不信於所見而求所不見之外不可得也或曰廣廷嚴居衆人之所肅也晏室獨處曾史之所慢也觀人之所肅非得情也且君上者臣下之所為飾也好惡在所見臣下之飾姦物以愚其君必也明不能燭逺姦見隠㣲而待之以觀飾行定賞罰不亦蔽乎管子曰言於室滿於室言於堂滿於堂是謂天下王或曰管仲之所謂言室滿室言堂滿堂者非特謂遊戯飲食之言也必謂大物也}
