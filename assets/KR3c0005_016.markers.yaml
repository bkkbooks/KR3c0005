  - {type: variant, offset: 260, length: 0, content: '', krp: 危故靈臺之飲衛侯怒而不誅故禇師作難食黿之羮鄭君怒而不誅故子公殺君君子之舉知所惡非甚之也曰知之若是其明也而不行誅焉以及於死故曰知所惡以見其無權也人君非獨不足於見難而已或不足於㫁制今昭公見惡稽罪而不誅使渠彌含憎懼死以徼幸故不免於殺是昭公之報惡不甚也或曰報惡甚者大誅報小罪大誅報小罪也者獄之至也獄之患故非在所以誅也以讐之衆也是以晉厲公滅三郄而欒中行作難鄭子都殺伯咺而食鼎起禍吴王誅子胥而越勾踐成霸則衛侯之逐鄭靈之弑不以禇師之不死而子公之不誅也以未可以怒而有怒之色未可誅而有誅之心怒其當罪而誅不逆人心}
  - {type: variant, offset: 261, length: 0, content: '', WYG: 懸奚害夫未立有罪即位之後宿罪而誅齊胡之所以滅也君行之臣猶有後患况為臣而行之君乎誅既不當而以盡為心是與天下為讐也則雖為戮不亦可乎衛靈之時彌子瑕有寵於衛國侏儒有見公者曰臣之夢賤矣公曰奚夢夢見竈者為見公也公怒曰吾聞人主者夢見日奚為見寡人而夢見竈乎侏儒曰夫日兼照天下一物不能當也人君兼照一國一人不能壅也故將見人主而夢日也夫竈一人煬焉則後人無從見矣或者一人煬君邪則臣雖夢竈不亦可乎公曰善遂去雍鉏退彌子瑕而用司空狗或曰侏儒善假於夢以見主道矣然靈公不知侏儒之言也去雍鉏退彌子瑕而用司空狗者是去所愛而用所賢也鄭子都賢慶建而壅焉燕子噲賢子之而壅焉夫去所愛而用所賢未免使一人煬已也不肖者煬主不足以害明今不加知而使賢者煬主則必危矣或曰屈到嗜芰文王嗜菖蒲葅非正味也而二賢尚之所味不必美晉靈侯說㕘無恤燕子噲賢子之非正士也而二君尊之所}
  - {type: page-break, offset: 261, content: '', id: KR3c0005_WYG_016-15a, image: WYG0729/WYG0729-0754c.png}
  - {type: page-break, offset: 261, content: '', id: KR3c0005_WYG_016-15b, image: WYG0729/WYG0729-0754d.png}
