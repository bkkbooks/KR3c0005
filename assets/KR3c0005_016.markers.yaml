  - {type: variant, offset: 116, length: 1, content: 獨, WYG: 勞而事治智慮不用而姦得故宋人語曰一雀過羿必得之則羿誣矣羿雖善射見雀未必一一得之故曰誣也以天下為之羅則雀不失矣夫知姦亦有大羅不失其一而已矣不修其理而以己之胷察為之弓矢則子産誣矣老子曰以智治國國之賊也其子産之謂矣秦昭王問於左右曰今時韓魏孰與始強左右對曰弱於始也今之如耳魏齊孰與曩之孟常芒卯對曰不及也王曰孟常芒卯率強韓魏猶無奈寡人何也左右對曰甚然中期推琴而對曰王之料天下過矣夫六晉之時知氏最強滅范中行而從韓魏之兵以伐趙灌以晉水城之未沈者三板知伯出魏宣子御韓康子為􅆖乘知伯曰始吾不知水可以滅人之國吾乃今知之汾水可以灌安邑絳水可以灌平陽魏宣子肘韓康子康子踐宣子之足肘足接乎車上而知氏分於晉陽之下今足下雖強未若知氏韓魏雖弱未至如其晉陽之下也此天下方用肘足之時願王勿易之也或曰昭王之問也有失左右中期之對也有過凡明主之治國也任其勢勢不可害則雖強天下無奈何也而况孟常芒卯韓魏能奈我何其勢可}
