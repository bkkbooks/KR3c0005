  - {type: variant, offset: 7, length: 0, content: '', WYG: 之所與燕也則近優而逺士而以為治非其難者也夫處世而不能用其}
  - {type: page-break, offset: 7, content: '', id: KR3c0005_WYG_016-3b, image: WYG0729/WYG0729-0748d.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 之所與燕也則近優而逺士而以為治非其難者也夫處世而不能用其}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 而徒不去國是以一人之力禁一國以一人之力禁一國者少能勝之明能照逺姦而見隠㣲必行之令雖逺於海内必無變然則去國之海而不劫殺非其難者也楚成王置商臣以為太子又欲置公子職商臣作難遂弑成王公子宰周太子也公子根有寵遂以東州反分而為兩國此皆非晩置太子之患也夫分勢不二庶孽卑寵無籍雖處耄老晚置太子可也然則晚置太子庶孽不亂又非其難也物之所謂難者必借人成勢而勿侵害己可謂一難也貴妾不使二后二難也愛孽不使危正適専聴一臣而不敢偶君此則可謂}
  - {type: page-break, offset: 8, content: '', id: KR3c0005_WYG_016-4a, image: WYG0729/WYG0729-0749a.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 而徒不去國是以一人之力禁一國以一人之力禁一國者少能勝之明能照逺姦而見隠㣲必行之令雖逺於海内必無變然則去國之海而不劫殺非其難者也楚成王置商臣以為太子又欲置公子職商臣作難遂弑成王公子宰周太子也公子根有寵遂以東州反分而為兩國此皆非晩置太子之患也夫分勢不二庶孽卑寵無籍雖處耄老晚置太子可也然則晚置太子庶孽不亂又非其難也物之所謂難者必借人成勢而勿侵害己可謂一難也貴妾不使二后二難也愛孽不使危正適専聴一臣而不敢偶君此則可謂}
  - {type: variant, offset: 9, length: 1, content: 守, WYG: 難也葉公子髙問政於仲尼仲尼曰政在説近而来逺哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財}
