  - {type: variant, offset: 5, length: 0, content: '', WYG: 元何犿註難三第三十八難四第三十九難三第三十八魯穆公問於子思曰吾聞龎􅀈氏之子不孝其行奚如子思對曰君子尊賢以崇徳舉善以勸民若夫過行是細人之所識也臣不知也子思出子服厲伯入見問龎􅀈氏子子服厲伯對曰其過三皆君之所未嘗聞自是之後君貴子思而賤子服厲伯也或曰魯之公室三世劫於季氏不亦宜乎明君求善而賞之求姦而誅之其得之一也故以善聞之者以説善同於上者也以姦聞之者以惡姦同於上者也此宜賞譽之所及也聞善聞姦俱當賞也不以姦聞是異於上而下比周於姦者也此宜毁罰之所及也今子思不以過聞而穆公貴之厲伯以姦聞而穆公賤之人情皆喜貴而惡賤故季氏之亂成而上不聞此魯君之所以劫也且此亡王之俗取魯之民所以自美而穆公獨貴之不亦倒乎文公出亡獻子使寺人披攻之蒲城披斬其袪文公奔翟恵公即位又使攻之恵竇不得也及文公反國披求見公曰蒲城之役君令一宿而汝即至恵竇之難君令三宿而汝一宿何其速也披對曰君令不二除君之惡惟恐不堪蒲人翟人余何有焉當時君為蒲翟之人無臣之分則何有焉今公即位其無蒲翟乎且桓公置射鈎而相管仲君乃見之或曰齊晉絶祀不亦宜乎桓公能用管仲之功而忘射鈎之怨文公能聴寺人之言而弃斬袪之罪桓公文公能容二子者也後世之君明不及二公後世之臣賢不如二子以不忠之臣事不明之君君不知則有燕操子之也子罕田常之賊知之則以管仲寺人自解君必不誅而自以為有桓文之徳是臣讎君而明不能燭多假之資自以為賢而不戒則雖無後嗣不亦可乎且寺人之言也直餙非識言也君令而不貳者則是貞於君也死君後生臣不愧而後為貞不皆死然後為貞今恵公朝卒而暮事文公寺人之不貳何如人有設桓公隠者曰一難二難三難何也桓公不能對以告管仲管仲對曰一難也近優而逺士二難也去其國而數之海三難也君老而晩置太子桓公曰善不擇日而廟禮太子或曰管仲之射隠不得也士之用不在近逺而俳優侏儒固}
