  - {type: variant, offset: 149, length: 7, content: 變因傳柄移藉使, krp: 君也君有失也故臣有得也不命亡於有失之君而命亡於有得之臣不察魯不得誅衛大夫而衛君之明不知不悛之臣孫子雖有是二也以亡其所以失所以得君也或曰臣主之施分也臣能奪君者以得相踦也故非其分而取者衆之所奪也辭其分而取者民之所予也是以桀索㟭山之女紂求比干之心而天下離湯身易名武身受詈而海内服趙咺走山田氏外僕而齊晉從則湯武之所以王齊晉之所以立非必以其君也彼得之而後以君處之也今未有其所以得而行其所以處是倒義而逆德也倒義則事之所以敗也逆德則怨之所以聚也敗亡之不察何也魯陽虎欲攻三桓不尅而犇齊齊景公禮之鮑文子諫曰不可陽虎有寵於季氏而欲伐於季孫貪其富也今君富於季孫而齊大於魯陽虎所以盡詐也景公乃囚陽虎或曰千金之家其子不仁人之急利甚也桓公五伯之上也争國而}
