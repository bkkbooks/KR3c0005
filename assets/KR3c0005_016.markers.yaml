  - {type: variant, offset: 260, length: 0, content: '', WYG: 危故靈臺之飲衛侯怒而不誅故禇師作難食黿之羮鄭君怒而不誅故子公殺君君子之舉知所惡非甚之也曰知之若是其明也而不行誅焉以及於死故曰知所惡以見其無權也人君非獨不足於見難而已或不足於㫁制今昭公見惡稽罪而不誅使渠彌含憎懼死以徼幸故不免於殺是昭公之報惡不甚也或曰報惡甚者大誅報小罪大誅報小罪也者獄之至也獄之患故非在所以誅也以讐之衆也是以晉厲公滅三郄而欒中行作難鄭子都殺伯咺而食鼎起禍吴王誅子胥而越勾踐成霸則衛侯之逐鄭靈之弑不以禇師之不死而子公之不誅也以未可以怒而有怒之色未可誅而有誅之心怒其當罪而誅不逆人心}
