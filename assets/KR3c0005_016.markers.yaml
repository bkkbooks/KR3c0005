  - {type: variant, offset: 206, length: 3, content: 尊外操, WYG: 未起難也其備未具也羣臣皆有陽虎之心而君上不知是㣲而巧也陽虎貪於天下以欲攻上是踈而拙也不使景公加誅於拙虎是鮑文子之說反也臣之忠詐在君所行也君明而嚴則羣臣忠君懦而闇則羣臣詐知㣲之謂明無救赦之謂嚴不知齊之巧臣而誅魯之成亂不亦妄乎或曰仁貪不同心故公子目夷辭宋而楚商臣弑父鄭去疾予弟而魯桓弑兄五伯兼并而以桓律人則是皆無貞亷也且君明而嚴則羣臣忠陽虎為亂於魯不成而走入齊而不誅是承為亂也君明則知誅陽虎之可以濟亂也此見㣲之情也語曰諸侯以}
