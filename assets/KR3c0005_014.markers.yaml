  - {type: variant, offset: 1316, length: 2, content: 世學, WYG: 田成恒利之是田成恒傾圃池而示渴民也一曰王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪中繩引而却之馬掩迹拊而發之彘逸出於竇中馬退而却筴不能進前也馬駻而走轡不能正也一曰司城子罕謂宋君曰慶賞賜予}
