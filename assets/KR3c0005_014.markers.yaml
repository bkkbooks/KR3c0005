  - {type: punctuation, offset: 1578, content: ；, id: KR3c0005_tls_014-bkkpn220}
  - {type: 'tls:seg', offset: 1578, content: '', id: KR3c0005_tls_014-39a.8}
  - {type: variant, offset: 1578, length: 2, content: 哀憐, WYG: 夫生而亂不如死而治大夫其釋之田鮪教其子田章曰欲利而身先利而君欲富而家先富而國一曰田鮪教其子田章曰主賣官爵臣賣智力故自恃無恃人公孫儀相魯而嗜魚一國盡爭買魚而獻之公儀子不受其弟諌曰夫子嗜魚而不受者何也對曰夫唯嗜魚故不受也夫即受魚必有下人之色有下人之色將枉於法枉於法則免於相雖嗜魚此不必能自給致我魚我又不能自給魚即無受魚而不免於相雖嗜魚我能長自給魚此明夫恃人不如自恃也明於人之為己者不如己之自為也三子之相燕貴而主斷蘇代為齊使燕王問之曰齊王亦何如主也對曰必不霸矣燕王曰何也對曰昔桓公之霸也内事屬鮑叔外事屬管仲桓公被髪而御婦人日遊於市今齊王不信其大臣於是燕王因益大信子之子之聞之使人遺蘇代金}
