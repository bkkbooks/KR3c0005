  - {type: variant, offset: 25, length: 211, content: 是以主有所善臣從而譽之主有所憎臣因而毀之凡人之大體取舍同者則相是也取合異者則相非也今人臣之所譽者人主之所是也此之謂同取人臣之所毀者人主之所非也此之謂同舍夫取舍合而相與逆者未嘗聞也此人臣之所以取信幸之道也夫姦臣得乘信幸之勢以毀譽進退群臣者人主非有術數以御之也非參驗以審之也必將以曩之合己信今之言此幸臣之所以得欺主成私者也故主必欺於上而臣必重於下矣此之謂擅主之臣國有擅主之臣則群下不得盡其智力以陳其忠百官之吏不得奉法以致其功矣, WYG: ''}
