  - {type: variant, offset: 1326, length: 238, content: 愚學皆不知治亂之情讘唊多誦先古之書以亂當世之治智慮不足以避穽井之陷又妄非有術之士聽其言者危用其計者亂此亦愚之至大而患之至甚者也俱與有術之士有談說之名而實相去千萬也此夫名同而實有異者也夫世愚學之人比有術之士也猶塏垤之比大陵也其相去遠矣而聖人者審於是非之實察於治亂之情也故其治國也正明法陳嚴刑將以救群生之亂去天下之禍使強不陵弱眾不暴寡耆老得遂幼孤得長邊境不侵君臣相親父子相保而無死亡係虜之患此亦功之至厚者也愚人不知顧以為暴愚者固欲治而惡其所以治皆惡危而喜其所以危者何以知之夫嚴刑重, WYG: 誅}
