  - {type: variant, offset: 240, length: 2, content: 夫安, WYG: 以造父於期既善馭馬又能忍得及至彘趨飲遂不能制子罕為出彘罕行罰一國畏之因簒君亦威分出彘之類也田恒為圃池擅行賞人歸之因弑簡公亦分圃池之比也故宋君簡公弑患在王良造父之共車田連成竅之共琴也王造誠能御車使共操轡則不進田成信善琴令共操彈則曲不成君臣共賞亦由是也二治强生於法弱亂生於阿法曲則亂君明於此則正賞罰而非不仁也爵禄生於功功立則爵生誅罰生於罪罪著則罰生臣明於此則盡死力而非忠君也君通於不仁臣通於不忠則可以王矣昭襄知主情但當自求理以訾責也百姓但當仰君亦不湏曲為愛故君疾而禱者責之以二甲而不發五苑應侯欲發蔬果以救饑人昭王以為無功受賞因止之也田鮪知臣情但當立功盖因不湏私忠於上也故教田章鮪教子章曰富國家自富}
