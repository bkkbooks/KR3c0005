  - {type: variant, offset: 1603, length: 623, content: 必逆於世而順於道德知之者同於義而異於俗弗知之者異於義而同於俗天下知之者少則義非矣處非道之位被眾口之譖溺於當世之言而欲當嚴天子而求安幾不亦難哉此夫智士所以至死而不顯於世者也楚莊王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得為君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾余之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲強戲余余與爭之至裂余之衣而此子之不孝莫大於此矣君怒而殺甲也故妻以妾余之詐棄而子以之死從是觀之父之愛子也猶可以毀而害也君臣之相與也非有父子之親也而群臣之毀言非特一妾之口也何怪夫賢聖之戮死哉此商君之所以車裂於秦而吳起之所以枝解於楚者也凡人臣者有罪固不欲誅無功者皆欲尊顯而聖人之治國也賞不加於無功而誅必行於有罪者也然則有術數者之為人也固左右姦臣之所害非明主弗能聽也世之學者說人主不曰乘威嚴之勢以困姦衺之臣而皆曰仁義惠愛而已矣世主美仁義之名而不察其實是以大者國亡身死小者地削主卑何以明之夫施與貧困者此世之所謂仁義哀憐百姓不忍誅罰者此世之所謂惠愛也夫有施與貧困則無功者得賞不忍誅罰則暴亂者不止國有無功得賞者則民不外務當敵斬首內不急力田疾作皆欲行貨財事富貴為私善立名譽以取尊官厚俸故姦私之臣愈眾而暴亂之徒愈勝不亡何待夫嚴刑者民之所畏也重罰者民之所惡, WYG: ''}
