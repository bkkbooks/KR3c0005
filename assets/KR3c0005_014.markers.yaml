  - {type: variant, offset: 564, length: 1, content: 孤, krp: 父也五因事之理則不勞而成故茲鄭之踞轅而歌以上髙梁也其患在趙簡主税吏請輕重主欲税吏問輕重主不自定其輕重之節日勿輕重而已吏因擅意因以富薄疑之言國中飽簡主喜而府庫虛百姓餓而姦吏富也故桓公廵民而管仲省腐財怨女公廵人見有饑人及老而無妻者以告仲曰國有腐財則人饑宫有怨女則人老而無妻也不然則在延陵乘馬不得進造父過之而為之泣也前礙飾後礙錯旣不得前却遂旁而佚造父見之泣猶賞罰失必致敗也右經一造父御四馬馳驟周旋而恣欲}
  - {type: variant, offset: 566, length: 0, content: '', WYG: 馬意所欲馬必随之也恣欲於馬者擅轡筴之制也以轡筴專制之故馬不違也然馬驚於出彘而造父不能禁制者非轡筴之嚴不足也威分於出彘也彘亦令馬可畏故曰威分王子於期為駙駕轡筴不用而擇欲於馬擅芻水之利也然馬過於圃池而駙馬敗者非芻水之利不足也徳分於圃池也故王良造父天下之善御者也然而使王良操左革而叱咤之使造父操右革而鞭笞之馬不能行十里共故也田連成竅天下善鼔琴者也然而田連鼔}
