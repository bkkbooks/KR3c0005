  - {type: variant, offset: 600, length: 685, content: 明主法下困姦臣以尊主安國者也是以度數之言得效於前則賞罰必用於後矣人主誠明於聖人之術而不苟於世俗之言循名實而定是非因參驗而審言辭是以左右近習之臣知偽詐之不可以得安也必曰我不去姦私之行盡力竭智以事主而乃以相與比周妄毀譽以求安是猶負千鈞之重陷於不測之淵而求生也必不幾矣百官之吏亦知為姦利之不可以得安也必曰我不以清廉方正奉法乃以貪汙之心枉法以取私利是猶上高陵之顛墮峻谿之下而求生必不幾矣安危之道若此其明也左右安能以虛言惑主而百官安敢以貪漁下是以臣得陳其忠而不弊下得守其職而不怨此管仲之所以治齊而商君之所以強秦也從是觀之則聖人之治國也固有使人不得不愛我之道而不恃人之以愛為我也恃人之以愛為我者危矣恃吾不可不為者安矣夫君臣非有骨肉之親正直之道可以得利則臣盡力以事主正直之道不可以得安則臣行私以干上明主知之故設利害之道以示天下而已矣夫是以人主雖不口教百官不目索姦衺而國已治矣人主者非目若离婁乃為明也非耳若師曠乃為聰也目必不任其數而待目以為明所見者少矣非不弊之術也耳必不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視天下不得不為己聽故身在深宮之中而明照四海之內而天下弗能蔽弗能欺者何也闇亂之道廢而聰明之勢興也故善任勢者國安不知因其勢者國危古秦之俗君臣廢法而服私是以國亂兵弱而主卑商君說秦孝公以變法易俗而明公道賞告姦困末作而利本事當此之時秦民習故俗之有罪可以得免無功可以得尊顯也故輕犯新法於是犯之者其誅重而必告之者其賞厚而信故姦莫不得而被刑者眾民疾怨而眾過日聞孝公不聽遂行商君之法民後知有罪之必誅而告私姦者眾也故民莫犯其刑無所加是以國治而兵強地廣而主尊此其所以然者匿罪之, WYG: 位}
