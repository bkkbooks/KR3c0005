  - {type: variant, offset: 1576, length: 0, content: '', WYG: 為我用者非以吾愛之為我用者也以吾勢之為我用者也吾釋勢與民相收若是吾適不愛而民因不為我用也故遂絶愛道也秦大饑應侯請曰五苑之草著謂草木著地而生也蔬菜橡果棗栗足以活民請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬果者使民有功與無功俱賞也夫使民有功與無功俱賞者此亂之道也夫發五苑而亂不如棄棗􅂼而}
  - {type: page-break, offset: 1576, content: '', id: KR3c0005_WYG_014-7a, image: WYG0729/WYG0729-0732a.png}
