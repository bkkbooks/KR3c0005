  - {type: variant, offset: 1572, length: 0, content: '', WYG: 誅大臣君曰與子罕議之居期年民知殺生之命制於子罕也故一}
  - {type: variant, offset: 1572, length: 0, content: '', krp: 誅大臣君曰與子罕議之居期年民知殺生之命制於子罕也故一}
  - {type: variant, offset: 1573, length: 0, content: '', WYG: 歸焉故子罕劫宋君而奪其政法不能禁也故曰子罕為出彘而田成恒為圃池也今令王良造父共車人操一邊轡而入門閭駕必敗而道不至也令田連成竅共琴人撫一絃而揮則音必敗曲不遂矣二秦昭王有病百姓里買牛而家為王禱公孫述出見之入賀王曰百姓乃皆里買牛為王禱王使人問之果有之王曰訾之人二甲訾毁也罰之也夫非令而擅禱是愛寡人也夫愛寡人寡人亦且改法而心與之相循者是法不立法不立亂亡之道也不如人罰二甲而復與為治一曰秦襄王病百姓為之禱病愈殺牛塞禱郎中閻遏公孫衍出見之曰非社臘之時也奚自殺牛而祠社怪而問之百姓曰人主病為之禱今病愈殺牛塞禱閻遏公孫衍説見王拜賀曰過堯舜矣王驚曰何謂也對曰堯舜其民未至為之禱也今王病而民以牛禱病愈殺牛塞禱故臣竊以王為過堯舜也王因使人問之何里為之訾其里正與伍老屯二甲屯亦罰也閻遏公孫衍媿不敢言居數月王飲酒酣樂閻遏公孫衍謂王曰前時臣竊以王為過堯舜非直敢䛕也堯舜病且其民未至為之禱也今王病而民以牛禱病愈殺牛塞禱今乃訾其里正與伍老屯二甲臣竊怪之王曰子何故不知於此彼民}
