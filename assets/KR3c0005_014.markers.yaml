  - {type: variant, offset: 2480, length: 598, content: 水行之有輕舟便楫也乘之者遂得其成伊尹得之湯以王管仲得之齊以霸商君得之秦以強此三人者皆明於霸王之術察於治強之數而不以牽於世俗之言適當世明主之意則有直任布衣之士立為卿相之處處位治國則有尊主廣地之實此之謂足貴之臣湯得伊尹以百里之地立為天子桓公得管仲立為五霸主九合諸侯一匡天下孝公得商君地以廣兵以強故有忠臣者外無敵國之患內無亂臣之憂長安於天下而名垂後世所謂忠臣也若夫豫讓為智伯臣也上不能說人主使之明法術度數之理以避禍難之患下不能領御其眾以安其國及襄子之殺智伯也豫讓乃自黔劓敗其形容以為智伯報襄子之仇是雖有殘刑殺身以為人主之名而實無益於智伯若秋毫之末此吾之所下也而世主以為忠而高之古有伯夷叔齊者武王讓以天下而弗受二人餓死首陽之陵若此臣不畏重誅不利重賞不可以罰禁也不可以賞使也此之謂無益之臣也吾所少而去也而世主之所多而求也諺曰厲憐王此不恭之言也雖然古無虛諺不可不察也此謂劫殺死亡之主言也人主無法術以御其臣雖長年而美材大臣猶將得勢擅事主斷而各為其私急而恐父兄豪傑之士借人主之力以禁誅於己也故弒賢長而立幼弱廢正的而立不義故春秋記之曰楚王子圍將聘於鄭未出境聞王病而反因入問病以其冠纓絞王而殺之遂自立也齊崔杼其妻美而莊公通之數如崔氏之室及公往崔子之徒賈舉率崔子之徒而攻公公入室請與之分國崔子不許公請自刃於廟崔子又不聽公乃走踰於北墻賈舉射公中其股公墜崔子之徒以戈斫公而死之而立其弟景公近之所見李兌之用趙也餓主父百日而死, WYG: ''}
