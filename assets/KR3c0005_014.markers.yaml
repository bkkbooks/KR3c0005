  - {type: variant, offset: 1578, length: 2, content: 哀憐, krp: 夫生而亂不如死而治大夫其釋之田鮪教其子田章曰欲利而身先利而君欲富而家先富而國一曰田鮪教其子田章曰主賣官爵臣賣智力故自恃無恃人公孫儀相魯而嗜魚一國盡爭買魚而獻之公儀子不受其弟諌曰夫子嗜魚而不受者何也對曰夫唯嗜魚故不受也夫即受魚必有下人之色有下人之色將枉於法枉於法則免於相雖嗜魚此不必能自給致我魚我又不能自給魚即無受魚而不免於相雖嗜魚我能長自給魚此明夫恃人不如自恃也明於人之為己者不如己之自為也三子之相燕貴而主斷蘇代為齊使燕王問之曰齊王亦何如主也對曰必不霸矣燕王曰何也對曰昔桓公之霸也内事屬鮑叔外事屬管仲桓公被髪而御婦人日遊於市今齊王不信其大臣於是燕王因益大信子之子之聞之使人遺蘇代金}
  - {type: variant, offset: 1581, length: 4, content: 姓輕刑罰, WYG: 鎰而聴其所使之一曰蘇代為秦使燕見無益子之則必不得事而還貢賜又不出於是見燕王乃譽齊王燕王曰齊王何若是之賢也則將必王乎蘇代曰救亡不暇安得王哉燕王曰何也曰其任所愛不均燕王曰其任何也曰昔者齊桓公愛管仲置以為仲父内事理焉外事斷焉舉國而歸之故一匡天下九合諸侯今齊任所愛不均是以知其亡也燕王曰今吾任子之天下未之聞也於是明日張朝而聴子之潘壽謂燕王曰王不如以國讓子之人所以謂堯賢者以其讓天下於許由許由必不受也則是堯有讓許由之名而實不失天下也今王以國讓子之子之必不受也則是王有讓子之之名而與堯同行也於是燕王因舉國而屬之子之大重一曰潘夀隠者燕使人聘之潘夀見燕王曰臣恐子之之如益也王曰何益哉對曰古者禹死將𫝊天下於益啟之人因相與攻益而立啟今王信愛子之將𫝊國子之太子之人盡懐印璽子之之人無一人在朝廷者王不幸棄羣臣則子之亦益也王因收吏璽自三百石以上皆效之子之子之大重夫人主之所以鏡照者諸侯之士徒也今諸侯之士徒皆私門之黨也人主之所以自羽翼者巖穴之士徒也今巖穴之士徒皆私門之舍人也是何也奪褫之資在子之也故吳章曰人主不佯憎愛人佯愛人不得復憎也佯憎人不得復愛也一曰燕王欲傳國於子之也問之潘夀對曰禹愛益而任天下於益已而以啟人為吏及老而以啟為不足任天下故傳天下於益而勢重盡在啟也已而啟與友黨攻益而奪之天下是禹名傳天下於益而實令啟自取之也此禹之不及堯舜明矣今王欲傳之子之而吏無非太子之人者也是名傳之而實令太子自取之也燕王乃收璽自三百石以上皆效之子之遂重方吾子曰吾聞之古禮行不與同服者同車不與同族者共家而况君人者乃借其權而外其勢乎吳章謂韓宣王曰人主不可佯愛人一日不可復憎不可以佯憎人一日不可復愛也故佯憎佯愛之徴見則䛕者因資而毁譽之雖有明主不能復收而况於以誠借人也趙王遊於圃中左右以莵與虎而輟觀之盼然環其眼環轉其眼以作怒也王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目如此者則必死矣其明日平陽君聞之使人殺言者而王不誅也衛君入朝於周周行人問其號對曰諸侯辟疆周行人却之曰諸侯不得與天子同號開辟疆土者天子之號衛君乃自更曰諸侯燬而後内之仲尼聞之曰逺哉禁偪虛名不以借人况實事乎名辟疆未必能辟疆故曰虛也四揺木者一一攝其葉則勞而不徧左右拊其本而葉徧揺矣拊擊動也臨淵而揺木鳥驚而髙魚恐而下善張網者引其綱若一一攝萬目而後得則是勞而難引其綱而魚已囊矣故吏}
