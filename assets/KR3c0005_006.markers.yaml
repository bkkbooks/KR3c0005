  - {type: variant, offset: 17, length: 2, content: 強奉, WYG: 廣是以舉之曰儉故能廣凢物之有形者易裁也易割也何以論之有形則有短長有短長則有小大有小大則有方圓有方圓則有堅脆有堅脆則有輕重有輕重則有白黑短長大小方圎堅脆輕重白黒之謂理理定而物易割也故議於大庭而後言則立權議之士知之矣故欲成方圓而随其規矩則萬事之功形矣而萬物莫不有規矩議言之士計㑹規矩也聖人盡随於萬物之規矩故曰不敢為天下先不敢為天下先則事無不事功無不功而議必葢世欲無䖏大官其可得乎䖏大官之謂為成事長是以故曰不敢為天下先故能為成事長慈於子者不敢絶衣食慈於身者不敢離}
