  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書韓非子卷六元何犿註觧老第二十徳者内也得者外也上徳不徳言其神不淫於外也神不淫於外則身全身全之謂德德者得身也凢徳者以無為集以無欲成以不思安以不用固為之欲之則徳無舍徳無舍則不全用之思之則不固不固則無功無功則生}
