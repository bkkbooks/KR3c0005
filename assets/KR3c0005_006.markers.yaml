  - {type: variant, offset: 10, length: 0, content: '', WYG: 操是以死生氣禀焉萬智斟酌焉萬事廢興焉天得之以髙地得之以藏維斗得之以成其威日月得之以恒其光五常得之以常其位列星得之以端其行四時得之以御其變氣軒轅得之以擅四方赤松得之與天地統聖人得之以成文章道與堯舜俱智與接輿俱狂與桀紂俱滅與湯武俱昌以為近乎逰於四極以為逺乎常在吾側以為暗乎其光昭昭以為明乎其物冥冥而功成天地和化雷霆宇内之物恃之以成凢道之情不制不形柔}
