  - {type: variant, offset: 334, length: 803, content: 輕重今若以譽進能則臣離上而下比周若以黨舉官則民務交而不求用於法故官之失能者其國亂以譽為賞以毀為罰也則好賞惡罰之人釋公行行私術比周以相為也忘主外交以進其與則其下所以為上者薄矣交眾與多外內朋黨雖有大過其蔽多矣故忠臣危死於非罪姦邪之臣安利於無功忠臣之所以危死而不以其罪則良臣伏矣姦邪之臣安利不以功則姦臣進矣此亡之本也若是則群臣廢法而行私重輕公法矣數至能人之門不壹至主之廷百慮私家之便不壹圖主之國屬數雖多非所以尊君也百官雖具非所以任國也然則主有人主之名而實託於群臣之家也故臣曰亡國之廷無人焉廷無人者非朝廷之衰也家務相益不務厚國大臣務相尊而不務尊君小臣奉祿養交不以官為事此其所以然者由主之不上斷於法而信下為之也故明主使法擇人不自舉也使法量功不自度也能者不可弊敗者不可飾譽者不能進非者弗能退則君臣之間明辯而易治故主讎法則可也賢者之為人臣北面委質無有二心朝廷不敢辭賤軍旅不敢辭難順上之為從主之法虛心以待令而無是非也故有口不以私言有目不以私視而上盡制之為人臣者譬之若手上以脩頭下以脩足清暖寒熱不得不救鏌鋣傅體不敢弗搏無私賢哲之臣無私事能之士故民不越鄉而交無百里之慼貴賤不相踰愚智提衡而立治之至也今夫輕爵祿易去亡以擇其主臣不謂廉詐說逆法倍主強諫臣不謂忠行惠施利收下為名臣不謂仁離俗隱居而以詐非上臣不謂義外使諸侯內耗其國伺其危嶮之陂以恐其主曰交非我不親怨非我不解而主乃信之以國聽之卑主之名以顯其身毀國之厚以利其家臣不謂智此數物者險世之說也而先王之法所簡也先王之法曰臣毋或作威毋或作利從王之指無或作惡從王之路古者世治之民奉公法廢私術專意一行具以待任夫為人主而身察百官則日不足力不給且上用目則下飾觀上用耳則下飾聲上用慮則下繁辭先王以三者為不足故舍己能而因法數審賞罰先王之所守要故法省而不侵獨制四海之內聰智不得用其詐險躁不得關其佞姦邪無所依遠在千里外不敢易其辭勢在郎中不敢蔽善飾非朝廷群下直湊單微不敢相踰越故治不足而日有餘上之任勢使, WYG: ''}
