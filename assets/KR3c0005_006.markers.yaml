  - {type: variant, offset: 1, length: 0, content: '', krp: 徳徳則無徳不徳則在有徳故曰上徳不徳是以有徳所以貴無為無思為虚者謂其意無所制也夫無術者故以無為無思為虛也夫故以無為無思為虛者其意常不忘虛是制於為虛也虛者謂其意所無制也今制於為虛是不虛也虛者之無為也不以無為為有常不以無為為有常則虛虛則徳盛徳盛之謂上徳故曰上徳無為而無不為也仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍也生心之所不能己也非求其報也故曰上仁為之而無以為也義者君臣上下之事父子貴賤之差也知交朋友之接也親踈内外之分也臣事君宜下懐上子事父宜賤敬貴宜知交友朋之相助也宜親者内而踈者外宜義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以情貌也羣義之文章也君臣父子之交也貴賤賢不肖之所以别也中心懐而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外節之所以諭内也故曰禮以情貌也凢人之為外物動也不知其為身之禮也衆人之為禮也以尊他人也故時勸時衰君子之為禮以為其身以為其身故神之為上禮上禮神而衆人貳故不能相應不能相應故曰上禮為之而莫之應衆人雖貳聖人復恭敬盡手足之禮也不衰故曰攘臂而仍之道有積而徳有功徳者道之功功有實而實有光仁者徳之光光有澤而澤有事義者仁之事也事有禮而禮有文禮者義之文也故曰失道而後失徳失徳而後失仁失仁而後失義失義而後失禮禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黄其質至羙物不足以飾之夫物之待飾而後行者其質不羙也是以父子之間其禮樸而不明故曰禮薄也凡物不並盛隂陽是也理相奪予威徳是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰也然則為禮者事通人之樸心者也衆人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能毋争乎有争則亂故曰夫禮者忠信之薄也而亂之首乎先物行先理動之謂前識前識者無縁而忘意}
  - {type: variant, offset: 2, length: 2, content: 第六, WYG: 也何以論之詹何坐弟子侍有牛鳴於門外弟子曰是黒牛也而白題詹何曰然是黑牛也而白在其角使人視之果黒牛而以布裹其角以詹子之術嬰衆人之心華焉殆矣故曰道之華也嘗試釋詹子之察而使五尺之愚童子視之亦知其黒牛而以布裹其角也故以詹子之察苦心傷神而後與五尺之愚童子同功是以曰愚之首也故曰前識者道之華也而愚之首也所謂大丈夫者謂其智之大也所謂處其厚不處其薄者行情實而去禮貌也所謂處其實不處其華者必縁理不徑絶也所謂去彼取此者去貌徑絶而取縁理好情實也故曰去彼取此人有禍則心畏恐心畏恐則行端直行端直則思慮熟思慮熟則得事理行端直則無禍害無禍害則盡天年得事理則必成功盡天年則全而壽必成功則冨與貴全壽冨之謂福而冨本於有禍故曰禍兮福之所倚以成其功也人有福則冨貴至冨貴至則衣食美衣食美則驕心生驕心生則行邪僻而動弃理行邪僻則身死夭動弃理則無成功夫内有死夭之難而外無成功之名者大禍也而禍本生於有福故曰福兮禍之所伏夫縁道理以從事者無不能成無不能成者大能成天子之勢尊而小易得卿相将軍之賞禄夫弃道理而妄舉動者雖上有天子諸侯之勢尊而下有倚頓陶朱卜祝之冨猶失其民人而亡其財資也衆人之輕弃道理而易妄舉動者不知其禍福之深大而道濶逺若是也故諭人曰孰知其極人莫不欲冨貴全夀而未有能免扵貧賤死夭之禍也心欲冨貴全夀而今貧賤死夭是不能至扵其所欲至也凡失其所欲之路而妄行者之謂迷迷則不能至於其所欲至矣今衆人之不能至扵其所欲至故曰迷衆人之所不能至扵其所欲至也自天地之剖判以至扵今故曰人之迷也其日固以乆矣所謂方者内外相應也言行相稱也所謂廉者必生死之命也輕恬資財也所謂直者義必公正立心不偏黨也所謂光者官爵尊貴衣裘壯麗也今有道之士雖中外信順不以誹謗窮墮雖死節輕財不以侮罷羞貪雖異端不黨不以去邪罪私雖勢尊衣羙不以夸賤欺貧其故何也使失路者而肯聽習問知即不成迷也今衆人之所以欲成功而反為敗者生扵不知道理而不肯問知而聽能衆人不肯問知聽能而聖人強以其禍敗適之則怨衆人多而聖人寡寡之不勝衆數也今舉動而與天下為讎非全身長生之道也是以行軌節而舉之也故曰方而不割亷而不劌直而不肆光而不耀聦明睿智天也動静思慮人也人也者乗扵天明以視寄扵天聦以聽託扵天智以思慮故視強則目不明聽甚則耳不聦思慮過度則智識亂目不明則不能决黒白之分耳不聦則不能别清濁之聲智識亂則不能審得失之地目不能决黒白之色則謂之盲耳不能别清濁之聲則謂之聾心不能審得失之地則謂之狂盲則不能避晝日之險聾則不能知雷霆之害狂則不能免人間法令之禍書之所謂治人者適動静之節省思慮之費也所謂事天者不極聦明之力不盡智識之任茍極盡則費神多費神多則盲聾悖狂之禍至是以嗇之嗇之者愛其精神嗇其智識也故曰治人事天莫如嗇衆人之用神也躁躁則多費多費之謂侈聖人之用神也静静則少費少費之謂嗇嗇之謂術也生扵道理夫能嗇也是從扵道而服扵理者也衆人離扵患陷扵禍猶未知退而不服從道理聖人雖未見禍患之形虛無服從扵道理以稱蚤服故曰夫謂嗇是以蚤服知治人者其思慮静知事天者其孔竅虛思慮静故徳不去孔竅虛則和氣日入故曰重積徳夫能令故徳不去新和氣日至者蚤服者也故曰蚤服是謂重積徳積徳而後神静神静而後和多和多而後計得計得而後能御萬物能御萬物則戰易勝敵戰易勝敵而論必葢世論必葢世故曰無不克無不克本扵重積徳故曰重積徳則無不克戰易勝敵則兼有天下論必葢世則民人從進兼天下而退從民人其術逺則衆人莫見其端末莫見其端末是以莫知其極故曰無不克則莫知其極凡有}
