  - {type: variant, offset: 13, length: 0, content: '', krp: 之爪角害之䖏鄉不節憎愛無度則争鬪之爪角害之嗜欲無限動静不節則痤疽之爪角害之好用其私智而弃道理則網羅之爪角害之兕虎有域而萬害有原避其域塞其原則免於諸害矣凢兵革}
  - {type: variant, offset: 14, length: 1, content: 強, WYG: 所以備害也重生者雖入軍無忿争之心無忿争之心則無所用救害之備此非獨謂野䖏之軍也聖人之逰世也無害人之心無害人之心則必無人害無人害則不備人故曰陸行不遇兕虎入山不恃備以救害故曰入軍不備甲兵逺諸害故曰兕無所投其角虎無所錯其爪兵無所容其刃不設備而必無害天地之道理也體天地之道故曰無死地焉動無死地而謂之善攝生矣愛子者慈於子重生者慈於身貴功者慈於事慈母之於弱子也務致其福則事除其禍事除其禍則思慮熟思慮熟則得事理得事理則必成功必成功則其行之也不疑不疑之謂勇聖人之於萬事也盡如慈母之為弱子慮也故見必行之道見必行之道則眀其從事亦不疑不疑之謂勇不疑生於慈故曰慈故能勇周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈常費而况於人乎故萬物必有盛衰萬事必有弛張國家必有文武官治必有賞罰是以智士儉用其財則家富聖人愛寳其神則精盛人君重戰其卒則民衆民衆}
