  - {type: variant, offset: 5, length: 0, content: '', WYG: 而後亡之有身而後殃之不可謂能有其國能保其身夫能有其國必能安其社禝能保其身必能終其天年而後可謂能有其國能保其身矣夫能有其國保其身者必且體道體道則其智深其智深則其㑹逺其㑹逺衆人莫能見其所極唯夫能令人不見其事極不見事極者為保其身有其國故曰莫知其極莫知其極則可以有國所謂有國之母母者道也道也者生扵所以有國之術所以有國之術故謂之有國之母夫道以與世周旋也其建生也長持禄也乆故曰有國之母可以長乆樹木有曼根有直根根者書之所謂柢也柢也者木之根以建生也曼根者木之所以持生也徳也者人之所以建生也禄也者人之所以持生也今建於理者其持禄也久故曰深其根體其道者其生日長故曰固其柢柢固則生長根深則視乆故曰深其根固其柢長生乆視之道也工人數變業則失其功作者數揺徙則亡其功一人之作日亡半日十日則亡五人之功矣萬人之作日亡半日十日則亡五萬人之功矣然則數變業者其人彌衆其虧彌大矣凡法令更則利害易利害易則民務變務變之謂變業故以理觀之事大衆而數揺之則少成功藏大噐而數徙之則多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴静不重變法故曰治大國者若烹小鮮人處疾則貴醫有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫内無痤疽癉痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道莅天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不神也其神不傷也鬼不祟也疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民民不犯法則上亦不行刑上不行刑之謂上不傷人故曰聖人亦不傷民上不與民相害而人不與鬼相傷故曰兩不相傷民不敢犯法則上内不用刑罰而外不事利其産業上内不用刑罰而外不事利其産業則民蕃息民蕃息而畜積盛民蕃息而畜積盛之謂有徳凡所謂祟者魂魄去而精神亂精神亂則無徳鬼不祟人則魂魄不去魂魄不去而精神不亂精神不亂之謂有徳上盛畜積而鬼不亂其精神則徳盡在於民矣故曰兩不相傷則徳交歸焉言其徳上下交盛而俱歸於民也有道之君外無怨讎於鄰敵而内有徳澤於人民夫外無怨讎於鄰敵者其遇諸侯也外有禮義内有徳澤於人民者其治人事也務本遇諸侯有禮義則役希起治民事務本則淫奢止凡馬之所以大用者外供甲兵而内給淫奢也今有道之君外希用甲兵而内禁淫奢上不事馬於戰鬬逐北而民不以馬逺通淫物所積力唯田疇積力唯田疇必且糞灌故曰天下有道却走馬以糞也人君無道則内暴虐其民而外侵欺其鄰國内暴虐則民産絶外侵欺則兵數起民産絶則畜生少兵數起則士卒盡畜生少則戎馬乏士卒盡則軍危殆戎馬乏則将馬出軍危殆則近臣役馬者軍之大用郊者言其近也今所以給軍之具於将馬近臣故曰天下無道戎馬生於郊矣人有欲則計㑹亂計㑹亂而有欲甚有欲甚則邪心勝邪心勝則事經絶事經絶則禍難生由是觀之禍難生於邪心邪心誘於可欲可欲之類進則教良民為姦退則令善人有禍姦起則上侵弱君禍至則人民多傷然則可欲之類上侵弱君而下傷人民夫上侵弱君而下傷人民者大罪也故曰禍莫大於可欲是以聖人不引五色不淫於聲樂明君賤玩好而去淫麗人無毛羽不衣則不犯寒上不屬天而下不著地以腸胃為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣足以犯寒食足以充虚則不憂矣衆人則不然大為諸侯小餘千金之資其欲得之憂不除也胥靡有免死罪時活今不知足者之憂終身不觧故曰禍莫大於不知足故欲利甚於憂憂則疾生疾生而智慧衰智慧衰則失度量失度量則妄舉動妄舉動則禍害至禍害至則疾嬰内疾嬰内則痛禍薄外痛禍薄外則苦痛雜於腸胃之間苦痛雜於腸胃之間則傷人也㦧㦧則退而自咎退而自咎也生於欲利故曰咎莫㦧於欲利道者萬物之所然也萬理之所稽也理者成物之文也道者萬物之所以成也故曰道理之者也物有理不可以相薄物有理不可以相薄故理之為物之制萬物各異理萬物各異理而道盡稽萬物之理故不得不化不得不化故}
