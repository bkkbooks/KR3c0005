  - {type: variant, offset: 1, length: 0, content: '', WYG: 徳徳則無徳不徳則在有徳故曰上徳不徳是以有徳所以貴無為無思為虚者謂其意無所制也夫無術者故以無為無思為虛也夫故以無為無思為虛者其意常不忘虛是制於為虛也虛者謂其意所無制也今制於為虛是不虛也虛者之無為也不以無為為有常不以無為為有常則虛虛則徳盛徳盛之謂上徳故曰上徳無為而無不為也仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍也生心之所不能己也非求其報也故曰上仁為之而無以為也義者君臣上下之事父子貴賤之差也知交朋友之接也親踈内外之分也臣事君宜下懐上子事父宜賤敬貴宜知交友朋之相助也宜親者内而踈者外宜義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以情貌也羣義之文章也君臣父子之交也貴賤賢不肖之所以别也中心懐而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外節之所以諭内也故曰禮以情貌也凢人之為外物動也不知其為身之禮也衆人之為禮也以尊他人也故時勸時衰君子之為禮以為其身以為其身故神之為上禮上禮神而衆人貳故不能相應不能相應故曰上禮為之而莫之應衆人雖貳聖人復恭敬盡手足之禮也不衰故曰攘臂而仍之道有積而徳有功徳者道之功功有實而實有光仁者徳之光光有澤而澤有事義者仁之事也事有禮而禮有文禮者義之文也故曰失道而後失徳失徳而後失仁失仁而後失義失義而後失禮禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黄其質至羙物不足以飾之夫物之待飾而後行者其質不羙也是以父子之間其禮樸而不明故曰禮薄也凡物不並盛隂陽是也理相奪予威徳是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰也然則為禮者事通人之樸心者也衆人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能毋争乎有争則亂故曰夫禮者忠信之薄也而亂之首乎先物行先理動之謂前識前識者無縁而忘意}
