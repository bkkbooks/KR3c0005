  - {type: variant, offset: 1202, length: 237, content: 法峻法所以禁過外私也嚴刑所以遂令懲下也威不貳錯制不共門威制共則眾邪彰矣法不信則君行危矣刑不斷則邪不勝矣故曰巧匠目意中繩然必先以規矩為度上智捷舉中事必以先王之法為比故繩直而枉木斲準夷而高科削權衡縣而重益輕斗石設而多益少故以法治國舉措而已矣法不阿貴繩不撓曲法之所加智者弗能辭勇者弗敢爭刑過不避大臣賞善不遺匹夫故矯上之失詰下之邪治亂決繆絀羡齊非一民之軌莫如法厲官威民退淫殆止詐偽莫如刑刑重則不敢以貴易賤法審則上尊而不侵上尊而不侵則主強而守要故先王貴之而傳之人主釋法用私則上下不別矣, WYG: 子卷六}
