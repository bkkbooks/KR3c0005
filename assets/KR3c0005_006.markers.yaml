  - {type: variant, offset: 21, length: 1, content: 弱, WYG: 不敢舍規矩故臨兵而慈於士吏則戰勝敵慈於噐械則城堅固故曰慈於戰則勝以守則固夫能自全也而盡随於萬物之理者必且有天生天生也者生心也故天下之道盡之生也若以慈衛之也事必萬全而舉無不當則謂之寳矣故曰吾有三寳持而寳之書之所謂大道也者端道也所謂貌施也者邪道也所謂徑大也者佳麗也佳麗也者邪道之分也朝甚除也者獄訟繁也獄訟繁則田荒田荒則府倉虚府倉虚}
