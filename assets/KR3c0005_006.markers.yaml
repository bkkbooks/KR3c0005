  - {type: variant, offset: 11, length: 1, content: 奉, WYG: 隨時與理相應萬物得之以死得之以生萬物得之以敗得之以成道譬之若水溺者多飲之即死渇者適飲之即生譬之若劒㦸愚人以行忿則禍生聖人以誅暴則福成故得之以死得之以生得之以敗得之以成人希見生象也而得死象之骨案其圗以想其生也故諸人之所以意想者皆謂之象也今道雖不可得聞見聖人執其見功以處見其形故曰無狀之狀無物之象凢理者方圓短長麤靡堅脆之分也故理定而後可得道也故定理有存亡有死生有盛衰夫物之一存一亡乍死乍生初盛而後衰者不可謂常唯夫與天地之剖判也俱生至天地之消散也不死不衰者謂常者而常者無攸易無定理無定理非在於常所是以不可道也聖人觀其𤣥虚用其周行强字之曰道然而可論故曰道之可道非常道也人始於生而卒於死始之謂出卒之謂入故曰出生入死人之身三百六十節四肢九竅其大具也四肢與九竅十有三者十有三者之動静盡屬於生焉屬之謂徒也故曰生之徒也十有三者至其死也十有三具者皆還而屬之於死死之徒亦有十三故曰生之徒十有三死之徒十有三凢民之生生而生者固動動盡則損也而動不止是損而不止也損而不止則生盡生盡之謂死則十有三具者皆為死死地也故曰民之生生而動動皆之死地之十有三是以聖人愛精神而貴䖏静此甚大於兕虎之害夫兕虎有域動静有時避其域省其時則免其兕虎之害矣民獨知兕虎之有爪角也而莫知萬物之盡有爪角也不免於萬物之害何以論之時雨降集曠野閒静而以昬晨犯山川則風露之爪角害之事上不忠輕犯禁令則刑}
