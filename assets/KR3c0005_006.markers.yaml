  - {type: variant, offset: 13, length: 0, content: '', WYG: 之爪角害之䖏鄉不節憎愛無度則争鬪之爪角害之嗜欲無限動静不節則痤疽之爪角害之好用其私智而弃道理則網羅之爪角害之兕虎有域而萬害有原避其域塞其原則免於諸害矣凢兵革}
