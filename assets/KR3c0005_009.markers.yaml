  - {type: variant, offset: 699, length: 436, content: 內也娛其色而不行其謁不使私請其於左右也使其身必責其言不使益辭其於父兄大臣也聽其言也必使以罰任於後不令妄舉其於觀樂玩好也必令之有所出不使擅進擅退不使群臣虞其意其於德施也縱禁財發墳倉利於民者必出於君不使人臣私其德其於說議也稱譽者所善毀疵者所惡必實其能察其過不使群臣相為語其於勇力之士也軍旅之功無踰賞邑鬭之勇無赦罪不使群臣行私財其於諸侯之求索也法則聽之不法則距之所謂亡君者非莫有其國也而有之者皆非己有也令臣以外為制於內則是君人者亡也聽大國為救亡也而亡亟於不聽故不聽群臣知不聽則不外諸侯諸侯知不聽則不受臣之誣其君矣明主之為官職爵祿也所以進賢材勸有功也故曰賢材者處厚祿任大官功大者有尊爵受重賞官賢者量其能賦祿者稱其功是以賢者不誣能以事其主有功者樂進其業故事成功立今則不然不課賢不肖不論有功勞用諸侯之重聽左右之謁父兄大臣上請爵祿於上而下賣之以收財利及以樹私黨故財利多者買官以為貴有左右之交者請謁以成重功勞之臣不論官職之遷失謬是以吏偷官而外交棄事而親財是以賢者懈怠而不勸有功者隳而簡其業, WYG: 内}
