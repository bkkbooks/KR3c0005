  - {type: variant, offset: 0, length: 1, content: 八, WYG: 欽定四庫全書韓非子卷九元何犿註内儲說上七術第三十儲聚也謂聚其所說皆君之内謀故曰内儲說主之所用也七術所察也六㣲七術一曰衆端㕘觀端直也欲求衆直必㕘驗而聴觀也二曰必罰明威三曰信賞盡能四曰一聽責下專聽一理必有失責下不一能則不明五曰疑詔詭使疑危而制之譎詭而使之則下不敢隠情六曰挾知而問七曰倒言反事或倒其言或反其事則}
