  - {type: variant, offset: 32, length: 4, content: 便僻好色, WYG: 何足見也竪牛曰壬固已數見於君矣君賜之玊環壬巳佩之矣叔孫召壬見之而果佩之叔孫怒而殺壬壬兄曰丙竪牛又妬而欲殺之叔孫為丙鑄鐘鐘成丙不敢擊使竪牛請之叔孫竪牛不為請又欺之曰吾已為爾請之矣使爾撃之丙因擊之叔孫聞之曰丙不請而擅擊鐘怒而逐之丙出走齊居一年竪牛為謝叔孫叔孫使竪牛召之又不召而報之曰吾已召之矣丙怒甚不肯来叔孫大怒使人殺之二子已死叔孫有病竪牛因獨養之而去左右不内人曰叔孫不欲聞人聲因不食而餓殺叔孫已死竪牛因不發䘮也徙其府庫重寳空之而奔齊夫聴所信之言而子父為人僇}
