  - {type: variant, offset: 30, length: 0, content: '', WYG: 者曰竪牛亦擅用叔孫之令叔孫有子曰壬竪牛妬而欲殺之因與壬㳺於魯君所魯君賜之玊環壬拜受之而不敢佩使竪牛請之叔孫竪牛欺之曰吾已為爾請之矣使爾佩之壬因佩之竪牛因謂叔孫何不見壬於君乎叔孫曰}
  - {type: variant, offset: 30, length: 0, content: '', krp: 者曰竪牛亦擅用叔孫之令叔孫有子曰壬竪牛妬而欲殺之因與壬㳺於魯君所魯君賜之玊環壬拜受之而不敢佩使竪牛請之叔孫竪牛欺之曰吾已為爾請之矣使爾佩之壬因佩之竪牛因謂叔孫何不見壬於君乎叔孫曰}
