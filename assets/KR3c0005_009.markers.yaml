  - {type: variant, offset: 26, length: 0, content: '', WYG: 莫三人而迷今魯國之羣臣以千百數一言於季氏之私人數非不衆所言者一人也安得三哉齊人有謂齊王曰河伯大神也王何不試與之遇乎臣請使王遇之為壇場大水之上而與王立之焉有間大魚動因曰此河伯直信一人言故有斯弊張儀欲以秦韓與魏之勢伐齊荆而惠施欲以齊荆偃兵以齊荆為援則秦韓不敢加兵故兵可偃也二人爭之羣臣左右皆為張子言而以攻齊荆為利而莫爲惠子言王果聴張子而以惠子言爲不可攻齊荆事已定惠子入見王言曰先生毋言矣攻齊荆之事果利矣一國盡以爲然惠子因說不可不察也夫齊荆之事也誠利一國盡以爲利是何智者之衆也攻齊荆之事誠不利一國盡以爲利何愚者之衆也凡謀者疑也有疑然後謀疑也者誠疑以爲可者半以爲不可者半若誠有疑則半可半不可今一國盡以爲可是王亡半也無致疑之人故亡其半劫主者固亡其半者也無人致疑則大盗得恣其謀田成趙髙成其簒殺者無人疑故也叔孫相魯}
