  - {type: 'tls:seg', offset: 4, content: '', id: KR3c0005_tls_009-1a.3}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 歸恩厚也故越王焚宫室焚其室者欲行賞罰於救火以驗人之用命而呉起倚車轅賞移轅者欲示其信而不欺也李悝斷訟以射欲人之善射故其斷訟與善射者理也宋崇門以毁死崇門之人居喪而瘠君與之官故多毁死者也勾踐知之故式怒鼃勾踐知勸賞可以招人故式怒鼃以求勇昭侯知之故藏敝袴厚賞之使人為賁諸也婦人之拾蠶漁者之握鱣是以效之拾蠶握鱣而不懼利在故也此得利忘難之效也賞譽三一聽則愚智不分直聴一理不反覆叅之則愚智不分責下則人臣不叅下之材能一一責之則人臣不得叅襍其說在索鄭魏王以鄭本梁地故索鄭而合之不思梁本鄭地鄭人亦索梁而合之此一聴之過也與吹竽混商吹竽是不責下也故令得叅襍其患在申子之以趙紹韓沓為嘗試申子為請兵先令趙紹韓沓嘗韓君知其意然後說終成其私也故公子汜議割河東韓王欲河東以搆三國此非計也公子汜激君行令而應侯謀㢮上黨應侯謀上黨亦非計也秦王從之此上二事皆一聴之患也一聽四數見久待而不任姦則鹿散謂人數見於君或復乆待雖不任用外人則謂此得主之意終不敢為姦如鹿之散使人問他則不鬻私謂使此雖知其}
