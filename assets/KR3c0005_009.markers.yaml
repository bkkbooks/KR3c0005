  - {type: variant, offset: 37, length: 0, content: '', krp: 不參之患也江乞為魏王使荆謂荆王曰臣入王之境内聞王之國俗曰君子不蔽人之美不言人之惡誠有之乎王曰有之然則若白公之亂得無危乎不言人惡則白公得成其姦謀故危也誠得如此臣免死罪矣有惡不言何罪之有衛嗣君重如耳愛世姬而恐其皆因其愛重以壅己也乃貴薄疑以敵之如耳尊魏姬以耦世姬曰以是相參也嗣君知欲無壅而未得其術也夫不使賤議貴賤不得與貴議也下必坐上下得罪必坐於與上議也而必待勢重之鈞也而後敢相議今兩受勢重旣鈞正可相與議則是益樹壅塞之臣也兩受其謀為壅更甚此嗣君不得術嗣君之壅乃始夫矢來有鄉鄉方也有來從之方則積鐡以備一鄉謂聚鐡於身以備一處即甲之不全者也矢來無鄉則爲鐡室以盡僃之謂甲之全者自首至足無不有鐡故曰鐡室僃之則體不傷故彼以盡僃之不傷此以盡敵之無姦也言君亦當盡敵於臣皆所以防疑則姦絶也龎恭與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎曰不信二人言市有虎王信之乎曰不信三人言市有虎王信之乎王曰寡人信之龎恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也逺於市議臣者過於三人願王察之龎恭從邯鄲反竟不得見二董閼于為趙上地守行石邑山中澗深峭如牆深百仞因問其㫄鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘嘗有入此者乎對曰無有董閼于喟然太息曰吾能治矣使吾治之無赦猶入澗之必死也則人莫之敢犯也何為不治之子産相鄭病將死謂游吉曰我死後子必用鄭必以嚴莅人夫火形嚴故人鮮灼水形懦人多溺子必嚴子之刑無令溺子之懦故子産死游吉不肯嚴刑鄭少年相率為盗處於萑澤將遂以爲鄭禍游吉率車騎與戰一日一夜僅能尅之游吉喟然歎曰吾蚤行夫子之教必不悔至於此矣魯哀公問於仲尼曰春秋之記曰冬十二月霣霜不殺菽何為記此仲尼對曰此言可以殺而不殺也夫宜殺而不殺桃李冬實天失道草木猶犯干之而况於人君乎人君失道人臣凌之者宜殷之法刑弃灰於街者子貢以為重問之仲尼仲尼曰知治之道也夫弃灰於街必掩人灰塵播揚善掩翳人也掩人人必怒怒則鬬鬬必三族相殘也因鬬相殘傷此殘三族之道也雖刑之可也且夫重罰者人之所惡也而無弃灰人之所易也使人行之所易而無離所惡此治之道一曰殷之法弃灰于公道者斷其手子貢曰弃灰之罪輕斷手之罰重古人何太毅也毅酷也曰無弃灰所易也斷手所惡也行所易不關所惡古人以為易故行之中山之相樂池以車百乘使趙選其客之有智能者以為將行將主行道之人以為行位中道而亂樂池曰吾以公為有智而使公為將行今中道而亂何也客因辭而去曰公不知治有威足以服人而利足以勸人故能治之今臣君之少客也言在客之少也夫從少正長從賤治貴而不得操其利害之柄以制之此所以亂也嘗試使臣彼之善者我能以為卿相彼不善者我能以斬其首何故而不治公孫鞅之法也重輕罪重罪者人之所難犯也而小過者人之所易去也使人去其所易無離其所難此治之道夫小過不生大罪不至是人無罪而亂不生也今重罪輕輕罪避故能無罪而不生亂也一曰公孫鞅曰行刑重其輕者輕者不至重者不来不犯輕自然無重罪也是謂以刑去刑也以輕刑去重刑荆南之地麗水之中生金人多竊采金采金之禁得而輒辜磔於市甚衆壅離其水也又設防禁遮擁令又離其水也而人竊金不止夫罪莫重辜磔於市猶不止者不必得也言犯罪者不必一一皆得而有免脫者則人幸其免脫而輕犯重罪故今有於此曰予汝天下而殺汝身庸人不為也夫有天下大利也猶不為者知必死故不必得也則雖辜磔竊金不止知必死則天下不為也魯人燒積澤天北風火南倚火勢南靡故曰倚也恐燒國哀公懼自將衆趣救火者左右無人盡逐獸而火不救乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火之所以無救也哀公曰善仲尼曰事急不及以賞救火者盡賞之則國不足以賞於人請徒行罰哀公曰善於是仲尼乃下令曰不救火者此降北之罪逐獸者比入禁之罪令未下遍而火已救矣成驩謂齊王曰王太仁太不忍人王曰太仁太不忍人非善名邪對曰此人臣之善也非}
