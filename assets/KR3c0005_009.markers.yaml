  - {type: variant, offset: 2, length: 3, content: 第九凡, WYG: 情可得而盡此七者主之所用也觀聴不叅則誠不聞不叅謂偏聴一人則誠者莫告聴有門户則臣壅塞各聴其所從若門户然則為臣所塞其說在侏儒之夢見竈侏儒夢竈言竈有一人煬則後人不見此譏靈公偏聴子瑕哀公之稱莫衆而迷公言謀事無衆故迷孔子對舉國盡黨季孫與之同亂是一國為一人公之迷宜矣故齊人見河伯齊王專信一人故被誑以大魚為河伯與惠子之言亡其半也惠子言君之謀事有半疑有半今皆稱不疑則雷同朋黨故曰亡其半此上五說皆不叅門户之聴其患在竪牛之餓叔孫叔孫專聴竪牛故身餓死而二子戮亡也而江乞之說荆俗也荆俗不言人惡故白公得以為亂嗣公欲治不知謂不知治之術也故使有敵恐其所貴臣妾擁已故更貴臣妾以敵之彼得敵適足以成其朋黨為擁更甚也是以明主推積鐡之類積鐡為室盡以僃矢則體不傷積疑為心盡以僃臣則姦不生而察一市之患雖一市之人言市有虎猶未可信况三人乎叅觀一愛多者則法不立威寡者則下侵上是以刑罰不必則禁令不行其說在董子之行石邑董子至石邑象深澗以立法故趙國治也與子産之教㳺吉也子産教游吉令法吏以嚴斷故仲尼說隕霜仲尼對哀公言隕霜不榖草則以宜殺而不殺故也而殷法刑棄灰將行去樂池將行以樂池不專任以刑賞之柄故去之而公孫鞅重輕罪公孫鞅以謂輕罪尚不能犯則無由犯重罪故先重輕罪是以麗水之金不守竊麗水之金其罪辜磔猶竊而不止則有竊而獲免者故雖重罪不止也而積澤之火不救魯之積澤火焚而人不救則以不行法故也成歡以太仁弱齊國成歡以齊王太仁知其必弱齊國卜皮以慈惠亡魏王卜皮以魏王慈惠知其必亡其身也管仲知之故斷死人知冶國常嚴禁人之厚𦵏不用命者戮其尸嗣公知之故買胥靡嗣公亦知國當必罰有胥靡逃之以一都買而誅之必罰二賞譽薄而謾者下不用謾欺也賞譽厚而信者下輕死其說在文子稱若獸鹿獸鹿唯就薦草猶}
