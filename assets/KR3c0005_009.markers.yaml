  - {type: variant, offset: 13, length: 0, content: '', WYG: 更使視輼車周主亡玊簮周主故亡玊簮以求神明之譽也商太宰論牛矢太宰詭論牛矢以求聴察之名也詭使五挾知而問則不智者至挾己所智而}
  - {type: variant, offset: 13, length: 0, content: '', krp: 更使視輼車周主亡玊簮周主故亡玊簮以求神明之譽也商太宰論牛矢太宰詭論牛矢以求聴察之名也詭使五挾知而問則不智者至挾己所智而}
  - {type: variant, offset: 14, length: 2, content: 八術, WYG: 所問則雖不知者莫不皆知也深知一物衆隠皆變於一物知之能深則衆隠伏之物莫不變而露見其說在昭侯之握一爪也握爪佯亡以驗左右之誠故必審南門而三鄉得必審南門之牛犯苖而二鄉之犯者皆得其情實周主索曲杖而羣臣懼私得曲杖羣臣聳懼卜皮事庶子使庶子愛御吏便得彼隂懼也西門豹詳遺轄謀遺其轄欲取清明之稱也挾智六倒言反事以甞所疑則姦情得倒錯其言反為其事以試其所疑也故陽山謾樛竪偽謾樛竪知君疑也淖齒為秦使詐為秦使知君惡己齊人欲為亂佯逐所愛令君知而不疑子之以白馬謬言白馬以驗左右之誠子産離訟者分離訟者便得兩訟之情嗣公過闗市知過者之輸金便得聴察之稱倒言七右經一衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢賤矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈對曰夫日兼燭天下一物不能當也言一物不能蔽日之光也人君兼燭一國人一人不能擁也一人不能擁君之明故將見人主者夢見日夫竈一人煬焉則後人無從見矣一人煬則蔽竈之光故後人不見之煬然也今或者一人有煬君者乎此譏彌子瑕專擁蔽君之明乎則臣雖夢見竈不亦可乎魯哀公問於孔子曰鄙諺曰莫衆而迷舉事不與衆謀者必迷惑今寡人舉事與羣臣慮之而國愈亂其故何也孔子對曰明主之問臣一人知之一人不知也一人知之一人不知則得再三詳議如是者明主在上羣臣直議於下今羣臣無不一辭同軌乎季孫者舉魯國盡化為一舉國既化為一則安得論其是非也君雖問境内之人猶不免於亂也境内之人亦與季孫為一故問之無益}
