  - {type: variant, offset: 3111, length: 263, content: 事馬於戰鬭逐北而民不以馬遠淫通物所積力唯田疇積力於田疇必且糞灌故曰天下有道卻走馬以糞也人君無道則內暴虐其民而外侵欺其鄰國內暴虐則民產絕外侵欺則兵數起民產絕則畜生少兵數起則士卒盡畜生少則戎馬乏士卒盡則軍危殆戎馬乏則牸馬出軍危殆則近臣役馬者軍之大用郊者言其近也今所以給軍之具於牸馬近臣故曰天下無道戎馬生於郊矣人有欲則計會亂計會亂而有欲甚有欲甚則邪心勝邪心勝則事經絕事經絕則禍難生由是觀之禍難生於邪心邪心誘於可欲可欲之類進則教良民為姦退則令善人有禍姦起則上侵弱君禍至則民人多傷然則可欲之類上侵弱君而下傷人民夫上侵弱君而下傷人民者大罪, WYG: 肖論賢}
