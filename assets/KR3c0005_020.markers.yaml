  - {type: variant, offset: 3441, length: 0, content: '', krp: 死亡之患者主不察賢智之言而蔽於愚不肖之患也今人主非肯用法術之士聴愚不肖之臣則賢智之士孰敢當三子之危而進其智能者乎此世之所以亂也飭令第五十三飭令則法不遷法平則吏無姦法已定矣不以善言售法任功則民少言任善則民多言行法曲斷以五里斷者王能參驗五里然後斷定其罪如此者王也以九里斷者既王且彊宿治者削宿置也若委置其法則必削以刑治以賞戰厚禄以用術國無姦民則都無姦市物多末衆農㢮姦勝則國必削民有餘食使以粟出爵必以其力則震不怠三寸之管毋當不可滿也雖受不多然當無則不可滿也授官爵出利禄不以功是無當也國以功授官與爵此謂以成智謀以威勇戰其國無敵國以功授官與爵則治見者省言有塞此謂以治去治以言去言以功與爵者也故國多力而天下莫之能侵也兵出必取取必能有之按兵不攻必當朝廷之事小者不毁效功取官爵廷雖有辟言不得以相干也是謂以數治以力攻者出一取十以言攻者出十䘮百國好力此謂以難攻國好言此謂以易攻其能勝其害輕其任而道壞餘力於心莫負乘宮之責於君内無伏怨使明者不相干故莫訟使士不兼官故技長使人不同功故莫爭言此謂易攻重刑少賞上愛民民死賞多賞輕刑上不愛民民不死賞利出一空者其國無敵利出二空者其兵半用利出十空者民不守重刑明民大制使人則上利行刑重其輕者輕者不至重者不來此謂以刑去刑罪重而刑輕刑輕則事生此謂以刑致刑其國必削心度第五十四聖人之治民度於本不從其}
