  - {type: variant, offset: 5632, length: 229, content: 孫者體此道以守宗廟宗廟不滅之謂祭祀不絕身以積精為德家以資財為德鄉國天下皆以民為德今治身而外物不能亂其精神故曰脩之身其德乃真真者慎之固也治家無用之物不能動其計則資有餘故曰脩之家其德有餘治鄉者行此節則家之有餘者益眾故曰脩之鄉其德乃長治邦者行此節則鄉之有德者益眾故曰脩之邦其德乃豐莅天下者行此節則民之生莫不受其澤故曰脩之天下其德乃普脩身者以此別君子小人治鄉治邦莅天下者各以此科適觀息耗則萬不失一故曰以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾奚以知天下之然也以此, WYG: 卷二十}
