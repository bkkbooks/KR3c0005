  - {type: variant, offset: 3081, length: 0, content: '', WYG: 能任重引車致逺道者以筋力也萬乘之主千乘之君所以制天下而征諸侯者以其威勢也威勢者人主之筋力也今}
  - {type: variant, offset: 3081, length: 0, content: '', krp: 能任重引車致逺道者以筋力也萬乘之主千乘之君所以制天下而征諸侯者以其威勢也威勢者人主之筋力也今}
  - {type: variant, offset: 3082, length: 0, content: '', WYG: 臣得威左右擅勢是人主失力人主失力而能有國者千無一人虎豹之所以能勝人執百獸者以其爪牙也而使虎豹失其爪牙則人必制之矣今勢重者人主之爪牙也君人而失其爪牙虎豹之類也宋君失其爪牙於子罕簡公失其爪牙於田常而不蚤奪之故身死國亡今無術之主皆明知宋簡之􅂈也而不悟其失不察其事類者也且法術之士與當途之臣不相容也何以明之主有術士則大臣不得制斷近習不敢賣重大臣左右權勢息則人主之道眀矣今則不然其當途之臣得勢擅事以環其私左右近習朋黨比周以制䟽逺則法術之士奚時得進用人主奚時得論裁故有術不必用而勢不兩立法術之士焉得無危故君人者非能退大臣之議而背左右之訟獨合乎道言也則法術之士安能䝉死亡之危而進説乎此世之所以不治也明王者推功而爵禄稱能而官事所舉者必有賢所}
