  - {type: variant, offset: 761, length: 758, content: 為禮者事通人之樸心者也眾人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能毋爭乎有爭則亂故曰夫禮者忠信之薄也而亂之首乎先物行先理動之謂前識前識者無緣而忘意度也何以論之詹何坐弟子侍牛鳴於門外弟子曰是黑牛也而白題詹何曰然是黑牛也而白在其角使人視之果黑牛而以布裹其角以詹子之術嬰眾人之心華焉殆矣故曰道之華也嘗試釋詹子之察而使五尺之愚童子視之亦知其黑牛而以布裹其角也故以詹子之察苦心傷神而後與五尺之愚童子同功是以曰愚之首也故曰前識者道之華也而愚之首也所謂大丈夫者謂其智之大也所謂處其厚不處其薄者行情實而去禮貌也所謂處其實不處其華者必緣理不徑絕也所謂去彼取此者去貌徑絕而取緣理好情實也故曰去彼取此人有禍則心畏恐心畏恐則行端直行端直則思慮熟思慮熟則得事理行端直則無禍害無禍害則盡天年得事理則必成功盡天年則全而壽必成功則富與貴全壽富貴之謂福而福本於有禍故曰禍兮福之所倚以成其功也人有福則富貴至富貴至則衣食美衣食美則驕心生驕心生則行邪僻而動棄理行邪僻則身死夭動棄理則無成功夫內有死夭之難而外無成功之名者大禍也而禍本生於有福故曰福兮禍之所伏夫緣道理以從事者無不能成無不能成者大能成天子之勢尊而小易得卿相將軍之賞祿夫棄道理而妄舉動者雖上有天子諸侯之勢尊而下有猗頓陶朱卜祝之富猶失其民人而亡其財資也眾人之輕棄道理而易妄舉動者不知其禍福之深大而道闊遠若是也故諭人曰孰知其極人莫不欲富貴全壽而未有能免於貧賤死夭之禍也必欲富貴全壽而今貧賤死夭是不能至於其所欲至也凡失其所欲之路而妄行者之謂迷迷則不能至於其所欲至矣今眾人之不能至於其所欲至故曰迷眾人之所不能至於其所欲至也自天地之剖判以至于今故曰人之迷也其日故以久矣所謂方者內外相應也言行相稱也所謂廉者必生死之命也輕恬資財也所謂直者義必公正公心不偏黨也所謂光者官爵尊貴衣裘壯麗也今, WYG: ''}
