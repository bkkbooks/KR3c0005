  - {type: variant, offset: 3702, length: 342, content: 化不得不化故無常操無常操是以死生氣稟焉萬智斟酌焉萬事廢興焉天得之以高地得之以藏維斗得之以成其威日月得之以恆其光五常得之以常其位列星得之以端其行四時得之以御其變氣軒轅得之以擅四方赤松得之與天地統聖人得之以成文章道與堯舜俱智與接輿俱狂與桀紂俱滅與湯武俱昌以為近乎遊於四極以為遠乎常在吾側以為暗乎其光昭昭以為明乎其物冥冥而功成天地和化雷霆宇內之物恃之以成凡道之情不制不形柔弱隨時與理相應萬物得之以死得之以生萬事得之以敗得之以成道譬諸若水溺者多飲之即死渴者適飲之即生譬之若劍戟愚人以行忿則禍生聖人以誅暴則福成故得之以死得之以生得之以敗得之以成人希見生象也而得死象之骨案其圖以想其生也故諸人之所以意想者皆謂之象也今道雖不可得聞見聖人執其見功以處見其形故曰無狀之狀無物之象凡理者方圓短長麤靡堅脆之, WYG: ''}
