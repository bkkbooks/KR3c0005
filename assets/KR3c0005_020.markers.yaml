  - {type: variant, offset: 2437, length: 483, content: 曼根者木之所以持生也德也者人之所以建生也祿也者人之所以持生也今建於理者其持祿也久故曰深其根體其道者其生日長故曰固其柢柢固則生長根深則視久故曰深其根固其柢長生久視之道也工人數變業則失其功作者數搖徙則亡其功一人之作日亡半日十日則亡五人之功矣萬人之作日亡半日十日則亡五萬人之功矣然則數變業者其人彌眾其虧彌大矣凡法令更則利害易利害易則民務變務變之謂變業故以理觀之事大眾而數搖之則少成功藏大器而數徙之則多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴靜不重變法故曰治大國者若烹小鮮人處疾則貴醫有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫內無痤疽癉痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道莅天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不神也其神不傷人也鬼祟也疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民民不犯法則上亦不行刑上不行刑之謂上不傷人故曰聖人亦不傷民上不與民相害而人不與鬼相傷故曰兩不相傷民不敢犯法則上內不用刑罰而外不事利其產業上內不用刑罰而外不事利其產業則民蕃息民蕃息而畜積盛民蕃息而畜積盛之謂有德凡, WYG: ''}
