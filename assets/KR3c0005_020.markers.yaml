  - {type: variant, offset: 536, length: 222, content: 有積而積有功德者道之功功有實而實有光仁者德之光光有澤而澤有事義者仁之事也事有禮而禮有文禮者義之文也故曰失道而後失德失德而後失仁失仁而後失義失義而後失禮禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黃其質至美物不足以飾之夫物之待飾而後行者其質不美也是以父子之間其禮樸而不明故曰禮薄也凡物不並盛陰陽是也理相奪予威德是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰, WYG: ''}
