  - {type: variant, offset: 321, length: 213, content: 交友朋之相助也宜親者內而踈者外宜義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以貌情也群義之文章也君臣父子之交也貴賤賢不肖之所以別也中心懷而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外飾之所以諭內也故曰禮以貌情也凡人之為外物動也不知其為身之禮也眾人之為禮也以尊他人也故時勸時衰君子之為禮以為其身以為其身故神之為上禮上禮神而眾人貳故不能相應不能相應故曰上禮為之而莫之應眾人雖貳聖人之復恭敬盡手足之禮也不衰故曰攘臂而仍, WYG: 孝悌忠順}
