  - {type: variant, offset: 5440, length: 191, content: 者五聲之長者也故竽先則鍾瑟皆隨竽唱則諸樂皆和今大姦作則俗之民唱俗之民唱則小盜必和故服文采帶利劍厭飲食而貨資有餘者是之謂盜竽矣人無愚智莫不有趨舍恬淡平安莫不知禍福之所由來得於好惡怵於淫物而後變亂所以然者引於外物亂於玩好也恬淡有趨舍之義平安知禍福之計而今也玩好變之外物引之引之而往故曰校至聖人不然一建其趨舍雖見所好之物不能引不能引之謂不校一於其情雖有可欲之類神不為動神不為動之謂不悅為人, WYG: 韓非}
