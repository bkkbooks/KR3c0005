  - {type: variant, offset: 16, length: 1, content: 順, WYG: 之不聽也出因更其族為輔氏至於期日之夜趙氏殺其守隄之吏而决其水灌知伯軍知伯軍救水而亂韓魏翼而擊之襄子将卒犯其前大敗知伯之軍而擒知伯知伯身死軍破國分為三為天下笑故曰貪愎好利則滅國殺身之本也奚謂耽於女樂昔者戎王使由余聘於秦穆公問之曰寡人嘗聞道而未得目見之也願聞古之明主得國失國何常以由余對曰臣嘗得聞之矣常以儉得之以奢失之穆公曰寡人不辱而問道於子子以儉對寡人何也由余對曰臣聞昔者堯有天下飯於土簋飲於土鉶其地南至交趾北至幽都東西至日月之所出入者莫不賔服堯禪天下虞舜受之作為食器斬山木而財之削鋸修之迹磨其斧迹流漆墨其上流布也輸之於宫以為食器諸侯以為益侈國之不服者十三舜禪天下而傳之於禹禹作為祭器墨染其外而朱畫其内縵帛為茵蔣席蔣草名額縁觴酌有采而樽爼有飾此彌侈矣而國之不服者三十三夏后氏沒殷人受之作為大路而建九旒食器雕琢觴酌刻鏤四壁堊墀茵席雕文此彌侈矣而國之不服者五十三君子皆知文章矣而欲服者彌少臣故曰儉其道也由余出公乃召内史廖而告之曰寡人聞鄰國有聖人敵國之憂也今由余聖人也寡人患之吾将奈何内史廖曰臣聞戎王之居僻陋而道逺未聞中國之聲君其遺之女樂以亂其政而後為由余請期以疏其諫彼君臣有間而後可圖也君曰諾乃使史廖以女樂二八遺戎王因為由余請期戎王許諾見其女樂而說之設酒張飲日以聽樂終嵗不遷牛馬半死由余歸因諫戎王戎王弗聼由余遂去之秦秦穆公迎而拜之上卿問其兵勢與其地形既以得之舉兵而伐之兼國十二開地干里故曰耽於女樂不顧國政亡國之禍也奚謂離内逺遊昔者田成子遊於海而樂之號令諸大夫曰言歸者死顔涿聚曰君遊海而樂之奈臣有圖國者何君雖樂之将安得田成子曰寡人布令曰言歸者死今子犯寡人之令援戈將擊之顔涿聚曰昔桀殺闗龍逢而紂殺王子}
