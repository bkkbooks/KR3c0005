  - {type: variant, offset: 208, length: 5, content: 故度量雖正, WYG: 奚謂國小無禮昔者晉公子重耳出亡過於曹曹君袒裼而觀之釐負羈與叔瞻侍於前叔瞻謂曹君曰臣觀晉公子非常人也君遇之無禮彼若有時反國而起兵即恐為曹傷君不如殺之曹君弗聼釐負羈歸而不樂其妻問之曰公從外來而有不樂之色何也負羈曰吾聞之有福不及禍來連我君有福}
