  - {type: variant, offset: 223, length: 0, content: '', WYG: 誅無禮則曹其首也子奚不先自貳焉負羈曰諾盛黄金於壺充之以餐加壁其上夜令人遺公子公子見使者再拜受其餐而辭其璧公子自曹入楚自楚入秦入秦三年秦穆公召羣臣而謀曰昔者晉獻公與寡人交諸侯莫弗聞獻公不幸離羣臣出入十年矣其嗣子不善吾恐此將令其宗廟不祓除而社稷不血食也如是弗定則非與人交之道吾欲輔重耳而入之晉何如羣臣皆曰善公因起卒革車五百乘疇騎二千疇等也言馬齊等皆精妙也歩卒五萬輔重耳入之于晉立為晉君重耳即位三年舉兵而伐曹矣因令人告曹君曰懸叔瞻而出之我且殺而以為大戮又令人告釐負羈曰軍旅薄城吾知子不違也知不敢違君言非本心也其表子之閭寡人将以為令令軍勿敢犯曹人聞之率其親戚而保釐負羈之閭者七百餘家此禮之所}
