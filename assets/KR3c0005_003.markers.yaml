  - {type: variant, offset: 60, length: 136, content: 為虛而無用總微說約徑省而不飾則見以為劌而不辯激急親近探知人情則見以為譖而不讓閎大廣博妙遠不測則見以為夸而無用家計小談以具數言則見以為陋言而近世辭不悖逆則見以為貪生而諛上言而遠俗詭躁人間則見以為誕捷敏辯給繁於文采則見以為史殊釋文學以質性言則見以為鄙時稱詩書道法往古則見以為誦, WYG: 南鄉楚}
