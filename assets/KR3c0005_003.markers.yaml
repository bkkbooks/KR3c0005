  - {type: variant, offset: 26, length: 1, content: 見, krp: 竪刁何如管仲曰不可夫人之情莫不愛其身公妬而好内竪刁自獖虧勢也}
  - {type: variant, offset: 29, length: 1, content: 華, WYG: 治内其身不愛又安能愛君曰然則公子開方何如管仲曰不可齊衛之間不過十日之行開方為事君欲適君之故十五年不歸見其父母此非人情也其父母之不親也又能親君乎公曰然則易牙何如管仲曰不可夫易牙為君主味君之所未嘗食唯人肉耳易牙蒸其首子而進之君所知也人之情莫不愛其子今蒸其子以為膳於君其子弗愛又安能愛君乎公曰然則孰可管仲曰隰朋可其為人也堅中而亷外少欲而多信夫堅中則足以為表亷外則可以大任少欲則能臨其衆多信則能親鄰國此霸者之佐也君其用之君曰諾居一年餘管仲死君遂不用隰朋而與竪刁刁蒞事三年桓公南遊堂阜竪刁率易牙衛公子開方及大臣為亂桓公渇餒而死南門之寢公守之室身死三月不收蟲出于户故桓公之兵横行天下為五伯長卒見弑於其臣而滅髙名為天下笑者何也不用管仲之過也故曰過}
