  - {type: variant, offset: 18, length: 6, content: 滑澤洋洋纚纚, WYG: 干今君雖殺臣之身以三之可也臣言為國非為身也延頸而前曰君擊之矣君乃釋戈趣駕而歸至三日而聞國人有謀不内田子成者矣田子成所以遂有齊國者顔涿聚之力也故曰離内逺遊則危身之道也奚謂過而不聽於忠臣昔者齊桓公九合諸侯一匡天下為五伯長管仲佐之管仲老不能用事休居於家桓公從而問之曰仲父家居有病即不幸而不起此病政安遷之管仲曰臣老矣不可問也雖然臣聞之知臣莫若君知子莫若父君其試以心决之君曰鮑叔牙何如管仲曰不可鮑叔牙為人剛愎而上悍剛則犯民以暴愎則不得民心悍則下不為用其心不懼非霸者之佐也公曰}
