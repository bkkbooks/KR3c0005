  - {type: variant, offset: 6, length: 0, content: '', krp: 酒也子反受而飲之子反之為人也嗜酒而甘之弗能絶於口而醉戰既罷共王欲復戰令人召司馬子反司馬子反辭以心疾共王駕而自往入其幄中聞酒臭而還曰今日之戰不穀親傷所恃者司馬也而司馬又醉如此是亡楚國之社稷而不恤吾衆也不穀無復戰矣於是還師而去斬司馬子反以為大戮故竪穀陽之進酒不以讎子反也其心忠愛之而適足以殺之故曰行小忠則大忠之賊也奚謂顧小利昔者晉獻公欲假道於虞以伐虢荀息曰君其以垂棘之璧與屈産之乘賂虞公求假道焉必假我道君曰垂棘之璧吾先君之寳也屈産之乘寡人之駿馬也若受吾幣不假之道将奈何荀息曰彼不假我道必不敢受我幣若受我幣而假我道則是寳猶取之内府而藏之外府也馬猶取之内廐而著之外廐也君勿憂君曰諾乃使荀息以垂棘之璧與屈産之乘賂虞公而求假道焉虞公貪利其璧與馬而欲許之宫之竒諫曰不可許夫虞之有虢也如車之有輔輔依車車亦依輔虞虢之勢正是也若假之道則虢朝亡而虞夕從之矣不可願勿許虞公弗聴遂假之道荀息伐虢而還反處三年興兵伐虞又尅之荀息牽馬操璧而報獻公獻公說曰璧則猶是也雖然馬齒亦益長矣故虞公之兵殆而地削者何也愛小利而不慮其害故曰顧小利則大利之殘也奚謂行僻昔者楚靈王為申之命宋太子後至執而囚之狎徐君輕侮之也拘齊慶封中射士中射士官有上中下諫曰合諸矦不可無禮此存亡之機也昔者桀為有戎之㑹而有緡叛之紂為黎丘之蒐而戎狄叛之有戎有緡皆國名由無禮也君其圖之君不聽遂行其意居未期年靈王南遊羣臣從而刼之靈王餓而死乾溪之上故曰行僻自用無禮諸侯則亡身之至也奚謂好音昔者衛靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼔新聲者而說之使人問左右盡報弗聞乃召師㳙而告之曰有鼓新聲者使人問左右盡報弗聞其状似鬼神子為聼而寫之師㳙曰諾因静坐撫琴而寫之師㳙明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日而習之遂去之晉晉平公觴之於施夷之臺酒酣靈公起公曰有新聲願請以試平公曰善乃召師㳙令坐師曠之旁援琴撫之未終師曠撫止之曰此亡國之聲不可遂也平公曰此道奚出師曠曰此師延之所作與紂為靡靡之樂也及武王伐紂師延東走至於濮水而自投故聞此聲者必於濮水之上先聞此聲者其國必削不可遂平公曰寡人所好者音也子其使遂之師㳙鼓究之平公問師曠曰此所謂何聲也師曠曰此所謂清商也公曰清商固最悲乎師曠曰不如清徵公曰清徵可得而聞乎師曠曰不可古之聼清徵者皆有徳義之君也今吾君徳薄不足以聼平公曰寡人之所好者音也願試聼之師曠不得已援琴而鼓一奏之有𤣥鶴二八道道從也南方來集於郎門之垝棟端也再奏之而列三奏之延頸而鳴舒翼而舞音中宫商之聲聲聞于天平公大說坐者皆喜平公提觴而起為師曠壽反而問曰音莫悲於清徵乎師曠曰不如清角平公曰清角可得而聞乎師曠曰不可昔者黄帝合鬼神於泰山之上駕象車而六蛟龍畢方神名也竝鎋蒲末切蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後騰蛇伏地鳳皇覆上大合鬼神作為清角今主君徳薄不足聼之聼之將恐有敗平公曰寡人老矣所好者音也願遂聼之師曠不得已而鼓之一奏而有𤣥雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆隳廊瓦坐者散走平公恐懼伏于廊室之間晉國大旱赤地三年平公之身遂瘙病故曰不務聼治而好五音不已則窮身之事也奚謂貪愎昔者智伯瑶知伯名率趙韓魏而伐范中行滅之反歸休兵數年因令人請地於韓韓康子欲勿與段規諫曰不可不與也夫知伯之為人也好利而鷙愎彼來請地而弗與則移兵於韓必矣君其與之與之彼狃狃習也得地於韓將生心他求也又將請地他國他國且有不聽不聽則知伯必加之兵如是韓可以免於患而待其事之變康子曰諾因令使者致萬家之縣一於知伯知伯說又令人請地於魏宣子欲勿與趙葭諫曰彼請地於韓韓與之今請地於魏魏弗與則是魏内自强而外怒知伯也如弗予其措兵於魏必矣不如予之宣子諾因令人致萬家之縣一於知伯知伯又令人之趙請蔡臯狼之地邑名趙襄子弗與知伯因隂約韓魏將以伐趙襄子召張孟談而告之曰夫知伯之為人也陽親而隂疏三使韓魏而寡人不與焉三使隂以相約知有異志也其措兵於寡人必矣今吾安居而可張孟談曰夫董閼于簡主之才臣也其治晉陽而尹鐸循之尹鐸安于之屬大夫其餘教猶存君其定居晉陽而已矣君曰諾乃召延陵生令將軍車騎先至晉陽君因從之君至而行其城郭及五官之藏城郭不治倉無積粟府無儲錢庫無甲兵邑無守具襄子懼乃召張孟談曰寡人行城郭及五官之藏皆不備具吾將何以應敵張孟談曰臣聞聖人之治藏於臣不藏於府庫務修其教不治城郭君其出令令民自遺三年之食有餘粟者入之倉遺三年之用有餘錢者入之府遺有竒人者使治城郭之繕竒餘也謂閒人奇音覊君夕出令明日倉不容粟府無積錢庫不受甲兵居五日而城郭已治守備已具君召張孟談而問之曰吾城郭已治守備已具錢粟已足甲兵有餘吾奈無箭何張孟談曰臣聞董子之治晉陽也公宫之垣皆以荻蒿楛楚墻之有楛髙至于丈君發而用之於是發而試之其堅則雖菌簵之勁弗能過也君曰吾箭已足矣奈無金何張孟談曰臣聞董子治晉陽也公宫令舍之堂皆以鍊銅為柱質君發而用之於是發而用之有餘金矣號令已定守備已具三國之兵果至至則乘晉陽之城遂戰三月弗能㧞因舒軍而圍之决晉陽之水以灌之圍晉陽三年城中巢居而處懸釡而炊財食将盡士大夫羸病襄子謂張孟談曰糧食匱財力盡士大夫羸病吾恐不能守矣欲以城下何國之可下張孟談曰臣聞之亡弗能存危弗能安則無為貴智矣君失此計者臣請試潜行而出見韓魏之君張孟談見韓魏之君曰臣聞脣亡齒寒今知伯率二君而伐趙趙将亡矣趙亡則二君為之次二君曰我知其然也雖然知伯之為人也麤中而少親我謀而覺則其禍必至矣為之奈何張孟談曰謀出二君之口而入臣之耳人莫之知也二君因與張孟談約三軍之反與之期日夜遣孟談入晉陽以報二君之反於襄子襄子迎孟談而再拜之且恐且喜二君以約遣張孟談因朝知伯而出遇智過於轅門之外智過怪其色因入見知伯曰二君貎將有變君曰何如其行矜而意髙}
