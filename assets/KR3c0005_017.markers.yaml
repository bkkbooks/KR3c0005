  - {type: variant, offset: 13, length: 1, content: 信, WYG: 者也非能生功止過者也是故禁姦之法太上禁其心其次禁其言其次禁其事今世皆曰尊主安國者必以仁義智能也故有道之主逺仁義去智能服之以法是以譽廣而名威民治而國安知用民之法也凡術也者主之所以執也法也者官之所以師也然使郎中日聞道於郎門之外以至於境内日見法又非其難者也昔者有扈氏有失度讙兠氏有孤男三苖有成駒桀有侯侈紂有崇侯虎晉有優施此六}
