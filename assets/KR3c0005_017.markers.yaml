  - {type: variant, offset: 413, length: 304, content: 匠人成棺則欲人之夭死也非輿人仁而匠人賊也人不貴則輿不售人不死則棺不買情非憎人也利在人之死也故后妃夫人太子之黨成而欲君之死也君不死則勢不重情非憎君也利在君之死也故人主不可以不加心於利己死者故日月暈圍於外其賊在內備其所憎禍在所愛是故明王不舉不參之事不食非常之食遠聽而近視以審內外之失省同異之言以知朋黨之分偶參伍之驗以責陳言之實執後以應前按法以治眾眾端以參觀士無幸賞無踰行殺必當罪不赦則姦邪無所容其私徭役多則民苦民苦則權勢起權勢起則復除重復除重則貴人富苦民以富貴人起勢以藉人臣非天下長利也故曰徭役少則民安民安則下無重權下無重權則權勢滅權勢滅則德在上矣今夫水之勝火亦明矣然而釜鬵間之水煎沸竭盡其上而火得熾盛焚其下水失, WYG: ''}
