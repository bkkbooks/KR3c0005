  - {type: variant, offset: 23, length: 0, content: '', WYG: 窟穴或槁死於草木或饑餓於山谷或沉溺於水泉有民如此先古聖王皆不能臣當今之世將安用之若夫關龍逢王子比干隨季梁陳泄冶楚申胥吳子胥此六人者皆疾争強諌以勝}
  - {type: variant, offset: 23, length: 0, content: '', krp: 窟穴或槁死於草木或饑餓於山谷或沉溺於水泉有民如此先古聖王皆不能臣當今之世將安用之若夫關龍逢王子比干隨季梁陳泄冶楚申胥吳子胥此六人者皆疾争強諌以勝}
