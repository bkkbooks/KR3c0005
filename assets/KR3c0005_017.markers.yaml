  - {type: 'tls:seg', offset: 25, content: '', id: KR3c0005_tls_017-1a.7}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 言聴事行則如師徒之勢一言而不聴一事而不行則陵其主以語從之以威雖身死家破要領不屬手足異處不難為也如此臣者先古聖王皆不能忍也當今之時将安用之若夫田齊恒宋子罕魯季孫意如晉僑如衛子南勁鄭太宰欣楚白公周單茶燕子之此九人者之為其臣也皆朋黨比周以事其君隠正道而行私曲上偪君下亂治援外以撓内侵下以謀上不難為也如此臣者唯聖王智主能禁之若夫昏亂之君能見之乎若夫后稷臯陶伊尹周公旦太公望管仲隰朋百里奚蹇叔舅犯趙衰范蠡大夫種逄同華登此十五人者為其臣也皆夙興夜寐卑身賤體竦心白意明刑辟治官職以事其君進善言通道法而不敢矜其善有成功立事而不伐其勞不難破家以便國殺身以安主以其主為髙天㤗山之尊而以其身為壑谷鬴洧之卑主有明名廣譽於國而身不難受壑谷鬴洧之卑如此臣者雖當昏亂之主尚可致功况於顯明之主乎此謂霸王之佐也若夫周滑伯鄭王孫申陳公孫寕儀行父荆芊尹申亥随少師越種干吳王孫頟晉陽成泄齊竪刁易牙此十二人者之為其臣也皆思小利而忘法義進則揜蔽賢良以隂闇其主退則撓亂百官而為禍難皆輔其君共其欲苟得一說於主雖破國殺衆不難為也有臣如此雖當聖王尚恐奪之而况昏亂之君其能無失乎有臣如此者皆身死國亡為天下笑故周威公身殺國分為二鄭子陽身殺國分為三陳靈公身死於夏徴舒氏荆靈王死於乾谿之上随亡於荆吳并於越知伯滅於晉陽之下桓公身死七日不收故曰諂䛕之臣唯聖王知之而亂主近之故至身死國亡聖主明君則不然内舉不避親外舉不避讐是在焉從而舉之}
