  - {type: variant, offset: 5, length: 0, content: '', WYG: 元何犿註難勢第四十問辯第四十一問田第四十二定法第四十三說疑第四十四詭使第四十五難勢第四十慎子曰飛龍乘雲騰蛇遊霧雲罷霧霽而龍蛇與螾螘同矣則失其所乘也賢人而詘於不肖者則權輕位卑也不肖而能服於賢者則權重位尊也堯為匹夫不能治三人而桀為天子能亂天下吾以此知勢位之足恃而賢智之不足慕也夫弩弱而矢髙者激於風也身不肖而令行者得助於衆也堯教於𨽻屬而民不聴至於南靣而王天下令則行禁則止由此觀之賢智未足以服衆而勢位足以任賢者也應慎子曰飛龍乘雲騰蛇遊霧吾不以龍蛇為不託於雲霧之勢也雖然夫擇賢而専任勢足以為治乎則吾未得見也夫有雲霧之勢而能乘遊之者龍蛇之材美之也今雲盛而螾弗能乘也霧醲而螘不能遊也夫有盛雲醲霧之勢而不能乘遊者螾螘之材薄也今桀紂南靣而王天下以天子之威為之雲霧而天下不免乎大亂者桀紂之材薄也且其人以堯之勢治天下何以異桀之勢亂天下者也夫勢者非能必使賢者用己而不肖者不用己也賢者用之則天下治不肖者用之則天下亂人之情性賢者寡而不肖者衆而以威勢之利濟亂世之不肖人則是以勢亂天下多矣以勢治天下者寡矣夫勢者便治而利亂者也故周書曰毋為虎傅翼將飛入邑擇人而食之夫乘不肖人於勢是為虎傅翼也桀紂為髙䑓深池以盡民力為炮烙以傷民性桀紂得乘肆行者南靣之威為之翼也使桀紂為匹夫未始行一而身在刑戮矣勢者飬虎狼之心而成暴亂之事者也此天下之大患也勢之於治亂夲末有位也而語專言勢之足以治天下者則其智之所至者淺矣夫良馬固車使臧獲御之則為人笑王良御之而日取千里車馬非異也或至乎千里或為人笑則巧拙相去逺矣今以國位為車以勢為馬以號令為轡以刑罰為鞭筴使堯舜御之則天下治使桀紂御之則天下亂則賢不肖相去逺矣夫欲追速致逺不知任王良欲進利除害不知任賢能此則不知類之患也夫堯舜亦治民之王良也復應之曰其人以勢為足恃以治官客曰必待賢乃治則不然矣夫勢者名一而變無數者也勢必於自然則無為言於勢矣吾所為言勢者言人之所設也今曰堯舜得勢而治桀得勢而亂吾非以堯舜為不然也雖然非一人之所得設也夫堯舜生而在上位雖有十桀紂不能亂者則勢治也桀紂亦生而在上位雖有十堯舜而亦不能治者則勢亂也故曰勢治者則不可亂而勢亂者則不可治也此自然之勢也非人之所得設也若吾所言謂人之所得勢也而已矣賢何事焉何以明其然也客曰人有鬻矛與楯者譽其楯之堅物莫能陷也俄而又譽其矛曰吾矛之利物無不陷也人應之曰以子之矛陷子之楯何如其人弗能應也以為不可陷之楯與無不陷之矛為名不可兩立也夫賢之為勢不可禁而勢之為道也無不禁以不可禁之勢與無不禁之道此矛楯之説也夫賢勢之不相容亦明矣且夫堯舜桀紂千世而一出是比肩隨踵而生也世之治者不絶於中吾所以為言勢者中也中者上不及堯舜而下亦不為桀紂抱法處勢則治背法去勢則亂今廢勢背法而待堯舜堯舜至乃治是千世亂而一治也抱法處勢而待桀紂桀紂至乃亂是千世治而一亂也且夫治千而亂一與治一而亂千也是猶乘驥駬而分馳也相去亦逺矣夫弃隠括之法去度量之數使奚仲為車不能成一輪無慶賞之勸刑罰之威釋勢委法堯舜户說而人辯之不能治三家夫勢之足用亦明矣而曰必待賢則亦不然矣且夫百日不食以待粱肉餓者不活今待堯舜之賢乃治當世之民是猶待粱肉而救餓之說也夫曰良馬固車臧獲御之則為人笑王良御之則日取乎千里吾不以為然夫待越人之善海逰者以救中國之溺人越人善遊矣而溺者不濟矣夫待古之王良以馭今之馬亦猶越人救溺之說也不可亦明矣夫良馬固車五十里而一置使中手御之追速致逺可以及也而千里可日致也何必待古之王良乎且御非使王良也則必使臧獲敗之治非使堯舜也則必使桀紂亂之此味非飴蜜也必苦菜亭歴也此則積辯累辭離理失術兩未之議也奚可以難夫道理之言乎哉客議未及此論也問辯第四十一或問曰辯安生乎對曰生於上之不眀也問者曰上之不眀因生辯也何哉對曰眀主之國令者言最貴者也法者事最適者也言無二貴法不兩適故言行而不軌於法令者必禁若其無法令而可以接詐應變生利揣事者上必采其言而責其實言當則有大利不當則有重罪是以愚者畏罪而不敢言智者無以訟此所以無辯之故也亂世則不然主上有令而民以文學非之官府有法民以私行矯之人主顧漸其法令而尊學者之智行此世之所以多文學也夫言行者以功用為之的彀者也夫砥礪殺矢而以妄發其端未嘗不中秋毫也然而不可為善射者無常儀的也設五寸之的引十歩之逺非羿逄䝉不能必中者有常也故有常則羿逄䝉以五寸的為功無常則以妄發之中秋毫為拙今聴言觀行不以公用為之的彀言雖至察行雖至堅則妄發之說也是以亂世之聴言也以難知為察以愽文為辯其觀行也以離羣為賢以犯上為抗人主者說辯察之言尊賢抗之行故夫作法術之人立取舍之行别辭争之論而莫為之正是以儒服帶劍者衆而耕戰之士寡堅白無厚之詞章而憲令之法息故曰上不明則辯生焉問田第四十二徐渠問田鳩曰臣聞智士不襲下而遇君聖人不見功而接上令陽成義渠眀將也而措於毛伯公孫亶囘聖相也而闗於州部何哉田鳩曰此無他故異物主有度上有術之故也且足下獨不聞楚將宋觚而失其政魏相馮離而亡其國二君者驅於聲詞眩乎辯說不試於毛伯不闗乎州部故有失政亡國之患由是觀之夫無毛伯之試州部之闗豈明主之備哉堂谿公謂韓子曰臣聞服禮辭讓全之術也修行退智遂之道也今先生立法術設度數臣竊以為危於身而殆於軀何以效之所聞先生術曰楚不用吳起而削亂秦行商君而富彊二子之言已當矣然而吳起支解而商君車裂者不逄世遇主之患也逄遇不可必也患禍不可斥也夫舍乎全遂之道而肆乎危殆之行竊為先生無取焉韓子曰臣明先生之言矣夫治天下之柄齊民萌之度甚未易處也所以廢先生之教而行賤臣之所取者竊以為立法術設度數所以利民萌便衆庶之道也故不憚亂主闇上之患禍而必思以齊民萌之資利者仁智之行也憚亂主闇上之患禍而避乎死亡之害知明而不見民萌之資夫利身者貪鄙之為也臣不忍嚮貪鄙之為不敢傷仁智之行先王有幸臣之意然有大傷臣之實定法第四十三問者曰申不害公孫鞅此二家之言孰急於國應之曰是不可程也人不食十日則死大寒之隆不衣亦死謂之衣食孰急於人則是不可一無也皆飬生之具也今申不害言術而公孫鞅為法術者因任而授官循名而責實操殺生之柄課羣臣之能者也此}
