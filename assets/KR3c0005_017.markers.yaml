其政魏相馮離而亡其國二君者驅於聲詞眩乎辯說不試於毛伯不闗乎州部故有失政亡國之患由是觀之夫無毛伯之試州部之闗豈明主之備哉堂谿公謂韓子曰臣聞服禮辭讓全之術也修行退智遂之道也今先生立法術設度數臣竊以為危於身而殆於軀何以效之所聞先生術曰楚不用吳起而削亂秦行商君而富彊二子之言已當矣然而吳起支解而商君車裂者不逄世遇主之患也逄遇不可必也患禍不可斥也夫舍乎全遂之道而肆乎危殆之行竊為先生無取焉韓子曰臣明先生之言矣夫治天下之柄齊民萌之度甚未易處也所以廢先生之教而行賤臣之所取者竊以為立法術設度數所以利民萌便衆庶之道也故不憚亂主闇上之患禍而必思以齊民萌之資利者仁智之行也憚亂主闇上之患禍而避乎死亡之害知明而不見民萌之資夫利身者貪鄙之為也臣不忍嚮貪鄙之為不敢傷仁智之行先王有幸臣之意然有大傷臣之實定法第四十三問者曰申不害公孫鞅此二家之言孰急於國應之曰是不可程也人不食十日則死大寒之隆不衣亦死謂之衣食孰急於人則是不可一無也皆飬生之具也今申不害言術而公孫鞅為法術者因任而授官循名而責實操殺生之柄課羣臣之能者也此}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 所執也法者憲令著於官府刑罰必於民心賞存乎慎法而罰加乎姦令者也此臣之所師也君無術則弊於上臣無法則亂於下此不可一無皆帝王之具也問者曰徒術而無法徒法而無術其不可何哉對曰申不害韓昭侯之佐也韓者晉之别國也晉之故法未息而韓之新法又生先君之令未收而後君之令又下申不害不擅其法不一其憲令則姦多故利在故法前令則道之利在新法後令則道之利在故新相反前後相悖則申不害雖十使昭侯用術而姦臣猶有所譎其辭矣故託萬乘之勁韓七十年而不至於覇王者雖用術於上法不勤飾於官之}
