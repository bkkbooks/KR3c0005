  - {type: variant, offset: 46, length: 2, content: 窺覘, WYG: 破家殘賥内搆黨與外接巷族以為譽從隂約結以相固也虛相與爵禄以相勸也且與我者將利之不與我者將害之衆貪其利劫其威彼誠喜則能利己忌怒則能害己衆歸而民留之以譽盈於國發聞於主主不能理其情因以為賢彼又使譎詐之士外假為諸侯之寵使假之以輿馬信之以瑞節鎮之以辭令資之以幣帛使諸侯而淫說其主㣲挾私而公議所為使者異國之主也所為談者左右之人也主說其言而辯其辭以此人者天下之賢士也内外之於左右其諷一而語同大者不難卑身尊位以下之小者髙爵重禄以利之夫姦人之爵禄重而黨與彌衆又有姦邪之意則姦臣愈反而説之曰古之所謂聖君眀王者非長幼弱也及以次序也以其搆黨與聚巷族偪上弑君而求其利也彼曰何知其然也因曰舜偪堯禹偪舜湯放桀武王伐紂此四王者人臣弑}
