  - {type: variant, offset: 32, length: 1, content: 縛, WYG: 而所殺亡其身殘破其家者何也以其害國傷民敗法圮類也觀其所舉或在山林藪澤巖穴之間或在囹圄縲紲纆索之中或在割烹芻牧飯牛之事然而明主不羞其卑賤也以其能可以明法便國利民從而舉之身安名尊亂主則不然不知其臣之意行而任之以國故小之名卑地削大之國亡身死不明}
