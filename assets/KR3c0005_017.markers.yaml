  - {type: variant, offset: 800, length: 0, content: '', WYG: 立者恭儉也不聽上而巖居非世者顯倉廩之所以實者耕農之本務也而綦組錦繡刻畫為末作者富名之所以成城池之所以廣者戰士也今死士之孤饑餓乞扵道而優笑酒徒之屬椉車衣絲賞禄所以盡民力易下死也今戰勝攻取之士勞而賞不霑而卜筮視手理狐蟲為順辭扵前者日賜上握度量所以擅生殺之柄也今守度奉量之士欲以忠嬰上而不得見巧言利辭行姦軌以倖偷世者數御據法直言名刑相當循䋲墨}
  - {type: page-break, offset: 800, content: '', id: KR3c0005_WYG_017-20b, image: WYG0729/WYG0729-0766b.png}
  - {type: variant, offset: 800, length: 0, content: '', krp: 立者恭儉也不聽上而巖居非世者顯倉廩之所以實者耕農之本務也而綦組錦繡刻畫為末作者富名之所以成城池之所以廣者戰士也今死士之孤饑餓乞扵道而優笑酒徒之屬椉車衣絲賞禄所以盡民力易下死也今戰勝攻取之士勞而賞不霑而卜筮視手理狐蟲為順辭扵前者日賜上握度量所以擅生殺之柄也今守度奉量之士欲以忠嬰上而不得見巧言利辭行姦軌以倖偷世者數御據法直言名刑相當循䋲墨}
  - {type: punctuation, offset: 801, content: ，, id: KR3c0005_tls_017-bkkpn127}
  - {type: 'tls:seg', offset: 801, content: '', id: KR3c0005_tls_017-23a.8}
  - {type: variant, offset: 801, length: 0, content: '', WYG: 姦人所以為上治也而愈疏逺諂施順意從欲以危世者近習悉租稅專民力所以僃難充倉府也而士卒之逃事伏匿附託有威之門以避傜賦而上不得者萬数夫陳善田利宅所以戰士卒也而㫁頭裂腹播骨乎平原曠野者無宅容身身死田奪而女妹有色大臣左右無功者擇宅而受擇田而食賞利一從上出所擅制下也而戰介之士不得職而閒居之士尊顯上以此為教名安得無卑位安得無危夫卑名位者必下之不從法令有二心無私學反逆世者也而不禁其行不破其羣以散其黨又從而尊之用事者過矣上之所以立亷耻者所以屬下也今士大夫不羞汚泥醜辱而宦女妹私義之門不待次而宦賞賜所以為重也而戰鬬有功之士貧賤而便辟優徒超級名號誠信所以通威也而主揜障近習女謁竝行百官主爵遷人用事者過矣大臣官人比周不法行威利在下則主卑而大臣重矣夫立法令者以廢私也法令行而私道廢矣私者所以亂法也而士有二心私學巖居窞處託伏深慮大者非世細者惑下上不禁又從而尊之以名化之以實是無功而顯無勞而富也如此則士之有二心私學者焉得無深慮勉知詐與誹謗法令以求索與世相反者也凡亂上反世者}
