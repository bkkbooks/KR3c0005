  - {type: variant, offset: 58, length: 0, content: '', WYG: 天下稱大焉自顯名也而天下稱明焉則威足以臨天下利足以蓋世天下從之又曰以今時之所聞田成子取齊司城子罕取宋太宰欣取鄭單氏取周易牙取衛韓魏趙三子分晉此六}
  - {type: variant, offset: 58, length: 0, content: '', krp: 天下稱大焉自顯名也而天下稱明焉則威足以臨天下利足以蓋世天下從之又曰以今時之所聞田成子取齊司城子罕取宋太宰欣取鄭單氏取周易牙取衛韓魏趙三子分晉此六}
  - {type: variant, offset: 59, length: 0, content: '', WYG: 臣之弑其君者也姦臣聞此蹷然舉耳以為是也故内搆黨與外攄巷族觀時發事一舉而取國家且夫内以黨與刧弑其君外以諸侯之權矯易其國隠正道持私曲上禁君下撓治者不可勝數也是何也則不明於擇臣也記曰周宣王以來亡國數十其臣弑君取國者衆矣然則難之從内起與從外作者相半也能一盡其民力破國殺身者尚皆賢}
