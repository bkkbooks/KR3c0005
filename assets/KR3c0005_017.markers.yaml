  - {type: variant, offset: 802, length: 3, content: 於卑賤, WYG: 士有二心私學者也故本言曰所以治者法也所以亂者私也法立則莫得為私矣故曰道私者亂道法者治上無其道則智者有私辭賢者有私意上有私惠下有私欲聖智成羣造言作辭以非法令扵上上不禁塞又從而尊之是教下不聽上不從法也}
