  - {type: variant, offset: 204, length: 0, content: '', krp: 此亦猛狗也夫大臣為猛狗而齕有道之士矣左右又為社䑕而間主之情矣人主不覺如此主焉得無壅國焉得無亡乎一曰宋之酤酒者有荘氏者其酒常羙或使僕往酤荘氏之酒其狗齕人使者不敢往乃酤佗家之酒問曰何為不酤荘氏之酒對曰今日荘氏之酒酸故曰不殺其狗則酒酸一曰桓公問管仲曰治國何患對曰最苦社䑕夫社木而塗之䑕因自託也燻之則木焚灌之則塗阤此所以苦於社䑕也今人君左右出則為勢重以收利於民入則比周謾侮蔽惡以欺於君不誅則亂法誅之則人主危據而有之此亦社䑕也故人臣執柄擅禁明為己者必利不為己者必害亦猛狗也故左右為社䑕用事者為猛狗則術不行矣堯欲傳天下於舜鯀諫曰不祥哉孰以天下而傳之於匹夫乎堯不聴舉兵而誅殺鯀於羽山之郊共工又諌曰孰以天下而傳之於匹夫乎堯不聴又舉兵而誅共工於幽州之都於是天下莫敢言無傳天下於舜仲尼聞之曰堯之知舜之賢非其難者也夫至乎誅諌者必傳之舜乃其難也一曰不以其所疑敗其所察則難也荆荘王有茅門之法曰羣臣大夫諸公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理斬其輈戮其御太子怒入為王泣曰為我誅戮廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也焉可誅也夫犯法廢令不尊敬社稷者是臣乘君而下尚校也臣乘君則主失威下尚校則上位危威失位危社稷不守吾將何以遺子孫於是太子乃還走避舍露宿三日北面再拜請死罪一曰楚王急召太子楚國之法車不得至於茆門天雨庭中有潦太子遂驅車至於茆門廷理曰車不得至茆門非法也太子曰王召急不得須無潦遂驅之廷理舉殳而擊其馬敗其駕太子入為王泣曰庭中多潦驅車至茆門廷理曰非法也舉殳擊臣馬敗臣駕王必誅之王曰前有老主而不踰後有儲主而不屬矜矣是真吾守法之臣也乃益爵二級而開後門出太子勿復過衛嗣君謂薄疑曰子小寡人之國以為不足仕則寡人力能仕子請進爵以子為上卿乃進田萬頃薄子曰疑之母親疑以疑為能相萬乘所不窕也然疑家巫有蔡嫗者疑母甚愛信之屬之家事焉疑智足以信言家事疑母盡以聽疑也然已與疑言者亦必復決之於蔡嫗也故論疑之智能以疑為能相萬乘而不窕也論其親則子母之間}
  - {type: punctuation, offset: 205, content: ；, id: KR3c0005_tls_013-bkkpn46}
  - {type: 'tls:seg', offset: 205, content: '', id: KR3c0005_tls_013-5a.6}
  - {type: variant, offset: 207, length: 1, content: 兩, WYG: 不免議之於蔡嫗也今疑之於人主也非子母之親也而人主皆有蔡嫗人主之蔡嫗必其重人也重人者能行私者也夫行私者繩之外也而疑之所言法之内也繩之外與法之内讐也不相受也一曰衛君之晉謂薄疑曰吾欲與子皆行薄疑曰媪也在中請歸與媪計之衛君自請薄媪薄媪曰疑君之臣也君有意從之甚善衛君曰吾以請之媪媪許我矣薄疑歸言之媪也曰衛君之愛疑奚與媪媪曰不如吾愛子也衛君之賢疑奚與媪也曰不如吾賢子也媪與疑計家事已決矣乃請決之於卜者蔡嫗今衛君從疑而行雖與疑决計必與他蔡嫗敗之如是則疑不得長為臣矣夫教歌者使先呼而詘之其聲反清徴者乃教之一曰教歌者先揆以法疾呼中宫徐呼中徴疾不中宫徐不中徴不可謂教吳起衛左氏中人也使其妻織組而幅狹於度呉子使更之其妻曰諾及成復度之果不中度吳子大怒其妻對曰吾始經之而不可更也呉子出之其妻請其兄而索入其兄曰呉子為法者也其為法也且欲以與萬乘致功必先踐之妻妾然後行之子母㡬索入矣其妻之弟又重於衛君乃因以衛君之重請吳子吳子不聴遂去衛而入荆也一曰吳子示其妻以組曰子為我織組令之如是組已就而效之其組異善起曰使子為組令之如是而今也異善何也其妻曰用財若一也加務善之吳起曰非語也使之衣歸其父往請之吳起曰起家無虛言晉文公問於狐偃曰寡人甘肥周於堂巵酒豆肉集於宫壺酒不清生肉不布殺一牛遍於國中一歳之功盡以衣士卒其}
