  - {type: variant, offset: 351, length: 212, content: 楚國之俗曰大臣太重封君太眾若此則上偪主而下虐民此貧國弱兵之道也不如使封君之子孫三世而收爵祿絕減百吏之祿秩損不急之枝官以奉選練之士悼王行之期年而薨矣吳起枝解於楚商君教秦孝公以連什伍設告坐之過燔詩書而明法令塞私門之請而遂公家之勞禁游宦之民而顯耕戰之士孝公行之主以尊安國以富強八年而薨商君車裂於秦楚不用吳起而削亂秦行商君法而富強二子之言也已當矣然而枝解吳起而車裂商君者何也大臣若法而細民惡治也當今之世大臣貪重細民安亂甚於秦楚之俗而, WYG: 離}
