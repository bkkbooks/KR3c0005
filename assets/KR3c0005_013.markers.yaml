  - {type: variant, offset: 6, length: 0, content: '', WYG: 公子尾走晉景公與晏子遊於少海登栢寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎景公曰寡}
  - {type: variant, offset: 6, length: 0, content: '', krp: 公子尾走晉景公與晏子遊於少海登栢寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎景公曰寡}
