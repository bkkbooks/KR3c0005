  - {type: variant, offset: 209, length: 0, content: '', WYG: 以戰民乎狐子曰不足文公曰吾㢮闗市之征而緩刑罰其足以戰民乎狐子曰不足文公曰吾民之有喪資者寡人親使郎中視事有罪者赦之貧窮不足者與之其足以戰民乎狐子對曰不足此皆所以愼産也而戰之者殺之也民之從公也為愼産也公因而迎殺之失所以為從公矣曰然則何如足以戰民乎狐子對曰令無得不戰公曰無得不戰奈何狐子對曰信賞必罰其足以戰公曰刑罰之極安至對曰不辟親貴法行所愛文公曰善明日令田於圃陸期以日中為期後期者行軍法焉於是公有所愛者曰顛頡後期吏請其罪文公隕涕而憂吏曰請用事焉遂}
