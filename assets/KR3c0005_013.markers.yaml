  - {type: variant, offset: 149, length: 0, content: '', WYG: 主而漏其羣臣之語是猶無當之玉巵也雖有聖智莫盡其術為其漏也昭侯曰然昭侯聞堂谿公之言自此之後欲發天下之大事未嘗不獨寝恐夢言而使人知其謀也一曰堂谿公見昭侯曰今有白玉之巵而無當有瓦巵而有當君渴將何}
