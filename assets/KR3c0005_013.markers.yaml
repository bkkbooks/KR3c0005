  - {type: variant, offset: 10, length: 0, content: '', krp: 齊民其於民也上之請爵禄行諸大臣下之私大斗斛區釜以出貨小斗斛區釜以收之殺一牛取一豆肉餘以食士終嵗布帛取二制焉餘以衣士故市木之價不加貴於山澤之魚塩龜鼈蠃蚌不貴於海君重歛而田成氏厚施齊嘗大饑道旁餓死者不可勝數也父子相牽而趨田成氏者不聞不生故周秦之民相與歌之曰謳乎其已乎苞乎其往歸田成子乎詩曰雖無徳與女式歌且舞今田成氏之徳而民之歌舞民徳歸之矣故曰其田成氏乎公泫然出涕曰不亦悲乎寡人有國而田成氏有之今為之奈何晏子對曰君何患焉若君欲奪之則近賢而逺不肖治其煩亂緩其刑罰振貧窮而恤孤寡行恩惠而給不足民將歸君則雖有十田成氏其如君何或曰景公不知用勢而師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良佐轡則身不勞而易及輕獸矣今釋車輿之利捐六馬之足與王良之御而下走逐獸則雖樓季之足無時及獸矣託良馬固車則臧獲有餘國者君之車也勢者君之馬也夫不處勢以禁誅擅愛之臣而必徳厚以與天下齊行以争名是皆不乘君之車不因馬之利舍車而下走者也故曰景公不知用勢之主也而師曠晏子不知除患之臣也子夏曰春秋之記臣殺君子殺父者以十數矣皆非一日之積也有漸而至矣凡姦者行久而成積積成而力多力多而能殺故明主蚤絶之今田常之為亂有漸見矣而君不誅晏子不使其君禁侵陵之臣而使其主行惠故簡公受其禍故子夏曰善持勢者蚤絶姦之萌季孫相魯子路為郈令魯以五月起衆為長溝當此之為子路以其私秩粟為漿飯要作溝者五父之衢而飡之孔子聞之使子貢後覆其飯擊毁其噐曰魯君有民子奚為乃飡之子路怫然怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共其所有而同其利者也今以由之秩粟而飡民不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之為愛之也夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子令徒役而飡之將奪肥之民耶孔子駕而去魯以孔子之賢而季孫非魯君也以人臣之資假人主之術蚤禁於未形而子路不得行其私惠而害不得生况人主乎以景公之勢而禁田常之侵也則必無劫弑之患矣太公望東封於齊齊東海上有居士曰狂矞華士昆弟二人者立議曰吾不臣天子不友諸侯耕作而食之掘井而飲之吾無求於人也無上之名無君之禄不事仕而事力太公望至於營丘使吏執殺之以為首誅周公旦從魯聞之發急傳而問之曰夫二子賢者也今日饗國而殺賢者何也太公望曰是昆弟二人立議曰吾不臣天子不友諸侯耕作而食之掘井而飲之吾無求於人也無上之名無君之禄不事仕而事力彼不臣天子者是望不得而臣也不友諸侯者是望不得而使也耕作而食之掘井而飲之無求於人者是望不得以賞罰勸禁也且無上名雖知不為望用不仰君禄雖賢不為望功不仕則不治不任則不忠且先王之所以使其臣民者非爵禄則刑罰也今四者不足以使之則望當誰為君乎不服兵革而顯不親耕耨而名又非所以教於國也今有馬於此如驥之状者天下之至良也然而驅之不前却之不止左之不左右之不右則臧獲雖賤不託其足臧獲之所願託其足於驥者以驥之可以追利辟害也今不為人用臧獲雖賤不託其足焉已自謂以為世之賢士而不為主用行極賢而不用於君此非明主之所臣也亦驥之不可左右矣是以誅之一曰太公望東封於齊海上有賢者狂矞太公望聞之往請焉三却馬於門而狂矞不報見也太公望誅之當是時也周公旦在魯馳徃止之比至已誅之矣周公旦曰狂矞天下賢者也夫子何為誅之太公望曰狂矞也議不臣天子不友諸侯吾恐其亂法易教也故以為首誅今有馬於此形容似驥也然驅之不往引之不前雖臧獲不託足以旋其軫也如耳説衛嗣公衛嗣公説而太息左右曰公何為不相也公曰夫馬似鹿者而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也今如耳萬乘之相也外有大國之意其心不在衛雖辯智亦不為寡人用吾是以不相也薛公之相魏昭侯也左右有欒子者曰陽胡潘其於王甚重而不為薛公薛公患之於是乃召與之博予之人百金令之昆弟博俄又益之人二百金方博有間謁者言客張季之子在門公怫然怒撫兵而授謁者曰殺之吾聞季之不為文也立有間時季羽在側曰不然竊聞季為公甚顧其人隂未聞耳乃輟不殺客大禮之曰曩者聞季之不為文也故欲殺之今誠為文也豈忘季哉告廪獻千石之粟告府獻五百金告騶私廐獻良馬固車二乘因令奄將宫人之美妾二十人并遺季也欒子因相謂曰為公者必利不為公者必害吾曹何愛不為公因私競勸而遂為之薛公以人臣之勢假人主之術也而害不得生况錯之人主乎夫馴烏斷其下頷焉斷其下頷則必恃人而食焉得不馴乎夫明主畜臣亦然令臣不得不利君之禄不得無服上之名夫利君之禄服上之名焉得不服二申子曰上明見人僃之其不明見人惑之其知見人飾之不知見人匿之其無欲見人司之其有欲見人餌之故曰吾無從知之惟無為可以規之一曰申子曰愼而言也人且知女愼而行也人且隨女而有知見也人且匿女而無知見也人且意女女有知也人且臧女女無知也人且行女故曰惟無為可以規之田子方問唐易鞠曰弋者何愼對曰鳥以數百目視子子以二目御之子謹周子廩田子方曰善子加之弋我加之國鄭長者聞之曰田子方知欲為廩而未得所以為廩夫虛無無見者廩也一曰齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廩王曰何謂謹廩對曰鳥以數十目視人人以二目視鳥奈何不謹廩也故曰在於謹廩也王曰然則為天下何以異此廩今人主以二目視一國一國以萬目視人主將何以自為廩乎對曰鄭長者有言曰夫虛静無為而無見也其可以為此廩乎國羊重於鄭君聞君之惡已也侍飲因先謂君曰臣適不幸而有過願君幸而吿之臣請變更則臣免死罪矣客有説韓宣王宣王説而太息左右引王之説之曰先告客以為徳靖郭君之相齊也王后死未知所置乃獻}
