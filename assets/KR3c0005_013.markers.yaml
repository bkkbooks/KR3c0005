  - {type: variant, offset: 5, length: 0, content: '', WYG: 元何犿註外儲説右上第三十四君所以治臣者有三一勢不足以化則除之師曠之對晏子之説皆合勢之易也而道行之難是與獸逐走也未知除患患之可除在子夏之説春秋也善持勢者蚤絶其姦萌故季孫讓仲尼以遇勢而況錯之於君乎是以太公望殺狂矞而臧獲不乗􅂹嗣公知之故而駕鹿薛公知之故與二欒博此皆知同異之反也故明主之牧臣也説在畜焉二人主者利害之軺轂也射者衆故人主共矣是以好惡見則下有因而人主惑矣辭言通則臣難言而主不神矣説在申子之言六慎與唐易之言弋也患在國羊之請變與宣王之太息也明之以靖郭氏之獻十珥也與犀首甘茂之通穴聞也堂谿公知術故問玉巵昭侯能術故以聽獨寢明主之道在申子之勸獨斷也三術之不行有故不殺其狗則酒酸夫國亦有狗且左右皆社䑕也人主無堯之再誅與荘王之應太子而皆有薄媪之決蔡嫗也知貴不能以教歌之法先揆之呉起之出愛妻文公之斬顚頡皆違其情者也故能使人彈疽者必其忍痛者也右經一賞之譽之不勸罰之毁之不畏四者加焉不變則其除之齊景公之晉從平公飲師曠侍坐景公問政於師曠曰太師將奚以教寡人師曠曰君必惠民而已中坐酒酣將出又復問政於師曠曰太師奚以教寡人曰君必惠民而已矣景公出之舍師曠送之又問政於師曠師曠曰君必惠民而已矣景公歸思未醒而得師曠之所謂公子尾公子夏者景公之二弟也甚得齊民家富貴而民説之擬於公室此危吾位者也今謂我惠民者使我與二弟争民耶於是反國發廩粟以賦衆貧散府餘財以賜孤寡倉無陳粟府無餘財宫婦不御者出嫁之七十受禄米鬻徳惠施於民也已與二弟爭民居二年二弟出走公子夏逃}
