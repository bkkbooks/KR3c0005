  - {type: variant, offset: 201, length: 0, content: '', WYG: 勢重而收利於民入則比周而蔽惡於君内間}
  - {type: variant, offset: 201, length: 0, content: '', krp: 勢重而收利於民入則比周而蔽惡於君内間}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 情以告外外内為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社䑕也故人臣執柄而擅禁明為己者必利而不為己者必}
  - {type: variant, offset: 203, length: 0, content: '', krp: 情以告外外内為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社䑕也故人臣執柄而擅禁明為己者必利而不為己者必}
  - {type: variant, offset: 204, length: 0, content: '', WYG: 此亦猛狗也夫大臣為猛狗而齕有道之士矣左右又為社䑕而間主之情矣人主不覺如此主焉得無壅國焉得無亡乎一曰宋之酤酒者有荘氏者其酒常羙或使僕往酤荘氏之酒其狗齕人使者不敢往乃酤佗家之酒問曰何為不酤荘氏之酒對曰今日荘氏之酒酸故曰不殺其狗則酒酸一曰桓公問管仲曰治國何患對曰最苦社䑕夫社木而塗之䑕因自託也燻之則木焚灌之則塗阤此所以苦於社䑕也今人君左右出則為勢重以收利於民入則比周謾侮蔽惡以欺於君不誅則亂法誅之則人主危據而有之此亦社䑕也故人臣執柄擅禁明為己者必利不為己者必害亦猛狗也故左右為社䑕用事者為猛狗則術不行矣堯欲傳天下於舜鯀諫曰不祥哉孰以天下而傳之於匹夫乎堯不聴舉兵而誅殺鯀於羽山之郊共工又諌曰孰以天下而傳之於匹夫乎堯不聴又舉兵而誅共工於幽州之都於是天下莫敢言無傳天下於舜仲尼聞之曰堯之知舜之賢非其難者也夫至乎誅諌者必傳之舜乃其難也一曰不以其所疑敗其所察則難也荆荘王有茅門之法曰羣臣大夫諸公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理斬其輈戮其御太子怒入為王泣曰為我誅戮廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也焉可誅也夫犯法廢令不尊敬社稷者是臣乘君而下尚校也臣乘君則主失威下尚校則上位危威失位危社稷不守吾將何以遺子孫於是太子乃還走避舍露宿三日北面再拜請死罪一曰楚王急召太子楚國之法車不得至於茆門天雨庭中有潦太子遂驅車至於茆門廷理曰車不得至茆門非法也太子曰王召急不得須無潦遂驅之廷理舉殳而擊其馬敗其駕太子入為王泣曰庭中多潦驅車至茆門廷理曰非法也舉殳擊臣馬敗臣駕王必誅之王曰前有老主而不踰後有儲主而不屬矜矣是真吾守法之臣也乃益爵二級而開後門出太子勿復過衛嗣君謂薄疑曰子小寡人之國以為不足仕則寡人力能仕子請進爵以子為上卿乃進田萬頃薄子曰疑之母親疑以疑為能相萬乘所不窕也然疑家巫有蔡嫗者疑母甚愛信之屬之家事焉疑智足以信言家事疑母盡以聽疑也然已與疑言者亦必復決之於蔡嫗也故論疑之智能以疑為能相萬乘而不窕也論其親則子母之間}
