  - {type: variant, offset: 142, length: 1, content: 悲, WYG: 犀首反走再拜曰受命於是樗里疾已通穴聴之矣郎中皆曰兵秋起攻韓犀首為將於是日也郎中盡知之於是日也境内盡知之王召樗里疾曰是何匈匈也何道出樗里疾曰似犀首也王曰吾無與犀首言也其犀首何哉樗里疾曰犀首也羈旅新抵罪其心孤是言自嫁於衆王曰然使人召犀首已逃入諸侯矣堂谿公謂昭侯曰今有千金之玉巵通而無當可以盛水乎昭侯曰不可有瓦噐而不漏可以盛酒乎昭侯曰可對曰}
