  - {type: variant, offset: 179, length: 180, content: 狗矣人主者以刑德制臣者也今君人者釋其刑德而使臣用之則君反制於臣矣故田常上請爵祿而行之群臣下大斗斛而施於百姓此簡公失德而田常用之也故簡公見弒子罕謂宋君曰夫慶賞賜予者民之所喜也君自行之殺戮刑罰者民之所惡也臣請當之於是宋君失刑而子罕用之故宋君見劫田常徒用德而簡公弒子罕徒用刑而宋君劫故今世為人臣者兼刑德而用之則是世主之危甚於簡公宋君也故劫殺擁蔽之主兼失刑德而使臣用之, WYG: 地}
