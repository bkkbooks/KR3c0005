  - {type: variant, offset: 3, length: 1, content: 七, WYG: 二十二喻老第二十一天下有道無急患則曰静遽傳不用故曰却走馬以糞天下無道攻擊不休相守數年不已甲胄生蟣虱鷰雀處帷幄而兵不歸故曰戎馬生於郊翟人有獻豐狐𤣥豹之皮於晋文公文公受客皮而歎曰此以皮之美自為罪夫治國者以名號為罪徐偃王是也以城與地為罪虞虢是也故曰罪莫大於可欲智伯兼范中行而攻趙不已韓魏反之軍敗晋陽身死髙梁之東遂卒被分漆其首以為溲噐故曰禍莫大於不知足虞君欲屈産之乗與垂棘之璧不聼宫之竒故邦亡身死故曰咎莫㦧於欲得邦以存為常覇王其可也身以生為常富貴其可也不欲自害則邦不亡身不死故曰知足之為足矣楚荘王既勝狩于河雍歸而賞孫叔敖孫叔敖請漢間之地沙石之處楚邦之法禄臣再世而收地唯孫叔敖獨在此不以其邦為收者瘠也故九世而祀不絶故曰善建不㧞善抱不脫子孫以其祭祀世世不輟孫叔敖之謂也制在已曰重不離位曰静重則能使輕静則能使躁故曰重為輕根静為躁君故曰君子終日行不離輜重也邦者人君之輜重也主父生傳其邦此離其輜重者也故雖有代雲中之樂超然已無趙矣主父萬乗之主而以身輕於天下無勢之謂輕離位之謂躁是以生幽而死故曰輕則失臣躁則失君主父之謂也勢重者人君之淵也君人者勢重於人臣之間失則不可復得也簡公失之於田成晉公失之於六卿而邦亡身死故曰魚不可脫於深淵賞罰者邦之利噐也在君則制臣在臣則勝君君見賞臣則損之以為徳君見罰臣則益之以為威人君見賞而人臣用其勢人君見罰而人臣乗其威故曰邦之利噐不可以示人越王入宦於吴而勸之伐齊以弊吳吳兵既勝齊人於艾陵張之於江濟強之於黄池故可制於五湖故曰将欲翕之必固張之將欲弱之必固強之晋獻公將欲襲虞遺之以璧馬知伯將襲仇由遺之以廣車故曰将欲取之必固與之起事於無形而要大功於天下是謂㣲}
