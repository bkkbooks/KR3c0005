  - {type: variant, offset: 65, length: 0, content: '', WYG: 武王擒紂於牧野故曰守柔曰強越王之霸也不病官武王之王也不病詈故曰聖人之不病也以其不病是以無病也宋之鄙人得璞玉而獻之子罕子罕不受鄙人曰此寳也宜為君子噐不宜為細人用子罕曰爾以玉為寳我以不受子玉為寳是鄙人欲玉而子罕不欲玉故曰欲不欲不貴難得之貨王夀負書而行見徐馮於周塗馮曰事者為也為生於時知者無常事書者言也言生於知知者不藏書今子何獨負之而行於是王夀因焚其書而儛之故知者不以言談教而慧者不以藏書篋此世之所過也而王夀復之是學不學也故曰學不學復}
