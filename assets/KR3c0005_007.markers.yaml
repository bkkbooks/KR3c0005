  - {type: variant, offset: 484, length: 2, content: 罰昔, WYG: 曰大噐晩成大音希聲楚荘王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣愚患之智如目也能見百歩之外而不能自見其睫王之兵自敗於秦晉䘮地數百里此兵之弱也莊蹻為盜於境内而吏不能禁此政之亂也王之弱亂非越之下也欲伐越此智之如目也王乃止故知之難不在見人在自見故曰自見之謂明子夏見曽子曽子曰何肥也對曰戰勝故肥也曽子曰何謂也子夏曰吾入見先王之義則榮之出見冨貴之樂又榮之兩}
