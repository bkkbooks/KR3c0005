  - {type: variant, offset: 738, length: 1, content: 受, WYG: 食樂羊罷中山文侯賞其功而疑其心孟孫獵得麑使秦西巴載之持歸其母随之而啼秦西巴弗忍而與之孟孫歸至而求麑答曰余弗忍而與其母孟孫大怒逐之居三月復召以為其子傅其御曰曩將罪之今召以為子傅何也孟孫曰夫不忍麑又且忍吾子乎故曰巧詐不如拙誠樂羊以有功見疑秦西巴以有罪益信曽從子善相劒者也衞君怨吳王曽從子曰吳王好劒臣相劒者也臣請為吳王相劒㧞而示之因為君刺之衞君曰子為之是也非縁義也為利也吳強而冨衞弱而貧子必徃吾恐子為吳王用之於我也乃逐之紂為象箸箕子怖以為象箸不盛羹於土簋則必犀玉之杯玉杯象箸必不盛菽藿則必旄象豹胎旄象豹胎必不衣短褐而舎茅茨之下則必錦衣九重髙䑓廣室也稱此以求則天下不足矣聖人見㣲以知萌見端以知末故見象箸而怖知天下不足也周公旦已勝殷將攻商盖辛公甲曰大難攻小易服不如服衆小以劫大乃攻九夷而商盖服矣紂為長夜之飲懼以失日問其左右盡不知也乃使人問箕子箕子謂其徒曰為天下主而一}
