  - {type: variant, offset: 8, length: 2, content: 導制, WYG: 及也在肌膚鍼石之所及也在腸胃火齊之所及也在骨髄司命之所屬無奈何也今在骨髄臣是以無請也居五日桓侯體痛使人索扁鵲已逃秦矣桓侯遂死故良醫之治病也攻之於腠理此皆争之於小者也夫事之禍福亦有腠理之地故曰聖人蚤從事焉昔晋公子重耳出亡過鄭鄭君不禮叔瞻諫曰此賢公子也君厚待之可以積徳鄭君不聼叔瞻又諫曰不厚待之不若殺之無令有後患鄭君又不聼及公子返晉邦舉兵伐鄭大破之取八城焉晉獻公以垂棘之璧假道於虞而伐虢大夫宫之竒諫曰不可唇亡而齒寒虞虢相救非相徳也今日晋滅虢明日虞必随之亡虞君不聼受}
