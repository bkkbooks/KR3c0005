  - {type: variant, offset: 502, length: 2, content: 加衣, WYG: 曰自勝之謂強周有玉版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故予費仲文王舉太公於渭濵者貴之也而資費仲玉版者是愛之也故曰不貴其師不愛其資雖知太迷是謂要妙説林上第二十二湯以伐桀而恐天下言己為貪也因乃讓天下於務光而恐務光之受之也乃使人説務光曰湯殺君而欲傳惡聲於子故譲天下於子務光因自投於河秦武王令甘茂擇所欲為於僕與行事孟卯曰公不如為僕公所長者使也公雖為僕王猶使之於公也公佩僕璽而為行事是兼官也子圉見孔子於商太宰孔子出子圉入請問客太宰曰吾已見孔子則視子猶蚤虱之細者也吾今見之}
