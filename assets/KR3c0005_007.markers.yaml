  - {type: variant, offset: 5, length: 1, content: 主, WYG: 處小弱而重自卑謂損弱勝強也有形之類大必起於小行久之物族必起於少故曰天下之難事必作於易天下之大事必作於細是以欲制物者於其細也故曰圖難於其易也為大於其細也千丈之堤以螻蟻之穴潰百尺之室以突隙之烟焚故曰白圭之行堤也塞其穴丈人之慎火也塗其隙是以白圭無水難丈人無火患此皆慎易以避難敬細以逺大者也扁鵲見蔡桓公立有間扁鵲曰君有疾在腠理不治将恐深桓侯曰寡人無扁鵲出桓侯曰醫之好治不病以為功居十日扁鵲復見曰君之病在肌膚不治將益深桓侯不應扁鵲出桓侯又不悦居十日扁鵲復見曰君之病在腸胃不治将益深桓侯又不應扁鵲出桓侯又不悦居十日扁鵲望桓侯而還走桓侯故使人問之扁鵲曰疾在腠理湯熨}
