  - {type: variant, offset: 717, length: 5, content: 好味易牙蒸, WYG: 乃弗救子胥出走邊候得之子胥曰上索我者以我有美珠也今我已亡之矣我且曰子取吞之候因釋之慶封為亂於齊而欲走越其族人曰晉近奚不之晋慶封曰越逺利以避難族人曰變是心也居晋而可不變是心也雖逺越其可以安乎智伯索地於魏宣子魏宣子弗予任章曰何故不予宣子曰無故請地故弗予任章曰無故索地鄰國必恐彼重欲無厭天下必懼君予之地智伯必驕而輕敵鄰邦必懼而相親以相親之兵待輕敵之國則智伯之命不長矣周書曰將欲敗之必姑輔之將欲取之必姑予之君不如予之以驕智伯且君何釋以天下圖智氏而獨以吾國為智氏質乎君曰善乃與之萬戸之邑智伯大悦因索地於趙弗與因圍晉陽韓魏反之外趙氏應之内智氏自亡秦康公築臺三年荆人起兵將欲以兵攻齊任妄曰饑召兵疾召兵勞召兵亂召兵君築臺三年今荆人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊荆人輟行齊攻宋宋使臧孫子南求救於荆荆大恱許救之甚歡臧孫子憂而反其御曰索救而得今子有憂色何也臧孫子曰宋小而齊大夫救小宋而惡於大齊此人之所以憂也而荆王說必以堅我也我堅而齊敝荆之所以利也臧孫子乃歸齊人拔五城於宋而荆救不至魏文侯借道於趙而攻中山趙肅侯將不許趙刻曰君過矣魏攻中山而弗能取則魏必罷罷則魏輕魏輕則趙重魏拔中山必不能越趙而有中山也是用兵者魏也而得地者趙也君必許之許之而大歡彼將知君利之也必將輟行君不如借之道示以不得已也鴟夷子皮事田成子田成子去齊走而之燕鴟夷子皮負傳而從至望邑子皮曰子獨不聞涸澤之蛇乎涸澤蛇將徙有小蛇謂大蛇曰子行而我随之人以為蛇之行者耳必有殺子不如相銜負我以行人以我為神君也乃相銜負以越公道而行人皆避之曰神君也今子羙而我惡以子為我上客千乘之君也以子為我使者萬乗之卿也子不如為我舎人田成子因負傳而随之至逆旅逆旅之君待之甚敬因獻酒肉温人之周周不納客問之曰客耶對曰主人問其巷人而不知也吏因囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩曰普天之下莫非王土率土之濵莫非王臣今君天子則我天子之臣也豈有為人之臣而又為之客哉故曰主人也君使出之韓宣王謂樛留曰吾欲兩用公仲公叔其可乎對曰不可晉用六卿而國分簡公兩用田成闞止而簡公殺魏兩用犀首張儀而西河之外亡今王兩用之其多力者樹其黨寡力者借外權羣臣有内樹黨以驕主有外為交以削地則王之國危矣紹績昧醉寐而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下而康誥曰毋彛酒者彛酒常酒也常酒者天子失天下匹夫失其身管仲隰朋從於桓公而伐孤竹春徃冬反迷惑失道管仲曰老馬之智可用也乃放老馬而随之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水以管仲之聖而隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎有獻不死之藥於荆王者謁者操之以入中射之士問曰可食乎曰可因奪而食之王大怒使人殺中射之士中射之士使人説王曰臣問謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也是客欺王也夫殺無罪之臣而明人之欺王也不如釋臣王乃不殺田駟欺鄒君鄒君將使人殺之田駟恐告恵子恵子見鄒君曰今有人見君則䀹其一目奚如君曰我必殺之惠子曰瞽両目䀹君奚為不殺君曰不能勿䀹惠子曰田駟東慢齊侯南欺荆王駟之於欺人瞽也君奚怨焉鄒君乃不殺魯穆公使衆公子或宦於晋或宦於荆犁鉏曰假人於越而救溺子越人雖善逰子必不生矣失火而取水於海海水雖多火必不滅矣逺水不救近火也今晋與荆雖強而齊近魯患其不救乎嚴遂不善周君患之馮沮曰嚴遂相而韓傀貴於君不如行賊於韓傀則君必以為嚴氏也張譴相韓病將死公乗無正懐三十金而問其疾居一月自問張譴曰若子死將誰使代子答曰無正重法而畏上雖然不如公子食我之得民也張譴死因相公乗無正樂羊為魏將而攻中山}
