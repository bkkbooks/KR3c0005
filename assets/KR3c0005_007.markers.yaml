  - {type: variant, offset: 63, length: 1, content: 威, WYG: 卒故怖其始居五年紂為肉圃設炮烙登糟丘臨酒池紂遂以亡故箕子見象箸以知天下之禍故曰見小曰明勾踐入官於吳身執干戈為吴王洗馬故能殺夫差於姑蘇文王見詈於玉門顔色不變}
  - {type: variant, offset: 63, length: 1, content: 威, krp: 卒故怖其始居五年紂為肉圃設炮烙登糟丘臨酒池紂遂以亡故箕子見象箸以知天下之禍故曰見小曰明勾踐入官於吳身執干戈為吴王洗馬故能殺夫差於姑蘇文王見詈於玉門顔色不變}
