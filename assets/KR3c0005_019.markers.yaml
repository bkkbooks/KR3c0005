  - {type: variant, offset: 535, length: 0, content: '', WYG: 官則治者寡而亂者衆矣故明主之道一法而不求智固術而不慕信故法不敗而羣官無姦詐矣今人主之於言也説其辯而不求其當焉其用於行也羙其聲而不責其功焉是}
  - {type: page-break, offset: 535, content: '', id: KR3c0005_WYG_019-9a, image: WYG0729/WYG0729-0782c.png}
  - {type: variant, offset: 535, length: 0, content: '', krp: 官則治者寡而亂者衆矣故明主之道一法而不求智固術而不慕信故法不敗而羣官無姦詐矣今人主之於言也説其辯而不求其當焉其用於行也羙其聲而不責其功焉是}
  - {type: variant, offset: 536, length: 0, content: '', WYG: 天下之衆其談言者務為辯而不周於用故舉先王言仁義者盈廷而政不免於亂行身者競於為髙而不合於功故智士退處巖穴歸禄不受而兵不免於弱政不免於亂此其故何也民之所譽上之所禮亂國之術也今境内之民皆言治藏商管之法者家有之而國愈貧言耕者衆執耒者寡也境内皆言兵藏孫吳之書者家有之而兵愈弱言戰者多被甲者少也故明主用其力不聼其言賞其功必禁無用故民盡死力以從其上夫耕之用力也勞而民為之者曰可得以富也戰之事也危而民為之者曰可得以貴也今修文學習言談則無耕之勞而有富之實無戰之危而有貴之尊則人孰不為也是以百人事智而一人用力事智者衆則法敗用力者寡則國貧此世之所以亂也故明主之國無書簡之文以法為教無先王之語以吏為師無私劒之捍以斬首為勇是境内之民其言談者必軌於法動作者歸之於功為勇者盡之於軍是故無事則國富有事則兵强此之謂王資既畜王資而承敵國之釁超五帝侔三王者必此法也今則不然士民縱恣於内言談者為勢於外外内稱惡以待强敵不亦殆乎故羣臣之言外事者非有分於從衡之黨則有仇讎之患而借力於國也從者合衆强以攻一弱也而衡者事一强以攻衆弱也皆非所以持國也今人臣之言衡者皆曰不事大則遇敵受禍矣事大未必有實則舉圖而委地效璽而請兵矣獻圖則地削效璽則名卑地削則國削名卑則政亂矣事大為衡未見其利也而亡地亂政矣人臣之言從者皆曰不救小而伐大則失天下失天下則國危國危而主卑救小未必有實則起兵而敵大矣救小未必能}
