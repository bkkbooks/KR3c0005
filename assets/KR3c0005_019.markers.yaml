  - {type: variant, offset: 539, length: 1, content: 韓, WYG: 交大未必不有䟽有䟽則為强國制矣出兵則軍敗退守則城拔救小為從未見其利而亡地敗軍矣是故事强則以外權市官於内救小則以内重求利於外國利未立封土厚禄至矣主上雖卑人臣尊矣國地雖削私家富矣事成則以權長重事敗則以富退處人主之於其聼説也於其臣事未成則爵禄已尊矣事敗而}
