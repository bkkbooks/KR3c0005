  - {type: variant, offset: 554, length: 1, content: 恃, krp: 則其傷大萬乘之國莫敢自頓於堅城之下而使强敵裁其弊也此必不亡之術也舎必不亡之術而道必滅之事治國者之過也智困於内而政亂於}
