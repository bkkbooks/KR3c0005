  - {type: variant, offset: 1322, length: 1, content: 正, WYG: 非一國可使齊為治也用衆而舎寡故不務德而務法夫必恃自直之箭百世無矢恃自圜之木千世無輪矣自直之箭自圜之木百世無有一然而世皆乘車射禽者何也隱括之道用也雖有不恃隱括而有自直之箭自圜之木良工弗貴也何則乘者非一人射者非一發也不恃賞罰而恃自善之民明主弗貴也何則國法不可失而所治非一人也故有術之君不随適然之善適然謂偶然也而行必然之道今或謂人曰使子必智而夀則世必以為狂夫智性也夀命也性命者非所學於人也而以人之所不䏻為悦人此世之所以謂之為狂也謂之不能然則是諭也夫諭性也以仁義教人是以智與夀説也有度之主弗受也故善毛嬙西施之美無益吾面用脂澤粉黛則倍其初言先王之仁義無益於治明吾法度必吾賞罰者亦國之脂澤粉黛也故眀主急其助而緩其頌故不道仁義今巫祝之祝人曰使若千嵗萬嵗千嵗萬嵗之聲括耳而一日之夀無徴於人此人所以簡巫祝也今世儒者之説人主不言今之所以為治而語已治之功不審官}
