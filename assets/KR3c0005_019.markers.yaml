  - {type: variant, offset: 563, length: 1, content: 臣, WYG: 人主不除此五蠧之民不飬耿介之士則海内雖有破亡之國削滅之朝亦勿怪矣顯學第五十世之顯學儒墨也儒之所至孔邱也墨之所至墨翟也自孔子之死也有子張之儒有子思之儒有顔氏之儒有孟氏之儒有漆雕氏之儒有仲良氏之儒有孫氏之儒有樂正氏之儒自墨子之死也有相里氏之墨有相夫氏之墨有鄧陵氏之墨}
