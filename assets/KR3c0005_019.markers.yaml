  - {type: variant, offset: 613, length: 2, content: 三代, krp: 之道也夫吏之所税耕者也而上之所飬學士也耕者則重税學士則多賞而索民之疾作而少言談不可得也立節參明執操不侵怨言過於耳必随之以劒世主必從而禮之以為自好之士夫斬首之勞不賞而家鬬之勇尊顯而索民之疾戰距敵而無私鬬不可得也國平則飬儒侠難至則用介士所飬者非所用所用者非所飬此所以亂也且夫人主之聼於學也若是其言宜布之而官用其身若非其言宜去其身而息其端今以為是也而弗布於官以為非也而不息其端是而不用非而不息亂亡之道也澹臺子羽君子之容也仲尼幾而取之與處乆而行不稱其貌宰予之辭雅而文也仲尼幾而取之與處乆而智不充其辯故孔子曰以容取人乎失之子羽以言取人乎失之宰予故以仲尼之智而有失實之聲今之新辯濫乎宰予而世主之聼眩乎仲尼為悦其言因任其身則焉得無失乎是以魏任孟卯之辯而有華下之患趙任馬服之辯而有長平之禍此二者任辯之失也夫視鍛錫而察青黄區冶}
  - {type: variant, offset: 618, length: 62, content: 強人主又以過予人臣又以徒取舍法律而言先王明君之功者上任之以國臣故曰是願古之功以古之賞賞今之人也主以是過予而臣以此徒取矣主過予, WYG: 必劒水擊鵠鴈陸斷駒馬}
