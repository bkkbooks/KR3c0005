  - {type: variant, offset: 544, length: 2, content: 皆不, WYG: 言多資之易為工也故治强易為謀弱亂難為計故用於秦者十變而謀希失用於燕者一變而計希得非用於秦者必智用於燕者必愚也盖治亂之資異也故周去秦為從朞年而舉衛離魏為衡半歳而亡是周滅於從衛亡於衡也使周衛緩其從衡之計而嚴其境内之治}
