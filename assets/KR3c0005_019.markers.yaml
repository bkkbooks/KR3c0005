  - {type: variant, offset: 610, length: 0, content: '', WYG: 復生将誰使定儒墨之誠乎殷周七百餘歲虞夏二千餘嵗而不䏻定儒墨之真今乃欲審堯舜之道於三千歲之前意者其不可必乎無參驗而必之者愚也弗}
  - {type: page-break, offset: 610, content: '', id: KR3c0005_WYG_019-14a, image: WYG0729/WYG0729-0785a.png}
  - {type: variant, offset: 610, length: 0, content: '', krp: 復生将誰使定儒墨之誠乎殷周七百餘歲虞夏二千餘嵗而不䏻定儒墨之真今乃欲審堯舜之道於三千歲之前意者其不可必乎無參驗而必之者愚也弗}
  - {type: variant, offset: 611, length: 0, content: '', WYG: 必而據之者誣也故明據先王必定堯舜者非愚則誣也愚誣之學襍反之行明主弗受也墨者之葬也冬日冬服夏日夏服桐棺三寸服䘮三月世主}
  - {type: variant, offset: 611, length: 0, content: '', krp: 必而據之者誣也故明據先王必定堯舜者非愚則誣也愚誣之學襍反之行明主弗受也墨者之葬也冬日冬服夏日夏服桐棺三寸服䘮三月世主}
  - {type: variant, offset: 612, length: 0, content: '', WYG: 為儉而禮之儒者破家而葬服喪三年大毁扶杖世主以為孝而禮之夫是墨子之儉将非孔子之侈也是孔子之孝将非墨子之戾也今孝戾侈儉俱在儒墨而上兼禮之漆雕之議不色撓不目逃行曲則違於臧獲行直則怒於諸侯世主以為㢘而禮之宋榮子之議設不鬬爭取不随仇不羞囹圄見侮不辱世主以為寛而禮之夫是漆雕之㢘将非宋榮之恕也是宋榮之寛将非漆雕之暴也今寛㢘恕暴俱在二子人主兼而禮之自愚誣之學襍反之辭爭而人主俱聼之故海内之士言無定術行無常儀夫冰炭不同器而乆寒暑不兼時而至雜反之學不兩立而治今兼聼雜學繆行同異之辭安得無亂乎聼行如此其於治人又必然矣今世之學士語治者多曰與貧窮地以實無資今夫與人相善也無豐年㫄入之利而獨以完給者非力則儉也與人相善也無饑饉疾疚禍罪之殃獨以貧窮者非侈則墯也侈而墯者貧而力而儉者富今上徴斂於富人以布施於貧家是奪力儉而與侈墯也而欲索民之疾作而節用不可得也今有人於此義不入危城不處軍旅不以天下大利易其脛一毛世主必從而禮之貴其智而髙其行以為輕物重生之士也夫上所以陳良田大宅設爵禄所以易民死命也今上尊貴輕物重生之士而索民之出死而重殉上事不可得也藏書策習談論聚徒役服文學而議説世主必從而禮之曰敬賢士先}
  - {type: page-break, offset: 612, content: '', id: KR3c0005_WYG_019-14b, image: WYG0729/WYG0729-0785b.png}
  - {type: page-break, offset: 612, content: '', id: KR3c0005_WYG_019-15a, image: WYG0729/WYG0729-0785c.png}
