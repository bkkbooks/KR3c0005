  - {type: variant, offset: 556, length: 0, content: '', WYG: 則亡不可振也民之故計皆就安利皆辟危窮今為之攻戰進則死於敵退則死於誅則危矣弃私家之事而必汗馬之勞家困而上弗論則窮矣窮危之所在也民安得勿避故事私門而完觧舎觧舍完則逺戰逺戰則安行貨賂而襲當塗者則求得求得則私安私安則利之所在安得勿就是}
