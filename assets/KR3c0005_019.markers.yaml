  - {type: variant, offset: 559, length: 0, content: '', WYG: 商工遊食之民少而名卑以寡趣本務而趨末作今世近習之請行則官爵可買官爵可買則商賈不卑矣姦財貨賈得用於市則商人不少矣聚歛倍農而不貴耕戰之士則耿介之士寡而髙價之民多矣是故亂國之俗其學者則稱先王之道以藉仁義盛容服而飾辯説以疑當世之法而貳人主之心其言古者為設詐稱借於外力以成其私而遺}
