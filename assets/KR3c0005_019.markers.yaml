  - {type: variant, offset: 11, length: 0, content: '', krp: 有巢氏民食果蓏蜯蛤腥臊惡臭而傷害腹胃民多疾病有聖人作鑚燧取火以化腥臊而民説之使王天下號之曰燧人氏中古之世天下}
  - {type: variant, offset: 12, length: 1, content: 吉, WYG: 水而鯀禹决瀆近古之世桀紂暴亂而湯武征伐今有搆木鑚燧於夏后氏之世者必為鯀禹笑矣有决瀆於殷周之世者必為湯武笑矣然則今有美堯舜湯武禹之道於當今之世者必為新聖笑矣是以聖人不期修古在扶世急也不法常行論世之事因為之備宋人有耕田者田中有株兎走觸株折頸而死因釋其耒而守株冀復得兎兎不可復得而身為宋國笑今欲以先王之政治當世之民皆守株之類也古者丈夫不耕草木之實足食也婦女不織禽獸之皮足衣也不事力而飬足人民少而財有餘故民不爭是以厚賞不行重罰不用而民自治今人有五子不為多子又有五子大父未死而有二十五孫是以人民衆而貨財寡事力勞而供飬薄故民爭雖倍賞累罰而不免於亂堯之王天下也茅茨不翦采椽不斵糲粢之食藜藿之羹冬日麑裘夏日葛衣雖監門之服飬不虧於此矣禹之王天下也身執耒臿以為民先股無肢脛不生毛雖臣虜之勞不苦於此矣以是言之夫古之譲天子者是去監門之飬而離臣虜之勞也故傳天下而不足多也今之縣令一日身死子孫累世絜駕故人重之是以人之於讓也輕辭古之天子難去今之縣令者薄厚之實異也夫山居而谷汲者膢臘而相遺以水谷水難得故節以水相遺也澤居苦水者買庸而决竇澤者苦水故買人功使决竇也故饑嵗之春㓜弟不饟㓜弟可惜猶不饟之也饟嵗之秋䟽客必食非疏骨肉愛過客也多少之實異也是以古之易財非仁也財多也今之爭奪非鄙也財寡也輕辭天子非高也勢薄也重爭土槖非下也權重也故聖人議多少論薄厚為之政故罰薄不為慈誅嚴不為戾稱俗而行也故事因於世而備適於事古者文王處豐鎬之間地方百里行仁義而懐西戎遂王天下徐偃王處漢東地方五百里行仁義割地而朝者三十有六國荆文王恐其害己也舉兵伐徐遂滅之故文王行仁義而王天下偃王行仁義而䘮其國是仁義用於古不用於今也故曰世異則事異當舜之時有苖不服禹将伐之舜曰不可上徳不厚而行武非道也乃修教三年執干戚舞有苖乃服共工之戰鐡銛距者及乎敵鎧甲不堅者傷乎體是干戚用於古不用於今也故曰事異則備變上古競於道德中世逐於智謀當今爭於氣力齊将攻魯魯使子貢説之齊人曰子言非不辯也吾所欲者土地也非斯言所謂也遂舉兵伐魯去門十里以為界故偃王仁義而徐亡子貢辯智而魯削以是言之夫仁義辯智非所以持國也去偃王之仁息子貢之智循徐魯之力使敵萬乘則齊荆之欲不得行於二國矣夫古今異俗新故異備如欲以寛緩之政治急世之民猶無轡策而御駻馬此不知之患也今儒墨皆稱先王兼愛天下則視民如父母何以明其然也曰司寇行刑君為之不舉樂聞死刑之報君為流涕此所舉先王也夫以君臣為如父子則必治推是言之是無亂父子也人之情性莫先於父母皆見愛而未必治也雖厚愛矣奚遽不亂今先王之愛民不過父母之愛子子未必不亂也則民奚遽治哉且夫以法行刑而君為之流涕此以效仁非以為治也夫垂泣不欲刑者仁也然而不可不刑者法也先王勝其法不聼其泣則仁之不可以為治亦明矣且民者固服於勢寡能懐於義仲尼天下聖人也脩行明道以游海内海内説其仁美其義而為服役者七十人盖貴仁者寡能義者難也故以天下之大而為服役者七十人而為仁義者一人魯哀公下主也南面君國境内之民莫敢不臣民者固服於勢勢誠易以服人故仲尼反為臣而哀公顧為君仲尼非懐其義服其勢也故以義則仲尼不服於哀公乘勢則哀公臣仲尼今學者之説人主也不乘必勝之勢而務行仁義則可以王是求人主之必及仲尼}
