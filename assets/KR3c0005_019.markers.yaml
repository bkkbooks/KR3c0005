  - {type: variant, offset: 543, length: 0, content: '', WYG: 是人君不明乎公私之利不察當否之言而誅罰不必其後也皆曰外事大可以王小可以安夫王者能攻人者也而安則不可攻也强則能攻人者也治則不可攻也治强不可責於外内政之修也今不行法術於内而事智於外則不至於治强矣鄙諺曰長袖善舞多錢善賈}
