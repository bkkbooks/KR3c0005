  - {type: variant, offset: 11, length: 0, content: '', WYG: 有巢氏民食果蓏蜯蛤腥臊惡臭而傷害腹胃民多疾病有聖人作鑚燧取火以化腥臊而民説之使王天下號之曰燧人氏中古之世天下}
