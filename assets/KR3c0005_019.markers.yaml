  - {type: variant, offset: 15, length: 0, content: '', WYG: 世之凡民皆如列徒則七十子也此必不得之數也今有不才之子父母怒之弗為改鄉人譙之弗為動師長教之弗為變夫以父母之愛鄉人之行師長之智三羙加焉而終不動其脛毛不改州部之吏操官兵推公法而求索姦人然後恐懼變其節易其行矣故父母之愛不足以教子必待州部之嚴刑者民固驕於愛聴於威矣故十仞之城樓季弗能踰者峭也千仞之山跛牂昜牧者夷也故明王峭其法而嚴其刑也布帛㝷常庸人不釋鑠金百鎰盜跖不掇金銷爛雖多跖弃而不掇不必害則不釋㝷常必害則手不掇百鎰故明主必其誅也是以賞莫如厚而信使民利之罰莫如重而必使民畏之法莫如一而固使民知之故主施賞不遷行誅無赦譽輔其賞毁随其罰則賢不肖俱盡其力矣今則不然其有功也爵之而卑其士官也以其耕作也賞之而少其家業也以其不収也外之而髙其輕世也以其犯禁罪之而多其有勇也毁譽賞罰之所加者相與悖繆也故法禁壊而民愈亂今兄弟被侵必}
