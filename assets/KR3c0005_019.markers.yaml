  - {type: variant, offset: 142, length: 364, content: 鄣盡矣臣故曰趙龜雖無遠見於燕且宜近見於秦秦以其大吉辟地有實救燕有有名趙以其大吉地削兵辱主不得意而死又非秦龜神而趙龜欺也初時者魏數年東鄉攻盡陶衛數年西鄉以失其國此非豐隆五行太一王相攝提六神五括天河殷搶歲星數年在西也又非天缺弧逆刑星熒惑奎台數年在東也故曰龜筴鬼神不足舉勝左右背鄉不足以專戰然而恃之愚莫大焉古者先王盡力於親民加事於明法彼法明則忠臣勸罰必則邪臣止忠勸邪止而地廣主尊者秦是也群臣朋黨比周以隱正道行私曲而地削主卑者山東是也亂弱者亡人之性也治強者王古之道也越王勾踐恃大朋之龜與吳戰而不勝身臣入宦于吳反國棄龜明法親民以報吳則夫差為擒故恃鬼神者慢於法恃諸侯者危其國曹恃齊而不聽宋齊攻荊而宋滅曹邢恃吳而不聽齊越伐吳而齊滅邢許恃荊而不聽魏荊攻宋而魏滅許鄭恃魏而不聽韓魏攻荊而韓滅鄭今者韓國小而恃大國主慢而聽秦魏恃齊荊為用而小國愈亡故恃, WYG: ''}
