  - {type: variant, offset: 20, length: 5, content: 鑿龜數筴兆, WYG: 世謂之有㢘隅之人知友被辱随仇者貞也㢘貞之行成而君上之法犯矣人主尊貞㢘之行而忘犯禁之罪故民程於勇而吏不能勝也不事力而衣食則謂之能不戰功而尊則謂之賢賢能之行成而兵弱而地荒矣人主説賢能之行而忘兵弱地荒之禍則私行立而公利滅矣儒以文亂法俠以武犯禁而人主兼禮之此所以亂也夫離法者罪而諸先王以文學取犯禁者誅而羣俠以私劒飬故法之所非君之所取吏之所誅上之所飬也法趣上下四相反也而無所定雖有十黄帝不能治也故行仁義者非所譽譽之則害功工文學者非所用用之則亂法楚之有直躬其父竊羊而謁之吏令尹}
