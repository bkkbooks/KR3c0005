  - {type: variant, offset: 103, length: 1, content: 計, WYG: 人皆畏其臣而易其君臣用罰則民畏臣而輕君歸其臣而去其君矣臣用賞則民歸臣而去其君此人主失刑徳之患也夫虎之所以能服狗者爪牙也使虎釋其爪牙而使狗用之則虎反服狗矣人主者以刑徳制臣者}
