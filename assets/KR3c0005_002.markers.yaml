  - {type: variant, offset: 89, length: 0, content: '', krp: 内耗其國伺其危險之陂以恐其主曰交非我不親怨非我不解而主乃信之以國聽之卑主之名以顯其身毁國之厚以利其家臣不謂智伺危以恐主毁國以利家姦雄者耳如此之臣不可謂智也此數物者險世之說也而先王之法所簡也險世所說邀取一時之利先王所簡}
  - {type: variant, offset: 90, length: 3, content: 滅宗廟, WYG: 令百代常行先王之法曰臣毋或作威毋或作利從王之指毋或作惡從王之路古者世治之民奉公法廢私術專意一行具以待任治世之人所具意行不用之於私唯以待君之任耳夫為之人主而身察百官則日不足力不給言當用法而察之且上用目則下飾觀飾觀則目視不得其真也上用耳則下飾聲飾聲則耳聴不知其偽也上用慮則下繁辭繁辭則慮惑於說也先王以三者為不足故舍己能而因法數審賞罰先王之所守要因法數審賞罰用此察之則百官不得混其真偽斯術也先王所守之要故法省而不侵獨制四海之内聰智不得用其詐隂躁不得闗其佞姦邪無所依逺在千里外不敢易其辭勢在郎中不敢蔽善飾非郎近侍之官也朝廷羣下直湊單微不敢相踰越雖單㣲直湊亦令得其職分而豪强不敢踰故治不足而日有餘上之任勢使然也立治之功日尚有餘而功教既已平羣臣既已穆則上之任用之勢不違法教使之然也夫人臣之侵其主也如地形焉即漸以往如地形之見耕漸就削㓕也使人主失端東西易面而不自知既以漸來故雖至於失端易面而主尚不能自知故先王立司南以端朝夕司南即指南車也以喻國之正法故明主使其羣臣不遊意於法之外不為惠於法之内不令遊意法外為惠法内皆所以防其侵也動無非法法所以凌過遊外私也既使羣臣動皆以法其或凌過遊外即皆私也嚴刑所以遂令懲下也所以嚴刑者}
