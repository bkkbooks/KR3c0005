  - {type: 'tls:seg', offset: 86, content: '', id: KR3c0005_tls_002-2a.8}
  - {type: variant, offset: 87, length: 0, content: '', WYG: 君臣之間明辯而易治明辯謂善惡不相掩故主讎法則可也讎謂校定可否賢者之為人臣北面委質無有二心朝廷不敢辭賤軍旅不敢辭難朝廷辭賤則下有觖上之心軍旅辭難則士有偷存之志順上之為從主之法虛心以待令而無是非也故有口不以私言為君言也有目不以私視為君視也而上盡制之為人臣者譬之若手上以修頭下以修足清暖寒熱不得不救入寒則救之以暖熱則救之以清凡此皆用手入故曰不得不救入也鏌鋣傅體不敢弗搏利刄近體手必搏之無私賢哲之臣無私事能之士賢哲之臣事能之士皆以公用之故民不越鄉而交無百里之慼既任臣以公則政平國理人無異望無外心故不越鄉而交所以無百里之慼貴賤不相踰愚智提衡而立愚智各得其所故提衡而立治之至也今夫輕爵禄易去亡以擇其主臣不謂廉易亡擇主心貪者耳如此之臣不可謂廉也詐說逆法倍主强諫臣不謂忠逆法强諫凌主者耳如此之臣不可謂忠行惠施利收下為名臣不謂仁行惠收下作福者耳如此之臣不可謂仁離俗隱居而以非上臣不謂義隱居非上揚主之惡如此之臣不可謂義外使}
  - {type: page-break, offset: 87, content: '', id: KR3c0005_WYG_002-4a, image: WYG0729/WYG0729-0612c.png}
  - {type: page-break, offset: 87, content: '', id: KR3c0005_WYG_002-4b, image: WYG0729/WYG0729-0612d.png}
  - {type: variant, offset: 87, length: 0, content: '', krp: 君臣之間明辯而易治明辯謂善惡不相掩故主讎法則可也讎謂校定可否賢者之為人臣北面委質無有二心朝廷不敢辭賤軍旅不敢辭難朝廷辭賤則下有觖上之心軍旅辭難則士有偷存之志順上之為從主之法虛心以待令而無是非也故有口不以私言為君言也有目不以私視為君視也而上盡制之為人臣者譬之若手上以修頭下以修足清暖寒熱不得不救入寒則救之以暖熱則救之以清凡此皆用手入故曰不得不救入也鏌鋣傅體不敢弗搏利刄近體手必搏之無私賢哲之臣無私事能之士賢哲之臣事能之士皆以公用之故民不越鄉而交無百里之慼既任臣以公則政平國理人無異望無外心故不越鄉而交所以無百里之慼貴賤不相踰愚智提衡而立愚智各得其所故提衡而立治之至也今夫輕爵禄易去亡以擇其主臣不謂廉易亡擇主心貪者耳如此之臣不可謂廉也詐說逆法倍主强諫臣不謂忠逆法强諫凌主者耳如此之臣不可謂忠行惠施利收下為名臣不謂仁行惠收下作福者耳如此之臣不可謂仁離俗隱居而以非上臣不謂義隱居非上揚主之惡如此之臣不可謂義外使}
  - {type: variant, offset: 89, length: 0, content: '', WYG: 内耗其國伺其危險之陂以恐其主曰交非我不親怨非我不解而主乃信之以國聽之卑主之名以顯其身毁國之厚以利其家臣不謂智伺危以恐主毁國以利家姦雄者耳如此之臣不可謂智也此數物者險世之說也而先王之法所簡也險世所說邀取一時之利先王所簡}
