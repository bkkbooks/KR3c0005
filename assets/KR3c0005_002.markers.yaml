  - {type: variant, offset: 337, length: 2, content: 魏質, krp: 乃離掘其根本木乃不神填其洶淵毋使水清淵者水之停積水清鑒之者必衆喻雖族和附之者必多也探其懐奪之威探其懐謂淵其心知其所欲為主上用之若電若雷威不下分則君命神而可畏故若雷電也八姦第九凡人臣之所道成姦者有八術道引也言姦臣或誘引君之左右或誘引君之百姓}
  - {type: variant, offset: 340, length: 1, content: 安, WYG: 成其姦邪其術有八也一曰在同牀何謂同牀曰貴夫人愛孺子便僻好色便僻得嬖羙好之色此人主之所惑也託於燕處之虞乘醉飽之時而求其所欲此必聴之術也乘因也夫人孺子等因君醉飽之時進以燕娯之具以求其所欲事無不聴為人臣者内事之以金玉使惑其主此之謂同牀以金玉之寳内事貴夫人愛孺子等使之惑主主惑則姦謀可成也二曰在㫄何謂在㫄曰優笑侏儒左右近習優笑者謂俳優能啁笑者侏儒短人也此人主未命而唯唯未使而諾諾先意承㫖觀貌察色以先主心者也此皆俱進俱退皆應皆對謂君所欲進則左右近習俱共進之所欲退則俱共退之命之則皆應問之則皆對一辭同軌以移主心者也為人臣者内事之以金玉玩好外為之行不法使之化其主此之謂在㫄姦臣既以金玉内事近習之臣外又為行非法漸化其主主既習非則其位可得而奪也三曰父兄何謂父兄曰側室公子人主之所親愛也大臣廷吏人主之所與度計也此皆盡力畢議人主之所必聴也為人臣者事公子側室以音聲子女收大臣廷吏以辭言處約言事事成則進爵益禄以勸其心使犯其主此之謂父兄收謂收攝其心也謂臣欲收大臣之心辭言為作聲譽又更處置邀共言事於君其事既成大臣必益爵禄用此以勸其心使之犯忤其主主犯則君臣有隙姦臣可以施謀也四曰養殃何謂養殃曰人主樂美宮室臺池好飾子女狗馬以娛其心此人主之殃也為人臣者盡民力以美宫室臺池重賦歛以飾子女狗馬以娛其主而亂}
