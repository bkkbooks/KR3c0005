  - {type: variant, offset: 236, length: 2, content: 取退, WYG: 生於萬物徳不同於隂陽故能成於隂陽衡不同於輕重故能知其輕重繩不同於出入故能正於出入和不同於燥濕故能均於燥濕君不同於羣臣故能制於羣臣凡此六者道之出也此六者皆自道生故曰道之出也道無雙故曰一是故明君貴獨道之容道以獨為容君臣不同道下以名禱下當陳其名言以禱於君君操其名臣效其形形名㕘同上下和調也凡聽之道以其所出反以為之入凡聼言之道或有未審必出言以難之彼必反求其理以入於此也故審名以定位明分以辯類審察其名則事位自定明識其分則物類自辯聽言之道溶若甚醉溶閒漫之貌凡聴言者欲闇以招明愚以求智故闇然若甚醉者則言者自盡}
