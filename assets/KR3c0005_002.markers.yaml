  - {type: variant, offset: 336, length: 0, content: '', WYG: 一家二貴事乃無功二貴争出命服役者不知誰從故事無功也夫妻持政子無適從夫唱婦隨者禮之正也今夫妻爭持其政故子不知所從也為人君者數披其木毋使木枝扶踈木喻臣也披為落其枝也數落木枝者喻數削黜臣之威勢也木枝扶踈將塞公閭謂臣威權覆主充塞公閭私門將實公庭將虚主將壅圍圍圉也數披其木無使木枝外拒拒謂枝之㫄生者也木枝外拒將逼主處數披其木毋使枝大本小枝大本小將不勝春風不勝春風枝將害心春風所以發生萬物者也喻君恩賞所以榮益於下者也枝本大矣春風又發其榮以増其重則披枝而害心喻臣本實矣君又加之恩賞以増其威則臣將二而危君矣公子既衆宗室憂唫宗室謂大宗適子家也庶子既衆勢凌適子故憂唫也止之之道數披其木毋使枝茂木枝數披黨}
