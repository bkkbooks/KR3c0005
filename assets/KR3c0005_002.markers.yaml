  - {type: 'tls:seg', offset: 535, content: '', id: KR3c0005_tls_002-13a.4}
  - {type: variant, offset: 535, length: 437, content: 下臣斯臣斯甚以為不然秦之有韓若人之有腹心之病也虛處則㤥然若居濕地著而不去以極走則發矣夫韓雖臣於秦未嘗不為秦病今若有卒報之事韓不可信也秦與趙為難荊蘇使齊未知何如以臣觀之則齊趙之交未必以荊蘇絕也若不絕是悉秦而應二萬乘也夫韓不服秦之義而服於強也今專於齊趙則韓必為腹心之病而發矣韓與荊有謀諸侯應之則秦必復見崤塞之患非之來也未必不以其能存韓也為重於韓也辯說屬辭飾非詐謀以釣利於秦而以韓利闚陛下夫秦韓之交親則非重矣此自便之計也臣視非之言文其淫說靡辯才甚臣恐陛下淫非之辯而聽其盜心因不詳察事情今以臣愚議秦發兵而未名所伐則韓之用事者以事秦為計矣臣斯請往見韓王使來入見大王見因內其身而勿遣稍召其社稷之臣以與韓人為市則韓可深割也因令象武發東郡之卒闚兵於境上而未名所之則齊人懼而從蘇之計是我兵未出而勁韓以威擒強齊以義從矣聞於諸侯也趙氏破膽荊人狐疑必有忠計荊人不動魏不足患也則諸侯可蠶食而盡趙氏可得與敵矣願陛下幸察愚臣之計無忽秦遂遣斯使韓也李斯往詔韓王未得見因上書曰昔秦韓戮力一意以不相侵天下莫敢犯, WYG: 手}
