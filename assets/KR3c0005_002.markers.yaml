  - {type: variant, offset: 389, length: 0, content: '', WYG: 塞其主而成其所欲此之謂民萌六曰流行何謂流行曰人主者固壅其言談希於聴論議易移以辯說君門隔於九重賢俊希得與攝故言談論議希也為人臣者求諸侯之辯士養國中之能說者使之以語其私為巧文之言流行之辭謂其言巧便聼者似若流通而可行示之以利勢懼之以患害施屬虚辭以壞其主設施綴屬浮虚之辭此之謂流行七曰威强何謂威强曰君人者以羣臣百姓為威强者也羣臣百姓之所善則君善之非羣臣百姓之所善則君不善之為人臣者聚帶劒之客養必死之士以彰其威明為己者必利不為己者必死以恐其羣臣百姓而行其私此之謂威强八曰四方何謂四方曰君人者國小則事大國}
