  - {type: variant, offset: 107, length: 1, content: 趙, krp: 其刑徳而使臣用之則君反制於臣矣反為臣所制也故田常上請爵禄而行之羣臣請君爵禄而與羣臣所以樹私徳於衆官下大斗斛而施於百姓於下而用大斗斛以施百姓所以樹私恩於衆庶也此簡公失徳而田常用之也故簡公見弑子罕謂宋君曰夫慶賞賜予者民之所喜也君自行之殺戮刑罰者民之所惡也臣請當之於是宋君失刑而子罕用之故宋君見刼田常徒用徳謂不兼刑也而簡公弑子罕徒用刑謂不兼徳也而宋君刼故今世為人臣者兼刑徳而用之則是世主之危甚於簡公宋君也故刼殺擁蔽之主非失刑徳而使臣用之而不危亡者則未嘗有也人主將欲禁姦則審合刑名者言不異事也言名也事刑也言事以相考則合不可知也為人臣者陳事而言君以其言授之事專以其事責其功功當其事事當其言則賞功不當其事事不當其言則罰故羣臣其言大而功小者則罰非罰小功也罰功不當名也羣臣其言小而功大者亦罰非不說於大功也以為不當名也害甚於有大功故罰不當名之害甚於大功功大震主亦所以為罰昔者韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而說寢寤而覺問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒故明主之畜臣臣不得越官而有功不得陳言而不當越官則死不當則罪守業其官所言者貞也守業以當官守官以當言如此者貞也則羣臣不得朋黨相為矣人主有二患任賢則臣將乘於賢以刼其君賢者必多才術故能乘賢以刼君也妄舉則事沮不勝妄舉謂不擇賢則其事必沮而不勝沮毁敗也故人主好賢則羣臣飾行以要君欲則是羣臣之情不效飾行則偽外故其内情不效效顯也羣臣之情不效則人主無以異其臣矣莫不飾行故真偽不分也故越王好勇而民多輕死楚靈王好細腰而國中多餓人齊桓公妬外而好内故豎刁自宫以治内桓公好味易牙蒸其首子而進之燕子噲好賢故子之明不受國子之燕之臣也以噲好賢故陳禪讓之事令噲不受國以譲已因以簒之故君見惡則羣臣匿端匿其端避所惡也君見好則羣臣誣能誣其能欲見用人主欲見則羣臣之情態得其資矣羣臣之情態皆欲求利君見其好惡則知利其所存故得以為資故子之託於賢以奪其君者也竪刁易牙因君之欲以侵其君者也其卒子噲以亂死子噲燕王名也桓公蟲流出尸而不𦵏此其故何也人君以情借臣}
