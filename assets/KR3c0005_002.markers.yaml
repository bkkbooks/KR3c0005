  - {type: variant, offset: 333, length: 0, content: '', WYG: 較其非若天若地是謂累解天地髙厚不可測者也君用意如天地則上因下考之累可解也若地若天孰踈孰親天無私覆地無私載故無踈無親也能象天地是謂聖人象天地之髙厚而無私也欲治其内置而勿親内謂君之機宻也欲令機事不失所置之臣勿私親之欲治其外官置一人不使自恣安得移并外謂百官之政也欲令官政不失則每官置一人焉夫兩雄必爭官有二人適足以増其猜競故一人則専而不恣豈有移易并兼之事大臣之門唯恐多人臣門多人威權在之故也凡治之極下不能得神隱不測故下不能得之治道無踰此者故曰治之極也周合刑名民乃守職去此更求是謂大惑刑名不差則民守職此治之至要者也去至要而不用非惑而何也猾民愈衆姦邪滿側亦既大惑故姦衆而邪滿故曰毋富人而貸焉毋貴人而逼焉君之富臣更從臣貸君之貴臣更令臣逼此倒置之徒不識理道者也毋專信一人而失其都國焉專信一人則勢聚焉故失其都腓大於股難以趣走臣重於君難以為理主失其神虎隨其後失神謂君可測知如臣能為虎隨後以伺其隙主上不知虎將為狗主既不知臣之為虎則臣匿威藏用外若狗然所以隂謀其事主不蚤止狗益無己臣既以虎為狗君不知而止之如此則同事相求皆為狗益其朋黨無有已時也虎成其羣以弑其母母則君也既朋黨相益即是虎成羣也虎既成羣母必見弑為主而無臣奚國之有臣皆為虎故曰無臣也主施其法大虎將怯主施其刑大虎自寧主既施刑虎則懼而履道故得安寧也法刑狗信虎化為人復反其真謂君君臣臣也欲為其國必伐其聚聚為朋黨交結伐之者所以離散其朋黨也不伐其聚彼將聚衆欲為其地必適其賜地亦國也欲治其國必令賜與適宜不適其賜亂人求益彼求我予假仇人斧亂人求益而與之則是以斧假仇人也假之不可彼將用之以伐我以斧與仇則是假與不可仇既得斧我之見伐不亦宜哉黄帝有言曰上下一日百戰夫上位可寳上利可貪居下者常有羡欲之心欲静則不能欲取則不得二者交戰一日有百也下匿其私用試其上上操度量以割其下下既有羡之心常匿私以試上故上必當操度量以割斷其下也故度量之立主之寳也度量可以割斷下故為主之寳也黨與之具臣之寳也黨與具可以奪君位故為臣寳臣之所不弑其君者黨與不具也故上失􅀈寸下得㝷常四指為􅀈上於度量少有所失下之得利已數倍多矣有國之君不大其都大其都臣將據以叛國有道之臣不貴其家大夫稱家貴其家臣將凌己有道之君不貴其臣貴其臣臣將貴勢過已貴之富之僃將代之臣既貴富僃必將代君也僃危恐殆急置太子禍乃無從起太子者君之副貳國之重鎮今欲僃其危殆必速置之則禍端自息矣内索出圉必身自執其度量臣人四面謀君常在圉今在内欲求出圉但身執度量則可矣厚者虧之薄者靡之厚謂臣黨與衆勢位髙也位如此必虧之使薄也虧靡有量毋使民比周同}
