  - {type: variant, offset: 206, length: 6, content: 韓魏資趙假齊, WYG: 見君之陽陰陽接則君臣通也左右既立開門而當左右謂左輔右弼也君臣既通輔弼之臣斯立如此則同類相從同聲相應四方賢才畢來矣君但開門而當之無所遮擁也當受也勿變勿易與二俱行賢才既來莫敢變易但令輔弼二臣俱行職事行之不已既行職事有功而可此俱皆賢臣之助不須有所除去無不隨化而成是謂履理也君能履理故有成功夫物者有所宜材者有所施各處其宜故上下無為使雞司夜令狸執䑕皆用其能上乃無事上有所長事乃不方所長謂任材用物皆得其宜故事不一方而成矜而好能下之所欺居上者矜好其能則下各飾其能}
