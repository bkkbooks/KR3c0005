  - {type: variant, offset: 337, length: 2, content: 魏質, WYG: 乃離掘其根本木乃不神填其洶淵毋使水清淵者水之停積水清鑒之者必衆喻雖族和附之者必多也探其懐奪之威探其懐謂淵其心知其所欲為主上用之若電若雷威不下分則君命神而可畏故若雷電也八姦第九凡人臣之所道成姦者有八術道引也言姦臣或誘引君之左右或誘引君之百姓}
