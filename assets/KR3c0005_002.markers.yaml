  - {type: variant, offset: 85, length: 1, content: 弱, WYG: 自舉也使法量功不自度也擇人量功之法布在方冊謂成國之舊制能者不可敝敗者不可飾譽者不能進非者弗能退以法量功故能不可敝敗不可飾也以法飾人故譽不能進非不能退也}
