  - {type: variant, offset: 81, length: 1, content: 兵, WYG: 輕重權衡所以稱輕重也臣既妙於輕重使之聽逺故不可欺以輕重也今若以譽進能則臣離上而下比周能由譽進所以比周於下求其虚譽若以黨舉官則民務交而不求用於法官由黨舉所以務交求其親援故官之失能者其國亂以譽為賞以毁為罰也則好賞惡罰之人釋公行行私術比周以相為也忘主外交以進其與與謂黨與也則其下所以為上者薄矣交衆與多外内朋黨雖有大過其蔽多矣朋黨既多遞相隠蔽雖有大過無從而知也故忠臣危死於非罪姦邪之臣安利於無功邪臣朋黨則忠臣横以非罪而見䧟邪臣輒以無功而獲利也忠臣之所以危死而不以其罪則良臣伏矣臣傷其類故良臣伏也姦邪之臣安利不以功則姦臣進矣同氣相求故姦臣進也此亡之本也若是則羣臣廢法而行私重輕公法矣私重謂朋黨私相重也數至能人之門此其所以私重也不一至主之廷百慮私家之便不一圖主之國屬數雖多非所以尊君也君之徒屬之數雖多皆行私重故非尊君百官雖具非所以任國也百官雖備皆慮私家之便故非任國任謂當其事也然則主有人主之名而實託於羣臣之家也威權下移故也故臣曰亡國之廷無人焉無憂國之人也臣韓非自謂也廷無人者非朝廷之衰也家務相益不務厚國大臣務相尊而不務尊君小臣奉禄養交不以官為事此其所以然者由主之不上斷於法而信下為之也故}
