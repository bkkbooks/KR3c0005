  - {type: variant, offset: 94, length: 2, content: 西面, WYG: 以遂令且懲下也遂通也威不貸錯制不共門威當主錯故不貸臣令錯制當主裁故不共臣同門錯置也威制共則衆邪彰矣威制共臣則制邪顯用矣法不信則君行危矣法不信則後不可行故君危也刑不斷則邪不勝矣故曰巧匠目意中繩然必先以規矩為度匠之目意雖復中繩而不可用當以規矩為其度上智㨗舉中事必以先王之法為比君知雖敏而中事不可用當以先王之法為其比例也故繩直而枉木斵凖夷而髙科削科等也削髙等令就下也權衡縣而重益輕减重益輕權衡乃平斗石設而多益少減多益少斗石乃滿故以法治國舉措而已矣舉法而措之治自平法不阿貴繩不撓曲法之所加智者弗能辭勇者弗敢爭刑過不避大臣賞善不遺匹夫故矯上之失詰下之邪治亂決繆絀羡齊非絀其健羡齊其為非絀音黜一民之軌莫如法屬官威民屬官欲令官之屬已退淫殆止詐偽莫如刑刑重則不敢以貴易賤不敢以貴勢慢易於賤也法審則上尊而不侵上尊而不侵則主强而守要故先王貴之而傳之傳之於後人主釋法用私則上下不别矣二柄第七明主之所導制其臣者二柄而已矣導引也言道所以引喻其臣而制斷之也二柄者刑徳也何謂刑徳曰殺戮之謂刑慶賞之謂徳為人臣者畏誅罰而利慶賞故人主自用其刑徳則羣臣畏其威而歸其利矣故世之姦臣則不然所惡則能得之其主而罪之姦臣所惡則巧詐媚惑其主得其威而罪也所愛則能得之其主而賞之姦臣所愛亦以巧詐媚惑其主得之恩而賞之今人主非使賞罰之威利出於已也聽其臣而}
