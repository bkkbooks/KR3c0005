  - {type: variant, offset: 215, length: 0, content: '', WYG: 材居上好生辯惠則下因其材以入其諛佞材則辯惠也上下易用國故不治上代下任下操上權則國不治用一之道以名為首一謂道可以常行古今莫二者唯其正名乎故曰以名為首名正物定名倚物徙故聖人執一以静使名自命令事自定既使名命事故事自定也不見其采下故素正采故皆事也上不見事則下事既素且正因而任之使自事之因其事而任之彼則自舉其事因而予之彼將自舉之因其事以與之彼則自舉之正與處之使皆自定之上以名舉之凡事皆使彼自定在上者}
