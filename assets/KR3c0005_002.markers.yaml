  - {type: variant, offset: 449, length: 5, content: 今年耳且趙, WYG: 㫄也其於父兄大臣也聴其言也必使以罰任於後當則任之不當則罰之不令妄舉防三姦之父兄其於觀樂玩好也必令之有所出謂知其所從來不使擅進不使擅退羣臣虞其意防四姦之飬殃也虞度也必不令度君意擅有所進退也其於徳施也縱禁財發墳倉積栗於倉若墳然利於民者必出於君不使人臣私其徳防五姦之民萌也其於說議也稱譽者所善毁疵者所惡必實其能察其過考實其能察詳其過不使羣臣相為語防六姦之流行其於勇力之士也軍旅之功無踰賞邑鬭之勇無赦罪邑鬭勇者謂恃力}
