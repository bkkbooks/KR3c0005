  - {type: variant, offset: 1273, length: 324, content: 復有亡地之患臣斯不得見請歸報秦韓之交必絕矣斯之來使以奉秦王之歡心願效便計豈陛下所以逆賤臣者邪臣斯願得一見前進道愚計退就葅戮願陛下有意焉今殺臣於韓則大王不足以強若不聽臣之計則禍必搆矣秦發兵不留行而韓之社稷憂矣臣斯暴身於韓之市則雖欲察賤臣愚忠之計不可得已邊鄙殘國固守鼓鐸之聲於耳而乃用臣斯之計晚矣且夫韓之兵於天下可知也今又背強秦夫棄城而敗軍則反掖之寇必襲城矣城盡則聚散聚散則無軍矣城固守則秦必興兵而圍王一都道不通則難必謀其勢不救左右計之者不用願陛下熟圖之若臣斯之所言有不應事實者願大王幸使得畢辭於前乃就吏誅不晚也秦王飲食不甘遊觀不樂意專在圖趙使臣斯來言願得身見因急與陛下有計也今使臣不通則韓之信未可知也夫秦必釋趙之患而移兵於韓願陛下幸復察圖之而賜臣報決, WYG: 非子卷二}
