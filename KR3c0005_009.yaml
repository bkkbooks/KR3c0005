body:
  text: 八姦第九凡人臣之所道成姦者有八術一曰在同床何謂同床曰貴夫人愛孺子便僻好色此人主之所惑也託於燕處之虞乘醉飽之時而求其所欲此必聽之術也為人臣者內事之以金玉使惑其主此之謂同床二曰在旁何謂在旁曰優笑侏儒左右近習此人主未命而唯唯未使而諾諾先意承旨觀貌察色以先主心者也此皆俱進俱退皆應皆對一辭同軌以移主心者也為人臣者內事之以金玉玩好外為之行不法使之化其主此之謂在旁三曰父兄何謂父兄曰側室公子人主之所親愛也大臣廷吏人主之所與度計也此皆盡力畢議人主之所必聽也為人臣者事公子側室以音聲子女收大臣廷吏以辭言處約言事事成則進爵益祿以勸其心使犯其主此之謂父兄四曰養殃何謂養殃曰人主樂美宮室臺池好飾子女狗馬以娛其心此人主之殃也為人臣者盡民力以美宮室臺池重賦斂以飾子女狗馬以娛其主而亂其心從其所欲而樹私利其間此謂養殃五曰民萌何謂民萌曰為人臣者散公財以說民人行小惠以取百姓使朝廷市井皆勸譽己以塞其主而成其所欲此之謂民萌六曰流行何謂流行曰人主者固壅其言談希於聽論議易移以辯說為人臣者求諸侯之辯士養國中之能說者使之以語其私為巧文之言流行之辭示之以利勢懼之以患害施屬虛辭以壞其主此之謂流行七曰威強何謂威強曰君人者以群臣百姓為威強者也群臣百姓之所善則君善之非群臣百姓之所善則君不善之為人臣者聚帶劍之客養必死之士以彰其威明為己者必利不為己者必死以恐其群臣百姓而行其私此之謂威強八曰四方何謂四方曰君人者國小則事大國兵弱則畏強兵大國之所索小國必聽強兵之所加弱兵必服為人臣者重賦斂盡府庫虛其國以事大國而用其威求誘其君甚者舉兵以聚邊境而制斂於內薄者數內大使以震其君使之恐懼此之謂四方凡此八者人臣之所以道成姦世主所以壅劫失其所有也不可不察焉明君之於內也娛其色而不行其謁不使私請其於左右也使其身必責其言不使益辭其於父兄大臣也聽其言也必使以罰任於後不令妄舉其於觀樂玩好也必令之有所出不使擅進擅退不使群臣虞其意其於德施也縱禁財發墳倉利於民者必出於君不使人臣私其德其於說議也稱譽者所善毀疵者所惡必實其能察其過不使群臣相為語其於勇力之士也軍旅之功無踰賞邑鬭之勇無赦罪不使群臣行私財其於諸侯之求索也法則聽之不法則距之所謂亡君者非莫有其國也而有之者皆非己有也令臣以外為制於內則是君人者亡也聽大國為救亡也而亡亟於不聽故不聽群臣知不聽則不外諸侯諸侯知不聽則不受臣之誣其君矣明主之為官職爵祿也所以進賢材勸有功也故曰賢材者處厚祿任大官功大者有尊爵受重賞官賢者量其能賦祿者稱其功是以賢者不誣能以事其主有功者樂進其業故事成功立今則不然不課賢不肖不論有功勞用諸侯之重聽左右之謁父兄大臣上請爵祿於上而下賣之以收財利及以樹私黨故財利多者買官以為貴有左右之交者請謁以成重功勞之臣不論官職之遷失謬是以吏偷官而外交棄事而親財是以賢者懈怠而不勸有功者隳而簡其業此亡國之風也
