body:
  text: 六反第四十六畏死遠難降北之民也而世尊之曰貴生之士學道立方離法之民也而世尊之曰文學之士遊居厚養牟食之民也而世尊之曰有能之士語曲牟知偽詐之民也而世尊之曰辨智之士行劍攻殺暴憿之民也而世尊之曰磏勇之士活賊匿姦當死之民也而世尊之曰任譽之士此六民者世之所譽也赴險殉誠死節之民而世少之曰失計之民也寡聞從令全法之民也而世少之曰朴陋之民也力作而食生利之民也而世少之曰寡能之民也嘉厚純粹整穀之民也而世少之曰愚戇之民也重命畏事尊上之民也而世少之曰怯懾之民也挫賊遏姦明上之民也而世少之曰讇讒之民也此六民者世之所毀也姦偽無益之民六而世譽之如彼耕戰有益之民六而世毀之如此此之謂六反布衣循私利而譽之世主聽虛聲而禮之禮之所在利必加焉百姓循私害而訾之世主壅於俗而賤之賤之所在害必加焉故名賞在乎私惡當罪之民而毀害在乎公善宜賞之士索國之富強不可得也古者有諺曰為政猶沐也雖有棄髮必為之愛棄髮之費而忘長髮之利不知權者也夫彈痤者痛飲藥者苦為苦憊之故不彈痤飲藥則身不活病不已矣今上下之接無子父之澤而欲以行義禁下則交必有郤矣且父母之於子也産男則相賀産女則殺之此俱出父母之懷衽然男子受賀女子殺之者慮其後便計之長利也故父母之於子也猶用計算之心以相待也而況無父子之澤乎今學者之説人主也皆去求利之心出相愛之道是求人主之過父母之親也此不熟於論恩詐而誣也故明主不受也聖人之治也審於法禁法禁明著則官治必於賞罰賞罰不阿則民用民用官治則國富國富則兵強而霸王之業成矣霸王者人主之大利也人主挾大利以聽治故其任官者當能其賞罰無私使士民明焉盡力致死則功伐可立而爵祿可致爵祿致而富貴之業成矣富貴者人臣之大利也人臣挾大利以從事故其行危至死其力盡而不望此謂君不仁臣不忠則可以霸王矣夫姦必知則備必誅則止不知則肆不誅則行夫陳輕貨於幽隱雖曾史可疑也懸百金於市雖大盜不取也不知則曾史可疑於幽隱必知則大盜不取懸金於市故明主之治國也衆其守而重其罪使民以法禁而不以廉止母之愛子也倍父父令之行於子者十母吏之於民無愛令之行於民也萬父母積愛而令窮吏用威嚴而民聽從嚴愛之策亦可決矣且父母之所以求於子也動作則欲其安利也行身則欲其遠罪也君上之於民也有難則用其死安平則盡其力親以厚愛關子於安利而不聽君以無愛利求民之死力而令行明主知之故不養恩愛之心而增威嚴之勢故母厚愛處子多敗推愛也父薄愛教笞子多善用嚴也今家人之治産也相忍以飢寒相強以勞苦雖犯軍旅之難飢饉之患溫衣美食者必是家也相憐以衣食相惠以佚樂天飢歲荒嫁妻賣子者必是家也故法之為道前苦而長利仁之為道偷樂而後窮聖人權其輕重出其大利故用法之相忍而棄仁人之相憐也學者之言皆曰輕刑此亂亡之術也凡賞罰之必者勸禁也賞厚則所欲之得也疾罰重則所惡之禁也急夫欲利者必惡害害者利之反也反於所欲焉得無惡欲治者必惡亂亂者治之反也是故欲治甚者其賞必厚矣其惡亂甚者其罰必重矣今取於輕刑者其惡亂不甚也其欲治又不甚也此非特無術也又乃無行是故決賢不肖愚知之策在賞罰之輕重且夫重刑者非為罪人也明主之法揆也治賊非治所治也治所治也者是治死人也刑盜非治所刑也治所刑也者是治胥靡也故曰重一姦之罪而止境內之邪此所以為治也重罰者盜賊也而悼懼者良民也欲治者奚疑於重刑若夫厚賞者非獨賞功也又勸一國受賞者甘利未賞者慕業是報一人之功而勸境內之衆也欲治者何疑於厚賞今不知治者皆曰重刑傷民輕刑可以止姦何必於重哉此不察於治者也夫以重止者未必以輕止也以輕止者必以重止矣是以上設重刑者而姦盡止姦盡止則此奚傷於民也所謂重刑者姦之所利者細而上之所加焉者大也民不以小利加大罪故姦必止者也所謂輕刑者姦之所利者大上之所加焉者小也民慕其利而傲其罪故姦不止也故先聖有諺曰不躓於山而躓於垤山者大故人順之垤微小故人易之也今輕刑罰民必易之犯而不誅是驅國而棄之也犯而誅之是為民設陷也是故輕罪者民之垤也是以輕罪之為民道也非亂國也則設民陷也此則可謂傷民矣今學者皆道書策之頌語不察當世之實事曰上不愛民賦斂常重則用不足而下怨上故天下大亂此以為足其財用以加愛焉雖輕刑罰可以治也此言不然矣凡人之取重罰固已足之之後也雖財用足而後厚愛之然而輕刑猶之亂也夫富家之愛子財貨足用財貨足用則輕用輕用則侈泰親愛之則不忍不忍則驕恣侈泰則家貧驕恣則行暴此雖財用足而愛厚輕刑之患也凡人之生也財用足則隳於用力上懦則肆於為非財用足而力作者神農也上治懦而行修者曾史也夫民之不及神農曾史亦明矣老聃有言曰知足不辱知止不殆夫以殆辱之故而不求於足之外者老聃也今以為足民而可以治是以民為皆如老聃也故桀貴在天子而不足於尊富有四海之內而不足於寶君人者雖足民不能足使為天子而桀未必以為天子為足也則雖足民何可以為治也故明主之治國也適其時事以致財物論其稅賦以均貧富厚其爵祿以盡賢能重其刑罰以禁姦邪使民以力得富以事致貴以過受罪以功致賞而不念慈惠之賜此帝王之政也人皆寐則盲者不知皆默則喑者不知覺而使之視問而使之對則喑盲者窮矣不聽其言也則無術者不知不任其身也則不肖者不知聽其言而求其當任其身而責其功則無術不肖者窮矣夫欲得力士而聽其自言雖庸人與烏獲不可別也授之以鼎俎則罷健效矣故官職者能士之鼎俎也任之以事而愚智分矣故無術者得於不用不肖者得於不任言不用而自文以為辨身不任而自飾以為高世主眩其辨濫其高而尊貴之是不須視而定明也不待對而定辨也喑盲者不得矣明主聽其言必責其用觀其行必求其功然則虛舊之學不談矜誣之行不飾矣
