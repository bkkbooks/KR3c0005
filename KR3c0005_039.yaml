body:
  text: 難四第三十九衛孫文子聘於魯公登亦登叔孫穆子趨進曰諸侯之會寡君未嘗後衛君也今子不後寡君一等寡君未知所過也子其少安孫子無辭亦無悛容穆子退而告人曰孫子必亡亡臣而不後君過而不悛亡之本也或曰天子失道諸侯伐之故有湯武諸侯失道大夫伐之故有齊晉臣而伐君者必亡則是湯武不王晉齊不立也孫子君於衛而後不臣於魯臣之君也君有失也故臣有得也不命亡於有失之君而命亡於有得之臣不察魯不得誅衛大夫而衛君之明不知不悛之臣孫子雖有是二也巨以亡其所以亡其失所以得君也或曰臣主之施分也臣能奪君者以得相踦也故非其分而取者衆之所奪也辭其分而取者民之所豫也是以桀索岷山之女紂求比干之心而天下離湯身易名武身受詈而海內服趙咺走山田氏外僕而齊晉從則湯武之所以王齊晉之所以立非必以其君也彼得之而後以君處之也今未有其所以得而行其所以處是倒義而逆德也倒義則事之所以敗也逆德則怨之所以聚也敗亡之不察何也魯陽虎欲攻三桓不剋而奔齊景公禮之鮑文子諫曰不可陽虎有寵於季氏而欲伐於季孫貪其富也今君富於季孫而齊大於魯陽虎所以盡詐也景公乃囚陽虎或曰千金之家其子不仁人之急利甚也桓公五伯之上也爭國而殺其兄其利大也臣主之間非兄弟之親也劫殺之功制萬乘而享大利則群臣孰非陽虎也事以微巧成以踈拙敗群臣之未起難也其備未具也群臣皆有陽虎之心而君上不知是微而巧也陽虎貪知於天下以欲攻上是疏而拙也不使景公加誅於齊之巧臣而使加誅於拙虎是鮑文子之說反也臣之忠詐在君所行也君明而嚴則群臣忠君懦而暗則群臣詐知微之謂明無救赦之謂嚴不知齊之巧臣而誅魯之成亂不亦妄乎或曰仁貪不同心故公子目夷辭宋而楚商臣弒父鄭去疾豫弟而魯桓弒兄五伯兼并而以桓律人則是皆無貞廉也且君明而嚴則群臣忠陽虎為亂於魯不成而走入齊而不誅是承為亂也君明則誅知陽虎之可以濟亂也此見微之情也語曰諸侯以國為親君嚴則陽虎之罪不可失此無救赦之實也則誅陽虎所以使群臣忠也未知齊之巧臣而廢明亂之罰責於未然而不誅昭昭之罪此則妄矣今誅魯之罪亂以威群臣之有姦心者而可以得季孟叔孫之親鮑文之說何以為反鄭伯將以高渠彌為卿昭公惡之固諫不聽及昭公即位懼其殺己也辛卯弒昭公而立子亶也君子曰昭公知所惡矣公子圉曰高伯其為戮乎報惡已甚矣或曰父子圉之言也不亦反乎昭公之及於難者報惡晚也然則高伯之晚於死者報惡甚也明君不懸怒懸怒則罪臣輕舉以行計則人主危故靈臺之飲衛侯怒而不誅故褚師作難食黿之羹鄭君怒而不誅故子公殺君君子之舉知所惡非甚之也曰知之若是其明也而不行誅焉以及於死故知所惡以見其無權也人君非獨不足於見難而已或不足於斷制今昭公見惡稽罪而不誅使渠彌含憎懼死以徼幸故不免於殺是昭公之報惡不甚也或曰報惡甚者大誅報小罪大誅報小罪也者獄之至也獄之患故非在所以誅也以讎之衆也是以晉厲公滅三郤而欒中行作難鄭子都殺伯咺而食鼎起禍吳王誅子胥而越勾踐成霸則衛侯之逐鄭靈之弒不以褚師之不死而公父之不誅也以未可以怒而有怒之色未可誅而有誅之心怒其當罪而誅不逆人心雖懸奚害夫未立有罪即位之後宿罪而誅齊胡之所以滅也君行之臣猶有後患況為臣而行之君乎誅既不當而以盡為心是與天下為讎也則雖為戮不亦可乎衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢淺矣公曰奚夢夢見竈者為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈乎侏儒曰夫日兼照天下一物不能當也人君兼照一國一人不能壅也故將見人主而夢日也夫竈一人煬焉則後人無從見矣或者一人煬君邪則臣雖夢竈不亦可乎公曰善遂去雍鉏退彌子瑕而用司空狗或曰侏儒善假於夢以見主道矣然靈公不知侏儒之言也去雍鉏退彌子瑕而用司空狗者是去所愛而用所賢也鄭子都賢慶建而壅焉燕子噲賢子之而壅焉夫去所愛而用所賢未免使一人煬己也不肖者煬主不足以害明今不加知而使賢者煬己則必危矣或曰屈到嗜芰文王嗜菖蒲葅非正味也而二賢尚之所味不必美晉靈侯說參無恤燕噲賢子之非正士也而二君尊之所賢不必賢也非賢而賢用之與愛而用之同賢誠賢而舉之與用所愛異狀故楚莊舉孫叔而霸商辛用費仲而滅此皆用所賢而事相反也燕噲雖舉所賢而同於用所愛衛奚距然哉則侏儒之未可見也君壅而不知其壅也已見之後而知其壅也故退壅臣是加知之也曰不加知而使賢者煬己則必危而今以加知矣則雖煬己必不危矣
