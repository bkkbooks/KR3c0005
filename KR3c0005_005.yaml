body:
  text: 主道第五道者萬物之始是非之紀也是以明君守始以知萬物之源治紀以知善敗之端故虛靜以待令令名自命也令事自定也虛則知實之情靜則知動者正有言者自為名有事者自為形形名參同君乃無事焉歸之其情故曰君無見其所欲君見其所欲臣自將雕琢君無見其意君見其意臣將自表異故曰去好去惡臣乃見素去智去舊臣乃自備故有智而不以慮使萬物知其處有賢而不以行觀臣下之所因有勇而不以怒使群臣盡其武是故去智而有明去賢而有功去勇而有強群臣守職百官有常因能而使之是謂習常故曰寂乎其無位而處漻乎莫得其所明君無為於上群臣竦懼乎下明君之道使智者盡其慮而君因以斷事故君不窮於智賢者勑其材君因而任之故君不窮於能有功則君有其賢有過則臣任其罪故君不窮於名是故不賢而為賢者師不智而為智者正臣有其勞君有其成功此之謂賢主之經也道在不可見用在不可知虛靜無事以暗見疵見而不見聞而不聞知而不知知其言以往勿變勿更以參合閲焉官有一人勿令通言則萬物皆盡函掩其跡匿其端下不能原去其智絶其能下不能意保吾所以往而稽同之謹執其柄而固握之絶其望破其意毋使人欲之不謹其閉不固其門虎乃將存不慎其事不掩其情賊乃將生弒其主代其所人莫不與故謂之虎處其主之側為姦匿聞其主之忒故謂之賊散其黨收其餘閉其門奪其輔國乃無虎大不可量深不可測同合刑名審驗法式擅為者誅國乃無賊是故人主有五壅臣閉其主曰壅臣制財利曰壅臣擅行令曰壅臣得行義曰壅臣得樹人曰壅臣閉其主則主失位臣制財利則主失德臣擅行令則主失制臣得行義則主失明臣得樹人則主失黨此人主之所以獨擅也非人臣之所以得操也人主之道靜退以為寶不自操事而知拙與巧不自計慮而知福與咎是以不言而善應不約而善增言已應則執其契事已增則操其符符契之所合賞罰之所生也故群臣陳其言君以其言授其事事以責其功功當其事事當其言則賞功不當其事事不當其言則誅明君之道臣不得陳言而不當是故明君之行賞也曖乎如時雨百姓利其澤其行罰也畏乎如雷霆神聖不能解也故明君無偷賞無赦罰賞偷則功臣墮其業赦罰則姦臣易為非是故誠有功則雖疏賤必賞誠有過則雖近愛必誅疏賤必賞近愛必誅則疏賤者不怠而近愛者不驕也
