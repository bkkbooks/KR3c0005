body:
  text: 有度第六國無常強無常弱奉法者強則國強奉法者弱則國弱荊莊王并國二十六開地三千里莊王之氓社稷也而荊以亡齊桓公并國三十啓地三千里桓公之氓社稷也而齊以亡燕襄王以河為境以薊為國襲涿方城殘齊平中山有燕者重無燕者輕襄王之氓社稷也而燕以亡魏安釐王攻燕救趙取地河東攻盡陶魏之地加兵於齊私平陸之都攻韓拔管勝於淇下睢陽之事荊軍老而走蔡召陵之事荊軍破兵四布於天下威行於冠帶之國安釐王死而魏以亡故有荊莊齊桓則荊齊可以霸有燕襄魏安釐則燕魏可以強今皆亡國者其群臣官吏皆務所以亂而不務所以治也其國亂弱矣又皆釋國法而私其外則是負薪而救火也亂弱甚矣故當今之時能去私曲就公法者民安而國治能去私行行公法者則兵強而敵弱故審得失有法度之制者加以群臣之上則主不可欺以詐偽審得失有權衡之稱者以聽遠事則主不可欺以天下之輕重今若以譽進能則臣離上而下比周若以黨舉官則民務交而不求用於法故官之失能者其國亂以譽為賞以毀為罰也則好賞惡罰之人釋公行行私術比周以相為也忘主外交以進其與則其下所以為上者薄矣交衆與多外內朋黨雖有大過其蔽多矣故忠臣危死於非罪姦邪之臣安利於無功忠臣之所以危死而不以其罪則良臣伏矣姦邪之臣安利不以功則姦臣進矣此亡之本也若是則群臣廢法而行私重輕公法矣數至能人之門不一至主之廷百慮私家之便不一圖主之國屬數雖多非所以尊君也百官雖具非所以任國也然則主有人主之名而實託於群臣之家也故臣曰亡國之廷無人焉廷無人者非朝廷之衰也家務相益不務厚國大臣務相尊而不務尊君小臣奉祿養交不以官為事此其所以然者由主之不上斷於法而信下為之也故明主使法擇人不自舉也使法量功不自度也能者不可弊敗者不可飾譽者不能進非者弗能退則君臣之間明辨而易治故主讎法則可也賢者之為人臣北面委質無有二心朝廷不敢辭賤軍旅不敢辭難順上之為從主之法虛心以待令而無是非也故有口不以私言有目不以私視而上盡制之為人臣者譬之若手上以修頭下以修足清暖寒熱不得不救鏌鋣傅體不敢弗搏無私賢哲之臣無私事能之士故民不越鄉而交無百里之戚貴賤不相踰愚智提衡而立治之至也今夫輕爵祿易去亡以擇其主臣不謂廉詐説逆法倍主強諫臣不謂忠行惠施利收下為名臣不謂仁離俗隱居而以詐非上臣不謂義外使諸侯內耗其國伺其危嶮之陂以恐其主曰交非我不親怨非我不解而主乃信之以國聽之卑主之名以顯其身毀國之厚以利其家臣不謂智此數物者險世之説也而先王之法所簡也先王之法曰臣毋或作威毋或作利從王之指無或作惡從王之路古者世治之民奉公法廢私術專意一行具以待任夫為人主而身察百官則日不足力不給且上用目則下飾觀上用耳則下飾聲上用慮則下繁辭先王以三者為不足故舍己能而因法數審賞罰先王之所守要故法省而不侵獨制四海之內聰智不得用其詐險躁不得關其佞姦邪無所依遠在千里外不敢易其辭勢在郎中不敢蔽善飾非朝廷群下直湊單微不敢相踰越故治不足而日有餘上之任勢使然也夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立司南以端朝夕故明主使其群臣不遊意於法之外不為惠於法之內動無非法峻法所以禁過外私也嚴刑所以遂令懲下也威不二錯制不共門威制共則衆邪彰矣法不信則君行危矣刑不斷則邪不勝矣故曰巧匠目意中繩然必先以規矩為度上智捷舉中事必以先王之法為比故繩直而枉木斫準夷而高科削權衡縣而重益輕斗石設而多益少故以法治國舉措而已矣法不阿貴繩不撓曲法之所加智者弗能辭勇者弗敢爭刑過不避大臣賞善不遺匹夫故矯上之失詰下之邪治亂決繆絀羡齊非一民之軌莫如法厲官威民退淫殆止詐偽莫如刑刑重則不敢以貴易賤法審則上尊而不侵上尊而不侵則主強而守要故先王貴之而傳之人主釋法用私則上下不別矣
