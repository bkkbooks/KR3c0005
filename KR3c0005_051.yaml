body:
  text: 忠孝第五十一天下皆以孝悌忠順之道為是也而莫知察孝悌忠順之道而審行之是以天下亂皆以堯舜之道為是而法之是以有弒君有曲於父堯舜湯武或反君臣之義亂後世之教者也堯為人君而君其臣舜為人臣有臣其君湯武為人臣而弒其主刑其尸而天下譽之此天下所以至今不治者也夫所謂明君者能畜其臣者也所謂賢臣者能明法辟治官職以戴其君者也今堯自以為明而不能以畜舜舜自以為賢而不能以戴堯湯武自以為義而弒其君長此明君且常與而賢臣且常取也故至今為人子者有取其父之家為人臣者有取其君之國者矣父而讓子君而讓臣此非所以定位一教之道也臣之所聞曰臣事君子事父妻事夫三者順則天下治三者逆則天下亂此天下之常道也明王賢臣而弗易也則人主雖不肖臣不敢侵也今夫上賢任智無常逆道也而天下常以為治是故田氏奪呂氏於齊戴氏奪子氏於宋此皆賢且智也豈愚且不肖乎是廢常上賢則亂舍法任智則危故曰上法而不上賢記曰舜見瞽瞍其容造焉孔子曰當是時也危哉天下岌岌有道者父固不得而子君固不得而臣也臣曰孔子本未知孝悌忠順之道也然則有道者進不為主臣退不為父子耶父之所以欲有賢子者家貧則富之父苦則樂之君之所以欲有賢臣者國亂則治之主卑則尊之今有賢子而不為父則父之處家也苦有賢臣而不為君則君之處位也危然則父有賢子君有賢臣適足以為害耳豈得利焉哉所謂忠臣不危其君孝子不非其親今舜以賢取君之國而湯武以義放弒其君此皆以賢而危主者也而天下賢之古之烈士進不臣君退不為家是進則非其君退則非其親者也且夫進不臣君退不為家亂世絕嗣之道也是故賢堯舜湯武而是烈士天下之亂術也瞽瞍為舜父而舜放之象為舜弟而殺之放父殺弟不可謂仁妻帝二女而取天下不可謂義仁義無有不可謂明詩云普天之下莫非王土率土之濱莫非王臣信若詩之言也是舜出則臣其君入則臣其父妾其母妻其主女也故烈士內不為家亂世絕嗣而外矯於君朽骨爛肉施於土地流於川谷不避蹈水火使天下從而效之是天下徧死而願夭也此皆釋世而不治是也世之所為烈士者離眾獨行取異於人為恬淡之學而理恍惚之言臣以為恬淡無用之教也恍惚無法之言也言出於無法教出於無用者天下謂之察臣以為人生必事君養親事君養親不可以恬淡治人必以言論忠信法術言論忠信法術不可以恍惚恍惚之言恬淡之學天下之惑術也孝子之事父也非競取父之家也忠臣之事君也非競取君之國也夫為人子而常譽他人之親曰某子之親夜寢早起強力生財以養子孫臣妾是誹謗其親者也為人臣常譽先王之德厚而願之是誹謗其君者也非其親者知謂之不孝而非其君者天下皆賢之此所以亂也故人臣毋稱堯舜之賢毋譽湯武之伐毋言烈士之高盡力守法專心於事主者為忠臣古者黔首悗密惷愚故可以虛名取也今民儇詗智慧欲自用不聽上上必且勸之以賞然後可進又且畏之以罰然後不敢退而世皆曰許由讓天下賞不足以勸盜跖犯刑赴難罰不足以禁臣曰未有天下而無以天下為者許由是也已有天下而無以天下為者堯舜是也毀廉求財犯刑趨利忘身之死者盜跖是也此二者殆物也治國用民之道也不以此二者為量治也者治常者也道也者道常者也殆物妙言治之害也天下太上之士不可以賞勸也天下太下之士不可以刑禁也然為太上士不設賞為太下士不設刑則治國用民之道失矣故世人多不言國法而言從橫諸侯言從者曰從成必霸而言橫者曰橫成必王山東之言從橫未嘗一日而止也然而功名不成霸王不立者虛言非所以成治也王者獨行謂之王是以三王不務離合而正五霸不待從橫而察治內以裁外而已矣
