body:
  text: 說難第十二凡說之難非吾知之有以說之之難也又非吾辨之能明吾意之難也又非吾敢橫失而能盡之難也凡說之難在知所說之心可以吾說當之所說出於為名高者也而說之以厚利則見下節而遇卑賤必棄遠矣所說出於厚利者也而說之以名高則見無心而遠事情必不收矣所說陰為厚利而顯為名高者也而說之以名高則陽收其身而實疏之說之以厚利則陰用其言顯棄其身矣此不可不察也夫事以密成語以泄敗未必其身泄之也而語及所匿之事如此者身危彼顯有所出事而乃以成他故說者不徒知所出而已矣又知其所以為如此者身危規異事而當知者揣之外而得之事泄於外必以為己也如此者身危周澤未渥也而語極知說行而有功則德忘說不行而有敗則見疑如此者身危貴人有過端而說者明言禮義以挑其惡如此者身危貴人或得計而欲自以為功說者與知焉如此者身危彊以其所不能為止以其所不能已如此者身危故與之論大人則以為間己矣與之論細人則以為賣重論其所愛則以為藉資論其所憎則以為嘗己也徑省其說則以為不智而拙之米鹽博辨則以為多而久之略事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此說之難不可不知也凡說之務在知飾所說之所矜而滅其所恥彼有私急也必以公義示而強之其意有下也然而不能已說者因為之飾其美而少其不為也其心有高也而實不能及說者為之舉其過而見其惡而多其不行也有欲矜以智能則為之舉異事之同類者多為之地使之資說於我而佯不知也以資其智欲內相存之言則必以美名明之而微見其合於私利也欲陳危害之事則顯其毀誹而微見其合於私患也譽異人與同行者規異事與同計者有與同汙者則必以大飾其無傷也有與同敗者則必以明飾其無失也彼自多其力則毋以其難概之也自勇其斷則無以其謫怒之自智其計則毋以其敗窮之大意無所拂悟辭言無所繫縻然後極騁智辨焉此道所得親近不疑而得盡辭也伊尹為宰百里奚為虜皆所以干其上也此二人者皆聖人也然猶不能無役身以進如此其汙也今以吾言為宰虜而可以聽用而振世此非能仕之所恥也夫曠日離久而周澤既渥深計而不疑引爭而不罪則明割利害以致其功直指是非以飾其身以此相持此說之成也昔者鄭武公欲伐胡故先以其女妻胡君以娛其意因問於群臣吾欲用兵誰可伐者大夫關其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親己遂不備鄭鄭人襲胡取之宋有富人天雨墻壞其子曰不築必將有盜其鄰人之父亦云暮而果大亡其財其家甚智其子而疑鄰人之父此二人說者皆當矣厚者為戮薄者見疑則非知之難也處知則難也故繞朝之言當矣其為聖人於晉而為戮於秦也此不可不察昔者彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子瑕母病人間往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口味以啖寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗啖我以餘桃故彌子之行未變於初也而以前之所以見賢而後獲罪者愛憎之變也故有愛於主則智當而加親有憎於主則智不當見罪而加疏故諫說談論之士不可不察愛憎之主而後說焉夫龍之為蟲也柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人人主亦有逆鱗說者能無嬰人主之逆鱗則幾矣
