body:
  text: 飾邪第十九鑿龜數策兆曰大吉而以攻燕者趙也鑿龜數策兆曰大吉而以攻趙者燕也劇辛之事燕無功而社稷危鄒衍之事燕無功而國道絶趙代先得意於燕後得意於齊國亂節高自以為與秦提衡非趙龜神而燕龜欺也趙又嘗鑿龜數策而北伐燕將劫燕以逆秦兆曰大吉始攻大梁而秦出上黨矣兵至釐而六城拔矣至陽城秦拔鄴矣龐援揄兵而南則鄣盡矣臣故曰趙龜雖無遠見於燕且宜近見於秦秦以其大吉辟地有實救燕有有名趙以其大吉地削兵辱主不得意而死又非秦龜神而趙龜欺也初時者魏數年東鄉攻盡陶衛數年西鄉以失其國此非豐隆五行太一王相攝提六神五括天河殷搶歲星數年在西也又非天缺弧逆刑星熒惑奎台數年在東也故曰龜策鬼神不足舉勝左右背鄉不足以專戰然而恃之愚莫大焉古者先王盡力於親民加事於明法彼法明則忠臣勸罰必則邪臣止忠勸邪止而地廣主尊者秦是也群臣朋黨比周以隱正道行私曲而地削主卑者山東是也亂弱者亡人之性也治強者王古之道也越王勾踐恃大朋之龜與吳戰而不勝身臣入宦于吳反國棄龜明法親民以報吳則夫差為擒故恃鬼神者慢於法恃諸侯者危其國曹恃齊而不聽宋齊攻荊而宋滅曹邢恃吳而不聽齊越伐吳而齊滅邢許恃荊而不聽魏荊攻宋而魏滅許鄭恃魏而不聽韓魏攻荊而韓滅鄭今者韓國小而恃大國主慢而聽秦魏恃齊荊為用而小國愈亡故恃人不足以廣壤而韓不見也荊為攻魏而加兵許鄢齊攻任扈而削魏不足以存鄭而韓弗知也此皆不明其法禁以治其國恃外以滅其社稷者也臣故曰明於治之數則國雖小富賞罰敬信民雖寡強賞罰無度國雖大兵弱者地非其地民非其民也無地無民堯舜不能以王三代不能以強人主又以過豫人臣又以徒取舍法律而言先王明君之功者上任之以國臣故曰是願古之功以古之賞賞今之人也主以是過豫而臣以此徒取矣主過豫則臣偷幸臣徒取則功不尊無功者受賞則財匱而民望財匱而民望則民不盡力矣故用賞過者失民用刑過者民不畏有賞不足以勸有刑不足以禁則國雖大必危故曰小知不可使謀事小忠不可使主法荊恭王與晉厲公戰於鄢陵荊師敗恭王傷酣戰而司馬子反渴而求飲其友豎穀陽奉卮酒而進之子反曰去之此酒也豎穀陽曰非也子反受而飲之子反為人嗜酒甘之不能絶之於口醉而臥恭王欲復戰而謀事使人召子反子反辭以心疾恭王駕而往視之入幄中聞酒臭而還曰今日之戰寡人目親傷所恃者司馬司馬又如此是亡荊國之社稷而不恤吾衆也寡人無與復戰矣罷師而去之斬子反以為大戮故曰豎穀陽之進酒也非以端惡子反也實心以忠愛之而適足以殺之而已矣此行小忠而賊大忠者也故曰小忠大忠之賊也若使小忠主法則必將赦罪以相愛是與下安矣然而妨害於治民者也當魏之方明立辟從憲令之時有功者必賞有罪者必誅強匡天下威行四鄰及法慢妄豫而國日削矣當趙之方明國律從大軍之時人衆兵強辟地齊燕及國律慢用者弱而國日削矣當燕之方明奉法審官斷之時東縣齊國南盡中山之地及奉法已亡官斷不用左右交爭論從其下則兵弱而地削國制於鄰敵矣故曰明法者強慢法者弱強弱如是其明矣而世主弗為國亡宜矣語曰家有常業雖飢不餓國有常法雖危不亡夫舍常法而從私意則臣下飾於智能臣下飾於智能則法禁不立矣是妄意之道行治國之道廢也治國之道去害法者則不惑於智能不矯於名譽矣昔者舜使吏決鴻水先令有功而舜殺之禹朝諸侯之君會稽之上防風之君後至而禹斬之以此觀之先令者殺後令者斬則古者先貴如令矣故鏡執清而無事美惡從而比焉衡執正而無事輕重從而載焉夫搖鏡則不得為明搖衡則不得為正法之謂也故先王以道為常以法為本本治者名尊本亂者名絶凡智能明通有以則行無以則止故智能單道不可傳於人而道法萬全智能多失夫懸衡而知平設規而知圓萬全之道也明主使民飾於道之故故佚而有功釋規而任巧釋法而任智惑亂之道也亂主使民飾於智不知道之故故勞而無功釋法禁而聽請謁群臣賣官於上取賞於下是以利在私家而威在群臣故民無盡力事主之心而務為交於上民好上交則貨財上流而巧説者用若是則有功者愈少姦臣愈進而材臣退則主惑而不知所行民聚而不知所道此廢法禁後功勞舉名譽聽請謁之失也凡敗法之人必設詐託物以來親又好言天下之所希有此暴君亂主之所以惑也人臣賢佐之所以侵也故人臣稱伊尹管仲之功則背法飾智有資稱比干子胥之忠而見殺則疾強諫有辭夫上稱賢明下稱暴亂不可以取類若是者禁君之立法以為是也今人臣多立其私智以法為非者是邪以智過法立智如是者禁主之道也明主之道必明於公私之分明法制去私恩夫令必行禁必止人主之公義也必行其私信於朋友不可為賞勸不可為罰沮人臣之私義也私義行則亂公義行則治故公私有分人臣有私心有公義修身潔白而行公行正居官無私人臣之公義也汙行從欲安身利家人臣之私心也明主在上則人臣去私心行公義亂主在上則人臣去公義行私心故君臣異心君以計畜臣臣以計事君君臣之交計也害身而利國臣弗為也害國而利臣君不行也臣之情害身無利君之情害國無親君臣也者以計合者也至夫臨難必死盡智竭力為法為之故先王明賞以勸之嚴刑以威之賞刑明則民盡死民盡死則兵強主尊刑賞不察則民無功而求得有罪而幸免則兵弱主卑故先王賢佐盡力竭智故曰公私不可不明法禁不可不審先王知之矣
