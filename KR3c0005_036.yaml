body:
  text: 難一第三十六晉文公將與楚人戰召舅犯問之曰吾將與楚人戰彼衆我寡為之奈何舅犯曰臣聞之繁禮君子不厭忠信戰陳之間不厭詐偽君其詐之而已矣文公辭舅犯因召雍季而問之曰我將與楚人戰彼衆我寡為之奈何雍季對曰焚林而田偷取多獸後必無獸以詐遇民偷取一時後必無復文公曰善辭雍季以舅犯之謀與楚人戰以敗之歸而行爵先雍季而後舅犯群臣曰城濮之事舅犯謀也夫用其言而後其身可乎文公曰此非若所知也夫舅犯言一時之權也雍季言萬世之利也仲尼聞之曰文公之霸也宜哉既知一時之權又知萬世之利或曰雍季之對不當文公之問凡對問者有因問小大緩急而對也所問高大而對以卑狹則明主弗受也今文公問以少遇衆而對曰後必無復此非所以應也且文公不知一時之權又不知萬世之利戰而勝則國安而身定兵強而威立雖有後復莫大於此萬世之利奚患不至戰而不勝則國亡兵弱身死名息拔拂今日之死不及安暇待萬世之利待萬世之利在今日之勝今日之勝在詐於敵詐敵萬世之利而已故曰雍季之對不當文公之問且文公又不知舅犯之言舅犯所謂不厭詐偽者不謂詐其民謂詐其敵也敵者所伐之國也後雖無復何傷哉文公之所以先雍季者以其功耶則所以勝楚破軍者舅犯之謀也以其善言耶則雍季乃道其後之無復也此未有善言也舅犯則以兼之矣舅犯曰繁禮君子不厭忠信者忠所以愛其下也信所以不欺其民也夫既以愛而不欺矣言孰善於此然必曰出於詐偽者軍旅之計也舅犯前有善言後有戰勝故舅犯有二功而後論雍季無一為而先賞文公之霸不亦宜乎仲尼不知善賞也歷山之農者侵畔舜往耕焉期年甽畝正河濱之漁者爭坻舜往漁焉期年而讓長東夷之陶者器苦窳舜往陶焉期年而器牢仲尼歎曰耕漁與陶非舜官也而舜往為之者所以救敗也舜其信仁乎乃躬藉處苦而民從之故曰聖人之德化乎或問儒者曰方此時也堯安在其人曰堯為天子然則仲尼之聖堯奈何聖人明察在上位將使天下無姦也今耕漁不爭陶器不窳舜又何德而化舜之救敗也則是堯有失也賢舜則去堯之明察聖堯則去舜之德化不可兩得也楚人有鬻楯與矛者譽之曰吾楯之堅物莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以子之矛陷子之楯何如其人弗能應也夫不可陷之楯與無不陷之矛不可同世而立今堯舜之不可兩譽矛楯之説也且舜救敗期年已一過三年已三過舜有盡壽有盡天下過無已者以有盡逐無已所止者寡矣賞罰使天下必行之令曰中程者賞弗中程者誅令朝至暮變暮至朝變十日而海內畢矣奚待期年舜猶不以此説堯令從己乃躬親不亦無術乎且夫以身為苦而後化民者堯舜之所難也處勢而矯下者庸主之所易也將治天下釋庸主之所易道堯舜之所難未可與為政也管仲有病桓公往問之曰仲父病不幸卒於大命將奚以告寡人管仲曰微君言臣故將謁之願君去豎刁除易牙遠衛公子開方易牙為君主味君惟人肉未嘗易牙蒸其子首而進之夫人情莫不愛其子今弗愛其子安能愛君君妬而好內豎刁自宮以治內人情莫不愛其身身且不愛安能愛君開方事君十五年齊衛之間不容數日行棄其母久宦不歸其母不愛安能愛君臣聞之矜偽不長蓋虛不久願君去此三子者也管仲卒死桓公弗行及桓公死蟲出戶不葬或曰管仲所以見告桓公者非有度者之言也所以去豎刁易牙者以不愛其身適君之欲也曰不愛其身安能愛君然則臣有盡死力以為其主者管仲將弗用也曰不愛其死力安能愛君是欲君去忠臣也且以不愛其身度其不愛其君是將以管仲之不能死公子糾度其不死桓公也是管仲亦在所去之域矣明主之道不然設民所欲以求其功故為爵祿以勸之設民所惡以禁其姦故為刑罰以威之慶賞信而刑罰必故君舉功於臣而姦不用於上雖有豎刁其奈君何且臣盡死力以與君市君垂爵祿以與臣市君臣之際非父子之親也計數之所出也君有道則臣盡力而姦不生無道則臣上塞主明而下成私管仲非明此度數於桓公也使去豎刁一豎刁又至非絶姦之道也且桓公所以身死蟲流出戶不葬者是臣重也臣重之實擅主也有擅主之臣則君令不下究臣情不上通一人之力能隔君臣之間使善敗不聞禍福不通故有不葬之患也明主之道一人不兼官一官不兼事卑賤不待尊貴而進大臣不因左右而見百官修通群臣輻湊有賞者君見其功有罰者君知其罪見知不悖於前賞罰不弊於後安有不葬之患管仲非明此言於桓公也使去三子故曰管仲無度矣襄子圍於晉陽中出圍賞有功者五人高赫為賞首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事寡人國家危社稷殆矣吾群臣無有不驕侮之意者惟赫子不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫敢失禮矣或曰仲尼不知善賞矣夫善賞罰者百官不敢侵職群臣不敢失禮上設其法而下無姦詐之心如此則可謂善賞罰矣使襄子於晉陽也令不行禁不止是襄子無國晉陽無君也尚誰與守哉今襄子於晉陽也知氏灌之臼竈生龜而民無反心是君臣親也襄子有君臣親之澤操令行禁止之法而猶有驕侮之臣是襄子失罰也為人臣者乘事而有功則賞今赫僅不驕侮而襄子賞之是失賞也明主賞不加於無功罰不加於無罪今襄子不誅驕侮之臣而賞無功之赫安在襄子之善賞也故曰仲尼不知善賞晉平公與群臣飲飲酣乃喟然歎曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披衽而避琴壞於壁公曰太師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰啞是非君人者之言也左右請除之公曰釋之以為寡人戒或曰平公失君道師曠失臣禮夫非其行而誅其身君之於臣也非其行則陳其言善諫不聽則遠其身者臣之於君也今師曠非平公之行不陳人臣之諫而行人主之誅舉琴而親其體是逆上下之位而失人臣之禮也夫為人臣者君有過則諫諫不聽則輕爵祿以待之此人臣之禮也今師曠非平公之過舉琴而親其體雖嚴父不加於子而師曠行之於君此大逆之術也臣行大逆平公喜而聽之是失君道也故平公之迹不可明也使人主過於聽而不悟其失師曠之行亦不可明也使姦臣襲極諫而飾弒君之道不可謂兩明此為兩過故曰平公失君道師曠亦失臣禮矣齊桓公時有處士曰小臣稷桓公三往而弗得見桓公曰吾聞布衣之士不輕爵祿無以易萬乘之主萬乘之主不好仁義亦無以下布衣之士於是五往乃得見之或曰桓公不知仁義夫仁義者憂天下之害趨一國之患不避卑辱謂之仁義故伊尹以中國為亂道為宰干湯百里奚以秦為亂道為虜干穆公皆憂天下之害趨一國之患不辭卑辱故謂之仁義今桓公以萬乘之勢下匹夫之士將欲憂齊國而小臣不行見小臣之忘民也忘民不可謂仁義仁義者不失人臣之禮不敗君臣之位者也是故四封之內執禽而朝名曰臣臣吏分職受事名曰萌今小臣在民萌之衆而逆君上之欲故不可謂仁義仁義不在焉桓公又從而禮之使小臣有智能而遁桓公是隱也宜刑若無智能而虛驕矜桓公是誣也宜戮小臣之行非刑則戮桓公不能領臣主之理而禮刑戮之人是桓公以輕上侮君之俗教於齊國也非所以為治也故曰桓公不知仁義靡笄之役韓獻子將斬人郤獻子聞之駕往救之比至則已斬之矣郤子因曰胡不以徇其僕曰曩不將救之乎郤子曰吾敢不分謗乎或曰郤子言不可不察也非分謗也韓子之所斬也若罪人則不可救救罪人法之所以敗也法敗則國亂若非罪人則不可勸之以徇勸之以徇是重不辜也重不辜民所以起怨者也民怨則國危郤子之言非危則亂不可不察也且韓子之所斬若罪人郤子奚分焉斬若非罪人則已斬之矣而郤子乃至是韓子之謗已成而郤子且後至也夫郤子曰以殉不足以分斬人之謗而又生殉之謗是子言分謗也昔者紂為炮烙崇侯惡來又曰斬涉者之脛也奚分於紂之謗且民之望於上也甚矣韓子弗得且望郤子之得之也今郤子俱弗得則民絶望於上矣故曰郤子之言非分謗也益謗也且郤子之往救罪也以韓子為非也不道其所以為非而勸之以殉是使韓子不知其過也夫下使民望絶於上又使韓子不知其失吾未得郤子之所以分謗者也桓公解管仲之束縛而相之管仲曰臣有寵矣然而臣卑公曰使子立高國之上管仲曰臣貴矣然而臣貧公曰使子有三歸之家管仲曰臣富矣然而臣疏於是立以為仲父霄略曰管仲以賤為不可以治貴故請高國之上以貧為不可以治富故請三歸以疏為不可以治親故處仲父管仲非貪以便治也或曰今使臧獲奉君令詔卿相莫敢不聽非卿相卑而臧獲尊也主令所加莫敢不從也今使管仲之治不緣桓公是無君也國無君不可以為治若負桓公之威下桓公之令是臧獲之所以信也奚待高國仲父之尊而後行哉當世之行事都丞之下徵令者不辟尊貴不就卑賤故行之而法者雖巷伯信乎卿相行之而非法者雖大吏詘乎民萌今管仲不務尊主明法而事增寵益爵是非管仲貪欲富貴必暗而不知術也故曰管仲有失行霄略有過譽韓宣王問於樛留吾欲兩用公仲公叔其可乎樛留對曰昔魏兩用樓翟而亡西河楚兩用昭景而亡鄢郢今君兩用公仲公叔此必將爭事而外市則國必憂矣或曰昔者齊桓公兩用管仲鮑叔成湯兩用伊尹仲虺夫兩用臣者國之憂則是桓公不霸成湯不王也湣王一用淖齒而身死乎東廟主父一用李兌減食而死主有術兩用不為患無術兩用則爭事而外市一則專制而劫弒今留無術以規上使其主去兩用一是不有西河鄢郢之憂則必有身死減食之患是樛留未有善以知言也
