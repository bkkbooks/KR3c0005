body:
  text: 外儲說左上第三十二經一明主之道如有若之應密子也人主之聽言也美其辨其觀行也賢其遠故群臣士民之道言者迂弘其行身也離世其說在田鳩對荊王也故墨子為木鳶謳癸築武宮夫藥酒忠言明君聖主之以獨知也經二人主之聽言也不以功用為的則說者多棘刺白馬之說不以儀的為關則射者皆如羿也人主於說也皆如燕王學道也而長說者皆如鄭人爭年也是以言有纖察微難而非務也故季惠宋墨皆畫策也論有迂深閎大非用也故魏長瞻陳莊皆鬼魅也行有拂難堅確非功也故務卞鮑介田仲皆堅瓠也且虞慶詘匠也而屋壞范且窮工而弓折是故求其誠者非歸餉也不可經三挾夫相為則責望自為則事行故父子或怨譙取庸作者進美羹說在文公之先宣言與勾踐之稱如皇也故桓公藏蔡怒而攻楚吳起懷瘳實而吮傷且先王之賦頌鍾鼎之銘皆播吾之跡華山之博也然先王所期者利也所用者力也築社之諺自辭說也請許學者而行宛曼於先王或者不宜今乎如是不能更也鄭縣人得車厄也衛人佐弋也卜子妻寫弊袴也而其少者侍長者飲也先王之言有其所為小而世意之大者有其所為大而世意之小者未可必知也說在宋人之解書與梁人之讀記也故先王有郢書而後世多燕說夫不適國事而謀先王皆歸取度者也經四利之所在民歸之名之所彰士死之是以功外於法而賞加焉則上不能得所利於下名外於法而譽加焉則士勸名而不畜之於君故中章胥己仕而中牟之民棄田圃而隨文學者邑之半平公腓痛足痺而不敢壞坐晉國之辭仕託者國之錘此三士者言襲法則官府之籍也行中事則如令之民也二君之禮太甚若言離法而行遠功則繩外民也二君又何禮之禮之當亡且居學之士國無事不用力有難不被甲禮之則惰修耕戰之功不禮則害主上之法國安則尊顯危則為屈公之威人主奚得於居學之士哉故明主論李疵視中山也經五詩曰不躬不親庶民不信傅說之以無衣紫援之以鄭簡宋襄責之以尊厚耕戰夫不明分不責誠而以躬親位下且為下走睡臥與夫掩弊微服孔丘不知故稱猶盂鄒君不知故先自僇明主之道如叔向賦獵與昭侯之奚聽也經六小信成則大信立故明主積於信賞罰不信則禁令不行說在文公之攻原與箕鄭救餓也是以吳起須故人而食文侯會虞人而獵故明主表信如曾子殺彘也患在厲王擊警鼓與李悝謾兩和也說一宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細也治之而憂治天下將奈何乎故有術而御之身坐於廟堂之上有處女子之色無害於治無術而御之身雖瘁臞猶未有益楚王謂田鳩曰墨子者顯學也其身體則可其言多而不辨何也曰昔秦伯嫁其女於晉公子令晉為之飾裝從衣文之媵七十人至晉晉人愛其妾而賤公女此可謂善嫁妾而未可謂善嫁女也楚人有賣其珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰輯以翡翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也今世之談也皆道辨說文辭之言人主覽其文而忘有用墨子之說傳先王之道論聖人之言以宣告人若辨其辭則恐人懷其文忘其直以文害用也此與楚人鬻珠秦伯嫁女同類故其言多不辨墨子為木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰吾不如為車輗者巧也用咫尺之木不費一朝之事而引三十石之任致遠力多久於歲數今我為鳶三年成蜚一日而敗惠子聞之曰墨子大巧巧為輗拙為鳶宋王與齊仇也築武宮謳癸倡行者止觀築者不倦王聞召而賜之對曰臣師射稽之謳又賢於癸王召射稽使之謳行者不止築者知倦王曰行者不止築者知倦其謳不勝如癸美何也對曰王試度其功癸四板射稽八板擲其堅癸五寸射稽二寸夫良藥苦於口而智者勸而飲之知其入而已己疾也忠言拂於耳而明主聽之知其可以致功也說二宋人有請為燕王以棘刺之端為母猴者必三月齊然後能觀之燕王因以三乘養之右御冶工言王曰臣聞人主無十日不燕之齊今知王不能久齊以觀無用之器也故以三月為期凡刻削者以其所以削必小今臣冶人也無以為之削此不然物也王必察之王因囚而問之果妄乃殺之冶人謂王曰計無度量言談之士多棘刺之說也一曰燕王好微巧衛人曰能以棘刺之端為母猴燕王說之養之以五乘之奉王曰吾試觀客為棘刺之母猴客曰人主欲觀之必半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘刺之母猴乃可見也燕王因養衛人不能觀其母猴鄭有臺下之冶者謂燕王曰臣削者也諸微物必以削削之而所削必大於削今棘刺之端不容削鋒難以治棘刺之端王試觀客之削能與不能可知也王曰善謂衛人曰客為棘刺之母猴也何以理之曰以削王曰吾欲觀見之客曰臣請之舍取之因逃兒說宋人善辨者也持白馬非馬也服齊稷下之辨者乘白馬而過關則顧白馬之賦故籍之虛辭則能勝一國考實按形不能謾於一人夫新砥礪殺矢彀弩而射雖冥而妄發其端未嘗不中秋毫也然而莫能復其處不可謂善射無常儀的也設五寸之的引十步之遠非羿逄蒙不能必全者有常儀的也有度難而無度易也有常儀的則羿逢蒙以五寸為巧無常儀的則以妄發而中秋毫為拙故無度而應之則辨士繁說設度而持之雖知者猶畏失也不敢妄言今人主聽說不應之以度而說其辨不度以功譽其行而不入關此人主所以長欺而說者所以長養也客有教燕王為不死之道者王使人學之所使學者未及學而客死王大怒誅之王不知客之欺己而誅學者之晚也夫信不然之物而誅無罪之臣不察之患也且人所急無如其身不能自使其無死安能使王長生哉鄭人有相與爭年者一人曰吾與堯同年其一人曰我與黃帝之兄同年訟此而不決以後息者為勝耳客有為周君畫策者三年而成君觀之與髹策者同狀周君大怒畫策者曰築十版之墻鑿八尺之牖而以日始出時加之其上而觀周君為之望見其狀盡成龍蛇禽獸車馬萬物之狀備具周君大悅此策之功非不微難也然其用與素髹策同客有為齊王畫者齊王問曰畫孰最難者曰犬馬難孰易者對曰鬼魅最易夫犬馬人所知也旦暮罄於前不可類之故難鬼魅無形者不罄於前故易之也齊有居士田仲者宋人屈穀見之曰穀聞先生之義不恃仰人而食今穀有巨瓠堅如石厚而無竅獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然穀將棄之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也虞慶為屋謂匠人曰屋太尊匠人對曰此新屋也塗濡而椽生虞慶曰不然夫濡塗重而生椽撓以撓椽任重塗此宜卑更日久則塗乾而椽燥塗乾則輕椽燥則直以直椽任輕塗此益尊匠人詘為之而屋壞一曰虞慶將為屋匠人曰材生而塗濡夫材生則撓塗濡則重以撓任重今雖成久必壞虞慶曰材乾則直塗乾則輕今誠得乾日以輕直雖久必不壞匠人詘作之成有間屋果壞范且曰弓之折必於其盡也不於其始也夫工人張弓也伏檠三旬而蹈弦一日犯機是節之其始而暴之其盡也焉得無折且張弓不然伏檠一日而蹈弦三旬而犯機是暴之其始而節之其盡也工人窮也為之弓折范且虞慶之言皆文辨辭勝而反事之情人主說而不禁此所以敗也夫不謀治強之功而艷乎辨說文麗之聲是卻有術之士而任壞屋折弓也故人主之於國事也皆不達乎工匠之搆屋張弓也然而士窮乎范且虞慶者為虛辭其無用而勝實事其無易而窮也人主多無用之辨而少無易之言此所以亂也今世之為范且虞慶者不輟而人主說之不止是貴敗折之類而以知術之人為工匠也工匠不得施其技巧故屋壞弓折知治之人不得行其方術故國亂而主危夫嬰兒相與戲也以塵為飯以塗為羹以木為胾然至日晚必歸餉者塵飯塗羹可以戲而不可食也夫稱上古之傳頌辨而不愨道先王仁義而不能正國者此亦可以戲而不可以為治也夫慕仁義而弱亂者三晉也不慕而治強者秦也然而未帝者治未畢也說三人為嬰兒也父母養之簡子長而怨子盛壯成人其供養薄父母怒而誚之子父至親也而或譙或怨者皆挾相為而不周於為己也夫買庸而播耕者主人費家而美食調布而求易錢者非愛庸客也曰如是耕者且深耨者熟耘也庸客致力而疾耘耕者盡巧而正畦陌者非愛主人也曰如是羹且美錢布且易云也此其養功力有父子之澤矣而心調於用者皆挾自為心也故人行事施豫以利之為心則越人易和以害之為心則父子離且怨文公伐宋乃先宣言曰吾聞宋君無道蔑侮長老分財不中教令不信余來為民誅之越伐吳乃先宣言曰我聞吳王築如皇之臺掘深池罷苦百姓煎靡財貨以盡民力余來為民誅之蔡女為桓公妻桓公與之乘舟夫人蕩舟桓公大懼禁之不止怒而出之乃且復召之因復更嫁之桓公大怒將伐蔡仲父諫曰夫以寢席之戲不足以伐人之國功業不可冀也請無以此為稽也桓公不聽仲父曰必不得已楚之菁茅不貢於天子三年矣君不如舉兵為天子伐楚楚服因還襲蔡曰余為天子伐楚而蔡不以兵聽從遂滅之此義於名而利於實故必有為天子誅之名而有報讎之實吳起為魏將而攻中山軍人有病疽者吳起跪而自吮其膿傷者之母立泣人問曰將軍於若子如是尚何為而泣對曰吳起吮其父之創而父死今是子又將死也今吾是以泣趙主父令工施鉤梯而緣播吾刻踈人迹其上廣三尺長五尺而勒之曰主父常遊於此秦昭王令工施鉤梯而上華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王嘗與天神博於此矣文公反國至河令籩豆捐之席蓐捐之手足胼胝面目黧黑者後之咎犯聞之而夜哭公曰寡人出亡二十年乃今得反國咎犯聞之不喜而哭意不欲寡人反國耶犯對曰籩豆所以食也席蓐所以臥也而君捐之手足胼胝面目黧黑勞有功者也而君後之今臣有與在後中不勝其哀故哭且臣為君行詐僞以反國者衆矣臣尚自惡也而況於君再拜而辭文公止之曰諺曰築社者㩷撅而置之端冕而祀之今子與我取之而不與我治之與我置之而不與我祀之焉可解左驂而盟于河鄭縣人卜子使其妻為袴其妻問曰今袴何如夫曰象吾故袴妻子因毀新令如故袴鄭縣人有得車軛者而不知其名問人曰此何種也對曰此車軛也俄又復得一問人曰此是何種也對曰此車軛也問者大怒曰曩者曰車軛今又曰車軛是何衆也此女欺我也遂與之鬭衛人有佐弋者鳥至因先以其裷麾之鳥驚而不射也鄭縣人卜子妻之市買鱉以歸過潁水以為渴也因縱而飲之遂亡其鱉夫少者侍長者飲長者飲亦自飲也一曰魯人有自喜者見長年飲酒不能釂則唾之亦效唾之一曰宋人有少者亦欲效善見長者飲無餘非堪酒飲也而欲盡之書曰紳之束之宋人有治者因重帶自紳束也人曰是何也對曰書言之固然書曰既雕既琢還歸其朴梁人有治者動作言學舉事於文曰難之顧失其實人曰是何也對曰書言之固然郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭云而過書舉燭舉燭非書意也燕相受書而說之曰舉燭者尚明也尚明也者舉賢而任之燕相白王王大說國以治治則治矣非書意也今世舉學者多似此類鄭人有且置履者先自度其足而置之其坐至之市而忘操之已得履乃曰吾忘持度反歸取之及反市罷遂不得履人曰何不試之以足曰寧信度無自信也說四王登為中牟令上言於襄主曰中牟有士曰中章胥己者其身甚修其學甚博君何不舉之主曰子見之我將為中大夫相室諫曰中大夫晉重列也今無功而受非晉臣之意君其耳而未之目邪襄主曰我取登既耳而目之矣登之所取又耳而目之是耳目人絶無已也王登一日而見二中大夫豫之田宅中牟之人棄其田耘賣宅圃而隨文學者邑之半叔向御坐平公請事公腓痛足痺轉筋而不敢壞坐晉國聞之皆曰叔向賢者平公禮之轉筋而不敢壞坐晉國之辭仕託慕叔向者國之錘矣鄭縣人有屈公者聞敵恐因死恐已因生趙主父使李疵視中山可攻不也還報曰中山可伐也君不亟伐將後齊燕主父曰何故可攻李疵對曰其君見好巖穴之士所傾蓋與車以見窮閭隘巷之士以十數伉禮下布衣之士以百數矣君曰以子言論是賢君也安可攻疵曰不然夫好顯巖穴之士而朝之則戰士怠於行陳上尊學者下士居朝則農夫惰於田戰士怠於行陳者則兵弱也農夫惰於田者則國貧也兵弱於敵國貧於內而不亡者未之有也伐之不亦可乎主父曰善舉兵而伐中山遂滅也說五齊桓公好服紫一國盡服紫當是時也五素不得一紫桓公患之謂管仲曰寡人好服紫紫貴甚一國百姓好服紫不已寡人奈何管仲曰君欲止之何不試勿衣紫也謂左右曰吾甚惡紫之臭於是左右適有衣紫而進者公必曰少卻吾惡紫臭公曰諾於是日郎中莫衣紫其明日國中莫衣紫三日境內莫衣紫也一曰齊王好衣紫齊人皆好也齊國五素不得一紫齊王患紫貴傅說王曰詩云不躬不親庶民不信今王欲民無衣紫者王請自解紫衣而朝群臣有紫衣進者曰益遠寡人惡臭是日也郎中莫衣紫是月也國中莫衣紫是歲也境內莫衣紫鄭簡公謂子産曰國小迫於荊晉之閒今城郭不完兵甲不備不可以待不虞子産曰臣閉其外也已遠矣而守其內也已固矣雖國小猶不危之也君其勿憂是以沒簡公身無患一曰子産相鄭簡公謂子産曰飲酒不樂也俎豆不大鍾鼓竽瑟不鳴寡人之事不一國家不定百姓不治耕戰不輯睦亦子之罪子有職寡人亦有職各守其職子産退而為政五年國無盜賊道不拾遺桃棗蔭於街者莫有援也錐刀遺道三日可反三年不變民無飢也宋襄公與楚人戰於涿谷上宋人既成列矣楚人未及濟右司馬購強趨而諫曰楚人衆而宋人寡請使楚人半涉未成列而擊之必敗襄公曰寡人聞君子曰不重傷不擒二毛不推人於險不迫人於厄不鼓不成列今楚未濟而擊之害義請使楚人畢涉成陳而後鼓士進之右司馬曰君不愛宋民腹心不完特為義耳公曰不反列且行法右司馬反列楚人已成列撰陳矣公乃鼓之宋人大敗公傷股三日而死此乃慕自親仁義之禍夫必恃人主之自躬親而後民聽從是則將令人主耕以為食服戰鴈行也民乃肯耕戰則人主不泰危乎而人臣不泰安乎齊景公遊少海傳騎從中來謁曰嬰疾甚且死恐公後之景公遽起傳騎又至景公曰趨駕煩且之乘使騶子韓樞御之行數百步以騶為不疾奪轡代之御可數百步以馬為不進盡釋車而走以煩且之良而騶子韓樞之巧而以為不如下走也魏昭王欲與官事謂孟嘗君曰寡人欲與官事君曰王欲與官事則何不試習讀法昭王讀法十餘簡而睡臥矣王曰寡人不能讀此法夫不躬親其勢柄而欲為人臣所宜為者也睡不亦宜乎孔子曰為人君者猶盂也民猶水也盂方水方盂圜水圜鄒君好服長纓左右皆服長纓纓甚貴鄒君患之問左右左右曰君好服百姓亦多服是以貴君因先自斷其纓而出國中皆不服長纓君不能下令為百姓服度以禁之斷纓出以示先民是先戮以蒞民也叔向賦獵功多者受多功少者受少韓昭侯謂申子曰法度甚不易行也申子曰法者見功而與賞因能而受官今君設法度而聽左右之請此所以難行也昭侯曰吾自今以來知行法矣寡人奚聽矣一日申子請仕其從兄官昭侯曰非所學於子也聽子之謁敗子之道乎亡其用子之謁申子辟舍請罪說六晉文公攻原裹十日糧遂與大夫期十日至原十日而原不下擊金而退罷兵而去士有從原中出者曰原三日即下矣群臣左右諫曰夫原之食竭力盡矣君姑待之公曰吾與士期十日不去是亡吾信也得原失信吾不為也遂罷兵而去原人聞曰有君如彼其信也可無歸乎乃降公衛人聞曰有君如彼其信也可無從乎乃降公孔子聞而記之曰攻原得衛者信也文公問箕鄭曰救餓奈何對曰信公曰安信曰信名信事信義信名則群臣守職善惡不踰百事不怠信事則不失天時百姓不踰信義則近親勸勉而遠者歸之矣吳起出遇故人而止之食故人曰諾今返而御吳子曰待公而食故人至暮不來起不食待之明日早令人求故人故人來方與之食魏文侯與虞人期獵明日會天疾風左右止文侯不聽曰不可以風疾之故而失信吾不為也遂自驅車往犯風而罷虞人曾子之妻之市其子隨之而泣其母曰女還顧反為女殺彘適市來曾子欲捕彘殺之妻止之曰特與嬰兒戲耳曾子曰嬰兒非與戲也嬰兒非有知也待父母而學者也聽父母之教今子欺之是教子欺也母欺子子而不信其母非以成教也遂烹彘也楚厲王有警為鼓以與百姓為戍飲酒醉過而擊之也民大驚使人止之曰吾醉而與左右戲過擊之也民皆罷居數月有警擊鼓而民不赴乃更令明號而民信之李悝警其兩和曰謹警敵人旦暮且至擊汝如是者再三而敵不至兩和懈怠不信李悝居數月秦人來襲之至幾奪其軍此不信患也一曰李悝與秦人戰謂左和曰速上右和已上矣又馳而至右和曰左和已上矣左右和曰上矣於是皆爭上其明年與秦人戰秦人襲之至幾奪其軍此不信之患有相與訟者子産離之而毋得使通辭到其言以告而知也衛嗣公使人僞關市關市呵難之因事關市以金關市乃舍之嗣公謂關市曰某時有客過而豫汝金因譴之關市大恐以嗣公為明察
