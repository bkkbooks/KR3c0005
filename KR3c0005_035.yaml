body:
  text: 外儲說右下第三十五經一賞罰共則禁令不行何以明之明之以造父於期子罕為出彘田恆為圃池故宋君簡公弒患在王良造父之共車田連成竅之共琴也經二治強生於法弱亂生於阿君明於此則正賞罰而非仁下也爵祿生於功誅罰生於罪臣明於此則盡死力而非忠君也君通於不仁臣通於不忠則可以王矣昭襄知主情而不發五苑田鮪知臣情故教田章而公儀辭魚經三明主者鑒於外也而外事不得不成故蘇代非齊王人主鑒於上也而居者不適不顯故潘壽言禹情人主無所覺悟方吾知之故恐同衣同族而況借於權乎吳章知之故說以佯而況借於誠乎趙王惡虎目而壅明主之道如周行人之卻衛侯也經四人主者守法責成以立功者也聞有吏雖亂而有獨善之民不聞有亂民而有獨治之吏故明主治吏不治民說在搖木之本與引網之綱故失火之嗇夫不可不論也救火者吏操壺走火則一人之用也操鞭使人則役萬夫故所遇術者如造父之遇驚馬牽馬推車則不能進代御執轡持策則馬咸騖矣是以說在椎鍛平夷榜檠矯直不然敗在淖齒用齊戮閔王李兌用趙餓主父也經五因事之理則不勞而成故茲鄭之踞轅而歌以上高梁也其患在趙簡主稅吏請輕重薄疑之言國中飽簡主喜而府庫虛百姓餓而姦吏富也故桓公巡民而管仲省腐財怨女不然則在延陵乘馬不得進造父過之而為之泣也說一造父御四馬馳驟周旋而恣欲於馬恣欲於馬者擅轡策之制也然馬驚於出彘而造父不能禁制者非轡策之嚴不足也威分於出彘也王子於期為駙駕轡策不用而擇欲於馬擅芻水之利也然馬過於圃池而駙駕敗者非芻水之利不足也德分於圃池也故王良造父天下之善御者也然而使王良操左革而叱咤之使造父操右革而鞭笞之馬不能行十里共故也田連成竅天下善鼓琴者也然而田連鼓上成竅擑下而不能成曲亦共故也夫以王良造父之巧共轡而御不能使馬人主安能與其臣共權以為治以田連成竅之巧共琴而不能成曲人主又安能與其臣共勢以成功乎一曰造父為齊王駙駕渴馬服成效駕圃中渴馬見圃池去車走池駕敗王子於期為趙簡主取道爭千里之表其始發也彘伏溝中王子於期齊轡策而進之彘突出於溝中馬驚駕敗司城子罕謂宋君曰慶賞賜與民之所喜也君自行之殺戮誅罰民之所惡也臣請當之宋君曰諾於是出威令誅大臣君曰問子罕也於是大臣畏之細民歸之處期年子罕殺宋君而奪政故子罕為出彘以奪其君國簡公在上位罰重而誅嚴厚賦斂而殺戮民田成恆設慈愛明寬厚簡公以齊民為渴馬不以恩加民而田成恆以仁厚為圃池也一曰造父為齊王駙駕以渴服馬百日而服成服成請效駕齊王王曰效駕於圃中造父驅車入圃馬見圃池而走造父不能禁造父以渴服馬久矣今馬見池駻而走雖造父不能治今簡公之以法禁其衆久矣而田成恆利之是田成恆傾圃池而示渴民也一曰王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪中繩引而卻之馬掩迹拊而發之彘逸出於竇中馬退而卻策不能進前也馬駻而走轡不能正也一曰司城子罕謂宋君曰慶賞賜豫者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅大臣君曰與子罕議之居朞年民知殺生之命制於子罕也故一國歸焉故子罕劫宋君而奪其政法不能禁也故曰子罕為出彘而田成常為圃池也今王良造父共車人操一邊轡而出門閭駕必敗而道不至也令田連成竅共琴人撫一絃而揮則音必敗曲不遂矣說二秦昭王有病百姓里買牛而家為王禱公孫述出見之入賀王曰百姓乃皆里買牛為王禱王使人問之果有之王曰訾之人二甲夫非令而擅禱是愛寡人也夫愛寡人寡人亦且改法而心與之相循者是法不立法不立亂亡之道也不如人罰二甲而復與為治一曰秦襄王病百姓為之禱病愈殺牛塞禱郎中閻遏公孫衍出見之曰非社臘之時也奚自殺牛而祠社怪而問之百姓曰人主病為之禱今病愈殺牛塞禱閻遏公孫衍說見王拜賀曰過堯舜矣王驚曰何謂也對曰堯舜其民未至為之禱也今王病而民以牛禱病愈殺牛塞禱故臣竊以王為過堯舜也王因使人問之何里為之訾其里正與伍老屯二甲閻遏公孫衍愧不敢言居數月王飲酒酣樂閻遏公孫衍謂王曰前時臣竊以王為過堯舜非直敢諛也堯舜病且其民未至為之禱也王因使人問之何里為之今王病而民以牛禱病愈殺牛塞禱今乃訾其里正與伍老屯二甲臣竊怪之王曰子何故不知於此彼民之所以為我用者非以吾愛之為我用者也以吾勢之為我用者也吾釋勢與民相收若是吾適不愛而民因不為我用也故遂絶愛道也秦大饑應侯請曰五苑之草著蔬菜橡果棗栗足以活民請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬草者使民有功與無功俱賞也夫使民有功與無功俱賞者此亂之道也夫發五苑而亂不如棄棗蔬而治一曰令發五苑之蓏蔬棗栗足以活民是用民有功與無功爭取也夫生而亂不如死而治大夫其釋之田鮪教其子田章曰欲利而身先利而君欲富而家先富而國一曰田鮪教其子田章曰主賣官爵臣賣智力故自恃無恃人公儀休相魯而嗜魚一國盡爭買魚而獻之公儀子不受其弟諫曰夫子嗜魚而不受者何也對曰夫唯嗜魚故不受也夫即受魚必有下人之色有下人之色將枉於法枉於法則免於相雖嗜魚此不必致我魚我又不能自給魚即無受魚而不免於相雖嗜魚我能長自給魚此明夫恃人不如自恃也明於人之為己者不如己之自為也說三子之相燕貴而主斷蘇代為齊使燕王問之曰齊王亦何如主也對曰必不霸矣燕王曰何也對曰昔桓公之霸也內事屬鮑叔外事屬管仲桓公被髮而御婦人日遊於市今齊王不信其大臣於是燕王因益大信子之子之聞之使人遺蘇代金百鎰而聽其所使一曰蘇代為齊使燕見無益子之則必不得事而還貢賜又不出於是見燕王乃譽齊王燕王曰齊王何若是之賢也則將必王乎蘇代曰救亡不暇安得王哉燕王曰何也曰其任所愛不均燕王曰其亡何也曰昔者齊桓公愛管仲置以為仲父內事理焉外事斷焉舉國而歸之故一匡天下九合諸侯今齊任所愛不均是以知其亡也燕王曰今吾任子之天下未之聞也於是明日張朝而聽子之潘壽謂燕王曰王不如以國讓子之人所以謂堯賢者以其讓天下於許由許由必不受也則是堯有讓許由之名而實不失天下也今王以國讓子之子之必不受也則是王有讓子之之名而與堯同行也於是燕王因舉國而屬之子之子之大重一曰潘壽隱者燕使人聘之潘壽見燕王曰臣恐子之之如益也王曰何益哉對曰古者禹死將傳天下於益啓之人因相與攻益而立啓今王信愛子之將傳國子之太子之人盡懷印為子之之人無一人在朝廷者王不幸棄群臣則子之亦益也王因收吏璽自三百石以上皆效之子之子之大重夫人主之所以鏡照者諸侯之士徒也今諸侯之士徒皆私門之黨也人主之所以自淺娋者巖穴之士徒也今巖穴之士徒皆私門之舍人也是何也奪褫之資在子之也故吳章曰人主不佯憎愛人佯愛人不得復憎也佯憎人不得復愛也一曰燕王欲傳國於子之也問之潘壽對曰禹愛益而任天下於益已而以啓人為吏及老而以啓為不足任天下故傳天下於益而勢重盡在啓也已而啓與友黨攻益而奪之天下是禹名傳天下於益而實令啓自取之也此禹之不及堯舜明矣今王欲傳之子之而吏無非太子之人者也是名傳之而實令太子自取之也燕王乃收璽自三百石以上皆效之子之子之遂重方吾子曰吾聞之古禮行不與同服者同車不與同族者共家而況君人者乃借其權而外其勢乎吳章謂韓宣王曰人主不可佯愛人一日不可復憎不可以佯憎人一日不可復愛也故佯憎佯愛之徵見則諛者因資而毀譽之雖有明主不能復收而況於以誠借人也趙王遊於圃中左右以菟與虎而輟盻然環其眼王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目如此者則必死矣其明日平陽君聞之使人殺言者而王不誅也衛君入朝於周周行人問其號對曰諸侯辟彊周行人卻之曰諸侯不得與天子同號衛君乃自更曰諸侯燬而後內之仲尼聞之曰遠哉禁逼虛名不以借人況實事乎說四搖木者一一攝其葉則勞而不遍左右拊其本而葉遍搖矣臨淵而搖木鳥驚而高魚恐而下善張網者引其綱若一一攝萬目而後得則是勞而難引其綱而魚已囊矣故吏者民之本綱者也故聖人治吏不治民救火者令吏挈壺甕而走火則一人之用也操鞭箠指麾而趣使人則制萬夫是以聖人不親細民明主不躬小事造父方耨時有子父乘車過者馬驚而不行其子下車牽馬父子推車請造父助我推車造父因收器輟而寄載之援其子之乘乃始檢轡持策未之用也而馬咸騖矣使造父而不能御雖盡力勞身助之推車馬猶不肯行也今身使佚且寄載有德於人者有術而御之也故國者君之車也勢者君之馬也無術以御之身雖勞猶不免亂有術以御之身處佚樂之地又致帝王之功也椎鍛者所以平不夷也榜檠者所以矯不直也聖人之為法也所以平不夷矯不直也淖齒之用齊也擢閔王之筋李兌之用趙也餓殺主父此二君者皆不能用其椎鍛榜檠故身死為戮而為天下笑一曰入齊則獨聞淖齒而不聞齊王入趙則獨聞李兌而不聞趙王故曰人主者不操術則威勢輕而臣擅名一曰武靈王使惠文王蒞政李兌為相武靈王不以身躬親殺生之柄故劫於李兌一曰田嬰相齊人有說王者曰終歲之計王不一以數日之閒自聽之則無以知吏之姦邪得失也王曰善田嬰聞之即遽請於王而聽其計王將聽之矣田嬰令官具押券斗石參升之計王自聽計計不勝聽罷食後復坐不復暮食矣田嬰復謂曰群臣所終歲日夜不敢偷怠之事也王以一夕聽之則群臣有為勸勉矣王曰諾俄而王已睡矣吏盡揄刀削其押券升石之計王自聽之亂乃始生說五茲鄭子引輦上高梁而不能支茲鄭踞轅而歌前者止後者趨輦乃上使茲鄭無術以致人則身雖絶力至死輦猶不上也今身不至勞苦而輦以上者有術以致人之故也趙簡主出稅者吏請輕重簡主曰勿輕勿重重則利入於上若輕則利歸於民吏無私利而正矣薄疑謂趙簡主曰君之國中飽簡主欣然而喜曰何如焉對曰府庫空虛於上百姓貧餓於下然而姦吏富矣齊桓公微服以巡民家人有年老而自養者桓公問其故對曰臣有子三人家貧無以妻之傭未反桓公歸以告管仲管仲曰畜積有腐棄之財則人飢餓宮中有怨女則民無妻桓公曰善乃論宮中有婦人而嫁之下令於民曰丈夫二十而室婦人十五而嫁一曰桓公微服而行於民間有鹿門稷者行年七十而無妻桓公問管仲曰有民老而無妻者乎管仲曰有鹿門稷者行年七十矣而無妻桓公曰何以令之有妻管仲曰臣聞之上有積財則民臣必匱乏於下宮中有怨女則有老而無妻者桓公曰善令於宮中女子未嘗御出嫁之乃令男子年二十而室女年十五而嫁則內無怨女外無曠夫延陵卓子乘蒼龍挑文之乘鉤飾在前錯錣在後馬欲進則鉤飾禁之欲退則錯錣貫之馬因旁出造父過而為之泣涕曰古之治人亦然矣夫賞所以勸之而毀存焉罰所以禁之而譽加焉民中立而不知所由此亦聖人之所為泣也一曰延陵卓子乘蒼龍與翟文之乘前則有錯飾後則有利錣進則引之退則策之馬前不得進後不得退遂避而逸因下抽刀而刎其腳造父見之泣一曰延陵卓子乘蒼龍與翟文之乘前則有錯飾後則有利錣進則引之退則策之馬前不得進後不得退遂避而逸因下抽刀而刎其腳造父見之泣終日不食因仰天而歎曰策所以進之也錯飾在前引所以退之也利錣在後今人主以其清潔也進之以其不適左右也退之以其公正也譽之以其不聽從也廢之民懼中立而不知所由此聖人之所為泣也
