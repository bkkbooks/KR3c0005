body:
  text: 姦劫弒臣第十四凡姦臣皆欲順人主之心以取親幸之勢者也是以主有所善臣從而譽之主有所憎臣因而毀之凡人之大體取舍同者則相是也取合異者則相非也今人臣之所譽者人主之所是也此之謂同取人臣之所毀者人主之所非也此之謂同舍夫取舍合而相與逆者未嘗聞也此人臣之所以取信幸之道也夫姦臣得乘信幸之勢以毀譽進退群臣者人主非有術數以御之也非參驗以審之也必將以曩之合己信今之言此幸臣之所以得欺主成私者也故主必欺於上而臣必重於下矣此之謂擅主之臣國有擅主之臣則群下不得盡其智力以陳其忠百官之吏不得奉法以致其功矣何以明之夫安利者就之危害者去之此人之情也今為臣盡力以致功竭智以陳忠者其身困而家貧父子罹其害為姦利以弊人主行財貨以事貴重之臣者身尊家富父子被其澤人焉能去安利之道而就危害之處哉治國若此其過也而上欲下之無姦吏之奉法其不可得亦明矣故左右知貞信之不可以得安利也必曰我以忠信事上積功勞而求安是猶盲而欲知黑白之情必不幾矣若以道化行正理不趨富貴事上而求安是猶聾而欲審清濁之聲也愈不幾矣二者不可以得安我安能無相比周蔽主上為姦私以適重人哉此必不顧人主之義矣其百官之吏亦知方正之不可以得安也必曰我以清廉事上而求安若無規矩而欲為方圓也必不幾矣若以守法不朋黨治官而求安是猶以足搔頂也愈不幾也二者不可以得安能無廢法行私以適重人哉此必不顧君上之法矣故以私為重人者衆而以法事君者少矣是以主孤於上而臣成黨於下此田成之所以弒簡公者也夫有術者之為人臣也得效度數之言上明主法下困姦臣以尊主安國者也是以度數之言得效於前則賞罰必用於後矣人主誠明於聖人之術而不苟於世俗之言循名實而定是非因參驗而審言辭是以左右近習之臣知偽詐之不可以得安也必曰我不去姦私之行盡力竭智以事主而乃以相與比周妄毀譽以求安是猶負千鈞之重陷於不測之淵而求生也必不幾矣百官之吏亦知為姦利之不可以得安也必曰我不以清廉方正奉法乃以貪汙之心枉法以取私利是猶上高陵之顛墮峻溪之下而求生必不幾矣安危之道若此其明也左右安能以虛言惑主而百官安敢以貪漁下是以臣得陳其忠而不弊下得守其職而不怨此管仲之所以治齊而商君之所以強秦也從是觀之則聖人之治國也固有使人不得不愛我之道而不恃人之以愛為我也恃人之以愛為我者危矣恃吾不可不為者安矣夫君臣非有骨肉之親正直之道可以得利則臣盡力以事主正直之道不可以得安則臣行私以干上明主知之故設利害之道以示天下而已矣夫是以人主雖不口教百官不目索姦邪而國已治矣人主者非目若離婁乃為明也非耳若師曠乃為聰也目必不任其數而待目以為明所見者少矣非不弊之術也耳必不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視天下不得不為己聽故身在深宮之中而明照四海之內而天下弗能蔽弗能欺者何也暗亂之道廢而聰明之勢興也故善任勢者國安不知因其勢者國危古秦之俗君臣廢法而服私是以國亂兵弱而主卑商君説秦孝公以變法易俗而明公道賞告姦困末作而利本事當此之時秦民習故俗之有罪可以得免無功可以得尊顯也故輕犯新法於是犯之者其誅重而必告之者其賞厚而信故姦莫不得而被刑者衆民疾怨而衆過日聞孝公不聽遂行商君之法民後知有罪之必誅而告私姦者衆也故民莫犯其刑無所加是以國治而兵強地廣而主尊此其所以然者匿罪之罰重而告姦之賞厚也此亦使天下必為己視聽之道也至治之法術已明矣而世學者弗知也且夫世之愚學皆不知治亂之情囁硤多誦先古之書以亂當世之治智慮不足以避穽井之陷又妄非有術之士聽其言者危用其計者亂此亦愚之至大而患之至甚者也俱與有術之士有談説之名而實相去千萬也此夫名同而實有異者也夫世愚學之人比有術之士也猶塏垤之比大陵也其相去遠矣而聖人者審於是非之實察於治亂之情也故其治國也正明法陳嚴刑將以救群生之亂去天下之禍使強不陵弱衆不暴寡耆老得遂幼孤得長邊境不侵君臣相親父子相保而無死亡係虜之患此亦功之至厚者也愚人不知顧以為暴愚者固欲治而惡其所以治皆惡危而喜其所以危者何以知之夫嚴刑重罰者民之所惡也而國之所以治也哀憐百姓輕刑罰者民之所喜而國之所以危也聖人為法國者必逆於世而順於道德知之者同於義而異於俗弗知之者異於義而同於俗天下知之者少則義非矣處非道之位被衆口之譖溺於當世之言而欲當嚴天子而求安幾不亦難哉此夫智士所以至死而不顯於世者也楚莊王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得為君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾余之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲強戲余余與爭之至裂余之衣而此子之不孝莫大於此矣君怒而殺甲也故妻以妾余之詐棄而子以之死從是觀之父之愛子也猶可以毀而害也君臣之相與也非有父子之親也而群臣之毀言非特一妾之口也何怪夫賢聖之戮死哉此商君之所以車裂於秦而吳起之所以枝解於楚者也凡人臣者有罪固不欲誅無功者皆欲尊顯而聖人之治國也賞不加於無功而誅必行於有罪者也然則有術數者之為人也固左右姦臣之所害非明主弗能聽也世之學者説人主不曰乘威嚴之勢以困姦邪之臣而皆曰仁義惠愛而已矣世主美仁義之名而不察其實是以大者國亡身死小者地削主卑何以明之夫施與貧困者此世之所謂仁義哀憐百姓不忍誅罰者此世之所謂惠愛也夫有施與貧困則無功者得賞不忍誅罰則暴亂者不止國有無功得賞者則民不外務當敵斬首內不急力田疾作皆欲行貨財事富貴為私善立名譽以取尊官厚俸故姦私之臣愈衆而暴亂之徒愈勝不亡何待夫嚴刑者民之所畏也重罰者民之所惡也故聖人陳其所畏以禁其邪設其所惡以防其姦是以國安而暴亂不起吾以是明仁義愛惠之不足用而嚴刑重罰之可以治國也無捶策之威銜橛之備雖造父不能以服馬無規矩之法繩墨之端雖王爾不能以成方圓無威嚴之勢賞罰之法雖堯舜不能以為治今世主皆輕釋重罰嚴誅行愛惠而欲霸王之功亦不可幾也故善為主者明賞設利以勸之使民以功賞而不以仁義賜嚴刑重罰以禁之使民以罪誅而不以愛惠免是以無功者不望而有罪者不幸矣託於犀車良馬之上則可以陸犯阪阻之患乘舟之安持楫之利則可以水絶江河之難操法術之數行重罰嚴誅則可以致霸王之功治國之有法術賞罰猶若陸行之有犀車良馬也水行之有輕舟便楫也乘之者遂得其成伊尹得之湯以王管仲得之齊以霸商君得之秦以強此三人者皆明於霸王之術察於治強之數而不以牽於世俗之言適當世明主之意則有直任布衣之士立為卿相之處處位治國則有尊主廣地之實此之謂足貴之臣湯得伊尹以百里之地立為天子桓公得管仲立為五霸主九合諸侯一匡天下孝公得商君地以廣兵以強故有忠臣者外無敵國之患內無亂臣之憂長安於天下而名垂後世所謂忠臣也若夫豫讓為智伯臣也上不能説人主使之明法術度數之理以避禍難之患下不能領御其衆以安其國及襄子之殺智伯也豫讓乃自黔劓敗其形容以為智伯報襄子之仇是雖有殘刑殺身以為人主之名而實無益於智伯若秋毫之末此吾之所下也而世主以為忠而高之古有伯夷叔齊者武王讓以天下而弗受二人餓死首陽之陵若此臣不畏重誅不利重賞不可以罰禁也不可以賞使也此之謂無益之臣也吾所少而去也而世主之所多而求也諺曰厲憐王此不恭之言也雖然古無虛諺不可不察也此謂劫殺死亡之主言也人主無法術以御其臣雖長年而美材大臣猶將得勢擅事主斷而各為其私急而恐父兄豪傑之士借人主之力以禁誅於己也故弒賢長而立幼弱廢正的而立不義故春秋記之曰楚王子圍將聘於鄭未出境聞王病而反因入問病以其冠纓絞王而殺之遂自立也齊崔杼其妻美而莊公通之數如崔氏之室及公往崔子之徒賈舉率崔子之徒而攻公公入室請與之分國崔子不許公請自刃於廟崔子又不聽公乃走踰於北墻賈舉射公中其股公墜崔子之徒以戈斫公而死之而立其弟景公近之所見李兌之用趙也餓主父百日而死淖齒之用齊也擢湣王之筋懸之廟梁宿昔而死故厲雖癰腫疕瘍上比於春秋未至於絞頸射股也下比於近世未至飢死擢筋也故劫殺死亡之君此其心之憂懼形之苦痛也必甚於厲矣由此觀之雖厲憐王可也
