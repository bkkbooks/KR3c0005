body:
  text: 三守第十六人主有三守三守完則國安身榮三守不完則國危身殆何謂三守人臣有議當途之失用事之過舉臣之情人主不心藏而漏之近習能人使人臣之欲有言者不敢不下適近習能人之心而乃上以聞人主然則端言直道之人不得見而忠直日疏愛人不獨利也待譽而後利之憎人不獨害也待非而後害之然則人主無威而重在左右矣惡自治之勞憚使群臣輻湊之變因傳柄移藉使殺生之機奪豫之要在大臣如是者侵此謂三守不完三守不完則劫殺之徵也凡劫有三有明劫有事劫有刑劫人臣有大臣之尊外操國要以資群臣使外內之事非己不得行雖有賢良逆者必有禍而順者必有福然則群臣直莫敢忠主憂國以爭社稷之利害人主雖賢不能獨計而人臣有不敢忠主則國為亡國矣此謂國無臣國無臣者豈郎中虛而朝臣少哉群臣持祿養交行私道而不效公忠此謂明劫鬻寵擅權矯外以勝內險言禍福得失之形以阿主之好惡人主聽之卑身輕國以資之事敗與主分其禍而功成則臣獨專之諸用事之人一心同辭以語其美則主言惡者必不信矣此謂事劫至於守司囹圄禁制刑罰人臣擅之此謂刑劫三守不完則三劫者起三守完則三劫者止三劫止塞則王矣
