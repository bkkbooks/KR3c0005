body:
  text: 難勢第四十慎子曰飛龍乘雲騰蛇遊霧雲罷霧霽而龍蛇與蚓蟻同矣則失其所乘也賢人而詘於不肖者則權輕位卑也不肖而能服於賢者則權重位尊也堯為匹夫不能治三人而桀為天子能亂天下吾以此知勢位之足恃而賢智之不足慕也夫弩弱而矢高者激於風也身不肖而令行者得助於衆也堯教於隸屬而民不聽至於南面而王天下令則行禁則止由此觀之賢智未足以服衆而勢位足以屈賢者也應慎子曰飛龍乘雲騰蛇遊霧吾不以龍蛇為不託於雲霧之勢也雖然夫釋賢而專任勢足以為治乎則吾未得見也夫有雲霧之勢而能乘遊之者龍蛇之材美也今雲盛而蚓弗能乘也霧醲而蟻不能遊也夫有盛雲醲霧之勢而不能乘遊者蚓蟻之材薄也今桀紂南面而王天下以天子之威為之雲霧而天下不免乎大亂者桀紂之材薄也且其人以堯之勢以治天下也其勢何以異桀之勢也亂天下者也夫勢者非能必使賢者用之而不肖者不用之也賢者用之則天下治不肖者用之則天下亂人之情性賢者寡而不肖者衆而以威勢之利濟亂世之不肖人則是以勢亂天下者多矣以勢治天下者寡矣夫勢者便治而利亂者也故周書曰毋為虎傅翼將飛入邑擇人而食之夫乘不肖人於勢是為虎傅翼也桀紂為高臺深池以盡民力為炮烙以傷民性桀紂得成肆行者南面之威為之翼也使桀紂為匹夫未始行一而身在刑戮矣勢者養虎狼之心而成暴亂之事者也此天下之大患也勢之於治亂本未有位也而語專言勢之足以治天下者則其智之所至者淺矣夫良馬固車使臧獲御之則為人笑王良御之而日取千里車馬非異也或至乎千里或為人笑則巧拙相去遠矣今以國位為車以勢為馬以號令為轡以刑罰為鞭策使堯舜御之則天下治桀紂御之則天下亂則賢不肖相去遠矣夫欲追速致遠不知任王良欲進利除害不知任賢能此則不知類之患也夫堯舜亦治民之王良也復應之曰其人以勢為足恃以治官客曰必待賢乃治則不然矣夫勢者名一而變無數者也勢必於自然則無為言於勢矣吾所為言勢者言人之所設也夫堯舜生而在上位雖有十桀紂不能亂者則勢治也桀紂亦生而在上位雖有十堯舜而亦不能治者則勢亂也故曰勢治者則不可亂而勢亂者則不可治也此自然之勢也非人之所得設也若吾所言謂人之所得設也而已矣賢何事焉何以明其然也客曰人有鬻矛與楯者譽其楯之堅物莫能陷也俄而又譽其矛曰吾矛之利物無不陷也人應之曰以子之矛陷子之楯何如其人弗能應也以為不可陷之楯與無不陷之矛為名不可兩立也夫賢之為道不可禁而勢之為道也無不禁以不可禁之賢與無不禁之勢此矛楯之說也夫賢勢之不相容亦明矣且夫堯舜桀紂千世而一出是比肩隨踵而生也世之治者不絶於中吾所以為言勢者中也中者上不及堯舜而下亦不為桀紂抱法處勢則治背法去勢則亂今廢勢背法而待堯舜堯舜至乃治是千世亂而一治也抱法處勢而待桀紂桀紂至乃亂是千世治而一亂也且夫治千而亂一與治一而亂千也是猶乘驥駬而分馳也相去亦遠矣夫棄隱栝之法去度量之數使奚仲為車不使成一輪無慶賞之勸刑罰之威釋勢委法堯舜戶說而人辨之不能治三家夫勢之足用亦明矣而曰必待賢則亦不然矣且夫百日不食以待粱肉餓者不活今待堯舜之賢乃治當世之民是猶待粱肉而救餓之說也夫曰良馬固車臧獲御之則為人笑王良御之則日取乎千里吾不以為然夫待越人之善海遊者以救中國之溺人越人善遊矣而溺者不濟矣夫待古之王良以馭今之馬亦猶越人救溺之說也不可亦明矣夫良馬固車五十里而一置使中手御之追速致遠可以及也而千里可日致也何必待古之王良乎且御非使王良也則必使倉獲敗之治非使堯舜也則必使桀紂亂之此味非飴蜜也必苦萊亭歷也此則積辨纍辭離理失術兩末之議也奚可以難夫道理之言乎哉客議未及此論也
