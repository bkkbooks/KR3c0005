body:
  text: 八說第四十七為故人行私謂之不棄以公財分施謂之仁人輕祿重身謂之君子枉法曲親謂之有行棄官寵交謂之有俠離世遁上謂之高傲交爭逆令謂之剛材行惠取衆謂之得民不棄者吏有姦也仁人者公財損也君子者民難使也有行者法制毀也有俠者官職曠也高傲者民不事也剛材者令不行也得民者君上孤也此八者匹夫之私譽人主之大敗也反此八者匹夫之私毀人主之公利也人主不察社稷之利害而用匹夫之私譽索國之無危亂不可得矣任人以事存亡治亂之機也無術以任人無所任而不敗人君之所任非辨智則修潔也任人者使有勢也智士者未必信也為多其智因惑其信也以智士之計處乘勢之資而為其私急則君必欺焉為智者之不可信也故任修士者使斷事也修士者未必智為潔其身因惑其智以愚人之所惛處治事之官而為其所然則事必亂矣故無術以用人任智則君欺任修則君事亂此無術之患也明君之道賤得議貴下必坐上決誠以參聽無門戶故智者不得詐欺計功而行賞程能而授事察端而觀失有過者罪有能者得故愚者不任事智者不敢欺愚者不得斷則事無失矣察士然後能知之不可以為令夫民不盡察賢者然後能行之不可以為法夫民不盡賢楊朱墨翟天下之所察也干世亂而卒不決雖察而不可以為官職之令鮑焦華角天下之所賢也鮑焦木枯華角赴河雖賢不可以為耕戰之士故人主之所察智士盡其辨焉人主之所尊能士能盡其行焉今世主察無用之辨尊遠功之行索國之富強不可得也博習辨智如孔墨孔墨不耕耨則國何得焉修孝寡欲如曾史曾史不戰攻則國何利焉匹夫有私便人主有公利不作而養足不仕而名顯此私便也息文學而明法度塞私便而一功勞此公利也錯法以道民也而又貴文學則民之所師法也疑賞功以勸民也而又尊行修則民之産利也惰夫貴文學以疑法尊行修以二功索國之富強不可得也搢笏干戚不適有方鐵銛登降周旋不逮日中奏百狸首射侯不當強弩趨發干城距衝不若堙穴伏橐古人亟於德中世逐於智當今爭於力古者寡事而備簡朴陋而不盡故有珧銚而推車者古者人寡而相親物多而輕利易讓故有揖讓而傳天下者然則行揖讓高慈惠而道仁厚皆推政也處多事之時用寡事之器非智者之備也當大爭之世而循揖讓之軌非聖人之治也故智者不乘推車聖人不行推政也法所以制事事所以名功也法有立而有難權其難而事成則立之事成而有害權其害而功多則為之無難之法無害之功天下無有也是以拔千丈之都敗十萬之衆死傷者軍之乘甲兵折挫士卒死傷而賀戰勝得地者出其小害計其大利也夫沐者有棄髮除者傷血肉為人見其難因釋其業是無術之士也先聖有言曰規有摩而水有波我欲更之無奈之何此通權之言也是以說有必立而曠於實者言有辭拙而急於用者故聖人不求無害之言而務無易之事人之不事衡石者非貞廉而遠利也石不能為人多少衡不能為人輕重求索不能得故人不事也明主之國官不敢枉法吏不敢為私利貨賂不行是境內之事盡如衡石也此其臣有姦者必知知者必誅是以有道之主不求清潔之吏而務必知之術也慈母之於弱子也愛不可為前然而弱子有僻行使之隨師有惡病使之事醫不隨師則陷於刑不事醫則疑於死慈母雖愛無益於振刑救死則存子者非愛也子母之性愛也臣主之權策也母不能以愛存家君安能以愛持國明主者通於富強則可以得欲矣故謹於聽治富強之法也明其法禁察其謀計法明則內無變亂之患計得則外無死虜之禍故存國者非仁義也仁者慈惠而輕財者也暴者心毅而易誅者也慈惠則不忍輕財則好與心毅則憎心見於下易誅則妄殺加於人不忍則罰多宥赦好與則賞多無功憎心見則下怨其上妄誅則民將背叛故仁人在位下肆而輕犯禁法偷幸而望於上暴人在位則法令妄而臣主乖民怨而亂心生故曰仁暴者皆亡國者也不能具美食而勸餓人飯不為能活餓者也不能辟草生粟而勸貸施賞賜不能為富民者也今學者之言也不務本作而好末事知道虛聖以說民此勸飯之說勸飯之說明主不受也書約而弟子辨法省而民訟簡是以聖人之書必著論明主之法必詳盡事盡思慮揣得失智者之所難也無思無慮挈前言而責後功愚者之所易也明主慮愚者之所易不責智者之所難故智慮力勞不用而國治也酸甘鹹淡不以口斷而決於宰尹則廚人輕君而重於宰尹矣上下清濁不以耳斷而決於樂正則瞽工輕君而重於樂正矣治國是非不以術斷而決於寵人則臣下輕君而重於寵人矣人主不親觀聽而制斷在下託食於國者也使人不衣不食而不飢不寒又不惡死則無事上之意意欲不宰於君則不可使也今生殺之柄在大臣而主令得行者未嘗有也虎豹必不用其爪牙而與鼷鼠同威萬金之家必不用其富厚而與監門同資有土之君說人不能利惡人不能害索人欲畏重己不可得也人臣肆意陳欲曰俠人主肆意陳欲曰亂人臣輕上曰驕人主輕下曰暴行理同實下以受譽上以得非人臣大得人主大亡明主之國有貴臣無重臣貴臣者爵尊而官大也重臣者言聽而力多者也明主之國遷官襲級官爵受功故有貴臣言不度行而有僞必誅故無重臣也
