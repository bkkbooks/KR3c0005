body:
  text: 二柄第七明主之所導制其臣者二柄而已矣二柄者刑德也何謂刑德曰殺戮之謂刑慶賞之謂德為人臣者畏誅罰而利慶賞故人主自用其刑德則群臣畏其威而歸其利矣故世之姦臣則不然所惡則能得之其主而罪之所愛則能得之其主而賞之今人主非使賞罰之威利出於己也聽其臣而行其賞罰則一國之人皆畏其臣而易其君歸其臣而去其君矣此人主失刑德之患也夫虎之所以能服狗者爪牙也使虎釋其爪牙而使狗用之則虎反服於狗矣人主者以刑德制臣者也今君人者釋其刑德而使臣用之則君反制於臣矣故田常上請爵祿而行之群臣下大斗斛而施於百姓此簡公失德而田常用之也故簡公見弒子罕謂宋君曰夫慶賞賜豫者民之所喜也君自行之殺戮刑罰者民之所惡也臣請當之於是宋君失刑而子罕用之故宋君見劫田常徒用德而簡公弒子罕徒用刑而宋君劫故今世為人臣者兼刑德而用之則是世主之危甚於簡公宋君也故劫殺擁蔽之主兼失刑德而使臣用之而不危亡者則未嘗有也人主將欲禁姦則審合刑名刑名者言與事也為人臣者陳而言君以其言授之事專以其事責其功功當其事事當其言則賞功不當其事事不當其言則罰故群臣其言大而功小者則罰非罰小功也罰功不當名也群臣其言小而功大者亦罰非不說於大功也以為不當名之害甚於有大功故罰昔者韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而說問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒故明主之畜臣臣不得越官而有功不得陳言而不當越官則死不當則罪守業其官所言者貞也則群臣不得朋黨相為矣人主有二患任賢則臣將乘於賢以劫其君妄舉則事沮不勝故人主好賢則群臣飾行以要君欲則是群臣之情不效群臣之情不效則人主無以異其臣矣故越王好勇而民多輕死楚靈王好細腰而國中多餓人齊桓公妬而好內故豎刁自宮以治內桓公好味易牙蒸其子首而進之燕子噲好賢故子之明不受國故君見惡則群臣匿端君見好則群臣誣能人主欲見則群臣之情態得其資矣故子之託於賢以奪其君者也豎刁易牙因君之欲以侵其君者也其卒子噲以亂死桓公蟲流出戶而不葬此其故何也人君以情借臣之患也人臣之情非必能愛其君也為重利之故也今人主不掩其情不匿其端而使人臣有緣以侵其主則群臣為子之田常不難矣故曰去好去惡群臣見素群臣見素則大君不蔽矣
