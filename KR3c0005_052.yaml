body:
  text: 人主第五十二人主之所以身危國亡者大臣太貴左右太威也所謂貴者無法而擅行操國柄而便私者也所謂威者擅權勢而輕重者也此二者不可不察也夫馬之所以能任重引車致遠道者以筋力也萬乘之主千乘之君所以制天下而征諸侯者以其威勢也威勢者人主之筋力也今大臣得威左右擅勢是人主失力人主失力而能有國者千無一人虎豹之所以能勝人執百獸者以其爪牙也當使虎豹失其爪牙則人必制之矣今勢重者人主之爪牙也君人而失其爪牙虎豹之類也宋君失其爪牙於子罕簡公失其爪牙於田常而不蚤奪之故身死國亡今無術之主皆明知宋簡之過也而不悟其失不察其事類者也且法術之士與當途之臣不相容也何以明之主有術士則大臣不得制斷近習不敢賣重大臣左右權勢息則人主之道明矣今則不然其當途之臣得勢擅事以環其私左右近習朋黨比周以制疏遠則法術之士奚時得進用人主奚時得論裁故有術不必用而勢不兩立法術之士焉得無危故君人者非能退大臣之議而背左右之訟獨合乎道言也則法術之士安能蒙死亡之危而進說乎此世之所以不治也明主者推功而爵祿稱能而官事所舉者必有賢所用者必有能賢能之士進則私門之請止矣夫有功者受重祿有能者處大官則私劍之士安得無離於私勇而疾距敵游宦之士焉得無撓於私門而務於清潔矣此所以聚賢能之士而散私門之屬也今近習者不必智人主之於人也或有所知而聽之入因與近習論其言聽近習而不計其智是與愚論智也其當途者不必賢人主之於人或有所賢而禮之入因與當途者論其行聽其言而不用賢是與不肖論賢也故智者決策於愚人賢士程行於不肖則賢智之士奚時得用而人主之明塞矣昔關龍逄說桀而傷其四肢王子比干諫紂而剖其心子胥忠直夫差而誅於屬鏤此三子者為人臣非不忠而說非不當也然不免於死亡之患者主不察賢智之言而蔽於愚不肖之患也今人主非肯用法術之士聽愚不肖之臣則賢智之士孰敢當三子之危而進其智能者乎此世之所以亂也
