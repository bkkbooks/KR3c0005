body:
  text: 說疑第四十四凡治之大者非謂其賞罰之當也賞無功之人罰不辜之民非所謂明也賞有功罰有罪而不失其人方在於人者也非能生功止過者也是故禁姦之法太上禁其心其次禁其言其次禁其事今世皆曰尊主安國者必以仁義智能而不知卑主危國者之必以仁義智能也故有道之主遠仁義去智能服之以法是以譽廣而名威民治而國安知用民之法也凡術也者主之所執也法也者官之所師也然使郎中日聞道於郎門之外以至於境內日見法又非其難者也昔者有扈氏有失度讙兜氏有孤男三苗有成駒桀有隹侈紂有崇侯虎晉有優施此六人者亡國之臣也言是如非言非如是內險以賊其外小謹以徵其善稱道往古使良事沮善禪其主以集精微亂之以其所好此夫郎中左右之類者也往世之主有得人而身安國存者有得人而身危國亡者得人之名一也而利害相千萬也故人主左右不可不慎也為人主者誠明於臣之所言則別賢不肖如黑白矣若夫許由續牙晉伯陽秦顛頡衛僑如狐不稽重明董不識卞隨務光伯夷叔齊此十二人者皆上見利不喜下臨難不恐或與之天下而不取有萃辱之名則不樂食穀之利夫見利不喜上雖厚賞無以勸之臨難不恐上雖嚴刑無以威之此之謂不令之民也此十二人者或伏死於窟穴或槁死於草木或飢餓於山谷或沉溺於水泉有民如此先古聖王皆不能臣當今之世將安用之若夫關龍逄王子比干隨季梁陳泄冶楚申胥吳子胥此六人者皆疾爭強諫以勝其君言聽事行則如師徒之勢一言而不聽一事而不行則陵其主以語待之以其身雖身死家破要領不屬手足異處不難為也如此臣者先古聖王皆不能忍也當今之時將安用之若夫齊田恆宋子罕魯季孫意如晉僑如衛子南勁鄭太宰欣楚白公周單荼燕子之此九人者之為其臣也皆朋黨比周以事其君隱正道而行私曲上偪君下亂治援外以撓內親下以謀上不難為也如此臣者唯聖王智主能禁之若夫昏亂之君能見之乎若夫后稷皋陶伊尹周公旦太公望管仲隰朋百里奚蹇叔舅犯趙衰范蠡大夫種逢同華登此十五人者為其臣也皆夙興夜寐卑身賤體竦心白意明刑辟治官職以事其君進善言通道法而不敢矜其善有成功立事而不敢伐其勞不難破家以便國殺身以安主以其主為高天泰山之尊而以其身為壑谷鬴洧之卑主有明名廣譽於國而身不難受壑谷鬴洧之卑如此臣者雖當昏亂之主尚可致功況於顯明之主乎此謂霸王之佐也若夫周滑之鄭王孫申陳公孫寧儀行父荊芋尹申亥隨少師越種干吳王孫頟晉陽成泄齊豎刁易牙此十二人者之為其臣也皆思小利而忘法義進則揜蔽賢良以陰闇其主退則撓亂百官而為禍難皆輔其君共其欲苟得一說於主雖破國殺眾不難為也有臣如此雖當聖王尚恐奪之而況昏亂之君其能無失乎有臣如此者皆身死國亡為天下笑故周威公身殺國分為二鄭子陽身殺國分為三陳靈公身死於夏徵舒氏荊靈王死於乾谿之上隨亡於荊吳并於越知伯滅於晉陽之下桓公身死七日不收故曰諂諛之臣唯聖王知之而亂主近之故至身死國亡聖王明君則不然內舉不避親外舉不避讎是在焉從而舉之非在焉從而罰之是以賢良遂進而姦邪並退故一舉而能服諸侯其在記曰堯有丹朱而舜有商均啟有五觀商有太甲武王有管蔡五王之所誅者皆父兄子弟之親也而所殺亡其身殘破其家者何也以其害國傷民敗法類也觀其所舉或在山林藪澤巖穴之間或在囹圄緤紲纏索之中或在割烹芻牧飯牛之事然明主不羞其卑賤也以其能為可以明法便國利民從而舉之身安名尊亂主則不然不知其臣之意行而任之以國故小之名卑地削大之國亡身死不明於用臣也無數以度其臣者必以其眾人之口斷之眾之所譽從而悅之眾之所非從而憎之故為人臣者破家殘賥內構黨與外接巷族以為譽從陰約結以相固也虛相與爵祿以相勸也曰與我者將利之不與我者將害之眾貪其利劫其威彼誠喜則能利己忌怒則能害己眾歸而民留之以譽盈於國發聞於主主不能理其情因以為賢彼又使譎詐之士外假為諸侯之寵使假之以輿馬信之以瑞節鎮之以辭令資之以幣帛使諸侯淫說其主微挾私而公議所為使者異國之主也所為談者左右之人也主說其言而辯其辭以此人者天下之賢士也內外之於左右其諷一而語同大者不難卑身尊位以下之小者高爵重祿以利之夫姦人之爵祿重而黨與彌眾又有姦邪之意則姦臣愈反而說之曰古之所謂聖君明王者非長幼世及以次序也以其構黨與聚巷族偪上弒君而求其利也彼曰何知其然也因曰舜偪堯禹偪舜湯放桀武王伐紂此四王者人臣弒其君者也而天下譽之察四王之情貪得之意也度其行暴亂之兵也然四王自廣措也而天下稱大焉自顯名也而天下稱明焉則威足以臨天下利足以蓋世天下從之又曰以今時之所聞田成子取齊司城子罕取宋太宰欣取鄭單氏取周易牙之取衛韓魏趙三子分晉此八人者臣之弒其君者也姦臣聞此蹶然舉耳以為是也故內搆黨與外攄巷族觀時發事一舉而取國家且夫內以黨與劫弒其君外以諸侯之權矯易其國隱正道持私曲上禁君下撓治者不可勝數也是何也則不明於擇臣也記曰周宣王以來亡國數十其臣弒其君而取國者眾矣然則難之從內起與從外作者相半也能一盡其民力破國殺身者尚皆賢主也若夫轉身易位全眾傳國最其病也為人主者誠明於臣之所言則雖罼弋馳騁撞鍾舞女國猶且存也不明臣之所言雖節儉勤勞布衣惡食國猶自亡也趙之先君敬侯不修德行而好縱慾適身體之所安耳目之所樂冬日罼弋夏浮淫為長夜數日不廢御觴不能飲者以筩灌其口進退不肅應對不恭者斬於前故居處飲食如此其不節也制刑殺戮如此其無度也然敬侯享國數十年兵不頓於敵國地不虧於四鄰內無群臣百官之亂外無諸侯鄰國之患明於所以任臣也燕君子噲邵公奭之後也地方數千里持戟數十萬不安子女之樂不聽鍾石之聲內不堙汙池臺榭外不罼弋田獵又親操耒耨以修畎畝子噲之苦身以憂民如此其甚也雖古之所謂聖王明君者其勤身而憂世不甚於此矣然而子噲身死國亡奪於子之而天下笑之此其何故也不明乎所以任臣也故曰人臣有五姦而主不知也為人臣者有侈用財貨賂以取譽者有務慶賞賜予以移眾者有務朋黨徇智尊士以擅逞者有務解免赦罪獄以事威者有務奉下直曲怪言偉服瑰稱以眩民耳目者此五者明君之所疑也而聖主之所禁也去此五者則譟詐之人不敢北面立談文言多實行寡而不當法者不敢誣情以談說是以群臣居則修身動則任力非上之令不敢擅作疾言誣事此聖王之所以牧臣下也彼聖主明君不適疑物以闚其臣也見疑物而無反者天下鮮矣故曰孽有擬適之子配有擬妻之妾廷有擬相之臣臣有擬主之寵此四者國之所危也故曰內寵並后外寵貳政枝子配適大臣擬主亂之道也故周記曰無尊妾而卑妻無孽適子而尊小枝无尊嬖臣而匹上卿無尊大臣以擬其主也四擬者破則上無意下無怪也四擬不破則隕身滅國矣
