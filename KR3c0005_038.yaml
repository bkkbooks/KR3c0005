body:
  text: 難三第三十八魯穆公問於子思曰吾聞龐𥼴氏之子不孝其行奚如子思對曰君子尊賢以崇德舉善以觀民若夫過行是細人之所識也臣不知也子思出子服厲伯入見問龐𥼴氏子子服厲伯對曰其過三皆君之所未嘗聞自是之後君貴子思而賤子服厲伯也或曰魯之公室三世劫於季氏不亦宜乎明君求善而賞之求姦而誅之其得之一也故以善聞之者以説善同於上者也以姦聞之者以惡姦同於上者也此宜賞譽之所及也不以姦聞是異於上而下比周於姦者也此宜毀罰之所及也今子思不以過聞而穆公貴之厲伯以姦聞而穆公賤之人情皆喜貴而惡賤故季氏之亂成而不上聞此魯君之所以劫也且此亡王之俗取魯之民所以自美而穆公獨貴之不亦倒乎文公出亡獻公使寺人披攻之蒲城披斬其袪文公奔翟惠公即位又使攻之惠竇不得也及文公反國披求見公曰蒲城之役君令一宿而汝即至惠竇之難君令三宿而汝一宿何其速也披對曰君令不二除君之惡惟恐不堪蒲人翟人余何有焉今公即位其無蒲翟乎且桓公置射鉤而相管仲君乃見之或曰齊晉絶祀不亦宜乎桓公能用管仲之功而忘射鉤之怨文公能聽寺人之言而棄斬袪之罪桓公文公能容二子者也後世之君明不及二公後世之臣賢不如二子不忠之臣以事不明之君君不知則有燕操子罕田常之賊知之則以管仲寺人自解君必不誅而自以為有桓文之德是臣讎而明不能燭多假之資自以為賢而不戒則雖無後嗣不亦可乎且寺人之言也直飾君令而不二者則是貞於君也死君復生臣不愧而後為貞今惠公朝卒而暮事文公寺人之不二何如人有設桓公隱者曰一難二難三難何也桓公不能對以告管仲管仲對曰一難也近優而遠士二難也去其國而數之海三難也君老而晚置太子桓公曰善不擇日而廟禮太子或曰管仲之射隱不得也士之用不在近遠而俳優侏儒固人主之所與燕也則近優而遠士而以為治非其難者也夫處勢而不能用其有而悖不去國是以一人之力禁一國以一人之力禁一國者少能勝之明能照遠姦而見隱微必行之令雖遠於海內必無變然則去國之海而不劫殺非其難者也楚成王置商臣以為太子又欲置公子職商臣作難遂弒成王公子宰周太子也公子根有寵遂以東州反分而為兩國此皆非晚置太子之患也夫分勢不二庶孽卑寵無藉雖處大臣晚置太子可也然則晚置太子庶孽不亂又非其難也物之所謂難者必借人成勢而勿使侵害己可謂一難也貴妾不使二后二難也愛孽不使危正適專聽一臣而不敢隅君此則可謂三難也葉公子高問政於仲尼仲尼曰政在悅近而來遠哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財三公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰政在悅近而來遠魯哀公有大臣三人外障距諸侯四鄰之士內比周而以愚其君使宗廟不掃除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乘之家賜者三故曰政在節財或曰仲尼之對亡國之言也葉民有倍心而説之悅近而來遠則是教民懷惠惠之為政無功者受賞而有罪者免此法之所以敗也法敗而政亂以亂政治敗民未見其可也且民有倍心者君上之明有所不及也不紹葉公之明而使之悅近而來遠是舍吾勢之所能禁而使與下行惠以爭民非能持勢者也夫堯之賢六王之冠也舜一徙而成邑而堯無天下矣有人無術以禁下恃為舜而不失其民不亦無術乎明君見小姦於微故民無大謀行小誅於細故民無大亂此謂圖難於其所易也為大者於其所細也今有功者必賞賞者不得君力之所致也有罪者必誅誅者不怨上罪之所生也民知誅賞之皆起於身也故疾功利於業而不受賜於君太上下智有之此言太上之下民無説也安取懷惠之民上君之民無利害説以悅近來遠亦可舍已哀公有臣外障距內比周以愚其君而説之以選賢此非功伐之論也選其心之所謂賢者也使哀公知三子外障距內比周也則三子不一日立矣哀公不知選賢選其心之所謂賢故三子得任事燕子噲賢子之而非孫卿故身死為僇夫差智太宰嚭而愚子胥故滅於越魯君不必知賢而説以選賢是使哀公有夫差燕噲之患也明君不自舉臣臣相進也不自賢功自徇也論之於任試之於事課之於功故群臣公政而無私不隱賢不進不肖然則人主奚勞於選賢景公以百乘之家賜而説以節財是使景公無術以知富之侈而獨儉於上未免於貧也有君以千里養其口腹則雖桀紂不侈焉齊國方三千里而桓公以其半自養是侈於桀紂也然而能為五霸冠者知侈儉之地也為君不能禁下而自禁者謂之劫不能飾下而自飾者謂之亂不節下而自節者謂之貧明君使人無私以詐而食者禁力盡於事歸利於上者必聞聞者必賞汙穢為私者必知知者必誅然故忠臣盡忠於公民士竭力於家百官精剋於上侈倍景公非國之患也然則説之以節財非其急者也夫對三公一言而三公可以無患知下之謂也知下明則禁於微禁於微則姦無積姦無積則無比周無比周則公私分公私分則朋黨散朋黨散則無外障距內比周之患知下明則見精沐見精沐則誅賞明誅賞明則國不貧故曰一對而三公無患知下之謂也鄭子産晨出過東匠之閭聞婦人之哭撫其御之手而聽之有間遣吏執而問之則手絞其夫者也異日其御問曰夫子何以知之子産曰其聲懼凡人於其親愛也始病而憂臨死而懼已死而哀今哭已死不哀而懼是以知其有姦也或曰子産之治不亦多事乎姦必待耳目之所及而後知之則鄭國之得姦者寡矣不任典成之吏不察參伍之政不明度量恃盡聰明勞智慮而以知姦不亦無術乎且夫物衆而智寡寡不勝衆智不足以遍知物故因物以治物下衆而上寡寡不勝衆者言君不足以遍知臣也故因人以知人是以形體不勞而事治智慮不用而姦得故宋人語曰一雀過羿羿必得之則羿誣矣以天下為之羅則雀不失矣夫知姦亦有大羅不失其一而已矣不循其理而以己之胸察為之弓矢則子産誣矣老子曰以智治國國之賊也其子産之謂矣秦昭王問於左右曰今時韓魏孰與始強左右對曰弱於始也今之如耳魏齊孰與曩之孟嘗芒卯對曰不及也王曰孟嘗芒卯率強韓魏猶無奈寡人何也左右對曰甚然中期推琴而對曰王之料天下過矣夫六晉之時知氏最強滅范中行而從韓魏之兵以伐趙灌以晉水城之未沈者三板知伯出魏宣子御韓康子為驂乘知伯曰始吾不知水可以滅人之國吾乃今知之汾水可以灌安邑絳水可以灌平陽魏宣子肘韓康子康子踐宣子之足肘足接乎車上而知氏分於晉陽之下今足下雖強未若知氏韓魏雖弱未至如其在晉陽之下也此天下方用肘足之時願王勿易之也或曰昭王之問也有失左右中期之對也有過凡明主之治國也任其勢勢不可害則雖強天下無奈何也而況孟嘗芒卯韓魏能奈我何其勢可害也則不肖如如耳魏齊及韓魏猶能害之然則害與不侵在自恃而已矣奚問乎自恃其不可侵則強與弱奚其擇焉失在不自恃而問其奈何也其不侵也幸矣申子曰失之數而求之信則疑矣其昭王之謂也知伯無度從韓康魏宣而圖以水灌滅其國此知伯之所以國亡而身死頭為飲柸之故也今昭王乃問孰與始強其畏有水人之患乎雖有左右非韓魏之二子也安有肘足之事而中期曰勿易此虛言也且中期之所官琴瑟也絃不調弄不明中期之任也此中期所以事昭王者也中期善承其任未慊昭王也而為所不知豈不妄哉左右對之曰弱於始與不及則可矣其曰甚然則諛也申子曰治不踰官雖知不言今中期不知而尚言之故曰昭王之問有失左右中期之對皆有過也管子曰見其可説之有證見其不可惡之有形賞罰信於所見雖所不見其敢為之乎見其可説之無證見其不可惡之無形賞罰不信於所見而求所不見之外不可得也或曰廣廷嚴居衆人之所肅也宴室獨處曾史之所僈也觀人之所肅非行情也且君上者臣下之所為飾也好惡在所見臣下之飾姦物以愚其君必也明不能燭遠姦見隱微而待之以觀飾行定賞罰不亦弊乎管子曰言於室滿於室言於堂滿於堂是謂天下王或曰管仲之所謂言室滿室言堂滿堂者非特謂遊戲飲食之言也必謂大物也人主之大物非法則術也法者編著之圖籍設之於官府而布之於百姓者也術者藏之於胸中以偶衆端而潛御群臣者也故法莫如顯而術不欲見是以明主言法則境內卑賤莫不聞知也不獨滿於堂用術則親愛近習莫之得聞也不得滿室而管子猶曰言於室滿室言於堂滿堂非法術之言也
