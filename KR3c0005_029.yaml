body:
  text: 大體第二十九古之全大體者望天地觀江海因山谷日月所照四時所行雲布風動不以智纍心不以私纍己寄治亂於法術託是非於賞罰屬輕重於權衡不逆天理不傷情性不吹毛而求小疵不洗垢而察難知不引繩之外不推繩之內不急法之外不緩法之內守成理因自然禍福生乎道法而不出乎愛惡榮辱之責在乎己而不在乎人故至安之世法如朝露純朴不散心無結怨口無煩言故車馬不疲弊於遠路旌旗不亂於大澤萬民不失命於寇戎雄駿不創壽於旗幢豪傑不著名於圖書不録功於盤盂記年之牒空虛故曰利莫長於簡福莫久於安使匠石以千歲之壽操鉤視規矩舉繩墨而正太山使賁育帶干將而齊萬民雖盡力於巧極盛於壽太山不正民不能齊故曰古之牧天下者不使匠石極巧以敗太山之體不使賁育盡威以傷萬民之性因道全法君子樂而大姦止淡然間靜因天命持大體故使人無離法之罪魚無失水之禍如此故天下少不可上不天則下不遍覆心不地則物不必載太山不立好惡故能成其高江海不擇小助故能成其富故大人寄形於天地而萬物備歷心於山海而國家富上無忿怒之毒下無伏怨之患上下交朴以道為舍故長利積大功立名成於前德垂於後治之至也
