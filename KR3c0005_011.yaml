body:
  text: 孤憤第十一智術之士必遠見而明察不明察不能燭私能法之士必強毅而徑直不徑直不能矯姦人臣循令而從事案法而治官非謂重人也重人也者無令而擅為虧法以利私耗國以便家力能得其君此所為重人也智術之士明察聽用且燭重人之陰情能法之士徑直聽用且矯重人之姦行故智術能法之士用則貴重之臣必在繩之外矣是智法之士與當塗之人不可兩存之仇也當塗之人擅事要則外內為之用矣是以諸侯不因則事不應故敵國為之訟百官不因則業不進故群臣為之用郎中不因則不得近主故左右為之匿學士不因則養祿薄禮卑故學士為之談也此四助者邪臣之所以自飾也重人不能忠主而進其仇人主不能越四助而燭察其臣故人主愈弊而大臣愈重凡當塗者之於人主也希不信愛也又且習故若夫即主心同乎好惡固其所自進也官爵貴重朋黨又衆而一國為之訟則法術之士欲干上者非有所信愛之親習故之澤也又將以法術之言矯人主阿辟之心是與人主相反也處勢卑賤無黨孤特夫以疏遠與近愛信爭其數不勝也以新旅與習故爭其數不勝也以反主意與同好惡爭其數不勝也以輕賤與貴重爭其數不勝也以一口與一國爭其數不勝也法術之士操五不勝之勢以歲數而又不得見當塗之人乘五勝之資而旦暮獨說於前故法術之士奚道得進而人主奚時得悟乎故資必不勝而勢不兩存法術之士焉得不危其可以罪過誣者以公法而誅之其不可被以罪過者以私劍而窮之是明法術而逆主上者不僇於吏誅必死於私劍矣朋黨比周以弊主言曲以便私者必信於重人矣故其可以功伐借者以官爵貴之其不可借以美名者以外權重之是以弊主上而趨於私門者不顯於官爵必重於外權矣今人主不合參驗而行誅不待見功而爵祿故法術之士安能蒙死亡而進其說姦邪之臣安肯乘利而退其身故主上愈卑私門益尊夫越雖國富兵強中國之主皆知無益於己也曰非吾所得制也今有國者雖地廣人衆然而人主壅蔽大臣專權是國為越也智不類越而不智不類其國不察其類者也人之所以謂齊亡者非地與城亡也呂氏弗制而田氏用之所以謂晉亡者亦非地與城亡也姬氏不制而六卿專之也今大臣執柄獨斷而上弗知收是人主不明也與死人同病者不可生也與亡國同事者不可存也今襲跡於齊晉欲國安存不可得也凡法術之難行也不獨萬乘千乘亦然人主之左右不必智也人主於人有所智而聽之因與左右論其言是與愚人論智也人主之左右不必賢也人主於人有所賢而禮之因與左右論其行是與不肖論賢也智者決策於愚人賢士程行於不肖則賢智之士羞而人主之論悖矣人臣之欲得官者其修士且以精潔固身其智士且以治辨進業其修士不能以貨賂事人恃其精潔而更不能以枉法為治則修智之士不事左右不聽請謁矣人主之左右行非伯夷也求索不得貨賂不至則精辨之功息而毀誣之言起矣治辨之功制於近習精潔之行決於毀譽則修智之吏廢則人主之明塞矣不以功伐決智行不以參伍審罪過而聽左右近習之言則無能之士在廷而愚汙之吏處官矣萬乘之患大臣太重千乘之患左右太信此人主之所公患也且人臣有大罪人主有大失臣主之利與相異者也何以明之哉曰主利在有能而任官臣利在無能而得事主利在有勞而爵祿臣利在無功而富貴主利在豪傑使能臣利在朋黨用私是以國地削而私家富主上卑而大臣重故主失勢而臣得國主更稱蕃臣而相室剖符此人臣之所以譎主便私也故當世之重臣主變勢而得固寵者十無二三是其故何也人臣之罪大也臣有大罪者其行欺主也其罪當死亡也智士者遠見而畏於死亡必不從重人矣賢士者修廉而羞與姦臣欺其主必不從重臣矣是當塗者之徒屬非愚而不知患者必汙而不避姦者也大臣挾愚汙之人上與之欺主下與之收利侵漁朋黨比周相與一口惑主敗法以亂士民使國家危削主上勞辱此大罪也臣有大罪而主弗禁此大失也使其主有大失於上臣有大罪於下索國之不亡者不可得也
