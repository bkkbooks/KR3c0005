body:
  text: 顯學第五十世之顯學儒墨也儒之所至孔丘也墨之所至墨翟也自孔子之死也有子張之儒有子思之儒有顏氏之儒有孟氏之儒有漆雕氏之儒有仲良氏之儒有孫氏之儒有樂正氏之儒自墨子之死也有相里氏之墨有相夫氏之墨有鄧陵氏之墨故孔墨之後儒分為八墨離為三取舍相反不同而皆自謂真孔墨孔墨不可復生將誰使定世之學乎孔子墨子俱道堯舜而取舍不同皆自謂真堯舜堯舜不復生將誰使定儒墨之誠乎殷周七百餘歲虞夏二千餘歲而不能定儒墨之真今乃欲審堯舜之道於三千歲之前意者其不可必乎無參驗而必之者愚也弗能必而據之者誣也故明據先王必定堯舜者非愚則誣也愚誣之學雜反之行明主弗受也墨者之葬也冬日冬服夏日夏服桐棺三寸服喪三月世主以為儉而禮之儒者破家而葬服喪三年大毀扶杖世主以為孝而禮之夫是墨子之儉將非孔子之侈也是孔子之孝將非墨子之戾也今孝戾侈儉俱在儒墨而上兼禮之漆雕之議不色撓不目逃行曲則違於臧獲行直則怒於諸侯世主以為廉而禮之宋榮子之議設不鬭爭取不隨仇不羞囹圄見侮不辱世主以為寬而禮之夫是漆雕之廉將非宋榮之恕也是宋榮之寬將非漆雕之暴也今寬廉恕暴俱在二子人主兼而禮之自愚誣之學雜反之辭爭而人主俱聽之故海內之士言無定術行無常議夫冰炭不同器而久寒暑不兼時而至雜反之學不兩立而治今兼聽雜學繆行同異之辭安得無亂乎聽行如此其於治人又必然矣今世之學士語治者多曰與貧窮地以實無資今夫與人相若也無豐年旁入之利而獨以完給者非力則儉也與人相若也無饑饉疾疚禍罪之殃獨以貧窮者非侈則墯也侈而墯者貧而力而儉者富今上徵斂於富人以布施於貧家是奪力儉而與侈墯也而欲索民之疾作而節用不可得也今有人於此義不入危城不處軍旅不以天下大利易其脛一毛世主必從而禮之貴其智而高其行以為輕物重生之士也夫上所以陳良田大宅設爵祿所以易民死命也今上尊貴輕物重生之士而索民之出死而重殉上事不可得也藏書策習談論聚徒役服文學而議說世主必從而禮之曰敬賢士先王之道也夫吏之所稅耕者也而上之所養學士也耕者則重稅學士則多賞而索民之疾作而少言談不可得也立節參明執操不侵怨言過於耳必隨之以劍世主必從而禮之以為自好之士夫斬首之勞不賞而家鬭之勇尊顯而索民之疾戰距敵而無私鬭不可得也國平則養儒俠難至則用介士所養者非所用所用者非所養此所以亂也且夫人主於聽學也若是其言宜布之官而用其身若非其言宜去其身而息其端今以為是也而弗布於官以為非也而不息其端是而不用非而不息亂亡之道也淡臺子羽君子之容也仲尼幾而取之與處久而行不稱其貌宰豫之辭雅而文也仲尼幾而取之與處久而智不充其辨故孔子曰以容取人乎失之子羽以言取人乎失之宰豫故以仲尼之智而有失實之聲今之新辨濫乎宰豫而世主之聽眩乎仲尼為悅其言因任其身則焉得無失乎是以魏任孟卯之辨而有華下之患趙任馬服之辨而有長平之禍此二者任辨之失也夫視鍛錫而察青黃區冶不能以必劍水擊鵠鴈陸斷駒馬則臧獲不疑鈍利發齒吻形容伯樂不能以必馬授車就駕而觀其末塗則臧獲不疑駑良觀容服聽辭言仲尼不能以必士試之官職課其功伐則庸人不疑於愚智故明主之吏宰相必起於州部猛將必發於卒伍夫有功者必賞則爵祿厚而愈勸遷官襲級則官職大而愈治夫爵祿大而官職治王之道也磐石千里不可謂富象人百萬不可謂強石非不大數非不衆也而不可謂富強者磐不生粟象人不可使距敵也今商官技藝之士亦不墾而食是地不墾與磐石一貫也儒俠毋軍勞顯而榮者則民不使與象人同事也夫知禍磐石象人而不知禍商官儒俠為不墾之地不使之民不知事類者也故敵國之君王雖說吾義吾弗入貢而臣關內之侯雖非吾行吾必使執禽而朝是故力多則人朝力寡則朝於人故明君務力夫嚴家無悍勇而慈母有敗子吾以此知威勢之可以禁暴而德厚之不足以止亂也夫聖人之治國不恃人之為吾善也而用其不得為非也恃人之為吾善也境內不什數用人不得為非一國可使齊為治者用衆而舍寡故不務德而務法夫必恃自直之箭百世無矢恃自圜之木千世無輪矣自直之箭自圜之木百世無有一然而世皆乘車射禽者何也隱栝之道用也雖有不恃隱栝而有自直之箭自圜之木良工弗貴也何則乘者非一人射者非一發也不恃賞罰而恃自善之民明主弗貴也何則國法不可失而所治非一人也故有術之君不隨適然之善而行必然之道今或謂人曰使子必智而壽則世必以為狂夫智性也壽命也性命者非所學於人也而以人之所不能為說人此世之所以謂之為狂也謂之不能然則是諭也夫諭性也以仁義教人是以智與壽說也有度之主弗受也故善毛嗇西施之美無益吾面用脂澤粉黛則倍其初言先王之仁義無益於治明吾法度必吾賞罰者亦國之脂澤粉黛也故明主急其助而緩其頌故不道仁義今巫祝之祝人曰使若千秋萬歲千秋萬歲之聲括耳而一日之壽無徵於人此人所以簡巫祝也今世儒者之說人主不善今之所以為治而語已治之功不審官法之事不察姦邪之情而皆道上古之傳譽先王之成功儒者飾辭曰聽吾言則可以霸王此說者之巫祝有度之主不受也故明主舉實事去無用不道仁義者故不聽學者之言今不知治者必曰得民之心欲得民之心而可以為治則是伊尹管仲無所用也將聽民而已矣民智之不可用猶嬰兒之心也夫嬰兒不剔首則腹痛不副痤則寖益剔首揊痤必一人抱之慈母治之然猶啼呼不止嬰兒子不知犯其所小苦致其所大利也今上急耕田墾草以厚民産也而以上為酷修刑重罰以為禁邪也而以上為嚴徵賦錢粟以實倉庫且以救飢饉備軍旅也而以上為貪境內必知介而無私解并力疾鬭所以禽虜也而以上為暴此四者所以治安也而民不知悅也夫求聖通之士者為民知之不足師用昔禹決江浚河而民聚瓦石子産開畝樹桑鄭人謗訾禹利天下子産存鄭人皆以受謗夫民智之不足用亦明矣故舉士而求賢智為政而期適民皆亂之端未可與為治也
