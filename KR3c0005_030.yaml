body:
  text: 內儲說上七術第三十主之所用也七術所察也六微七術一曰眾端參觀二曰必罰明威三曰信賞盡能四曰一聽責下五曰疑詔詭使六曰挾知而問七曰倒言反事此七者主之所用也經一參觀觀聽不參則誠不聞聽有門戶則臣壅塞其說在侏儒之夢見竈哀公之稱莫眾而迷故齊人見河伯與惠子之言亡其半也其患在豎牛之餓叔孫而江乙之說荊俗也嗣公欲治不知故使有敵是以明主推積鐵之類而察一市之患經二必罰愛多者則法不立威寡者則下侵上是以刑罰不必則禁令不行其說在董子之行石邑與子產之教游吉也故仲尼說隕霜而殷法刑棄灰將行去樂池而公孫鞅重輕罪是以麗水之金不守而積澤之火不救成歡以太仁弱齊國卜皮以慈惠亡魏王管仲知之故斷死人嗣公知之故買胥靡經三賞譽賞譽薄而謾者下不用也賞譽厚而信者下輕死其說在文子稱若獸鹿故越王焚宮室而吳起倚車轅李悝斷訟以射宋崇門以毀死勾踐知之故式怒鼃昭侯知之故藏弊袴厚賞之使人為賁諸也婦人之拾蠶漁者之握鱣是以效之經四一聽一聽則愚智不紛責下則人臣不參其說在索鄭與吹竽其患在申子之以趙紹韓沓為嘗試故公子氾議割河東而應侯謀弛上黨經五詭使數見久待而不任姦則鹿散使人問他則不鬻私是以龐敬還公大夫而戴讙詔視轀車周主亡玉簪商太宰論牛矢經六挾智挾智而問則不智者智深智一物眾隱皆變其說在昭侯之握一爪也故必南門而三鄉得周主索曲杖而群臣懼卜皮使庶子西門豹詳遺轄經七倒言倒言反事以嘗所疑則姦情得故陽山謾樛豎淖齒為秦使齊人欲為亂子之以白馬子產離訟者嗣公過關市說一衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈對曰夫日兼燭天下一物不能當也人君兼燭一國人一人不能擁也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎魯哀公問於孔子曰鄙諺曰莫眾而迷今寡人舉事與群臣慮之而國愈亂其故何也孔子對曰明主之問臣一人知之一人不知也如是者明主在上群臣直議於下今群臣無不一辭同軌乎季孫者舉魯國盡化為一君雖問境內之人猶不免於亂也一曰晏子聘魯哀公問曰語曰莫三人而迷今寡人與一國慮之魯不免於亂何也晏子曰古之所謂莫三人而迷者一人失之二人得之三人足以為眾矣故曰莫三人而迷今魯國之群臣以千百數一言於季氏之私人數非不眾所言者一人也安得三哉齊人有謂齊王曰河伯大神也王何不試與之遇乎臣請使王遇之乃為壇場大水之上而與王立之焉有間大魚動因曰此河伯張儀欲以秦韓與魏之勢伐齊荊而惠施欲以齊荊偃兵二人爭之群臣左右皆為張子言而以攻齊荊為利而莫為惠子言王果聽張子而以惠子言為不可攻齊荊事已定惠子入見王言曰先生毋言矣攻齊荊之事果利矣一國盡以為然惠子因說不可不察也夫齊荊之事也誠利一國盡以為利是何智者之眾也攻齊荊之事誠不可利一國盡以為利何愚者之眾也凡謀者疑也疑也者誠疑以為可者半以為不可者半今一國盡以為可是王亡半也劫主者固亡其半者也叔孫相魯貴而主斷其所愛者曰豎牛亦擅用叔孫之令叔孫有子曰壬豎牛妬而欲殺之因與壬游於魯君所魯君賜之玉環壬拜受之而不敢佩使豎牛請之叔孫豎牛欺之曰吾已為爾請之矣使爾佩之壬因佩之豎牛因謂叔孫何不見壬於君乎叔孫曰孺子何足見也豎牛曰壬固已數見於君矣君賜之玉環壬已佩之矣叔孫召壬見之而果佩之叔孫怒而殺壬壬兄曰丙豎牛又妬而欲殺之叔孫為丙鑄鐘鐘成丙不敢擊使豎牛請之叔孫豎牛不為請又欺之曰吾已為爾請之矣使爾擊之丙因擊之叔孫聞之曰丙不請而擅擊鍾怒而逐之丙出走齊居一年豎牛為謝叔孫叔孫使豎牛召之又不召而報之曰吾已召之矣丙怒甚不肯來叔孫大怒使人殺之二子已死叔孫有病豎牛因獨養之而去左右不內人曰叔孫不欲聞人聲不食而餓殺叔孫已死豎牛因不發喪也徙其府庫重寶空之而奔齊夫聽所信之言而子父為人僇此不參之患也江乙為魏王使荊謂荊王曰臣入王之境內聞王之國俗曰君子不蔽人之美不言人之惡誠有之乎王曰有之然則若白公之亂得無危乎誠得如此臣免死罪矣衛嗣君重如耳愛世姬而恐其皆因其愛重以壅己也乃貴薄疑以敵如耳尊魏姬以耦世姬曰以是相參也嗣君知欲無壅而未得其術也夫不使賤議貴下必坐上而必待勢重之鈞也而後敢相議則是益樹壅塞之臣也嗣君之壅乃始夫矢來有鄉則積鐵以備一鄉矢來無鄉則為鐵室以盡備之備之則體不傷故彼以盡備之不傷此以盡敵之無姦也龐恭與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎曰不信二人言市有虎王信之乎曰不信三人言市有虎王信之乎王曰寡人信之龐恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也遠於市議臣者過於三人願王察之龐恭從邯鄲反竟不得見說二董閼于為趙上地守行石邑山中澗深峭如墻深百仞因問其旁鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘嘗有入此者乎對曰無有董閼于喟然太息曰吾能治矣使吾治之無赦猶入澗之必死也則人莫之敢犯也何為不治子產相鄭病將死謂游吉曰我死後子必用鄭必以嚴莅人夫火形嚴故人鮮灼水形懦人多溺子必嚴子之形無令溺子之懦子產死游吉不肯嚴形鄭少年相率為盜處於雚澤將遂以為鄭禍游吉率車騎與戰一日一夜僅能剋之游吉喟然歎曰吾蚤行夫子之教必不悔至於此矣魯哀公問於仲尼曰春秋之記曰冬十二月霣霜不殺菽何為記此仲尼對曰此言可以殺而不殺也夫宜殺而不殺桃李冬實天失道草木猶犯干之而況於人君乎殷之法刑棄灰於街者子貢以為重問之仲尼仲尼曰知治之道也夫棄灰於街必掩人掩人人必怒怒則鬭鬭必三族相殘也此殘三族之道也雖刑之可也且夫重罰者人之所惡也而無棄灰人之所易也使人行之所易而無離所惡此治之道一曰殷之法棄灰于公道者斷其手子貢曰棄灰之罪輕斷手之罰重古人何太毅也曰無棄灰所易也斷手所惡也行所易不關所惡古人以為易故行之中山之相樂池以車百乘使趙選其客之有智能者以為將行中道而亂樂池曰吾以公為有智而使公為將行今中道而亂何也客因辭而去曰公不知治有威足以服人而利足以勸之故能治之今臣君之少客也夫從少正長從賤治貴而不得操其利害之柄以制之此所以亂也嘗試使臣彼之善者我能以為卿相彼不善者我得以斬其首何故而不治公孫鞅之法也重輕罪重罪者人之所難犯也而小過者人之所易去也使人去其所易無離其所難此治之道夫小過不生大罪不至是人無罪而亂不生也一曰公孫鞅曰行刑重其輕者輕者不至重者不來是謂以刑去刑也荊南之地麗水之中生金人多竊采金采金之禁得而輒辜磔於市甚眾壅離其水也而人竊金不止夫罪莫重辜磔於市猶不止者不必得也故今有於此曰予汝天下而殺汝身庸人不為也夫有天下大利也猶不為者知必死故不必得也則雖辜磔竊金不止知必死則有天下不為也魯人燒積澤天北風火南倚恐燒國哀公懼自將眾趣救火左右無人盡逐獸而火不救乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火之所以無救也哀公曰善仲尼曰事急不及以賞救火者盡賞之則國不足以賞於人請徒行罰哀公曰善於是仲尼乃下令曰不救火者比降北之罪逐獸者比入禁之罪令下未遍而火已救矣成驩謂齊王曰王太仁太不忍人王曰太仁太不忍人非善名邪對曰此人臣之善也非人主之所行也夫人臣必仁而後可與謀不忍人而後可近也不仁則不可與謀忍人則不可近也王曰然則寡人安所太仁安不忍人對曰王太仁於薛公而太不忍於諸田太仁薛公則大臣無重太不忍諸田則父兄犯法大臣無重則兵弱於外父兄犯法則政亂於內兵弱於外政亂於內此亡國之本也魏惠王謂卜皮曰子聞寡人之聲聞亦何如焉對曰臣聞王之慈惠也王欣然喜曰然則功且安至對曰王之功至於亡王曰慈惠行善也行之而亡何也卜皮對曰夫慈者不忍而惠者好與也不忍則不誅有過好予則不待有功而賞有過不罪無功受賞雖亡不亦可乎齊國好厚葬布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡則無以為蔽材木盡則無以為守備而人厚葬之不休禁之柰何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺椁過度者戮其尸罪夫當喪者夫戮死無名罪當喪者無利人何故為之也衛嗣君之時有胥靡逃之魏因為襄王之后治病衛嗣君聞之使人請以五十金買之五反而魏王不予乃以左氏易之群臣左右諫曰夫以一都買胥靡可乎王曰非子之所知也夫治無小而亂無大法不立而誅不必雖有十左氏無益也法立而誅必雖失十左氏無害也魏王聞之曰主欲治而不聽之不祥因載而往徒獻之說三齊王問於文子曰治國何如對曰夫賞罰之為道利器也君固握之不可以示人若如臣者猶獸鹿也唯薦草而就越王問於大夫文種曰吾欲伐吳可乎對曰可矣吾賞厚而信罰嚴而必君欲知之何不試焚宮室於是遂焚宮室人莫救之乃下令曰人之救火者死比死敵之賞救火而不死者比勝敵之賞不救火者比降北之罪人塗其體被濡衣而走火者左三千人右三千人此知必勝之勢也吳起為魏武侯西河之守秦有小亭臨境吳起欲攻之不去則甚害田者去之則不足以徵甲兵於是乃倚一車轅於北門之外而令之曰有能徙此南門之外者賜之上田上宅人莫之徙也及有徙之者還賜之如令俄又置一石赤菽東門之外而令之曰有能徙此於西門之外者賜之如初人爭徙之乃下令曰明日且攻亭有能先登者仕之國大夫賜之上田宅人爭趨之於是攻亭一朝而拔之李悝為魏文侯上地之守而欲人之善射也乃下令曰人之有狐疑之訟者令之射的中之者勝不中者負令下而人皆疾習射日夜不休及與秦人戰大敗之以人之善戰射也宋崇門之巷人服喪而毀甚瘠上以為慈愛於親舉以為官師明年人之所以毀死者歲十餘人子之服親喪者為愛之也而尚可以賞勸也況君上之於民乎越王慮伐吳欲人之輕死也出見怒鼃乃為之式從者曰奚敬於此王曰為其有氣故也明年之請以頭獻王者歲十餘人由此觀之譽之足以殺人矣一曰越王勾踐見怒鼃而式之御者曰何為式王曰鼃有氣如此可無為式乎士人聞之曰鼃有氣王猶為式況士人有勇者乎是歲人有自剄死以其頭獻者故越王將復吳而試其教燔臺而鼓之使民赴火者賞在火也臨江而鼓之使人赴水者賞在水也臨戰而使人絕頭刳腹而無顧心者賞在兵也又況據法而進賢其勸甚此矣韓昭侯使人藏弊袴侍者曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰非子之所知也吾聞明主之愛一嚬一笑嚬有為嚬而笑有為笑今夫袴豈特嚬笑哉袴之與嚬笑相去遠矣吾必待有功者故收藏之未有予也鱣似蛇蠶似蠋人見蛇則驚駭見蠋則毛起然而婦人拾蠶漁者握鱣利之所在則忘其所惡皆為孟賁說四魏王謂鄭王曰始鄭梁一國也已而別今願復得鄭而合之梁鄭君患之召群臣而與之謀所以對魏公子謂鄭君曰此甚易應也君對魏曰以鄭為故魏而可合也則弊邑亦願得梁而合之鄭魏王乃止齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王說之廩食以數百人宣王死湣王立好一一聽之處士逃一曰韓昭侯曰吹竽者眾吾無以知其善者田嚴對曰一一而聽之趙令人因申子於韓請兵將以攻魏申子欲言之君而恐君之疑己外市也不則恐惡於趙乃令趙紹韓沓嘗試君之動貌而後言之內則知昭侯之意外則有得趙之功三國兵至韓秦王謂樓緩曰三國之兵深矣寡人欲割河東而講何如對曰夫割河東大費也免國於患大功也此父兄之任也王何不召公子氾而問焉王召公子氾而告之對曰講亦悔不講亦悔王今割河東而講三國歸王必曰三國固且去矣吾特以三城送之不講三國也入韓則國必大舉矣王必大悔王曰不獻三城也臣故曰王講亦悔不講亦悔王曰為我悔也寧亡三城而悔無危乃悔寡人斷講矣應侯謂秦王曰王得宛葉藍田陽夏斷河內困梁鄭所以未王者趙未服也弛上黨在一而已以臨東陽則邯鄲口中虱也王拱而朝天下後者以兵中之然上黨之安樂其處甚劇臣恐弛之而不聽柰何王曰必弛易之矣說五龐敬縣令也遣市者行而召公大夫而還之立有間無以詔之卒遣行市者以為令與公大夫有言不相信以至無姦戴驩宋太宰夜使人曰吾聞數夜有乘轀車至李史門者謹為我伺之使人報曰不見轀車見有奉笥而與李史語者有間李史受笥周主亡玉簪令吏求之三日不能得也周主令人求而得之家人之屋間周主曰吾之吏之不事事也求簪三日不得之吾令人求之不移日而得之於是吏皆聳懼以為君神明也商太宰使少庶子之市顧反而問之曰何見於市對曰無見也太宰曰雖然何見也對曰市南門之外甚眾牛車僅可以行耳太宰因誡使者無敢告人吾所問於女因召市吏而誚之曰市門之外何多牛屎市吏甚怪太宰知之疾也乃悚懼其所也說六韓昭侯握爪而佯亡一爪求之甚急左右因割其爪而效之昭侯以此察左右之誠不韓昭侯使騎於縣使者報昭侯問曰何見也對曰無所見也昭侯曰雖然何見曰南門之外有黃犢食苗道左者昭侯謂使者毋敢洩吾所問於女乃下令曰當苗時禁牛馬入人田中固有令而吏不以為事牛馬甚多入人田中亟舉其數上之不得將重其罪於是三鄉舉而上之昭侯曰未盡也復往審之乃得南門之外黃犢吏以昭侯為明察皆悚懼其所而不敢為非周主下令索曲杖吏求之數日不能得周主私使人求之不移日而得之乃謂吏曰吾知吏不事事也曲杖甚易也而吏不能得我令人求之不移日而得之豈可謂忠哉吏乃皆悚懼其所以君為神明卜皮為縣令其御史汙濊而有愛妾卜皮乃使少庶子佯愛之以知御史陰情西門豹為鄴令佯亡其車轄令吏求之不能得使人求之而得之家人屋間說七陽山君相衛聞王之疑己也乃偽謗樛豎以知之淖齒聞齊王之惡己也乃矯為秦使以知之齊人有欲為亂者恐王知之因詐逐所愛者令走王知之子之相燕坐而佯言曰走出門者何白馬也左右皆言不見有一人走追之報曰有子之以此知左右之不誠信有相與訟者子產離之而無使得通辭倒其言以告而知之衛嗣公使人為客過關市關市苛難之因事關市以金關吏乃舍之嗣公為關吏曰某時有客過而所與汝金而汝因遣之關市乃大恐而以嗣公為明察
