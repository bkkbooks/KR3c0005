body:
  text: 問辨第四十一或問曰辨安生乎對曰生於上之不明也問者曰上之不明因生辨也何哉對曰明主之國令者言最貴者也法者事最適者也言無二貴法不兩適故言行而不軌於法令者必禁若其無法令而可以接詐應變生利揣事者上必采其言而責其實言當則有大利不當則有重罪是以愚者畏罪而不敢言智者無以訟此所以無辨之故也亂世則不然主有令而民以文學非之官府有法而民以私行矯之人主顧漸其法令而尊學者之智行此世之所以多文學也夫言行者以功用為之的彀者也夫砥礪殺矢而以妄發其端未嘗不中秋毫也然而不可謂善射者無常儀的也設五寸之的引十步之遠非羿逄蒙不能必中者有常儀的也故有常則羿逄蒙以中五寸的為巧無常則以妄發之中秋毫為拙今聽言觀行不以功用為之的彀言雖至察行雖至堅則妄發之說也是以亂世之聽言也以難知為察以博文為辨其觀行也以離群為賢以犯上為抗人主者說辨察之言尊賢抗之行故夫作法術之人立取舍之行別辭爭之論而莫為之正是以儒服帶劍者衆而耕戰之士寡堅白無厚之詞章而憲令之法息故曰上不明則辨生焉
