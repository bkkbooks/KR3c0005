body:
  text: 問田第四十二徐渠問田鳩曰臣聞智士不襲下而遇君聖人不見功而接上今陽成義渠明將也而措於屯伯公孫亶回聖相也而關於州部何哉田鳩曰此無他故異物主有度上有術之故也且足下獨不聞楚將宋觚而失其政魏相馮離而亡其國二君者驅於聲詞眩乎辨説不試於屯伯不關乎州部故有失政亡國之患由是觀之夫無屯伯之試州部之關豈明主之備哉堂溪公謂韓子曰臣聞服禮辭讓全之術也修行退智遂之道也今先生立法術設度數臣竊以為危於身而殆於軀何以效之所聞先生術曰楚不用吳起而削亂秦行商君而富強二子之言已當矣然而吳起支解而商君車裂者不逄世遇主之患也逢遇不可必也患禍不可斥也夫舍乎全遂之道而肆乎危殆之行竊為先生無取焉韓子曰臣明先生之言矣夫治天下之柄齊民萌之度甚未易處也然所以廢先王之教而行賤臣之所取者竊以為立法術設度數所以利民萌便衆庶之道也故不憚亂主暗上之患禍而必思以齊民萌之資利者仁智之行也憚亂主暗上之患禍而避乎死亡之害知明夫身而不見民萌之資利者貪鄙之為也臣不忍嚮貪鄙之為不敢傷仁智之行先生有幸臣之意然有大傷臣之實
