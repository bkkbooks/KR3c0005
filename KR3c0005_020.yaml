body:
  text: 解老第二十德者內也得者外也上德不德言其神不淫於外也神不淫於外則身全身全之謂德德者得身也凡德者以無為集以無欲成以不思安以不用固為之欲之則德無舍德無舍則不全用之思之則不固不固則無功無功則生於德德則無德不德則有德故曰上德不德是以有德所以貴無為無思為虛者謂其意無所制也夫無術者夫故以無為無思為虛也夫故以無為無思為虛者其意常不忘虛是制於為虛也虛者謂其意無所制也今制於為虛是不虛也虛者之無為也不以無為為有常不以無為為有常則虛虛則德盛德盛之謂上德故曰上德無為而無不為也仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍也生心之所不能已也非求其報也故曰上仁為之而無以為也義者君臣上下之事父子貴賤之差也知交朋友之接也親踈內外之分也臣事君宜下懷上宜子事父宜賤敬貴宜知交友朋之相助也宜親者內而踈者外宜義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以貌情也群義之文章也君臣父子之交也貴賤賢不肖之所以別也中心懷而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外飾之所以諭內也故曰禮以貌情也凡人之為外物動也不知其為身之禮也眾人之為禮也以尊他人也故時勸時衰君子之為禮以為其身以為其身故神之為上禮上禮神而眾人貳故不能相應不能相應故曰上禮為之而莫之應眾人雖貳聖人之復恭敬盡手足之禮也不衰故曰攘臂而仍之道有積而積有功德者道之功功有實而實有光仁者德之光光有澤而澤有事義者仁之事也事有禮而禮有文禮者義之文也故曰失道而後失德失德而後失仁失仁而後失義失義而後失禮禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黃其質至美物不足以飾之夫物之待飾而後行者其質不美也是以父子之間其禮樸而不明故曰禮薄也凡物不並盛陰陽是也理相奪予威德是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰也然則為禮者事通人之樸心者也眾人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能毋爭乎有爭則亂故曰夫禮者忠信之薄也而亂之首乎先物行先理動之謂前識前識者無緣而忘意度也何以論之詹何坐弟子侍牛鳴於門外弟子曰是黑牛也而白題詹何曰然是黑牛也而白在其角使人視之果黑牛而以布裹其角以詹子之術嬰眾人之心華焉殆矣故曰道之華也嘗試釋詹子之察而使五尺之愚童子視之亦知其黑牛而以布裹其角也故以詹子之察苦心傷神而後與五尺之愚童子同功是以曰愚之首也故曰前識者道之華也而愚之首也所謂大丈夫者謂其智之大也所謂處其厚不處其薄者行情實而去禮貌也所謂處其實不處其華者必緣理不徑絕也所謂去彼取此者去貌徑絕而取緣理好情實也故曰去彼取此人有禍則心畏恐心畏恐則行端直行端直則思慮熟思慮熟則得事理行端直則無禍害無禍害則盡天年得事理則必成功盡天年則全而壽必成功則富與貴全壽富貴之謂福而福本於有禍故曰禍兮福之所倚以成其功也人有福則富貴至富貴至則衣食美衣食美則驕心生驕心生則行邪僻而動棄理行邪僻則身死夭動棄理則無成功夫內有死夭之難而外無成功之名者大禍也而禍本生於有福故曰福兮禍之所伏夫緣道理以從事者無不能成無不能成者大能成天子之勢尊而小易得卿相將軍之賞祿夫棄道理而妄舉動者雖上有天子諸侯之勢尊而下有猗頓陶朱卜祝之富猶失其民人而亡其財資也眾人之輕棄道理而易妄舉動者不知其禍福之深大而道闊遠若是也故諭人曰孰知其極人莫不欲富貴全壽而未有能免於貧賤死夭之禍也必欲富貴全壽而今貧賤死夭是不能至於其所欲至也凡失其所欲之路而妄行者之謂迷迷則不能至於其所欲至矣今眾人之不能至於其所欲至故曰迷眾人之所不能至於其所欲至也自天地之剖判以至于今故曰人之迷也其日故以久矣所謂方者內外相應也言行相稱也所謂廉者必生死之命也輕恬資財也所謂直者義必公正公心不偏黨也所謂光者官爵尊貴衣裘壯麗也今有道之士雖中外信順不以誹謗窮墮雖死節輕財不以侮罷羞貪雖義端不黨不以去邪罪私雖勢尊衣美不以夸賤欺貧其故何也使失路者而肯聽習問知即不成迷也今眾人之所以欲成功而反為敗者生於不知道理而不肯問知而聽能眾人不肯問知聽能而聖人強以其禍敗適之則怨眾人多而聖人寡寡之不勝眾數也今舉動而與天下之為讎非全身長生之道也是以行軌節而舉之也故曰方而不割廉而不劌直而不肆光而不耀聰明睿智天也動靜思慮人也人也者乘於天明以視寄於天聰以聽託於天智以思慮故視強則目不明聽甚則耳不聰思慮過度則智識亂目不明則不能決黑白之分耳不聰則不能別清濁之聲智識亂則不能審得失之地目不能決黑白之色則謂之盲耳不能別清濁之聲則謂之聾心不能審得失之地則謂之狂盲則不能避晝日之險聾則不能知雷霆之害狂則不能免人間法令之禍書之所謂治人者適動靜之節省思慮之費也所謂事天者不極聰明之力不盡智識之任苟極盡則費神多費神多則盲聾悖狂之禍至是以嗇之嗇之者愛其精神嗇其智識也故曰治人事天莫如嗇眾人之用神也躁躁則多費多費之謂侈聖人之用神也靜靜則少費少費之謂嗇嗇之謂術也生於道理夫能嗇也是從於道而服於理者也眾人離於患陷於禍猶未知退而不服從道理聖人雖未見禍患之形虛無服從於道理以稱蚤服故曰夫謂嗇是以蚤服知治人者其思慮靜知事天者其孔竅虛思慮靜故德不去孔竅虛則和氣日入故曰重積德夫能令故德不去新和氣日至者蚤服者也故曰蚤服是謂重積德積德而後神靜神靜而後和多和多而後計得計得而後能御萬物能御萬物則戰易勝敵戰易勝敵而論必蓋世論必蓋世故曰無不克無不克本於重積德故曰重積德則無不克戰易勝敵則兼有天下論必蓋世則民人從進兼天下而退從民人其術遠則眾人莫見其端末莫見其端末是以莫知其極故曰無不克則莫知其極凡有國而後亡之有身而後殃之不可謂能有其國能保其身夫能有其國必能安其社稷能保其身必能終其天年而後可謂能有其國能保其身矣夫能有其國保其身者必且體道體道則其智深其智深則其會遠其會遠眾人莫能見其所極唯夫能令人不見其事極不見其事極者為保其身有其國故曰莫知其極莫知其極則可以有國所謂有國之母母者道也道也者生於所以有國之術所以有國之術故謂之有國之母夫道以與世周旋者其建生也長持祿也久故曰有國之母可以長久樹木有曼根有直根直根者書之所謂柢也柢也者木之所以建生也曼根者木之所以持生也德也者人之所以建生也祿也者人之所以持生也今建於理者其持祿也久故曰深其根體其道者其生日長故曰固其柢柢固則生長根深則視久故曰深其根固其柢長生久視之道也工人數變業則失其功作者數搖徙則亡其功一人之作日亡半日十日則亡五人之功矣萬人之作日亡半日十日則亡五萬人之功矣然則數變業者其人彌眾其虧彌大矣凡法令更則利害易利害易則民務變務變之謂變業故以理觀之事大眾而數搖之則少成功藏大器而數徙之則多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴靜不重變法故曰治大國者若烹小鮮人處疾則貴醫有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫內無痤疽癉痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道莅天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不神也其神不傷人也鬼祟也疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民民不犯法則上亦不行刑上不行刑之謂上不傷人故曰聖人亦不傷民上不與民相害而人不與鬼相傷故曰兩不相傷民不敢犯法則上內不用刑罰而外不事利其產業上內不用刑罰而外不事利其產業則民蕃息民蕃息而畜積盛民蕃息而畜積盛之謂有德凡所謂祟者魂魄去而精神亂精神亂則無德鬼不祟人則魂魄不去魂魄不去而精神不亂精神不亂之謂有德上盛畜積而鬼不亂其精神則德盡在於民矣故曰兩不相傷則德交歸焉言其德上下交盛而俱歸於民也有道之君外無怨讎於鄰敵而內有德澤於人民夫外無怨讎於鄰敵者其遇諸侯也外有禮義內有德澤於人民者其治人事也務本遇諸侯有禮義則役希起治民事務本則淫奢止凡馬之所以大用者外供甲兵而內給淫奢也今有道之君外希用甲兵而內禁淫奢上不事馬於戰鬭逐北而民不以馬遠淫通物所積力唯田疇積力於田疇必且糞灌故曰天下有道卻走馬以糞也人君無道則內暴虐其民而外侵欺其鄰國內暴虐則民產絕外侵欺則兵數起民產絕則畜生少兵數起則士卒盡畜生少則戎馬乏士卒盡則軍危殆戎馬乏則牸馬出軍危殆則近臣役馬者軍之大用郊者言其近也今所以給軍之具於牸馬近臣故曰天下無道戎馬生於郊矣人有欲則計會亂計會亂而有欲甚有欲甚則邪心勝邪心勝則事經絕事經絕則禍難生由是觀之禍難生於邪心邪心誘於可欲可欲之類進則教良民為姦退則令善人有禍姦起則上侵弱君禍至則民人多傷然則可欲之類上侵弱君而下傷人民夫上侵弱君而下傷人民者大罪也故曰禍莫大於可欲是以聖人不引五色不淫於聲樂明君賤玩好而去淫麗人無毛羽不衣則不犯寒上不屬天而下不著地以腸胃為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣足以犯寒食足以充虛則不憂矣眾人則不然大為諸侯小餘千金之資其欲得之憂不除也胥靡有免死罪時活今不知足者之憂終身不解故曰禍莫大於不知足故欲利甚於憂憂則疾生疾生而智慧衰智慧衰則失度量失度量則妄舉動妄舉動則禍害至禍害至而疾嬰內疾嬰內則痛禍薄外痛禍薄外則苦痛雜於腸胃之間苦痛雜於腸胃之間則傷人也憯憯則退而自咎退而自咎也生於欲利故曰咎莫憯於欲利道者萬物之所然也萬理之所稽也理者成物之文也道者萬物之所以成也故曰道理之者也物有理不可以相薄物有理不可以相薄故理之為物之制萬物各異理而道盡稽萬物之理故不得不化不得不化故無常操無常操是以死生氣稟焉萬智斟酌焉萬事廢興焉天得之以高地得之以藏維斗得之以成其威日月得之以恆其光五常得之以常其位列星得之以端其行四時得之以御其變氣軒轅得之以擅四方赤松得之與天地統聖人得之以成文章道與堯舜俱智與接輿俱狂與桀紂俱滅與湯武俱昌以為近乎遊於四極以為遠乎常在吾側以為暗乎其光昭昭以為明乎其物冥冥而功成天地和化雷霆宇內之物恃之以成凡道之情不制不形柔弱隨時與理相應萬物得之以死得之以生萬事得之以敗得之以成道譬諸若水溺者多飲之即死渴者適飲之即生譬之若劍戟愚人以行忿則禍生聖人以誅暴則福成故得之以死得之以生得之以敗得之以成人希見生象也而得死象之骨案其圖以想其生也故諸人之所以意想者皆謂之象也今道雖不可得聞見聖人執其見功以處見其形故曰無狀之狀無物之象凡理者方圓短長麤靡堅脆之分也故理定而後可得道也故定理有存亡有死生有盛衰夫物之一存一亡乍死乍生初盛而後衰者不可謂常唯夫與天地之剖判也具生至天地之消散也不死不衰者謂常而常者無攸易無定理無定理非在於常所是以不可道也聖人觀其玄虛用其周行強字之曰道然而可論故曰道之可道非常道也人始於生而卒於死始之謂出卒之謂入故曰出生入死人之身三百六十節四肢九竅其大具也四肢與九竅十有三者十有三者之動靜盡屬於生焉屬之謂徒也故曰生之徒也十有三者至死也十有三具者皆還而屬之於死死之徒亦有十三故曰生之徒十有三死之徒十有三凡民之生生而生者固動動盡則損也而動不止是損而不止也損而不止則生盡生盡之謂死則十有三具者皆為死死地也故曰民之生生而動動皆之死地之十有三是以聖人愛精神而貴處靜不愛精神不貴處靜此甚大於兕虎之害夫兕虎有域動靜有時避其域省其時則免其兕虎之害矣民獨知兕虎之有爪角也而莫知萬物之盡有爪角也不免於萬物之害何以論之時雨降集曠野間靜而以昏晨犯山川則風露之爪角害之事上不忠輕犯禁令則刑法之爪角害之處鄉不節憎愛無度則爭鬭之爪角害之嗜慾無限動靜不節則痤疽之爪角害之好用其私智而棄道理則網羅之爪角害之兕虎有域而萬害有原避其域塞其原則免於諸害矣凡兵革者所以備害也重生者雖入軍無忿爭之心無忿爭之心則無所用救害之備此非獨謂野處之軍也聖人之遊世也無害人之心則必無人害無人害則不備人故曰陸行不遇兕虎入山不恃備以救害故曰入軍不備甲兵遠諸害故曰兕無所投其角虎無所錯其爪兵無所容其刃不設備而必無害天地之道理也體天地之道故曰無死地焉動無死地而謂之善攝生矣愛子者慈於子重生者慈於身貴功者慈於事慈母之於弱子也務致其福務致其福則事除其禍事除其禍則思慮熟思慮熟則得事理得事理則必成功必成功則其行之也不疑不疑之謂勇聖人之於萬事也盡如慈母之為弱子慮也故見必行之道見必行之道則明其從事亦不疑不疑之謂勇不疑生於慈故曰慈故能勇周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈常費而況於人乎故萬物必有盛衰萬事必有弛張國家必有文武官治必有賞罰是以智士儉用其財則家富聖人愛寶其神則精盛人君重戰其卒則民眾民眾則國廣是以舉之曰儉故能廣凡物之有形者易裁也易割也何以論之有形則有短長有短長則有小大有小大則有方圓有方圓則有堅脆有堅脆則有輕重有輕重則有白黑短長大小方圓堅脆輕重白黑之謂理理定而物易割也故議於大庭而後言則立權議之士知之矣故欲成方圓而隨其規矩則萬事之功形矣而萬物莫不有規矩議言之士計會規矩也聖人盡隨於萬物之規矩故曰不敢為天下先不敢為天下先則事無不事功無不功而議必蓋世欲無處大官其可得乎處大官之謂為成事長是以故曰不敢為天下先故能為成事長慈於子者不敢絕衣食慈於身者不敢離法度慈於方圓者不敢舍規矩故臨兵而慈於士吏則戰勝敵慈於器械則城堅固故曰慈於戰則勝以守則固夫能自全也而盡隨於萬物之理者必且有天生天生也者生心也故天下之道盡之生也若以慈衛之也事必萬全而舉無不當則謂之寶矣故曰吾有三寶持而寶之書之所謂大道也者端道也所謂貌施也者邪道也所謂徑大也者佳麗也佳麗也者邪道之分也朝甚除也者獄訟繁也獄訟繁則田荒田荒則府倉虛府倉虛則國貧國貧而民俗淫侈民俗淫侈則衣食之業絕衣食之業絕則民不得無飾巧詐飾巧詐則知采文知采文之謂服文采獄訟繁倉廩虛而有以淫侈為俗則國之傷也若以利劍刺之故曰帶利劍諸夫飾智故以至於傷國者其私家必富私家必富故曰資貨有餘國有若是者則愚民不得無術而效之效之則小盜生由是觀之大姦作則小盜隨大姦唱則小盜和竽也者五聲之長者也故竽先則鍾瑟皆隨竽唱則諸樂皆和今大姦作則俗之民唱俗之民唱則小盜必和故服文采帶利劍厭飲食而貨資有餘者是之謂盜竽矣人無愚智莫不有趨舍恬淡平安莫不知禍福之所由來得於好惡怵於淫物而後變亂所以然者引於外物亂於玩好也恬淡有趨舍之義平安知禍福之計而今也玩好變之外物引之引之而往故曰校至聖人不然一建其趨舍雖見所好之物不能引不能引之謂不校一於其情雖有可欲之類神不為動神不為動之謂不悅為人子孫者體此道以守宗廟宗廟不滅之謂祭祀不絕身以積精為德家以資財為德鄉國天下皆以民為德今治身而外物不能亂其精神故曰脩之身其德乃真真者慎之固也治家無用之物不能動其計則資有餘故曰脩之家其德有餘治鄉者行此節則家之有餘者益眾故曰脩之鄉其德乃長治邦者行此節則鄉之有德者益眾故曰脩之邦其德乃豐莅天下者行此節則民之生莫不受其澤故曰脩之天下其德乃普脩身者以此別君子小人治鄉治邦莅天下者各以此科適觀息耗則萬不失一故曰以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾奚以知天下之然也以此
