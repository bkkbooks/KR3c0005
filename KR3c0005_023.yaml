body:
  text: 說林下第二十三伯樂教二人相踶馬相與之簡子廄觀馬一人舉踶馬其一人從後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而腫膝夫踶馬也者舉後而任前腫膝不可任也故後不舉子巧於相踶馬而拙於任腫膝夫事有所必歸而以有所腫膝而不任智者之所獨知也惠子曰置猿於柙中則與豚同故勢不便非所以逞能也衛將軍文子見曾子曾子不起而延於坐席正身於奧文子謂其御曰曾子愚人也哉以我為君子也君子安可毋敬也以我為暴人也暴人安可侮也曾子不僇命也鳥有翢翢者重首而屈尾將欲飲於河則必顛乃銜其羽而飲之人之所有飲不足者不可不索其羽也鱣似蛇蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱣婦人拾蠶利之所在皆為賁諸伯樂教其所憎者相千里之馬教其所愛者相駑馬千里之馬時一其利緩駑馬日售其利急此周書所謂下言而上用者惑也桓赫曰刻削之道鼻莫如大目莫如小鼻大可小小不可大也目小可大大不可小也舉事亦然為其後可復者也則事寡敗矣崇侯惡來知不適紂之誅也而不見武王之滅之也比干子胥知其君之必亡也而不知身之死也故曰崇侯惡來知心而不知事比干子胥知事而不知心聖人其備矣宋太宰貴而主斷季子將見宋君梁子聞之曰語必可與太宰三坐乎不然將不免季子因說以貴主而輕國楊朱之弟楊布衣素衣而出天雨解素衣衣緇衣而反其狗不知而吠之楊布怒將擊之楊朱曰子毋擊也子亦猶是曩者使女狗白而往黑而來子豈能毋怪哉惠子曰羿執決持扞操弓關機越人爭為持旳弱子扜弓慈母入室閉戶故曰可必則越人不疑羿不可必則慈母逃弱子桓公問管仲富有涯乎荅曰水之以涯其無水者也富之以涯其富已足者也人不能自止於足而亡其富之涯乎宋之富賈有監止子者與人爭買百金之璞玉因佯失而毀之負其百金而理其毀瑕得千溢焉事有舉之而有敗而賢其毋舉之者負之時也有欲以御見荊王者眾騶妬之因曰臣能撽鹿見王王為御不及鹿自御及之王善其御也乃言眾騶妬之荊令公子將伐陳丈人送之曰晉彊不可不慎也公子曰丈人奚憂吾為丈人破晉丈人曰可吾方廬陳南門之外公子曰是何也曰我笑勾踐也為人之如是其易也己獨何為密密十年難乎堯以天下讓許由許由逃之舍於家人家人藏其皮冠夫棄天下而家人藏其皮冠是不知許由者也三虱相與訟一虱過之曰訟者奚說三虱曰爭肥饒之地一虱曰若亦不患臘之至而茅之燥耳若又奚患於是乃相與聚嘬其母而食之彘臞人乃弗殺蟲有螝者一身兩口爭食相齕也遂相殺因自殺人臣之爭事而亡其國者皆螝類也宮有堊器有滌則潔矣行身亦然無滌堊之地則寡非矣公子糾將為亂桓公使使者視之使者報曰笑不樂視不見必為亂乃使魯人殺之公孫弘斷髮而為越王騎公孫喜使人絕之曰吾不與子為昆弟矣公孫弘曰我斷髮子斷頸而為人用兵我將謂子何周南之戰公孫喜死焉有與悍者鄰欲賣宅而避之人曰是其貫將滿矣子姑待之答曰吾恐其以我滿貫也遂去之故曰物之幾者非所靡也孔子謂弟子曰孰能導子西之釣名也子貢曰賜也能乃導之不復疑也孔子曰寬哉不被於利絜哉民性有恆曲為曲直為直孔子曰子西不免白公之難子西死焉故曰直於行者曲於欲晉中行文子出亡過於縣邑從者曰此嗇夫公之故人公奚不休舍且待後車文子曰吾嘗好音此人遺我鳴琴吾好佩此人遺我玉環是振我過者也以求容於我者吾恐其以我求容於人也乃去之果收文子後車二乘而獻之其君矣周趮謂宮他曰為我謂齊王曰以齊資我於魏請以魏事王宮他曰不可是示之無魏也齊王必不資於無魏者而以怨有魏者公不如曰以王之所欲臣請以魏聽王齊王必以公為有魏也必因公是公有齊也因以有齊魏矣白圭謂宋大尹曰君長自知政公無事矣今君少主也而務名不如令荊賀君之孝也則君不奪公位而大敬重公則公常用宋矣管仲鮑叔相謂曰君亂甚矣必失國齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先達者相收管仲乃從公子糾鮑叔從小白國人果弒君小白先入為君魯人拘管仲而效之鮑叔言而相之故諺曰巫咸雖善祝不能自祓也秦醫雖善除不能自彈也以管仲之聖而待鮑叔之助此鄙諺所謂虜自賣裘而不售士自譽辯而不信者也荊王伐吳吳使沮衛蹶融犒於荊師而將軍曰縛之殺以釁鼓問之曰女來卜乎荅曰卜卜吉乎曰吉荊人曰今荊將欲女釁鼓其何也荅曰是故其所以吉也吳使民來也固視將軍怒將軍怒將深溝高壘將軍不怒將懈怠今也將軍殺臣則吳必警守矣且國之卜非為一臣卜夫殺一臣而存一國其不言吉何也且死者無知則以臣釁鼓無益也死者有知也臣將當戰之時臣使鼓不鳴荊人因不殺也智伯將伐仇由而道難不通乃鑄大鐘遺仇由之君仇由之君大說除道將內之赤章曼枝曰不可此小之所以事大也而今也大以來卒必隨之不可內也仇由之君不聽遂內之赤章曼枝因斷轂而驅至於齊七月而仇由亡矣越已勝吳又索卒於荊而攻晉左史倚相謂荊王曰夫越破吳豪士死銳卒盡大甲傷今又索卒以攻晉示我不病也不如起師與分吳荊王曰善因起師而從越越王怒將擊之大夫種曰不可吾豪士盡大甲傷我與戰必不剋不如賂之乃割露山之陰五百里以賂之荊伐陳吳救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚吳人必至不如備之乃為陳陳未成也而吳人至見荊陳而反左史曰吳反覆六十里其君子必休小人必食我行三十里擊之必可敗也乃從之遂破吳軍韓趙相與為難韓子索兵於魏曰願借師以伐趙魏文侯曰寡人與趙兄弟不可以從趙又索兵以攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反已乃知文侯以搆於己乃皆朝魏齊伐魯索讒鼎魯以其鴈往齊人曰鴈也魯人曰真也齊曰使樂正子春來吾將聽子魯君請樂正子春樂正子春曰胡不以其真往也君曰我愛之荅曰臣亦愛臣之信韓咎立為君未定也弟在周周欲重之而恐韓咎不立也綦母恢曰不若以車百乘送之得立因曰為戒不立則曰來效賊也靖郭君將城薛客多以諫者靖郭君謂謁者曰毋為客通齊人有請見者曰臣請三言而已過三言臣請烹靖郭君因見之客趨進曰海大魚因反走靖郭君曰請聞其說客曰臣不敢以死為戲靖郭君曰願為寡人言之荅曰君聞大魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉今夫齊亦君之海也君長有齊奚以薛為君失齊雖隆薛城至於天猶無益也靖郭君曰善乃輟不城薛荊王弟在秦秦不出也中射之士曰資臣百金臣能出之因載百金之晉見叔向曰荊王弟在秦秦不出也請以百金委叔向叔向受金而以見之晉平公曰可以城壺丘矣平公曰何也對曰荊王弟在秦秦不出也是秦惡荊也必不敢禁我城壺丘若禁之我曰為我出荊王之弟吾不城也彼如出之可以德荊彼不出是卒惡也必不敢禁我城壺丘矣公曰善乃城壺丘謂秦公曰為我出荊王之弟吾不城也秦因出之荊王大說以鍊金百鎰遺晉闔廬攻郢戰三勝問子胥曰可以退乎子胥對曰溺人者一飲而止則無遂者以其休也不如乘之以沉之鄭人有一子將宦謂其家曰必築壞墻是不善人將竊其巷人亦云不時築而人果竊之以其子為智以巷人告者為盜
